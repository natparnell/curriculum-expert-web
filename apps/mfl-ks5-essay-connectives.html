<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Essay Connectives & Register</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#faf8f5;--card:#fff;--text:#1c1917;--text2:#78716c;--accent:#7c3aed;--accent-bg:#f5f3ff;--formal:#0d9488;--formal-bg:#ccfbf1;--informal:#f97316;--informal-bg:#fff7ed;--border:#e7e5e4;--shadow:0 2px 12px rgba(0,0,0,.05);--radius:10px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
.masthead{background:#1c1917;color:#e7e5e4;padding:16px 24px;display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
.masthead h1{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:900}
.masthead h1 span{color:var(--accent);font-style:italic;font-weight:400}
.masthead .tag{font-size:.6rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#a8a29e;background:#292524;padding:3px 10px;border-radius:3px}
.main{max-width:800px;margin:0 auto;padding:20px}

.lang-tabs{display:flex;gap:0;margin-bottom:16px;border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.lang-tab{flex:1;padding:10px;border:none;background:var(--card);font-family:'DM Sans',sans-serif;font-size:.75rem;font-weight:600;cursor:pointer;color:var(--text2);transition:all .2s}
.lang-tab.active{background:var(--accent);color:#fff}

.cat-tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.cat-tab{padding:6px 14px;border:1.5px solid var(--border);border-radius:5px;background:var(--card);font-family:'DM Sans',sans-serif;font-size:.7rem;font-weight:600;cursor:pointer;color:var(--text2);transition:all .2s}
.cat-tab:hover{border-color:var(--accent)}
.cat-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}

.connective-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.conn-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px;box-shadow:var(--shadow);cursor:pointer;transition:all .2s}
.conn-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.conn-card .foreign{font-size:1rem;font-weight:700;margin-bottom:2px}
.conn-card .english{font-size:.78rem;color:var(--text2)}
.conn-card .register-badge{display:inline-block;font-size:.58rem;font-weight:700;padding:2px 8px;border-radius:3px;margin-top:4px}
.conn-card .register-badge.formal{background:var(--formal-bg);color:var(--formal)}
.conn-card .register-badge.neutral{background:#f1f5f9;color:#475569}
.conn-card .register-badge.informal{background:var(--informal-bg);color:var(--informal)}
.conn-card .example{font-size:.72rem;color:var(--text2);font-style:italic;margin-top:6px;padding-top:6px;border-top:1px solid var(--border);display:none}
.conn-card.expanded .example{display:block}
.conn-card .pron{font-size:.65rem;color:#a78bfa;margin-top:2px}

.register-guide{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px;box-shadow:var(--shadow)}
.register-guide h3{font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700;color:var(--accent);margin-bottom:10px}
.register-row{display:grid;grid-template-columns:80px 1fr 1fr;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);font-size:.78rem;align-items:center}
.register-row:last-child{border-bottom:none}
.register-row .r-label{font-weight:700;font-size:.68rem;text-transform:uppercase;letter-spacing:.5px}
.register-row .r-formal{color:var(--formal);font-weight:600}
.register-row .r-informal{color:var(--informal);font-weight:600}

.copy-hint{text-align:center;font-size:.72rem;color:var(--text2);margin-bottom:10px}

@media(max-width:600px){.connective-grid{grid-template-columns:1fr}.register-row{grid-template-columns:1fr;gap:2px}}
</style>
</head>
<body>
<div class="masthead"><h1>Essay Connectives & <span>Register</span></h1><span class="tag">A-Level MFL</span></div>
<div class="main">
<div class="lang-tabs" id="langTabs">
<button class="lang-tab active" data-l="french">French</button>
<button class="lang-tab" data-l="spanish">Spanish</button>
<button class="lang-tab" data-l="german">German</button>
</div>
<div class="cat-tabs" id="catTabs"></div>
<div class="copy-hint">Tap a connective to expand its example sentence</div>
<div class="connective-grid" id="connGrid"></div>
<div class="register-guide" id="registerGuide"></div>
</div>
<script>

],

{foreign:'Puisque',english:'Since',register:'neutral',example:'Puisque la situation est urgente, il faut r&#xE9;agir imm&#xE9;diatement.',pron:'pwees-KUH'},

],

{foreign:'Ainsi',english:'Thus',register:'formal',example:'Ainsi, nous pouvons conclure que le probl&#xE8;me est complexe.',pron:'an-SEE'},

{foreign:'Il me semble que',english:'It seems to me that',register:'formal',example:'Il me semble que la situation n&#xE9;cessite une intervention urgente.',pron:'eel muh SOMBL kuh'},
{foreign:'Force est de constater que',english:'One must acknowledge that',register:'formal',example:'Force est de constater que les r&#xE9;sultats sont d&#xE9;cevants.',pron:'fors ay duh kon-sta-TAY kuh'}
],
Conclusion:[
{foreign:'En conclusion',english:'In conclusion',register:'formal',example:'En conclusion, il appara&#xEE;t clairement que des mesures s\'imposent.',pron:'on kon-kloo-ZYON'},
{foreign:'Pour conclure',english:'To conclude',register:'formal',example:'Pour conclure, cette question reste ouverte au d&#xE9;bat.',pron:'poor kon-KLOOR'},
{foreign:'En somme',english:'In short',register:'formal',example:'En somme, les arguments en faveur l\'emportent sur les objections.',pron:'on SOM'}
]
},
registerGuide:[
{context:'Addressing the reader',formal:'On peut constater que...',informal:'Tu vois que...'},
{context:'Giving opinion',formal:'Il convient de souligner...',informal:'Je pense que...'},
{context:'Concluding',formal:'En d&#xE9;finitive...',informal:'Bref...'},
{context:'Expressing certainty',formal:'Il est ind&#xE9;niable que...',informal:'C\'est s&#xFB;r que...'}
]
},

categories:['Addition','Contrast','Cause','Consequence','Opinion','Conclusion'],
connectives:{
Addition:[
{foreign:'Adem&#xE1;s',english:'Moreover',register:'formal',example:'Adem&#xE1;s, es importante se&#xF1;alar que la tendencia contin&#xFA;a.',pron:'ah-deh-MAS'},
{foreign:'Asimismo',english:'Likewise',register:'formal',example:'Asimismo, los datos confirman esta hip&#xF3;tesis.',pron:'ah-see-MEES-moh'},
{foreign:'Tambi&#xE9;n',english:'Also',register:'neutral',example:'Tambi&#xE9;n hay que considerar otros factores.',pron:'tam-bee-EN'}
],
Contrast:[
{foreign:'Sin embargo',english:'However',register:'formal',example:'Sin embargo, no se puede ignorar la complejidad del problema.',pron:'seen em-BAR-goh'},
{foreign:'No obstante',english:'Nevertheless',register:'formal',example:'No obstante, existen argumentos a favor de esta postura.',pron:'noh obs-TAN-teh'},
{foreign:'Pero',english:'But',register:'informal',example:'Pero tambi&#xE9;n hay desventajas.',pron:'PEH-roh'}
],
Cause:[
{foreign:'Dado que',english:'Given that',register:'formal',example:'Dado que la situaci&#xF3;n es grave, se necesitan medidas urgentes.',pron:'DAH-doh keh'},
{foreign:'Porque',english:'Because',register:'neutral',example:'Porque la sociedad est&#xE1; cambiando r&#xE1;pidamente.',pron:'por-KEH'}
],
Consequence:[
{foreign:'Por consiguiente',english:'Consequently',register:'formal',example:'Por consiguiente, es necesario actuar con rapidez.',pron:'por kon-see-gee-EN-teh'},
{foreign:'Por lo tanto',english:'Therefore',register:'formal',example:'Por lo tanto, debemos reconsiderar nuestra posici&#xF3;n.',pron:'por lo TAN-toh'}
],
Opinion:[
{foreign:'En mi opini&#xF3;n',english:'In my opinion',register:'neutral',example:'En mi opini&#xF3;n, esta pol&#xED;tica es inadecuada.',pron:'en mee oh-pee-nee-ON'},
{foreign:'Cabe destacar que',english:'It is worth noting that',register:'formal',example:'Cabe destacar que los resultados son prometedores.',pron:'KAH-beh des-tah-KAR keh'}
],
Conclusion:[
{foreign:'En conclusi&#xF3;n',english:'In conclusion',register:'formal',example:'En conclusi&#xF3;n, los beneficios superan los inconvenientes.',pron:'en kon-kloo-see-ON'},
{foreign:'En resumidas cuentas',english:'In short',register:'formal',example:'En resumidas cuentas, la evidencia apoya esta tesis.',pron:'en reh-soo-MEE-das KWEN-tas'}
]
},
registerGuide:[
{context:'Addressing the reader',formal:'Cabe se&#xF1;alar que...',informal:'Mira, es que...'},
{context:'Giving opinion',formal:'Considero que...',informal:'Creo que...'},
{context:'Concluding',formal:'En definitiva...',informal:'Total, que...'},
{context:'Expressing certainty',formal:'Es innegable que...',informal:'Est&#xE1; claro que...'}
]
},

categories:['Addition','Contrast','Cause','Consequence','Opinion','Conclusion'],
connectives:{
Addition:[
{foreign:'Dar&#xFC;ber hinaus',english:'Furthermore',register:'formal',example:'Dar&#xFC;ber hinaus muss man die sozialen Folgen bedenken.',pron:'da-ROO-ber hin-OWS'},
{foreign:'Au&#xDF;erdem',english:'Moreover',register:'neutral',example:'Au&#xDF;erdem zeigen die Statistiken einen deutlichen Trend.',pron:'OW-ser-daym'},
{foreign:'Auch',english:'Also',register:'informal',example:'Auch die jungen Leute sind davon betroffen.',pron:'owkh'}
],
Contrast:[
{foreign:'Jedoch',english:'However',register:'formal',example:'Jedoch darf man die Gegenargumente nicht ignorieren.',pron:'yeh-DOKH'},
{foreign:'Dennoch',english:'Nevertheless',register:'formal',example:'Dennoch bleibt die Frage offen.',pron:'DEN-nokh'},
{foreign:'Aber',english:'But',register:'informal',example:'Aber es gibt auch Nachteile.',pron:'AH-ber'}
],
Cause:[
{foreign:'Angesichts der Tatsache, dass',english:'Given the fact that',register:'formal',example:'Angesichts der Tatsache, dass die Lage ernst ist, m&#xFC;ssen wir handeln.',pron:'AN-geh-zikhts'},
{foreign:'Weil',english:'Because',register:'neutral',example:'Weil die Situation sich verschlechtert hat.',pron:'vyle'}
],
Consequence:[
{foreign:'Folglich',english:'Consequently',register:'formal',example:'Folglich ist es notwendig, Ma&#xDF;nahmen zu ergreifen.',pron:'FOLK-likh'},
{foreign:'Deshalb',english:'Therefore',register:'neutral',example:'Deshalb sollten wir unsere Strategie &#xFC;berdenken.',pron:'DES-halp'}
],
Opinion:[
{foreign:'Meiner Meinung nach',english:'In my opinion',register:'neutral',example:'Meiner Meinung nach ist diese Politik unwirksam.',pron:'MY-ner MY-nung nakh'},
{foreign:'Es steht fest, dass',english:'It is certain that',register:'formal',example:'Es steht fest, dass die Ergebnisse vielversprechend sind.',pron:'es shtayt fest das'}
],
Conclusion:[
{foreign:'Zusammenfassend',english:'In summary',register:'formal',example:'Zusammenfassend l&#xE4;sst sich sagen, dass die Vorteile &#xFC;berwiegen.',pron:'tsoo-ZAM-en-fas-end'},
{foreign:'Abschlie&#xDF;end',english:'In conclusion',register:'formal',example:'Abschlie&#xDF;end m&#xF6;chte ich betonen, dass diese Frage komplex ist.',pron:'AP-shlee-send'}
]
},
registerGuide:[
{context:'Addressing the reader',formal:'Es ist hervorzuheben, dass...',informal:'Schau mal...'},
{context:'Giving opinion',formal:'Ich vertrete die Auffassung...',informal:'Ich finde, dass...'},
{context:'Concluding',formal:'Letzten Endes...',informal:'Also...'},
{context:'Expressing certainty',formal:'Es steht au&#xDF;er Frage, dass...',informal:'Es ist klar, dass...'}
]
}
};

let lang='french',cat='Addition';

document.querySelectorAll('.lang-tab').forEach(t=>t.addEventListener('click',()=>{
lang=t.dataset.l;document.querySelectorAll('.lang-tab').forEach(b=>b.classList.remove('active'));t.classList.add('active');
cat=DATA[lang].categories[0];render();
}));

function render(){
const d=DATA[lang];
// Category tabs
const ct=document.getElementById('catTabs');ct.innerHTML='';
d.categories.forEach(c=>{
const btn=document.createElement('button');btn.className='cat-tab'+(c===cat?' active':'');btn.textContent=c;
btn.addEventListener('click',()=>{cat=c;render();});ct.appendChild(btn);
});

// Connectives
const grid=document.getElementById('connGrid');grid.innerHTML='';
(d.connectives[cat]||[]).forEach(c=>{
const card=document.createElement('div');card.className='conn-card';
card.innerHTML=`<div class="foreign">${c.foreign}</div><div class="english">${c.english}</div><span class="register-badge ${c.register}">${c.register}</span><div class="pron">${c.pron}</div><div class="example">"${c.example}"</div>`;
card.addEventListener('click',()=>card.classList.toggle('expanded'));
grid.appendChild(card);
});

// Register guide
const rg=document.getElementById('registerGuide');
rg.innerHTML=`<h3>Register Comparison</h3><div class="register-row"><div class="r-label">Context</div><div class="r-label" style="color:var(--formal)">Formal</div><div class="r-label" style="color:var(--informal)">Informal</div></div>`;
d.registerGuide.forEach(r=>{
rg.innerHTML+=`<div class="register-row"><div class="r-label">${r.context}</div><div class="r-formal">${r.formal}</div><div class="r-informal">${r.informal}</div></div>`;
});
}

render();
</script>
</body>
</html>
