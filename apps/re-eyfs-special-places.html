<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Special Places</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#fce7f3;--card:#fff;--text:#831843;--text2:#be185d;--accent:#be185d;--accent-bg:#fdf2f8;--border:#fbcfe8;--shadow:0 4px 16px rgba(131,24,67,.1);--shadow-lg:0 8px 32px rgba(131,24,67,.16);--radius:20px;--success:#22c55e}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh;user-select:none;-webkit-user-select:none}
.header{background:linear-gradient(135deg,#be185d,#ec4899,#f9a8d4);color:#fff;padding:16px 20px;text-align:center;box-shadow:var(--shadow)}
.header h1{font-size:1.6rem;font-weight:900;text-shadow:2px 2px 0 rgba(0,0,0,.1)}
.header p{font-size:.85rem;opacity:.9;font-weight:600;margin-top:2px}
.main{max-width:560px;margin:0 auto;padding:16px}

.instruction{text-align:center;font-size:1rem;font-weight:700;padding:10px;background:var(--accent-bg);border-radius:14px;margin-bottom:14px;border:2px solid var(--border)}

.places-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
.place-card{display:flex;flex-direction:column;align-items:center;gap:4px;padding:14px 8px;border:3px solid var(--border);border-radius:var(--radius);background:var(--card);box-shadow:var(--shadow);cursor:pointer;transition:all .25s;touch-action:manipulation}
.place-card:hover{transform:scale(1.04)}
.place-card.active{border-color:var(--accent);background:var(--accent-bg);transform:scale(1.04);box-shadow:var(--shadow-lg)}
.place-card .p-icon{font-size:2.4rem}
.place-card .p-name{font-size:.82rem;font-weight:800;text-align:center}
.place-card .p-religion{font-size:.62rem;font-weight:600;color:var(--text2)}

.detail-panel{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow-lg);overflow:hidden;margin-bottom:14px;display:none;animation:popIn .3s ease}
.detail-panel.show{display:block}
.detail-banner{padding:16px;text-align:center;color:#fff}
.detail-banner .d-icon{font-size:3rem}
.detail-banner h2{font-size:1.1rem;font-weight:900;margin-top:4px}
.detail-body{padding:16px}
.detail-body p{font-size:.88rem;line-height:1.6;margin-bottom:10px}
.features-list{list-style:none;margin-bottom:10px}
.features-list li{padding:6px 0;border-bottom:1px solid var(--border);font-size:.82rem;display:flex;align-items:flex-start;gap:8px}
.features-list li .f-icon{font-size:1.1rem;flex-shrink:0}
.fun-fact{padding:10px;background:#fef3c7;border-radius:10px;font-size:.82rem;border-left:4px solid #f59e0b}
.fun-fact strong{color:#92400e}

.score-bar{display:flex;justify-content:center;gap:6px;margin-bottom:14px}
.score-dot{width:14px;height:14px;border-radius:50%;background:#fce7f3;transition:all .3s}
.score-dot.done{background:var(--accent)}

.complete-msg{text-align:center;padding:16px;background:#dcfce7;border:3px solid var(--success);border-radius:var(--radius);font-size:1.1rem;font-weight:900;color:#166534;display:none;animation:popIn .4s ease}

@keyframes popIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
.celebration{position:fixed;inset:0;pointer-events:none;z-index:1000}
.confetti{position:absolute;border-radius:2px;animation:confettiFall linear forwards}
@keyframes confettiFall{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(100vh) rotate(720deg) scale(.3)}}
</style>
</head>
<body>
<div class="header"><h1>Special Places</h1><p>Visit places of worship around the world!</p></div>
<div class="main">
<div class="instruction">Tap a place to visit it and learn what makes it special!</div>
<div class="score-bar" id="scoreBar"></div>
<div class="places-grid" id="placesGrid"></div>
<div class="detail-panel" id="detailPanel"></div>
<div class="complete-msg" id="completeMsg"></div>
</div>
<div class="celebration" id="celebration"></div>
<script>
const PLACES=[
{name:'Church',icon:'&#x26EA;',religion:'Christianity',colour:'#7c3aed',
desc:'A church is where Christians go to worship God. They pray, sing hymns and listen to stories from the Bible. The most important day is Sunday.',
features:[{icon:'&#x271D;&#xFE0F;',text:'A cross, the symbol of Christianity'},{icon:'&#x1F56F;&#xFE0F;',text:'Candles that are lit during services'},{icon:'&#x1F3B5;',text:'An organ or piano for hymns'},{icon:'&#x1F4D6;',text:'A Bible on the altar'}],
fact:'Some churches have beautiful stained glass windows that tell stories from the Bible!'},
{name:'Mosque',icon:'&#x1F54C;',religion:'Islam',colour:'#059669',
desc:'A mosque is where Muslims go to pray to Allah. They pray five times a day facing Makkah. Before praying, they wash their hands and feet.',
features:[{icon:'&#x1F319;',text:'A crescent moon and star on top'},{icon:'&#x1F9F9;',text:'Beautiful carpets covering the floor for prayer'},{icon:'&#x1F4E2;',text:'A minaret (tall tower) where the call to prayer is made'},{icon:'&#x1F6BF;',text:'A place to wash before prayers'}],
fact:'Everyone takes off their shoes before going into a mosque to keep it clean!'},
{name:'Synagogue',icon:'&#x1F54D;',religion:'Judaism',colour:'#2563eb',
desc:'A synagogue is where Jewish people go to pray and learn about their faith. The Torah (holy book) is read from a special scroll.',
features:[{icon:'&#x2721;&#xFE0F;',text:'The Star of David symbol'},{icon:'&#x1F4DC;',text:'Torah scrolls kept in a special cupboard called the Ark'},{icon:'&#x1F56F;&#xFE0F;',text:'An eternal light (ner tamid) that never goes out'},{icon:'&#x1F3B5;',text:'A raised platform (bimah) for reading the Torah'}],
fact:'Torah scrolls are handwritten and can take over a year to make!'},
{name:'Mandir',icon:'&#x1F6D5;',religion:'Hinduism',colour:'#f59e0b',
desc:'A mandir (Hindu temple) is decorated with colourful statues of gods and goddesses. Hindus visit to pray, offer flowers and food, and ring bells.',
features:[{icon:'&#x1F514;',text:'Bells that are rung when you arrive'},{icon:'&#x1F33A;',text:'Flower garlands offered to the gods'},{icon:'&#x1FA94;',text:'Lamps and candles for worship (puja)'},{icon:'&#x1F345;',text:'Fruit and food offered to the gods'}],
fact:'Hindu temples often have beautiful towers called shikharas that point up towards heaven!'},
{name:'Gurdwara',icon:'&#x1F3DB;&#xFE0F;',religion:'Sikhism',colour:'#f97316',
desc:'A gurdwara is where Sikhs go to worship. Everyone is welcome and there is always a free kitchen (langar) where anyone can eat a meal together.',
features:[{icon:'&#x1F6A9;',text:'A special orange flag (Nishan Sahib) flying outside'},{icon:'&#x1F4D6;',text:'The Guru Granth Sahib (holy book) is treated with great respect'},{icon:'&#x1F37D;&#xFE0F;',text:'A free kitchen (langar) that feeds everyone'},{icon:'&#x1F9E3;',text:'Everyone covers their head as a sign of respect'}],
fact:'The langar in the Golden Temple in India feeds over 100,000 people every single day for free!'}
];

let explored=new Set();
const scoreBar=document.getElementById('scoreBar');
const grid=document.getElementById('placesGrid');
const detail=document.getElementById('detailPanel');

PLACES.forEach(()=>{const d=document.createElement('div');d.className='score-dot';scoreBar.appendChild(d);});

PLACES.forEach((p,i)=>{
const card=document.createElement('div');card.className='place-card';
card.innerHTML=`<span class="p-icon">${p.icon}</span><span class="p-name">${p.name}</span><span class="p-religion">${p.religion}</span>`;
card.addEventListener('click',()=>showPlace(i));
grid.appendChild(card);
});

function showPlace(idx){
explored.add(idx);
scoreBar.querySelectorAll('.score-dot').forEach((d,i)=>d.classList.toggle('done',explored.has(i)));
grid.querySelectorAll('.place-card').forEach((c,i)=>c.classList.toggle('active',i===idx));
const p=PLACES[idx];
detail.classList.remove('show');void detail.offsetWidth;detail.classList.add('show');
detail.innerHTML=`<div class="detail-banner" style="background:linear-gradient(135deg,${p.colour},${p.colour}cc)"><div class="d-icon">${p.icon}</div><h2>${p.name}</h2></div>
<div class="detail-body"><p>${p.desc}</p>
<ul class="features-list">${p.features.map(f=>`<li><span class="f-icon">${f.icon}</span>${f.text}</li>`).join('')}</ul>
<div class="fun-fact"><strong>Fun fact:</strong> ${p.fact}</div></div>`;
spawnMini();
if(explored.size===PLACES.length){document.getElementById('completeMsg').style.display='block';document.getElementById('completeMsg').innerHTML='&#x1F389; You visited all the special places! Each one is unique and special!';celebrate();}
}

function spawnMini(){const c=document.getElementById('celebration');const cols=['#be185d','#ec4899','#22c55e','#f59e0b','#3b82f6'];for(let i=0;i<8;i++){const e=document.createElement('div');e.className='confetti';e.style.cssText=`left:${Math.random()*100}vw;top:-10px;background:${cols[Math.floor(Math.random()*cols.length)]};width:${5+Math.random()*6}px;height:${5+Math.random()*6}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1+Math.random()*1.5}s;animation-delay:${Math.random()*.3}s;`;c.appendChild(e);setTimeout(()=>e.remove(),3000);}}
function celebrate(){const c=document.getElementById('celebration');const cols=['#be185d','#ec4899','#22c55e','#f59e0b','#3b82f6','#a855f7'];for(let i=0;i<35;i++){const e=document.createElement('div');e.className='confetti';e.style.cssText=`left:${Math.random()*100}vw;top:-12px;background:${cols[Math.floor(Math.random()*cols.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*.5}s;`;c.appendChild(e);setTimeout(()=>e.remove(),4500);}}
</script>
</body>
</html>
