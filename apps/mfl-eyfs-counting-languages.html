<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Counting in Languages</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#ede9fe;--card-bg:#fff;--text:#3b0764;--text-light:#7c3aed;--accent:#7c3aed;--french:#2563eb;--spanish:#dc2626;--german:#f59e0b;--border:#c4b5fd;--shadow:0 4px 16px rgba(60,7,100,.1);--shadow-lg:0 8px 32px rgba(60,7,100,.16);--radius:20px;--success:#22c55e}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh;user-select:none;-webkit-user-select:none}
.header{background:linear-gradient(135deg,#7c3aed,#a78bfa,#c4b5fd);color:#fff;padding:16px 20px;text-align:center;box-shadow:var(--shadow)}
.header h1{font-size:1.6rem;font-weight:900;text-shadow:2px 2px 0 rgba(0,0,0,.1)}
.header p{font-size:.85rem;opacity:.9;font-weight:600;margin-top:2px}
.main{max-width:560px;margin:0 auto;padding:16px}
.lang-bar{display:flex;gap:8px;justify-content:center;margin-bottom:14px}
.lang-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 16px;border:3px solid transparent;border-radius:16px;background:var(--card-bg);box-shadow:var(--shadow);cursor:pointer;transition:all .25s;touch-action:manipulation}
.lang-btn:hover{transform:scale(1.06)}
.lang-btn .l-flag{font-size:2rem}
.lang-btn .l-name{font-size:.7rem;font-weight:800}
.lang-btn.active{transform:scale(1.08);box-shadow:var(--shadow-lg)}
.lang-btn[data-lang="french"].active{border-color:var(--french);background:#dbeafe}
.lang-btn[data-lang="spanish"].active{border-color:var(--spanish);background:#fef2f2}
.lang-btn[data-lang="german"].active{border-color:var(--german);background:#fef3c7}

.number-display{text-align:center;padding:20px;background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow-lg);margin-bottom:14px}
.num-big{font-size:4rem;font-weight:900;display:block}
.num-word{font-size:1.6rem;font-weight:800;margin:6px 0}
.num-english{font-size:.85rem;color:var(--text-light);font-weight:600}
.num-pron{font-size:.78rem;color:#a78bfa;font-style:italic;margin-top:4px}

.objects-row{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin:10px 0;min-height:40px}
.obj{font-size:1.8rem;animation:popObj .3s ease both}
@keyframes popObj{from{opacity:0;transform:scale(0)}to{opacity:1;transform:scale(1)}}

.number-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:14px}
.num-btn{padding:14px 8px;border:3px solid var(--border);border-radius:14px;background:var(--card-bg);font-family:'Inter',sans-serif;font-size:1.4rem;font-weight:900;cursor:pointer;transition:all .25s;touch-action:manipulation;text-align:center;box-shadow:var(--shadow)}
.num-btn:hover{transform:scale(1.08)}
.num-btn.active{box-shadow:var(--shadow-lg)}
.num-btn.done{border-color:var(--success);background:#dcfce7}

.score-bar{display:flex;justify-content:space-between;padding:8px 14px;background:var(--card-bg);border-radius:10px;box-shadow:var(--shadow);margin-bottom:14px;font-size:.82rem;font-weight:700}

.complete-msg{text-align:center;padding:16px;background:#dcfce7;border:3px solid var(--success);border-radius:var(--radius);font-size:1.1rem;font-weight:900;color:#166534;display:none;animation:popIn .4s ease}
@keyframes popIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}

.celebration{position:fixed;inset:0;pointer-events:none;z-index:1000}
.confetti{position:absolute;border-radius:2px;animation:confettiFall linear forwards}
@keyframes confettiFall{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(100vh) rotate(720deg) scale(.3)}}

@media(max-width:420px){.number-grid{grid-template-columns:repeat(5,1fr)}.num-btn{padding:10px 4px;font-size:1.1rem}.num-big{font-size:3rem}.num-word{font-size:1.2rem}}
</style>
</head>
<body>
<div class="header"><h1>Counting in Languages</h1><p>Count to 10 in French, Spanish and German!</p></div>
<div class="main">
<div class="lang-bar" id="langBar">
<button class="lang-btn active" data-lang="french"><span class="l-flag">&#x1F1EB;&#x1F1F7;</span><span class="l-name">French</span></button>
<button class="lang-btn" data-lang="spanish"><span class="l-flag">&#x1F1EA;&#x1F1F8;</span><span class="l-name">Spanish</span></button>
<button class="lang-btn" data-lang="german"><span class="l-flag">&#x1F1E9;&#x1F1EA;</span><span class="l-name">German</span></button>
</div>
<div class="score-bar"><span id="langLabel" style="color:var(--accent);">French</span><span id="progressLabel" style="color:var(--text-light);">Tap a number!</span></div>
<div class="number-display" id="numberDisplay">
<span class="num-big" id="numBig">1</span>
<div class="objects-row" id="objectsRow"></div>
<div class="num-word" id="numWord">un</div>
<div class="num-english" id="numEnglish">one</div>
<div class="num-pron" id="numPron">uh(n)</div>
</div>
<div class="number-grid" id="numberGrid"></div>
<div class="complete-msg" id="completeMsg"></div>
</div>
<div class="celebration" id="celebration"></div>
<script>
const NUMBERS={
french:{name:'French',colour:'#2563eb',nums:['un','deux','trois','quatre','cinq','six','sept','huit','neuf','dix'],pron:['uh(n)','duh','twah','KAT-ruh','sank','sees','set','weet','nuhf','dees']},
spanish:{name:'Spanish',colour:'#dc2626',nums:['uno','dos','tres','cuatro','cinco','seis','siete','ocho','nueve','diez'],pron:['OO-no','dos','tres','KWAT-ro','SINK-oh','says','see-ET-eh','OH-cho','NWEH-veh','dee-ETH']},
german:{name:'German',colour:'#f59e0b',nums:['eins','zwei','drei','vier','f\u00fcnf','sechs','sieben','acht','neun','zehn'],pron:['eyns','tsvy','dry','feer','foonf','zeks','ZEE-ben','akht','noyn','tsayn']}
};
const ENGLISH=['one','two','three','four','five','six','seven','eight','nine','ten'];
const OBJECTS=['&#x2B50;','&#x1F33B;','&#x1F34E;','&#x1F426;','&#x1F98B;','&#x2764;&#xFE0F;','&#x1F308;','&#x1F31F;','&#x1F33A;','&#x1F496;'];
let lang='french',currentNum=0,explored={french:new Set(),spanish:new Set(),german:new Set()};

const numberGrid=document.getElementById('numberGrid');
const objectsRow=document.getElementById('objectsRow');

document.querySelectorAll('.lang-btn').forEach(btn=>{
btn.addEventListener('click',()=>{
lang=btn.dataset.lang;
document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
document.getElementById('langLabel').textContent=NUMBERS[lang].name;
buildGrid();
showNumber(0);
});
});

function buildGrid(){
numberGrid.innerHTML='';
for(let i=0;i<10;i++){
const btn=document.createElement('button');
btn.className='num-btn';
if(explored[lang].has(i))btn.classList.add('done');
btn.textContent=i+1;
btn.style.color=NUMBERS[lang].colour;
if(i===currentNum)btn.classList.add('active');
btn.addEventListener('click',()=>showNumber(i));
numberGrid.appendChild(btn);
}
}

function showNumber(idx){
currentNum=idx;
explored[lang].add(idx);
const n=NUMBERS[lang];

document.getElementById('numBig').textContent=idx+1;
document.getElementById('numBig').style.color=n.colour;
document.getElementById('numWord').textContent=n.nums[idx];
document.getElementById('numWord').style.color=n.colour;
document.getElementById('numEnglish').textContent=ENGLISH[idx];
document.getElementById('numPron').textContent=n.pron[idx];

objectsRow.innerHTML='';
for(let i=0;i<=idx;i++){
const span=document.createElement('span');
span.className='obj';
span.innerHTML=OBJECTS[i%OBJECTS.length];
span.style.animationDelay=(i*0.08)+'s';
objectsRow.appendChild(span);
}

document.getElementById('progressLabel').textContent=`${explored[lang].size}/10 explored`;
buildGrid();
spawnMini();

if(explored[lang].size===10){
const allDone=Object.values(explored).every(s=>s.size===10);
if(allDone){
document.getElementById('completeMsg').style.display='block';
document.getElementById('completeMsg').innerHTML='&#x1F389; You can count to 10 in three languages! Brilliant!';
celebrate();
}
}
}

function spawnMini(){
const c=document.getElementById('celebration');
const cols=['#7c3aed','#a78bfa','#2563eb','#dc2626','#f59e0b','#22c55e'];
for(let i=0;i<6;i++){const e=document.createElement('div');e.className='confetti';e.style.cssText=`left:${Math.random()*100}vw;top:-10px;background:${cols[Math.floor(Math.random()*cols.length)]};width:${5+Math.random()*5}px;height:${5+Math.random()*5}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1+Math.random()*1.5}s;animation-delay:${Math.random()*.3}s;`;c.appendChild(e);setTimeout(()=>e.remove(),3000);}
}
function celebrate(){
const c=document.getElementById('celebration');
const cols=['#7c3aed','#a78bfa','#2563eb','#dc2626','#f59e0b','#22c55e','#ec4899'];
for(let i=0;i<35;i++){const e=document.createElement('div');e.className='confetti';e.style.cssText=`left:${Math.random()*100}vw;top:-12px;background:${cols[Math.floor(Math.random()*cols.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*.5}s;`;c.appendChild(e);setTimeout(()=>e.remove(),4500);}
}

buildGrid();
showNumber(0);
</script>
</body>
</html>
