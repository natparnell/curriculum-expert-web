<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Famous People Cards</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #fef7ed;
    --card-bg: #ffffff;
    --text: #451a03;
    --text-light: #92400e;
    --accent: #b45309;
    --accent-light: #fef3c7;
    --border: #fed7aa;
    --shadow: 0 4px 16px rgba(120,60,10,0.10);
    --shadow-lg: 0 8px 32px rgba(120,60,10,0.16);
    --radius: 18px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
    user-select: none;
    -webkit-user-select: none;
}

.header {
    background: linear-gradient(135deg, #92400e, #b45309, #d97706);
    color: #fef3c7;
    padding: 16px 20px;
    text-align: center;
    box-shadow: var(--shadow);
}
.header h1 { font-size: 1.5rem; font-weight: 900; text-shadow: 2px 2px 0 rgba(0,0,0,0.1); }
.header p { font-size: 0.82rem; opacity: 0.9; font-weight: 600; margin-top: 2px; }

.main { max-width: 600px; margin: 0 auto; padding: 16px; }

.cards-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-bottom: 16px;
}

.person-card {
    background: var(--card-bg);
    border: 3px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: var(--shadow);
    touch-action: manipulation;
}
.person-card:hover { transform: scale(1.04); box-shadow: var(--shadow-lg); }
.person-card.active { border-color: var(--accent); background: var(--accent-light); transform: scale(1.04); }
.person-card .p-icon { font-size: 2.6rem; margin-bottom: 4px; }
.person-card .p-name { font-size: 0.88rem; font-weight: 800; }
.person-card .p-years { font-size: 0.68rem; color: var(--text-light); font-weight: 600; }

/* Detail panel */
.detail-panel {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow-lg);
    overflow: hidden;
    margin-bottom: 16px;
    display: none;
    animation: slideUp 0.3s ease;
}
.detail-panel.show { display: block; }

.detail-banner {
    padding: 16px;
    text-align: center;
    color: white;
}
.detail-banner .d-icon { font-size: 3rem; }
.detail-banner h2 { font-size: 1.2rem; font-weight: 900; margin-top: 4px; }
.detail-banner .d-years { font-size: 0.82rem; opacity: 0.85; font-weight: 600; }

.detail-body { padding: 16px; }

.fact-list { list-style: none; margin-bottom: 12px; }
.fact-list li {
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
    display: flex;
    align-items: flex-start;
    gap: 8px;
    line-height: 1.5;
}
.fact-list li .fact-icon { font-size: 1.2rem; flex-shrink: 0; margin-top: 2px; }

.why-box {
    padding: 12px;
    background: var(--accent-light);
    border-radius: 12px;
    border-left: 4px solid var(--accent);
}
.why-box h3 {
    font-size: 0.72rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--accent);
    margin-bottom: 4px;
}
.why-box p { font-size: 0.85rem; color: var(--text); font-weight: 600; }

.explored-bar {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 14px;
}
.explored-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--border);
    transition: all 0.3s;
}
.explored-dot.done { background: var(--accent); }

@keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.celebration { position: fixed; inset: 0; pointer-events: none; z-index: 1000; }
.confetti { position: absolute; border-radius: 2px; animation: confettiFall linear forwards; }
@keyframes confettiFall { 0% { opacity:1; transform: translateY(0) rotate(0); } 100% { opacity:0; transform: translateY(100vh) rotate(720deg) scale(0.3); } }

@media (max-width: 420px) {
    .cards-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="header">
    <h1>Famous People Cards</h1>
    <p>Tap a card to learn about amazing people from history!</p>
</div>

<div class="main">
    <div class="explored-bar" id="exploredBar"></div>
    <div class="cards-grid" id="cardsGrid"></div>
    <div class="detail-panel" id="detailPanel"></div>
</div>

<div class="celebration" id="celebration"></div>

<script>
const PEOPLE = [
    {
        name: 'Florence Nightingale',
        icon: '&#x1F3E5;',
        years: '1820 - 1910',
        colour: '#ec4899',
        facts: [
            { icon: '&#x1F3E5;', text: 'She was a nurse who helped wounded soldiers during the Crimean War.' },
            { icon: '&#x1F56F;&#xFE0F;', text: 'She was called "The Lady with the Lamp" because she visited patients at night.' },
            { icon: '&#x1F9F9;', text: 'She taught hospitals to be cleaner, which saved many lives.' },
            { icon: '&#x1F4DA;', text: 'She started the first proper training school for nurses.' }
        ],
        why: 'Florence changed hospitals forever. Because of her, hospitals became clean and safe places. She showed that women could be leaders and change the world.'
    },
    {
        name: 'Neil Armstrong',
        icon: '&#x1F680;',
        years: '1930 - 2012',
        colour: '#3b82f6',
        facts: [
            { icon: '&#x1F680;', text: 'He was the first person to walk on the Moon in 1969.' },
            { icon: '&#x1F30D;', text: 'He flew in a spacecraft called Apollo 11 with two other astronauts.' },
            { icon: '&#x1F4AC;', text: 'His famous words: "That is one small step for man, one giant leap for mankind."' },
            { icon: '&#x2708;&#xFE0F;', text: 'Before being an astronaut, he was a fighter pilot and test pilot.' }
        ],
        why: 'Neil showed that humans could travel to other worlds. His moon landing inspired millions of people to dream about exploring space.'
    },
    {
        name: 'Rosa Parks',
        icon: '&#x1F68C;',
        years: '1913 - 2005',
        colour: '#7c3aed',
        facts: [
            { icon: '&#x1F68C;', text: 'She refused to give up her seat on a bus to a white person in 1955.' },
            { icon: '&#x270A;', text: 'Her brave action helped start the Civil Rights Movement in America.' },
            { icon: '&#x1F91D;', text: 'She worked with Martin Luther King Jr to fight for equal rights.' },
            { icon: '&#x2B50;', text: 'She is known as "The Mother of the Civil Rights Movement."' }
        ],
        why: 'Rosa stood up for what was right by staying seated. Her courage helped change unfair laws so all people could be treated equally.'
    },
    {
        name: 'Mary Anning',
        icon: '&#x1F9B4;',
        years: '1799 - 1847',
        colour: '#0d9488',
        facts: [
            { icon: '&#x1F9B4;', text: 'She found amazing dinosaur fossils on the beaches of Lyme Regis in Dorset.' },
            { icon: '&#x1F50D;', text: 'When she was just 12, she helped discover an Ichthyosaurus skeleton.' },
            { icon: '&#x1F30A;', text: 'She found fossils of creatures that lived millions of years ago in the sea.' },
            { icon: '&#x1F4D6;', text: 'Many famous scientists used her discoveries, but she did not always get the credit.' }
        ],
        why: 'Mary helped us understand that amazing creatures lived on Earth long before humans. Her discoveries changed what we know about prehistoric life.'
    },
    {
        name: 'Isambard Kingdom Brunel',
        icon: '&#x1F309;',
        years: '1806 - 1859',
        colour: '#78350f',
        facts: [
            { icon: '&#x1F309;', text: 'He designed the Clifton Suspension Bridge in Bristol.' },
            { icon: '&#x1F682;', text: 'He built the Great Western Railway connecting London to the West.' },
            { icon: '&#x1F6A2;', text: 'He designed huge steamships including the SS Great Britain.' },
            { icon: '&#x1F477;', text: 'He is considered one of the greatest engineers who ever lived.' }
        ],
        why: 'Brunel built bridges, railways and ships that helped people travel further and faster. Many of his amazing structures are still standing today!'
    },
    {
        name: 'Queen Victoria',
        icon: '&#x1F451;',
        years: '1819 - 1901',
        colour: '#6d28d9',
        facts: [
            { icon: '&#x1F451;', text: 'She became Queen when she was just 18 years old.' },
            { icon: '&#x1F30D;', text: 'She ruled for 63 years, longer than any British king or queen before her.' },
            { icon: '&#x1F3ED;', text: 'During her reign, Britain changed hugely with factories, railways and inventions.' },
            { icon: '&#x1F48D;', text: 'She started the tradition of white wedding dresses.' }
        ],
        why: 'Victoria was queen during a time of enormous change. The "Victorian era" saw inventions like the telephone, photography and the first underground railway.'
    }
];

let explored = new Set();
const cardsGrid = document.getElementById('cardsGrid');
const detailPanel = document.getElementById('detailPanel');
const exploredBar = document.getElementById('exploredBar');

// Build explored dots
PEOPLE.forEach(() => {
    const dot = document.createElement('div');
    dot.className = 'explored-dot';
    exploredBar.appendChild(dot);
});

// Build cards
PEOPLE.forEach((person, i) => {
    const card = document.createElement('div');
    card.className = 'person-card';
    card.innerHTML = `<div class="p-icon">${person.icon}</div><div class="p-name">${person.name}</div><div class="p-years">${person.years}</div>`;
    card.addEventListener('click', () => showPerson(i));
    cardsGrid.appendChild(card);
});

function showPerson(idx) {
    const person = PEOPLE[idx];
    explored.add(idx);

    // Update cards
    document.querySelectorAll('.person-card').forEach((c, i) => c.classList.toggle('active', i === idx));

    // Update explored dots
    exploredBar.querySelectorAll('.explored-dot').forEach((d, i) => d.classList.toggle('done', explored.has(i)));

    // Show detail
    detailPanel.classList.remove('show');
    void detailPanel.offsetWidth;
    detailPanel.classList.add('show');

    detailPanel.innerHTML = `
        <div class="detail-banner" style="background:linear-gradient(135deg,${person.colour},${person.colour}cc);">
            <div class="d-icon">${person.icon}</div>
            <h2>${person.name}</h2>
            <div class="d-years">${person.years}</div>
        </div>
        <div class="detail-body">
            <ul class="fact-list">
                ${person.facts.map(f => `<li><span class="fact-icon">${f.icon}</span><span>${f.text}</span></li>`).join('')}
            </ul>
            <div class="why-box">
                <h3>Why they matter</h3>
                <p>${person.why}</p>
            </div>
        </div>
    `;

    spawnMini();

    if (explored.size === PEOPLE.length) {
        setTimeout(() => celebrate(), 500);
    }
}

function spawnMini() {
    const container = document.getElementById('celebration');
    const colours = ['#b45309','#d97706','#f59e0b','#22c55e','#3b82f6'];
    for (let i = 0; i < 8; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.style.cssText = `left:${Math.random()*100}vw;top:-10px;background:${colours[Math.floor(Math.random()*colours.length)]};width:${5+Math.random()*6}px;height:${5+Math.random()*6}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${1+Math.random()*1.5}s;animation-delay:${Math.random()*0.3}s;`;
        container.appendChild(el);
        setTimeout(() => el.remove(), 3000);
    }
}

function celebrate() {
    const container = document.getElementById('celebration');
    const colours = ['#b45309','#d97706','#f59e0b','#ec4899','#3b82f6','#7c3aed','#22c55e'];
    for (let i = 0; i < 35; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.style.cssText = `left:${Math.random()*100}vw;top:-12px;background:${colours[Math.floor(Math.random()*colours.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*0.5}s;`;
        container.appendChild(el);
        setTimeout(() => el.remove(), 4500);
    }
}
</script>
</body>
</html>
