<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phonics Blender</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #fdf2f8;
    --card-bg: #ffffff;
    --text: #4a1d6a;
    --text-light: #9b6db0;
    --accent: #d946ef;
    --accent-light: #fae8ff;
    --success: #22c55e;
    --success-light: #dcfce7;
    --border: #f0abfc;
    --shadow: 0 4px 16px rgba(100,30,140,0.10);
    --shadow-lg: 0 8px 32px rgba(100,30,140,0.18);
    --radius: 18px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
    overflow-x: hidden;
    user-select: none;
    -webkit-user-select: none;
}

.header {
    background: linear-gradient(135deg, #c026d3, #d946ef, #f0abfc);
    color: white;
    padding: 16px 20px;
    text-align: center;
    box-shadow: var(--shadow);
    position: relative; z-index: 10;
}
.header h1 { font-size: 1.5rem; font-weight: 900; text-shadow: 2px 2px 0 rgba(0,0,0,0.1); }
.header p { font-size: 0.82rem; opacity: 0.9; font-weight: 600; margin-top: 2px; }

.main { max-width: 520px; margin: 0 auto; padding: 16px; }

.info-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    background: var(--card-bg);
    border-radius: 12px;
    box-shadow: var(--shadow);
    margin-bottom: 14px;
    font-weight: 700;
    font-size: 0.85rem;
}
.info-bar .level { color: var(--accent); }
.info-bar .stars { color: #f59e0b; font-size: 1.1rem; }

.word-display {
    text-align: center;
    margin-bottom: 16px;
}
.word-icon { font-size: 4rem; margin-bottom: 8px; display: block; }
.word-hint { font-size: 0.85rem; color: var(--text-light); font-weight: 600; }

.blend-area {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 20px;
    min-height: 80px;
    align-items: center;
}

.letter-box {
    width: 60px;
    height: 72px;
    background: var(--card-bg);
    border: 4px solid var(--border);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    font-weight: 900;
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: all 0.25s;
    color: var(--text);
    position: relative;
    touch-action: manipulation;
}
.letter-box:hover { transform: scale(1.1); }
.letter-box.active { border-color: var(--accent); background: var(--accent-light); transform: scale(1.12); box-shadow: var(--shadow-lg); }
.letter-box.sounding { animation: soundPulse 0.3s ease; border-color: var(--accent); }
.letter-box.revealed { border-color: var(--success); background: var(--success-light); }

.blend-arrow {
    font-size: 1.5rem;
    color: var(--border);
    display: flex;
    align-items: center;
}

.sound-label {
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--text-light);
    position: absolute;
    bottom: -20px;
}

.controls {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 16px;
}

.btn {
    padding: 14px;
    border: none;
    border-radius: 50px;
    font-family: 'Inter', sans-serif;
    font-size: 1rem;
    font-weight: 800;
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: all 0.25s;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
}
.btn:hover { transform: scale(1.03); }
.btn.sound { background: linear-gradient(135deg, var(--accent), #a855f7); color: white; }
.btn.blend { background: linear-gradient(135deg, #3b82f6, #6366f1); color: white; }
.btn.reveal { background: linear-gradient(135deg, var(--success), #16a34a); color: white; }
.btn.next { background: linear-gradient(135deg, #f97316, #f59e0b); color: white; }

.letter-options {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin-bottom: 16px;
}
.letter-option {
    width: 52px;
    height: 52px;
    border-radius: 14px;
    border: 3px solid var(--border);
    background: var(--card-bg);
    font-size: 1.5rem;
    font-weight: 900;
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: manipulation;
    box-shadow: var(--shadow);
}
.letter-option:hover { transform: scale(1.1); border-color: var(--accent); }
.letter-option.selected { background: var(--accent); color: white; border-color: var(--accent); }
.letter-option.correct { background: var(--success); color: white; border-color: var(--success); }
.letter-option.wrong { background: #ef4444; color: white; border-color: #ef4444; animation: wobble 0.4s; }

.feedback {
    text-align: center;
    font-size: 1.1rem;
    font-weight: 800;
    padding: 12px;
    border-radius: var(--radius);
    margin-bottom: 12px;
    display: none;
    animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
}
.feedback.show { display: block; }
.feedback.win { background: var(--success-light); color: #166534; border: 2px solid var(--success); }

.mode-toggle {
    display: flex;
    gap: 0;
    margin-bottom: 14px;
    border-radius: 12px;
    overflow: hidden;
    border: 3px solid var(--border);
}
.mode-btn {
    flex: 1;
    padding: 10px;
    border: none;
    background: var(--card-bg);
    font-family: 'Inter', sans-serif;
    font-size: 0.82rem;
    font-weight: 700;
    cursor: pointer;
    color: var(--text-light);
    transition: all 0.2s;
}
.mode-btn.active { background: var(--accent); color: white; }

@keyframes soundPulse { 0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }
@keyframes popIn { from { opacity: 0; transform: scale(0.7); } to { opacity: 1; transform: scale(1); } }
@keyframes wobble { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }

.celebration { position: fixed; inset: 0; pointer-events: none; z-index: 1000; }
.confetti { position: absolute; border-radius: 2px; animation: confettiFall linear forwards; }
@keyframes confettiFall { 0% { opacity:1; transform: translateY(0) rotate(0); } 100% { opacity:0; transform: translateY(100vh) rotate(720deg) scale(0.3); } }
.star-burst { position: absolute; font-size: 2rem; animation: starPop 0.8s ease forwards; }
@keyframes starPop { 0% { opacity:1; transform: scale(0); } 50% { transform: scale(1.3) rotate(180deg); } 100% { opacity:0; transform: scale(0.5) translateY(-60px); } }

@media (max-width: 400px) {
    .letter-box { width: 50px; height: 60px; font-size: 1.6rem; }
    .letter-option { width: 44px; height: 44px; font-size: 1.2rem; }
}
</style>
</head>
<body>

<div class="header">
    <h1>Phonics Blender</h1>
    <p>Sound out the letters and blend them together!</p>
</div>

<div class="main">
    <div class="info-bar">
        <span class="level" id="levelLabel">Word 1 of 10</span>
        <span class="stars" id="starsLabel"></span>
    </div>

    <div class="mode-toggle">
        <button class="mode-btn active" id="modeLearn" data-mode="learn">Learn</button>
        <button class="mode-btn" id="modeQuiz" data-mode="quiz">Quiz</button>
    </div>

    <div class="word-display">
        <span class="word-icon" id="wordIcon"></span>
        <div class="word-hint" id="wordHint"></div>
    </div>

    <div class="blend-area" id="blendArea"></div>

    <div id="learnControls" class="controls">
        <button class="btn sound" id="soundBtn">Tap each letter to hear its sound</button>
        <button class="btn blend" id="blendBtn">Blend them together!</button>
        <button class="btn next" id="nextBtn">Next Word</button>
    </div>

    <div id="quizControls" style="display:none;">
        <div class="letter-options" id="letterOptions"></div>
        <div class="feedback" id="feedback"></div>
    </div>
</div>

<div class="celebration" id="celebration"></div>

<script>
const WORDS = [
    { word: 'cat', icon: '\u{1F431}', hint: 'It says meow!', sounds: ['c', 'a', 't'] },
    { word: 'dog', icon: '\u{1F436}', hint: 'It says woof!', sounds: ['d', 'o', 'g'] },
    { word: 'sun', icon: '\u2600\uFE0F', hint: 'Bright in the sky', sounds: ['s', 'u', 'n'] },
    { word: 'hat', icon: '\u{1F3A9}', hint: 'You wear it on your head', sounds: ['h', 'a', 't'] },
    { word: 'bed', icon: '\u{1F6CF}\uFE0F', hint: 'You sleep in it', sounds: ['b', 'e', 'd'] },
    { word: 'fish', icon: '\u{1F41F}', hint: 'It swims in water', sounds: ['f', 'i', 'sh'] },
    { word: 'ship', icon: '\u{1F6A2}', hint: 'It sails on the sea', sounds: ['sh', 'i', 'p'] },
    { word: 'frog', icon: '\u{1F438}', hint: 'It hops and says ribbit!', sounds: ['f', 'r', 'o', 'g'] },
    { word: 'lamp', icon: '\u{1F4A1}', hint: 'It gives us light', sounds: ['l', 'a', 'm', 'p'] },
    { word: 'chest', icon: '\u{1F4E6}', hint: 'A box for treasure', sounds: ['ch', 'e', 's', 't'] }
];

let mode = 'learn';
let currentIdx = 0;
let stars = 0;
let soundIdx = -1;
let quizMissing = -1;

const blendArea = document.getElementById('blendArea');
const learnControls = document.getElementById('learnControls');
const quizControls = document.getElementById('quizControls');
const letterOptions = document.getElementById('letterOptions');
const feedbackEl = document.getElementById('feedback');

// Mode toggle
document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        mode = btn.dataset.mode;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        learnControls.style.display = mode === 'learn' ? 'flex' : 'none';
        quizControls.style.display = mode === 'quiz' ? 'block' : 'none';
        loadWord();
    });
});

// Sound each letter on tap
document.getElementById('soundBtn').addEventListener('click', () => {
    soundIdx = 0;
    animateSound();
});

function animateSound() {
    const boxes = blendArea.querySelectorAll('.letter-box');
    boxes.forEach(b => b.classList.remove('active', 'sounding'));

    if (soundIdx < boxes.length) {
        boxes[soundIdx].classList.add('sounding', 'active');
        setTimeout(() => {
            boxes[soundIdx].classList.remove('sounding');
            soundIdx++;
            setTimeout(animateSound, 400);
        }, 350);
    }
}

// Blend animation
document.getElementById('blendBtn').addEventListener('click', () => {
    const boxes = blendArea.querySelectorAll('.letter-box');
    boxes.forEach(b => { b.classList.add('revealed'); b.classList.remove('active'); });
    // Show the full word
    setTimeout(() => {
        blendArea.innerHTML = '';
        const fullBox = document.createElement('div');
        fullBox.className = 'letter-box revealed';
        fullBox.style.width = 'auto';
        fullBox.style.padding = '10px 28px';
        fullBox.style.fontSize = '2.2rem';
        fullBox.textContent = WORDS[currentIdx].word;
        fullBox.style.animation = 'popIn 0.4s cubic-bezier(0.34,1.56,0.64,1)';
        blendArea.appendChild(fullBox);
    }, 600);
});

// Next word
document.getElementById('nextBtn').addEventListener('click', () => {
    currentIdx++;
    if (currentIdx >= WORDS.length) currentIdx = 0;
    loadWord();
});

// Letter box click in learn mode
function onLetterBoxClick(idx) {
    const boxes = blendArea.querySelectorAll('.letter-box');
    boxes.forEach(b => b.classList.remove('active'));
    boxes[idx].classList.add('active', 'sounding');
    setTimeout(() => boxes[idx].classList.remove('sounding'), 300);
}

function loadWord() {
    const w = WORDS[currentIdx];
    document.getElementById('levelLabel').textContent = `Word ${currentIdx + 1} of ${WORDS.length}`;
    document.getElementById('wordIcon').textContent = w.icon;
    document.getElementById('wordHint').textContent = w.hint;
    feedbackEl.className = 'feedback';
    updateStars();

    if (mode === 'learn') {
        renderLearnBlend(w);
    } else {
        renderQuizBlend(w);
    }
}

function renderLearnBlend(w) {
    blendArea.innerHTML = '';
    w.sounds.forEach((s, i) => {
        if (i > 0) {
            const arrow = document.createElement('span');
            arrow.className = 'blend-arrow';
            arrow.textContent = '+';
            blendArea.appendChild(arrow);
        }
        const box = document.createElement('div');
        box.className = 'letter-box';
        box.textContent = s;
        box.addEventListener('click', () => onLetterBoxClick(i));
        blendArea.appendChild(box);
    });
}

function renderQuizBlend(w) {
    blendArea.innerHTML = '';
    quizMissing = Math.floor(Math.random() * w.sounds.length);

    w.sounds.forEach((s, i) => {
        if (i > 0) {
            const arrow = document.createElement('span');
            arrow.className = 'blend-arrow';
            arrow.textContent = '+';
            blendArea.appendChild(arrow);
        }
        const box = document.createElement('div');
        box.className = 'letter-box';
        if (i === quizMissing) {
            box.textContent = '?';
            box.style.color = '#d946ef';
            box.style.borderColor = 'var(--accent)';
            box.id = 'missingBox';
        } else {
            box.textContent = s;
        }
        blendArea.appendChild(box);
    });

    // Generate options
    const correct = w.sounds[quizMissing];
    const allSounds = ['a','b','c','d','e','f','g','h','i','j','k','l','m','n','o','p','r','s','t','u','sh','ch','th'];
    let options = [correct];
    while (options.length < 4) {
        const pick = allSounds[Math.floor(Math.random() * allSounds.length)];
        if (!options.includes(pick)) options.push(pick);
    }
    shuffle(options);

    letterOptions.innerHTML = '';
    options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'letter-option';
        btn.textContent = opt;
        btn.addEventListener('click', () => checkQuizAnswer(opt, correct, btn));
        letterOptions.appendChild(btn);
    });
}

function checkQuizAnswer(picked, correct, btn) {
    if (picked === correct) {
        btn.classList.add('correct');
        const missingBox = document.getElementById('missingBox');
        if (missingBox) {
            missingBox.textContent = correct;
            missingBox.classList.add('revealed');
            missingBox.style.color = '';
        }
        stars++;
        updateStars();
        feedbackEl.className = 'feedback show win';
        feedbackEl.textContent = '\u2B50 Correct! The word is "' + WORDS[currentIdx].word + '"!';
        celebrate();

        document.querySelectorAll('.letter-option').forEach(o => { o.style.pointerEvents = 'none'; });
        setTimeout(() => {
            currentIdx++;
            if (currentIdx >= WORDS.length) currentIdx = 0;
            loadWord();
        }, 1800);
    } else {
        btn.classList.add('wrong');
        setTimeout(() => btn.classList.remove('wrong'), 500);
    }
}

function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
}

function updateStars() {
    const el = document.getElementById('starsLabel');
    el.textContent = '\u2B50'.repeat(Math.min(stars, 10));
}

function celebrate() {
    const container = document.getElementById('celebration');
    const colours = ['#c026d3','#d946ef','#f0abfc','#22c55e','#f59e0b','#3b82f6'];
    for (let i = 0; i < 25; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.style.left = Math.random()*100+'vw';
        el.style.top = '-12px';
        el.style.background = colours[Math.floor(Math.random()*colours.length)];
        el.style.width = (6+Math.random()*8)+'px';
        el.style.height = (6+Math.random()*8)+'px';
        el.style.borderRadius = Math.random()>0.5?'50%':'2px';
        el.style.animationDuration = (1.5+Math.random()*2)+'s';
        el.style.animationDelay = (Math.random()*0.5)+'s';
        container.appendChild(el);
        setTimeout(()=>el.remove(),4000);
    }
    const symbols = ['\u2B50','\u2728','\u{1F31F}'];
    for (let i = 0; i < 4; i++) {
        const el = document.createElement('div');
        el.className = 'star-burst';
        el.textContent = symbols[Math.floor(Math.random()*symbols.length)];
        el.style.left = (15+Math.random()*70)+'vw';
        el.style.top = (15+Math.random()*50)+'vh';
        container.appendChild(el);
        setTimeout(()=>el.remove(),1200);
    }
}

// Fix the inline style issue
loadWord();
</script>
</body>
</html>
