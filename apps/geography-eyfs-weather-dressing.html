<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Dressing</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #e0f2fe;
    --card-bg: #ffffff;
    --text: #0c4a6e;
    --text-light: #0369a1;
    --sunny: #f59e0b;
    --sunny-bg: #fef3c7;
    --rainy: #3b82f6;
    --rainy-bg: #dbeafe;
    --snowy: #a5b4fc;
    --snowy-bg: #eef2ff;
    --windy: #14b8a6;
    --windy-bg: #ccfbf1;
    --border: #bae6fd;
    --shadow: 0 4px 16px rgba(12,74,110,0.10);
    --shadow-lg: 0 8px 32px rgba(12,74,110,0.16);
    --radius: 20px;
    --success: #22c55e;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
    user-select: none;
    -webkit-user-select: none;
}

.header {
    background: linear-gradient(135deg, #0ea5e9, #38bdf8, #7dd3fc);
    color: white;
    padding: 16px 20px;
    text-align: center;
    box-shadow: var(--shadow);
}
.header h1 { font-size: 1.6rem; font-weight: 900; text-shadow: 2px 2px 0 rgba(0,0,0,0.1); }
.header p { font-size: 0.85rem; opacity: 0.9; font-weight: 600; margin-top: 2px; }

.main { max-width: 560px; margin: 0 auto; padding: 16px; }

/* Weather selector */
.weather-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 16px;
}
.weather-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 12px 6px;
    border: 3px solid transparent;
    border-radius: var(--radius);
    background: var(--card-bg);
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: all 0.25s;
    touch-action: manipulation;
}
.weather-btn:hover { transform: scale(1.06); }
.weather-btn .w-icon { font-size: 2rem; }
.weather-btn .w-label { font-size: 0.72rem; font-weight: 800; }
.weather-btn[data-w="sunny"].active { border-color: var(--sunny); background: var(--sunny-bg); }
.weather-btn[data-w="rainy"].active { border-color: var(--rainy); background: var(--rainy-bg); }
.weather-btn[data-w="snowy"].active { border-color: var(--snowy); background: var(--snowy-bg); }
.weather-btn[data-w="windy"].active { border-color: var(--windy); background: var(--windy-bg); }

.weather-desc {
    text-align: center;
    font-size: 1rem;
    font-weight: 700;
    padding: 10px;
    border-radius: 14px;
    margin-bottom: 14px;
    min-height: 44px;
}

/* Character and chosen clothes */
.dress-area {
    display: flex;
    gap: 16px;
    margin-bottom: 16px;
    align-items: flex-start;
}
.character-box {
    flex: 0 0 140px;
    text-align: center;
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 16px 12px;
}
.character-box .person { font-size: 5rem; line-height: 1; }
.character-box .chosen-clothes {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    justify-content: center;
    margin-top: 8px;
    min-height: 36px;
}
.chosen-item {
    font-size: 1.6rem;
    cursor: pointer;
    transition: transform 0.2s;
    animation: popIn 0.3s ease;
}
.chosen-item:hover { transform: scale(1.2); }

.clothes-box {
    flex: 1;
}
.clothes-box h3 {
    font-size: 0.78rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-light);
    margin-bottom: 8px;
}
.clothes-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
}
.cloth-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    padding: 10px 4px;
    background: var(--card-bg);
    border: 3px solid var(--border);
    border-radius: 14px;
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: all 0.25s;
    touch-action: manipulation;
}
.cloth-card:hover { transform: scale(1.06); }
.cloth-card.selected { border-color: var(--success); background: #dcfce7; }
.cloth-card.wrong { animation: wobble 0.4s; border-color: #ef4444; }
.cloth-card .cloth-icon { font-size: 1.8rem; }
.cloth-card .cloth-name { font-size: 0.62rem; font-weight: 700; text-align: center; }

.check-btn {
    display: block;
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, #0ea5e9, #38bdf8);
    color: white;
    font-family: 'Inter', sans-serif;
    font-size: 1rem;
    font-weight: 900;
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: all 0.25s;
    touch-action: manipulation;
    margin-bottom: 12px;
}
.check-btn:hover { transform: scale(1.03); }

.feedback {
    text-align: center;
    font-size: 1rem;
    font-weight: 800;
    padding: 12px;
    border-radius: var(--radius);
    display: none;
    animation: popIn 0.3s ease;
    margin-bottom: 12px;
}
.feedback.show { display: block; }
.feedback.win { background: #dcfce7; color: #166534; border: 2px solid #22c55e; }
.feedback.try { background: #fef2f2; color: #991b1b; border: 2px solid #fca5a5; }

@keyframes popIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
@keyframes wobble { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }

.celebration { position: fixed; inset: 0; pointer-events: none; z-index: 1000; }
.confetti { position: absolute; border-radius: 2px; animation: confettiFall linear forwards; }
@keyframes confettiFall { 0% { opacity:1; transform: translateY(0) rotate(0); } 100% { opacity:0; transform: translateY(100vh) rotate(720deg) scale(0.3); } }

@media (max-width: 420px) {
    .clothes-grid { grid-template-columns: repeat(2, 1fr); }
    .character-box { flex: 0 0 110px; }
    .character-box .person { font-size: 3.5rem; }
}
</style>
</head>
<body>

<div class="header">
    <h1>Weather Dressing</h1>
    <p>Pick the right clothes for the weather!</p>
</div>

<div class="main">
    <div class="weather-bar" id="weatherBar">
        <button class="weather-btn" data-w="sunny"><span class="w-icon">&#x2600;&#xFE0F;</span><span class="w-label">Sunny</span></button>
        <button class="weather-btn" data-w="rainy"><span class="w-icon">&#x1F327;&#xFE0F;</span><span class="w-label">Rainy</span></button>
        <button class="weather-btn" data-w="snowy"><span class="w-icon">&#x2744;&#xFE0F;</span><span class="w-label">Snowy</span></button>
        <button class="weather-btn" data-w="windy"><span class="w-icon">&#x1F32C;&#xFE0F;</span><span class="w-label">Windy</span></button>
    </div>

    <div class="weather-desc" id="weatherDesc">Tap a weather type to start!</div>

    <div class="dress-area">
        <div class="character-box">
            <div class="person" id="personIcon">&#x1F9D2;</div>
            <div class="chosen-clothes" id="chosenClothes"></div>
        </div>
        <div class="clothes-box">
            <h3>Choose clothes</h3>
            <div class="clothes-grid" id="clothesGrid"></div>
        </div>
    </div>

    <button class="check-btn" id="checkBtn">Check My Outfit!</button>
    <div class="feedback" id="feedback"></div>
</div>

<div class="celebration" id="celebration"></div>

<script>
const WEATHERS = {
    sunny: {
        desc: 'It is a hot, sunny day! The sun is shining brightly.',
        correct: ['sunhat', 'sunglasses', 't-shirt', 'shorts', 'sandals'],
        bg: '#fef3c7'
    },
    rainy: {
        desc: 'It is raining! Puddles are forming on the ground.',
        correct: ['raincoat', 'wellies', 'umbrella', 'trousers', 'jumper'],
        bg: '#dbeafe'
    },
    snowy: {
        desc: 'It is snowing! Everything is white and cold.',
        correct: ['coat', 'scarf', 'gloves', 'bobble-hat', 'boots'],
        bg: '#eef2ff'
    },
    windy: {
        desc: 'It is very windy! Leaves are blowing around.',
        correct: ['jacket', 'trousers', 'trainers', 'scarf', 'jumper'],
        bg: '#ccfbf1'
    }
};

const ALL_CLOTHES = [
    { id: 'sunhat', icon: '\u{1F452}', name: 'Sun Hat' },
    { id: 'sunglasses', icon: '\u{1F576}\uFE0F', name: 'Sunglasses' },
    { id: 't-shirt', icon: '\u{1F455}', name: 'T-Shirt' },
    { id: 'shorts', icon: '\u{1FA73}', name: 'Shorts' },
    { id: 'sandals', icon: '\u{1FA74}', name: 'Sandals' },
    { id: 'raincoat', icon: '\u{1F9E5}', name: 'Raincoat' },
    { id: 'wellies', icon: '\u{1F462}', name: 'Wellies' },
    { id: 'umbrella', icon: '\u2602\uFE0F', name: 'Umbrella' },
    { id: 'coat', icon: '\u{1F9E5}', name: 'Warm Coat' },
    { id: 'scarf', icon: '\u{1F9E3}', name: 'Scarf' },
    { id: 'gloves', icon: '\u{1F9E4}', name: 'Gloves' },
    { id: 'bobble-hat', icon: '\u{1F9E2}', name: 'Bobble Hat' },
    { id: 'boots', icon: '\u{1F97E}', name: 'Boots' },
    { id: 'jacket', icon: '\u{1F9E5}', name: 'Jacket' },
    { id: 'trousers', icon: '\u{1F456}', name: 'Trousers' },
    { id: 'trainers', icon: '\u{1F45F}', name: 'Trainers' },
    { id: 'jumper', icon: '\u{1F9F6}', name: 'Jumper' }
];

let currentWeather = null;
let selected = new Set();

document.querySelectorAll('.weather-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        currentWeather = btn.dataset.w;
        document.querySelectorAll('.weather-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selected = new Set();
        document.getElementById('feedback').className = 'feedback';

        const w = WEATHERS[currentWeather];
        document.getElementById('weatherDesc').textContent = w.desc;
        document.getElementById('weatherDesc').style.background = w.bg;

        renderClothes();
        renderChosen();
    });
});

function renderClothes() {
    const grid = document.getElementById('clothesGrid');
    grid.innerHTML = '';
    // Show a mix: correct ones for this weather + some wrong ones
    const w = WEATHERS[currentWeather];
    const correctItems = ALL_CLOTHES.filter(c => w.correct.includes(c.id));
    const wrongItems = ALL_CLOTHES.filter(c => !w.correct.includes(c.id));
    const shuffled = [...correctItems, ...wrongItems.sort(() => Math.random()-0.5).slice(0, 4)].sort(() => Math.random()-0.5);

    shuffled.forEach(cloth => {
        const card = document.createElement('div');
        card.className = 'cloth-card' + (selected.has(cloth.id) ? ' selected' : '');
        card.innerHTML = `<span class="cloth-icon">${cloth.icon}</span><span class="cloth-name">${cloth.name}</span>`;
        card.addEventListener('click', () => {
            if (selected.has(cloth.id)) {
                selected.delete(cloth.id);
            } else {
                selected.add(cloth.id);
            }
            renderClothes();
            renderChosen();
        });
        grid.appendChild(card);
    });
}

function renderChosen() {
    const el = document.getElementById('chosenClothes');
    el.innerHTML = '';
    selected.forEach(id => {
        const cloth = ALL_CLOTHES.find(c => c.id === id);
        if (cloth) {
            const span = document.createElement('span');
            span.className = 'chosen-item';
            span.textContent = cloth.icon;
            span.title = cloth.name;
            span.addEventListener('click', () => {
                selected.delete(id);
                renderClothes();
                renderChosen();
            });
            el.appendChild(span);
        }
    });
}

document.getElementById('checkBtn').addEventListener('click', () => {
    if (!currentWeather) {
        document.getElementById('feedback').className = 'feedback show try';
        document.getElementById('feedback').textContent = 'Choose a weather type first!';
        return;
    }

    const w = WEATHERS[currentWeather];
    const correctSet = new Set(w.correct);
    const selectedArr = [...selected];

    // Check: all selected should be correct, and most correct should be selected
    const wrongPicks = selectedArr.filter(id => !correctSet.has(id));
    const correctPicks = selectedArr.filter(id => correctSet.has(id));

    const fb = document.getElementById('feedback');
    if (wrongPicks.length === 0 && correctPicks.length >= 3) {
        fb.className = 'feedback show win';
        fb.textContent = '\u2B50 Great outfit! You are ready for the ' + currentWeather + ' weather!';
        celebrate();
    } else if (wrongPicks.length > 0) {
        fb.className = 'feedback show try';
        const wrongName = ALL_CLOTHES.find(c => c.id === wrongPicks[0])?.name || '';
        fb.textContent = '\u{1F914} Hmm, would you really wear ' + wrongName + ' in ' + currentWeather + ' weather? Try again!';
    } else {
        fb.className = 'feedback show try';
        fb.textContent = '\u{1F914} You need a few more items! Pick at least 3 clothes.';
    }
});

function celebrate() {
    const container = document.getElementById('celebration');
    const colours = ['#0ea5e9','#38bdf8','#7dd3fc','#f59e0b','#22c55e','#a5b4fc'];
    for (let i = 0; i < 30; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.style.cssText = `left:${Math.random()*100}vw;top:-12px;background:${colours[Math.floor(Math.random()*colours.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*0.5}s;`;
        container.appendChild(el);
        setTimeout(() => el.remove(), 4000);
    }
}
</script>
</body>
</html>
