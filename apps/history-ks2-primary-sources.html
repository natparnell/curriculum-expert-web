<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Primary Source Detective</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #faf5f0;
    --card-bg: #ffffff;
    --text: #292524;
    --text-light: #78716c;
    --accent: #92400e;
    --accent-light: #fef3c7;
    --success: #22c55e;
    --border: #e7e5e4;
    --shadow: 0 4px 16px rgba(0,0,0,0.06);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.10);
    --radius: 14px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
}

.header {
    background: linear-gradient(135deg, #78350f, #92400e, #b45309);
    color: #fef3c7;
    padding: 16px 20px;
    text-align: center;
    box-shadow: var(--shadow);
}
.header h1 { font-size: 1.4rem; font-weight: 900; }
.header p { font-size: 0.8rem; opacity: 0.85; font-weight: 600; margin-top: 2px; }

.main { max-width: 700px; margin: 0 auto; padding: 16px; }

.source-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
    flex-wrap: wrap;
}
.source-tab {
    padding: 8px 14px;
    border: 2px solid var(--border);
    border-radius: 10px;
    background: var(--card-bg);
    font-family: 'Inter', sans-serif;
    font-size: 0.72rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
}
.source-tab:hover { border-color: var(--accent); }
.source-tab.active { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }
.source-tab.done { border-color: var(--success); }
.source-tab .tab-icon { font-size: 1.2rem; }

/* Source display */
.source-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow-lg);
    overflow: hidden;
    margin-bottom: 16px;
    animation: fadeIn 0.3s ease;
}
.source-banner {
    padding: 14px 20px;
    background: linear-gradient(135deg, #92400e, #b45309);
    color: #fef3c7;
    display: flex;
    align-items: center;
    gap: 12px;
}
.source-banner .s-icon { font-size: 2.5rem; }
.source-banner h2 { font-size: 1rem; font-weight: 800; }
.source-banner .s-type { font-size: 0.68rem; opacity: 0.8; }

.source-display {
    padding: 20px;
    background: #fefce8;
    border-bottom: 1px solid var(--border);
    text-align: center;
    min-height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}
.source-display .artefact {
    font-size: 5rem;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
}
.magnifier {
    position: absolute;
    top: 8px;
    right: 8px;
    font-size: 1.5rem;
    opacity: 0.5;
}

.source-desc {
    padding: 16px 20px;
    font-size: 0.85rem;
    color: var(--text-light);
    font-style: italic;
    border-bottom: 1px solid var(--border);
}

/* Questions */
.questions-area {
    padding: 16px 20px;
}
.question-card {
    margin-bottom: 14px;
    padding: 12px;
    background: var(--bg);
    border-radius: 10px;
    border: 1px solid var(--border);
}
.question-card .q-num {
    font-size: 0.62rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--accent);
    margin-bottom: 4px;
}
.question-card .q-text {
    font-size: 0.88rem;
    font-weight: 700;
    margin-bottom: 8px;
}
.q-options {
    display: flex;
    flex-direction: column;
    gap: 6px;
}
.q-opt {
    padding: 8px 12px;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--card-bg);
    font-family: 'Inter', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
}
.q-opt:hover { border-color: var(--accent); background: var(--accent-light); }
.q-opt.correct { border-color: var(--success); background: #dcfce7; color: #166534; }
.q-opt.wrong { border-color: #ef4444; background: #fef2f2; color: #991b1b; }
.q-opt.disabled { pointer-events: none; opacity: 0.6; }

.q-feedback {
    font-size: 0.78rem;
    font-weight: 700;
    padding: 6px 10px;
    border-radius: 6px;
    margin-top: 6px;
    display: none;
}
.q-feedback.show { display: block; animation: fadeIn 0.2s ease; }
.q-feedback.right { background: #dcfce7; color: #166534; }
.q-feedback.wrong-fb { background: #fef2f2; color: #991b1b; }

.score-bar {
    display: flex;
    justify-content: space-between;
    padding: 10px 14px;
    background: var(--card-bg);
    border-radius: 10px;
    box-shadow: var(--shadow);
    margin-bottom: 14px;
    font-size: 0.85rem;
    font-weight: 700;
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.celebration { position: fixed; inset: 0; pointer-events: none; z-index: 1000; }
.confetti { position: absolute; border-radius: 2px; animation: confettiFall linear forwards; }
@keyframes confettiFall { 0% { opacity:1; transform: translateY(0) rotate(0); } 100% { opacity:0; transform: translateY(100vh) rotate(720deg) scale(0.3); } }

@media (max-width: 500px) {
    .source-tabs { gap: 4px; }
    .source-tab { padding: 6px 10px; font-size: 0.65rem; }
}
</style>
</head>
<body>

<div class="header">
    <h1>Primary Source Detective</h1>
    <p>Examine historical artefacts and answer questions like a real historian!</p>
</div>

<div class="main">
    <div class="score-bar">
        <span id="scoreLabel" style="color:var(--success);">Score: 0</span>
        <span id="sourceLabel" style="color:var(--text-light);">Choose a source</span>
    </div>

    <div class="source-tabs" id="sourceTabs"></div>
    <div id="sourceDisplay"></div>
</div>

<div class="celebration" id="celebration"></div>

<script>
const SOURCES = [
    {
        name: 'Roman Coin',
        icon: '&#x1FA99;',
        type: 'Artefact',
        desc: 'A small bronze coin found in a field in England. On one side is the face of Emperor Claudius. On the other is an image of a temple. It is dated around 43 AD.',
        questions: [
            { q: 'What type of source is this?', opts: ['Primary source (from the time)', 'Secondary source (written later)'], answer: 0, explain: 'This coin was made at the time of the Romans, so it is a primary source.' },
            { q: 'What can this coin tell us?', opts: ['What Romans looked like and what they valued', 'What Romans ate for dinner', 'How fast Roman horses could run'], answer: 0, explain: 'Coins show us portraits of leaders and symbols of what was important to them, like temples.' },
            { q: 'Why was this coin found in England?', opts: ['Someone dropped it recently', 'The Romans invaded and lived in Britain', 'It blew across from Italy'], answer: 1, explain: 'The Romans occupied Britain from 43 AD. They brought their money and way of life with them.' }
        ]
    },
    {
        name: 'Victorian Photograph',
        icon: '&#x1F4F7;',
        type: 'Photograph',
        desc: 'A black and white photograph from 1870 showing a family outside their home. The children are wearing formal clothes and look very serious. Nobody is smiling.',
        questions: [
            { q: 'Why is nobody smiling in the photograph?', opts: ['They were all sad that day', 'Cameras took a long time to take a photo so people had to stay very still', 'Smiling was illegal in Victorian times'], answer: 1, explain: 'Early cameras needed people to hold still for many seconds. It is hard to hold a smile that long!' },
            { q: 'What can we learn from their clothes?', opts: ['They were going swimming', 'People dressed very formally, even children', 'They had just been to a party'], answer: 1, explain: 'Victorian children wore formal clothes that look very different from what children wear today.' },
            { q: 'Is a photograph always a reliable source?', opts: ['Yes, cameras never lie', 'No, photos only show one moment and can be arranged', 'Only if taken on a Tuesday'], answer: 1, explain: 'Photographs show only one moment in time and can be posed or arranged to look a certain way.' }
        ]
    },
    {
        name: 'Egyptian Hieroglyphics',
        icon: '&#x1F4DC;',
        type: 'Writing',
        desc: 'A section of carved hieroglyphics from a temple wall in Luxor, Egypt. The symbols show pictures of birds, snakes, eyes and seated figures. It was carved around 1250 BC.',
        questions: [
            { q: 'What are hieroglyphics?', opts: ['Random decorations on walls', 'An ancient Egyptian writing system using pictures', 'A type of ancient Egyptian food'], answer: 1, explain: 'Hieroglyphics were the writing system of Ancient Egypt. Each picture symbol represented a sound or word.' },
            { q: 'Why did we struggle to read hieroglyphics for so long?', opts: ['The writing was too small', 'Nobody alive could read the ancient language until the Rosetta Stone was found', 'It was written in invisible ink'], answer: 1, explain: 'The Rosetta Stone, found in 1799, had the same text in hieroglyphics and Greek, which helped us decode the writing.' },
            { q: 'What might these temple carvings tell us about?', opts: ['Egyptian gods, pharaohs and important events', 'The weather forecast for tomorrow', 'What was on television'], answer: 0, explain: 'Temple walls often told stories about gods, pharaohs and their achievements.' }
        ]
    },
    {
        name: 'WW2 Ration Book',
        icon: '&#x1F4D5;',
        type: 'Document',
        desc: 'A small booklet from 1943 with the name "Mrs E. Williams" on the front. Inside are stamps and coupons for butter, sugar, meat and eggs. Some stamps have been used.',
        questions: [
            { q: 'Why did people need ration books during World War 2?', opts: ['For fun', 'To make sure everyone got a fair share of food when supplies were short', 'To win a prize'], answer: 1, explain: 'During WW2, ships bringing food were attacked, so food was limited. Rationing made sure everyone got a fair share.' },
            { q: 'What can the used stamps tell us?', opts: ['What Mrs Williams had already bought that week', 'Her favourite colour', 'Where she went on holiday'], answer: 0, explain: 'Each stamp was used when buying that type of food. Used stamps show what was purchased.' },
            { q: 'What does this source tell us about life during the war?', opts: ['Life was normal and easy', 'Food was scarce and people had to be very careful with what they ate', 'People had too much food'], answer: 1, explain: 'Ration books show that food was limited during the war and people could not buy as much as they wanted.' }
        ]
    }
];

let currentSource = 0;
let score = 0;
let answered = {};
let completedSources = new Set();

const sourceTabs = document.getElementById('sourceTabs');
const sourceDisplay = document.getElementById('sourceDisplay');

// Build tabs
SOURCES.forEach((s, i) => {
    const tab = document.createElement('button');
    tab.className = 'source-tab';
    tab.dataset.idx = i;
    tab.innerHTML = `<span class="tab-icon">${s.icon}</span>${s.name}`;
    tab.addEventListener('click', () => { currentSource = i; render(); });
    sourceTabs.appendChild(tab);
});

function render() {
    // Update tabs
    sourceTabs.querySelectorAll('.source-tab').forEach((t, i) => {
        t.classList.toggle('active', i === currentSource);
        t.classList.toggle('done', completedSources.has(i));
    });

    const s = SOURCES[currentSource];
    document.getElementById('sourceLabel').textContent = `Source ${currentSource + 1} of ${SOURCES.length}`;
    document.getElementById('scoreLabel').textContent = `Score: ${score}`;

    let html = `<div class="source-card">
        <div class="source-banner"><span class="s-icon">${s.icon}</span><div><h2>${s.name}</h2><div class="s-type">${s.type}</div></div></div>
        <div class="source-display"><span class="artefact">${s.icon}</span><span class="magnifier">&#x1F50D;</span></div>
        <div class="source-desc">${s.desc}</div>
        <div class="questions-area">`;

    s.questions.forEach((q, qi) => {
        const key = `${currentSource}-${qi}`;
        const wasAnswered = answered[key];

        html += `<div class="question-card"><div class="q-num">Question ${qi + 1}</div><div class="q-text">${q.q}</div><div class="q-options">`;

        q.opts.forEach((opt, oi) => {
            let cls = 'q-opt';
            if (wasAnswered !== undefined) {
                cls += ' disabled';
                if (oi === q.answer) cls += ' correct';
                else if (oi === wasAnswered && wasAnswered !== q.answer) cls += ' wrong';
            }
            html += `<button class="${cls}" data-source="${currentSource}" data-q="${qi}" data-opt="${oi}">${opt}</button>`;
        });

        html += '</div>';
        if (wasAnswered !== undefined) {
            const isRight = wasAnswered === q.answer;
            html += `<div class="q-feedback show ${isRight ? 'right' : 'wrong-fb'}">${isRight ? '&#x2705;' : '&#x274C;'} ${q.explain}</div>`;
        }
        html += '</div>';
    });

    html += '</div></div>';
    sourceDisplay.innerHTML = html;

    // Attach click handlers
    sourceDisplay.querySelectorAll('.q-opt:not(.disabled)').forEach(btn => {
        btn.addEventListener('click', () => {
            const si = parseInt(btn.dataset.source);
            const qi = parseInt(btn.dataset.q);
            const oi = parseInt(btn.dataset.opt);
            handleAnswer(si, qi, oi);
        });
    });
}

function handleAnswer(si, qi, oi) {
    const key = `${si}-${qi}`;
    if (answered[key] !== undefined) return;

    answered[key] = oi;
    const q = SOURCES[si].questions[qi];
    if (oi === q.answer) {
        score++;
        spawnMini();
    }

    // Check if all questions for this source are answered
    const allDone = SOURCES[si].questions.every((_, i) => answered[`${si}-${i}`] !== undefined);
    if (allDone) completedSources.add(si);

    render();

    if (completedSources.size === SOURCES.length) {
        setTimeout(celebrate, 500);
    }
}

function spawnMini() {
    const container = document.getElementById('celebration');
    const colours = ['#92400e','#b45309','#d97706','#22c55e','#f59e0b'];
    for (let i = 0; i < 8; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.style.cssText = `left:${Math.random()*100}vw;top:-10px;background:${colours[Math.floor(Math.random()*colours.length)]};width:${5+Math.random()*6}px;height:${5+Math.random()*6}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${1+Math.random()*1.5}s;animation-delay:${Math.random()*0.3}s;`;
        container.appendChild(el);
        setTimeout(() => el.remove(), 3000);
    }
}

function celebrate() {
    const container = document.getElementById('celebration');
    const colours = ['#92400e','#b45309','#d97706','#22c55e','#3b82f6','#ec4899'];
    for (let i = 0; i < 35; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.style.cssText = `left:${Math.random()*100}vw;top:-12px;background:${colours[Math.floor(Math.random()*colours.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*0.5}s;`;
        container.appendChild(el);
        setTimeout(() => el.remove(), 4500);
    }
}

render();
</script>
</body>
</html>
