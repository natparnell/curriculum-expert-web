<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biomes Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #f0fdf4;
    --card-bg: #ffffff;
    --text: #14532d;
    --text-light: #4d7c5e;
    --accent: #0d9488;
    --rainforest: #16a34a;
    --desert: #d97706;
    --tundra: #60a5fa;
    --grassland: #84cc16;
    --ocean: #0ea5e9;
    --temperate: #a3e635;
    --border: #bbf7d0;
    --shadow: 0 4px 16px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
    --radius: 14px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
}

.header {
    background: linear-gradient(135deg, #16a34a, #d97706, #0ea5e9);
    color: white;
    padding: 16px 20px;
    text-align: center;
    box-shadow: var(--shadow);
}
.header h1 { font-size: 1.4rem; font-weight: 900; }
.header p { font-size: 0.8rem; opacity: 0.9; font-weight: 600; margin-top: 2px; }

.main { max-width: 700px; margin: 0 auto; padding: 16px; }

.biome-selector {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 16px;
}
.biome-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 12px 6px;
    border: 3px solid var(--border);
    border-radius: 14px;
    background: var(--card-bg);
    cursor: pointer;
    transition: all 0.25s;
    touch-action: manipulation;
    box-shadow: var(--shadow);
}
.biome-btn:hover { transform: scale(1.04); }
.biome-btn .b-icon { font-size: 1.8rem; }
.biome-btn .b-name { font-size: 0.68rem; font-weight: 800; }
.biome-btn.active { transform: scale(1.05); box-shadow: var(--shadow-lg); }

.biome-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow-lg);
    overflow: hidden;
    margin-bottom: 16px;
    animation: slideUp 0.3s ease;
}
.biome-banner {
    padding: 20px;
    color: white;
    text-align: center;
}
.biome-banner h2 { font-size: 1.3rem; font-weight: 900; }
.biome-banner .subtitle { font-size: 0.82rem; opacity: 0.9; font-weight: 600; margin-top: 2px; }

.biome-body { padding: 16px; }

.stat-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 14px;
}
.stat-box {
    text-align: center;
    padding: 10px;
    background: var(--bg);
    border-radius: 10px;
}
.stat-box .stat-val { font-size: 1.1rem; font-weight: 900; color: var(--accent); }
.stat-box .stat-label { font-size: 0.62rem; font-weight: 700; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.5px; }

.section-title { font-size: 0.72rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--text-light); margin-bottom: 8px; margin-top: 12px; }

.chips-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
.chip { padding: 4px 12px; border-radius: 20px; font-size: 0.72rem; font-weight: 700; }
.chip.plant { background: #dcfce7; color: #166534; }
.chip.animal { background: #fef3c7; color: #92400e; }
.chip.impact { background: #fef2f2; color: #991b1b; }

.desc-text { font-size: 0.85rem; color: var(--text-light); line-height: 1.6; margin-bottom: 10px; }

.fun-fact {
    padding: 10px 14px;
    background: #fef3c7;
    border-radius: 10px;
    font-size: 0.82rem;
    border-left: 4px solid #f59e0b;
    margin-top: 10px;
}
.fun-fact strong { color: var(--text); }

@keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

@media (max-width: 500px) {
    .biome-selector { grid-template-columns: repeat(2, 1fr); }
    .stat-row { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>

<div class="header">
    <h1>Biomes Explorer</h1>
    <p>Discover the world's amazing biomes!</p>
</div>

<div class="main">
    <div class="biome-selector" id="biomeSelector"></div>
    <div id="biomeDisplay"></div>
</div>

<script>
const BIOMES = [
    {
        id: 'rainforest', icon: '\u{1F334}', name: 'Tropical Rainforest', colour: '#16a34a',
        location: 'Near the equator: Amazon, Congo, Southeast Asia',
        temp: '25-30\u00B0C', rainfall: '2000mm+', description: 'Tropical rainforests are hot and wet all year round. They have more species of plants and animals than any other biome. The trees grow so tall that they form layers called the canopy and understory.',
        plants: ['Kapok trees', 'Orchids', 'Bromeliads', 'Ferns', 'Lianas'],
        animals: ['Jaguar', 'Toucan', 'Tree frog', 'Monkey', 'Sloth'],
        humanImpact: ['Deforestation for farming', 'Mining', 'Road building'],
        fact: 'The Amazon rainforest produces about 20% of the world\'s oxygen!'
    },
    {
        id: 'desert', icon: '\u{1F3DC}\uFE0F', name: 'Hot Desert', colour: '#d97706',
        location: 'Around the Tropics: Sahara, Gobi, Atacama',
        temp: '30-50\u00B0C day', rainfall: '<250mm', description: 'Hot deserts are very dry with extreme temperatures. Days are scorching but nights can be freezing cold. Plants and animals have amazing adaptations to survive with very little water.',
        plants: ['Cacti', 'Date palm', 'Tumbleweed', 'Aloe vera'],
        animals: ['Camel', 'Scorpion', 'Fennec fox', 'Rattlesnake', 'Meerkat'],
        humanImpact: ['Overgrazing', 'Desertification', 'Water extraction'],
        fact: 'The Sahara Desert is almost as big as the whole of the USA!'
    },
    {
        id: 'tundra', icon: '\u2744\uFE0F', name: 'Tundra', colour: '#60a5fa',
        location: 'Arctic regions: Northern Canada, Siberia, Scandinavia',
        temp: '-30 to 10\u00B0C', rainfall: '<250mm', description: 'The tundra is one of the coldest biomes. The ground is permanently frozen (permafrost) beneath the surface. Only small, tough plants can survive here. Summers are very short.',
        plants: ['Mosses', 'Lichens', 'Arctic poppies', 'Dwarf shrubs'],
        animals: ['Polar bear', 'Arctic fox', 'Caribou', 'Snowy owl', 'Lemming'],
        humanImpact: ['Oil drilling', 'Climate change melting permafrost', 'Pollution'],
        fact: 'In summer, the sun does not set for weeks in the tundra (midnight sun)!'
    },
    {
        id: 'grassland', icon: '\u{1F33E}', name: 'Grassland (Savanna)', colour: '#84cc16',
        location: 'Africa, South America, Australia',
        temp: '20-30\u00B0C', rainfall: '500-1500mm', description: 'Grasslands have a wet season and a dry season. They are covered in grass with scattered trees. The African savanna is famous for large herds of animals and dramatic wildlife.',
        plants: ['Tall grasses', 'Acacia trees', 'Baobab trees', 'Shrubs'],
        animals: ['Lion', 'Elephant', 'Zebra', 'Giraffe', 'Wildebeest'],
        humanImpact: ['Farming and cattle ranching', 'Poaching', 'Habitat loss'],
        fact: 'The Great Migration sees over 1.5 million wildebeest cross the Serengeti every year!'
    },
    {
        id: 'ocean', icon: '\u{1F30A}', name: 'Ocean', colour: '#0ea5e9',
        location: 'Covers 71% of the Earth\'s surface',
        temp: '-2 to 30\u00B0C', rainfall: 'N/A', description: 'The ocean is the largest biome on Earth. It is divided into zones by depth: sunlight zone, twilight zone, midnight zone, and the deep ocean floor. Most marine life lives near the surface where sunlight reaches.',
        plants: ['Seaweed', 'Kelp forests', 'Phytoplankton', 'Seagrass'],
        animals: ['Whale', 'Shark', 'Dolphin', 'Turtle', 'Coral'],
        humanImpact: ['Plastic pollution', 'Overfishing', 'Ocean warming'],
        fact: 'We have explored less than 5% of the ocean floor!'
    },
    {
        id: 'temperate', icon: '\u{1F333}', name: 'Temperate Forest', colour: '#65a30d',
        location: 'UK, Europe, Eastern USA, Japan',
        temp: '5-20\u00B0C', rainfall: '750-1500mm', description: 'Temperate forests have four clear seasons. Many trees are deciduous, meaning they lose their leaves in autumn. The UK is in this biome! Mild temperatures and regular rainfall support rich wildlife.',
        plants: ['Oak', 'Beech', 'Bluebells', 'Ferns', 'Brambles'],
        animals: ['Badger', 'Fox', 'Deer', 'Robin', 'Squirrel'],
        humanImpact: ['Urbanisation', 'Farming', 'Pollution'],
        fact: 'The UK used to be almost entirely covered in forest thousands of years ago!'
    }
];

const selector = document.getElementById('biomeSelector');
const display = document.getElementById('biomeDisplay');

BIOMES.forEach(b => {
    const btn = document.createElement('button');
    btn.className = 'biome-btn';
    btn.dataset.id = b.id;
    btn.style.borderColor = b.colour + '60';
    btn.innerHTML = `<span class="b-icon">${b.icon}</span><span class="b-name">${b.name}</span>`;
    btn.addEventListener('click', () => showBiome(b.id));
    selector.appendChild(btn);
});

function showBiome(id) {
    const b = BIOMES.find(x => x.id === id);
    document.querySelectorAll('.biome-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.id === id);
        if (btn.dataset.id === id) {
            btn.style.borderColor = b.colour;
            btn.style.background = b.colour + '15';
        } else {
            btn.style.borderColor = '#bbf7d0';
            btn.style.background = '#ffffff';
        }
    });

    display.innerHTML = `
        <div class="biome-card">
            <div class="biome-banner" style="background:linear-gradient(135deg,${b.colour},${b.colour}cc);">
                <h2>${b.icon} ${b.name}</h2>
                <div class="subtitle">${b.location}</div>
            </div>
            <div class="biome-body">
                <div class="stat-row">
                    <div class="stat-box"><div class="stat-val">${b.temp}</div><div class="stat-label">Temperature</div></div>
                    <div class="stat-box"><div class="stat-val">${b.rainfall}</div><div class="stat-label">Rainfall/year</div></div>
                    <div class="stat-box"><div class="stat-val">${b.plants.length + b.animals.length}</div><div class="stat-label">Species shown</div></div>
                </div>

                <div class="desc-text">${b.description}</div>

                <div class="section-title">\u{1F33F} Plants</div>
                <div class="chips-row">${b.plants.map(p => `<span class="chip plant">${p}</span>`).join('')}</div>

                <div class="section-title">\u{1F43E} Animals</div>
                <div class="chips-row">${b.animals.map(a => `<span class="chip animal">${a}</span>`).join('')}</div>

                <div class="section-title">\u26A0\uFE0F Human Impact</div>
                <div class="chips-row">${b.humanImpact.map(h => `<span class="chip impact">${h}</span>`).join('')}</div>

                <div class="fun-fact"><strong>Fun fact:</strong> ${b.fact}</div>
            </div>
        </div>
    `;
}

// Show first biome
showBiome('rainforest');
</script>
</body>
</html>
