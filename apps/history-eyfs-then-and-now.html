<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Then and Now</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #fef7ed;
    --card-bg: #ffffff;
    --text: #451a03;
    --text-light: #92400e;
    --old: #b45309;
    --old-bg: #fef3c7;
    --new: #7c3aed;
    --new-bg: #f3e8ff;
    --border: #fed7aa;
    --shadow: 0 4px 16px rgba(120,60,10,0.10);
    --shadow-lg: 0 8px 32px rgba(120,60,10,0.16);
    --radius: 20px;
    --success: #22c55e;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
    user-select: none;
    -webkit-user-select: none;
}

.header {
    background: linear-gradient(135deg, #b45309, #d97706, #f59e0b);
    color: white;
    padding: 16px 20px;
    text-align: center;
    box-shadow: var(--shadow);
}
.header h1 { font-size: 1.6rem; font-weight: 900; text-shadow: 2px 2px 0 rgba(0,0,0,0.1); }
.header p { font-size: 0.85rem; opacity: 0.9; font-weight: 600; margin-top: 2px; }

.main { max-width: 560px; margin: 0 auto; padding: 16px; }

.progress-bar { display: flex; justify-content: center; gap: 6px; margin-bottom: 14px; }
.progress-dot { width: 16px; height: 16px; border-radius: 50%; background: #fed7aa; transition: all 0.3s; }
.progress-dot.done { background: var(--success); }
.progress-dot.current { background: var(--old); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.3); } }

.compare-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow-lg);
    overflow: hidden;
    margin-bottom: 16px;
}
.compare-header {
    padding: 14px;
    text-align: center;
    font-size: 1.1rem;
    font-weight: 800;
    background: var(--old-bg);
    border-bottom: 2px solid var(--border);
}

.flip-area {
    display: flex;
    justify-content: center;
    padding: 24px 16px;
    gap: 20px;
    align-items: center;
}

.flip-box {
    width: 160px;
    height: 180px;
    perspective: 600px;
    cursor: pointer;
    touch-action: manipulation;
}
.flip-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transition: transform 0.6s;
    transform-style: preserve-3d;
}
.flip-box.flipped .flip-inner { transform: rotateY(180deg); }

.flip-front, .flip-back {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 12px;
    box-shadow: var(--shadow);
}
.flip-front {
    border: 4px solid var(--old);
    background: var(--old-bg);
}
.flip-back {
    transform: rotateY(180deg);
    border: 4px solid var(--new);
    background: var(--new-bg);
}
.flip-front .f-label, .flip-back .f-label {
    font-size: 0.65rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
    padding: 2px 10px;
    border-radius: 10px;
    color: white;
}
.flip-front .f-label { background: var(--old); }
.flip-back .f-label { background: var(--new); }
.flip-front .f-icon, .flip-back .f-icon { font-size: 3.5rem; margin-bottom: 6px; }
.flip-front .f-name, .flip-back .f-name { font-size: 0.82rem; font-weight: 700; text-align: center; }

.tap-hint {
    text-align: center;
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text-light);
    padding: 0 16px 16px;
}

.info-bubble {
    padding: 14px;
    margin: 0 16px 16px;
    border-radius: 14px;
    font-size: 0.88rem;
    font-weight: 600;
    text-align: center;
    animation: popIn 0.3s ease;
    display: none;
}
.info-bubble.show { display: block; }
.info-bubble.old-info { background: var(--old-bg); color: var(--old); border: 2px solid var(--old); }
.info-bubble.new-info { background: var(--new-bg); color: var(--new); border: 2px solid var(--new); }

.nav-btns {
    display: flex;
    gap: 10px;
}
.nav-btn {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 50px;
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.25s;
    touch-action: manipulation;
    box-shadow: var(--shadow);
}
.nav-btn:hover { transform: scale(1.03); }
.nav-btn.prev { background: var(--card-bg); color: var(--text-light); border: 2px solid var(--border); }
.nav-btn.next { background: linear-gradient(135deg, var(--old), #d97706); color: white; }

.complete-msg {
    text-align: center;
    padding: 20px;
    background: #dcfce7;
    border: 3px solid var(--success);
    border-radius: var(--radius);
    font-size: 1.1rem;
    font-weight: 900;
    color: #166534;
    display: none;
    animation: popIn 0.4s ease;
    margin-bottom: 14px;
}

@keyframes popIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }

.celebration { position: fixed; inset: 0; pointer-events: none; z-index: 1000; }
.confetti { position: absolute; border-radius: 2px; animation: confettiFall linear forwards; }
@keyframes confettiFall { 0% { opacity:1; transform: translateY(0) rotate(0); } 100% { opacity:0; transform: translateY(100vh) rotate(720deg) scale(0.3); } }

@media (max-width: 420px) {
    .flip-box { width: 130px; height: 150px; }
    .flip-front .f-icon, .flip-back .f-icon { font-size: 2.8rem; }
}
</style>
</head>
<body>

<div class="header">
    <h1>Then and Now</h1>
    <p>Tap to flip between old and new!</p>
</div>

<div class="main">
    <div class="progress-bar" id="progressBar"></div>

    <div class="compare-card" id="compareCard">
        <div class="compare-header" id="compareTitle"></div>
        <div class="flip-area">
            <div class="flip-box" id="flipBox">
                <div class="flip-inner">
                    <div class="flip-front">
                        <span class="f-label">Long Ago</span>
                        <span class="f-icon" id="oldIcon"></span>
                        <span class="f-name" id="oldName"></span>
                    </div>
                    <div class="flip-back">
                        <span class="f-label">Today</span>
                        <span class="f-icon" id="newIcon"></span>
                        <span class="f-name" id="newName"></span>
                    </div>
                </div>
            </div>
        </div>
        <div class="tap-hint" id="tapHint">Tap the card to flip it!</div>
        <div class="info-bubble" id="infoBubble"></div>
    </div>

    <div class="complete-msg" id="completeMsg"></div>

    <div class="nav-btns">
        <button class="nav-btn prev" id="prevBtn">&laquo; Back</button>
        <button class="nav-btn next" id="nextBtn">Next &raquo;</button>
    </div>
</div>

<div class="celebration" id="celebration"></div>

<script>
const ITEMS = [
    {
        title: 'How We Travel',
        old: { icon: '\u{1F40E}', name: 'Horse and Cart' },
        new: { icon: '\u{1F697}', name: 'Car' },
        oldInfo: 'Long ago, people rode horses or used carts pulled by horses to get around.',
        newInfo: 'Today we travel in cars, buses, trains and even aeroplanes!'
    },
    {
        title: 'How We Talk to People Far Away',
        old: { icon: '\u{1F4DC}', name: 'Written Letter' },
        new: { icon: '\u{1F4F1}', name: 'Mobile Phone' },
        oldInfo: 'People used to write letters by hand. It could take days or weeks to arrive!',
        newInfo: 'Now we can call, text or video chat with anyone in the world instantly!'
    },
    {
        title: 'How We Light Our Homes',
        old: { icon: '\u{1F56F}\uFE0F', name: 'Candle' },
        new: { icon: '\u{1F4A1}', name: 'Electric Light' },
        oldInfo: 'Homes were lit by candles and oil lamps. It was quite dark at night!',
        newInfo: 'We just flick a switch and the room fills with bright electric light!'
    },
    {
        title: 'How We Wash Clothes',
        old: { icon: '\u{1FAA3}', name: 'Washing by Hand' },
        new: { icon: '\u{1F9FA}', name: 'Washing Machine' },
        oldInfo: 'Clothes were scrubbed by hand in a tub or by the river. It was very hard work!',
        newInfo: 'Today we put clothes in a washing machine and press a button. Easy!'
    },
    {
        title: 'How We Play Music',
        old: { icon: '\u{1F3BB}', name: 'Musical Instrument' },
        new: { icon: '\u{1F3A7}', name: 'Headphones & Streaming' },
        oldInfo: 'To hear music, someone had to play an instrument live, right there with you!',
        newInfo: 'Now we can listen to any song in the world through headphones or speakers!'
    },
    {
        title: 'How We Keep Food Cold',
        old: { icon: '\u{1F9CA}', name: 'Ice Box' },
        new: { icon: '\u{1F9CA}', name: 'Fridge Freezer' },
        oldInfo: 'People used to keep food cool with blocks of ice in a special box. The ice melted quickly!',
        newInfo: 'Now we have fridges and freezers that keep food fresh for days or weeks!'
    }
];

let current = 0;
let flipped = false;
let visited = new Set();

const flipBox = document.getElementById('flipBox');
const infoBubble = document.getElementById('infoBubble');

// Build progress dots
ITEMS.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'progress-dot';
    document.getElementById('progressBar').appendChild(dot);
});

flipBox.addEventListener('click', () => {
    flipped = !flipped;
    flipBox.classList.toggle('flipped', flipped);

    const item = ITEMS[current];
    infoBubble.classList.add('show');
    if (flipped) {
        infoBubble.className = 'info-bubble show new-info';
        infoBubble.textContent = item.newInfo;
    } else {
        infoBubble.className = 'info-bubble show old-info';
        infoBubble.textContent = item.oldInfo;
    }

    if (!visited.has(current)) {
        visited.add(current);
        spawnMini();
    }
    updateProgress();
});

document.getElementById('nextBtn').addEventListener('click', () => {
    if (current < ITEMS.length - 1) {
        current++;
        loadItem();
    }
});

document.getElementById('prevBtn').addEventListener('click', () => {
    if (current > 0) {
        current--;
        loadItem();
    }
});

function loadItem() {
    const item = ITEMS[current];
    flipped = false;
    flipBox.classList.remove('flipped');
    infoBubble.className = 'info-bubble';

    document.getElementById('compareTitle').textContent = item.title;
    document.getElementById('oldIcon').textContent = item.old.icon;
    document.getElementById('oldName').textContent = item.old.name;
    document.getElementById('newIcon').textContent = item.new.icon;
    document.getElementById('newName').textContent = item.new.name;
    document.getElementById('tapHint').textContent = 'Tap the card to flip between then and now!';

    updateProgress();

    if (visited.size === ITEMS.length) {
        document.getElementById('completeMsg').style.display = 'block';
        document.getElementById('completeMsg').textContent = '\u{1F389} You explored all the changes! Things have changed a lot!';
    }
}

function updateProgress() {
    document.querySelectorAll('.progress-dot').forEach((dot, i) => {
        dot.classList.remove('done', 'current');
        if (visited.has(i)) dot.classList.add('done');
        if (i === current) dot.classList.add('current');
    });
}

function spawnMini() {
    const container = document.getElementById('celebration');
    const colours = ['#b45309','#d97706','#f59e0b','#7c3aed','#22c55e'];
    for (let i = 0; i < 10; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.style.cssText = `left:${Math.random()*100}vw;top:-10px;background:${colours[Math.floor(Math.random()*colours.length)]};width:${5+Math.random()*6}px;height:${5+Math.random()*6}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${1+Math.random()*1.5}s;animation-delay:${Math.random()*0.3}s;`;
        container.appendChild(el);
        setTimeout(() => el.remove(), 3000);
    }
}

loadItem();
</script>
</body>
</html>
