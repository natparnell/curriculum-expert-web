<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seasons Wheel</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #fffbf0;
    --card-bg: #ffffff;
    --text: #2d1f00;
    --text-light: #8a7050;
    --spring: #4ade80;
    --spring-bg: #f0fdf4;
    --summer: #fbbf24;
    --summer-bg: #fefce8;
    --autumn: #f97316;
    --autumn-bg: #fff7ed;
    --winter: #60a5fa;
    --winter-bg: #eff6ff;
    --border: #f0e8d0;
    --shadow: 0 4px 16px rgba(80,60,20,0.10);
    --shadow-lg: 0 8px 32px rgba(80,60,20,0.16);
    --radius: 20px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
    overflow-x: hidden;
    user-select: none;
    -webkit-user-select: none;
}

.header {
    background: linear-gradient(135deg, #4ade80, #fbbf24, #f97316, #60a5fa);
    color: white;
    padding: 16px 20px;
    text-align: center;
    box-shadow: var(--shadow);
}
.header h1 { font-size: 1.6rem; font-weight: 900; text-shadow: 2px 2px 0 rgba(0,0,0,0.1); }
.header p { font-size: 0.85rem; opacity: 0.9; font-weight: 600; margin-top: 2px; }

.main { max-width: 600px; margin: 0 auto; padding: 16px; }

/* Season selector wheel */
.wheel-area {
    display: flex;
    justify-content: center;
    margin-bottom: 16px;
}
.season-wheel {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    width: 280px;
}
.season-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 16px 8px;
    border: 4px solid transparent;
    border-radius: var(--radius);
    background: var(--card-bg);
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: all 0.3s ease;
    touch-action: manipulation;
}
.season-btn:hover { transform: scale(1.06); }
.season-btn.active { transform: scale(1.08); box-shadow: var(--shadow-lg); }
.season-btn .season-icon { font-size: 2.4rem; }
.season-btn .season-name { font-size: 0.85rem; font-weight: 800; }

.season-btn[data-season="spring"].active { border-color: var(--spring); background: var(--spring-bg); }
.season-btn[data-season="summer"].active { border-color: var(--summer); background: var(--summer-bg); }
.season-btn[data-season="autumn"].active { border-color: var(--autumn); background: var(--autumn-bg); }
.season-btn[data-season="winter"].active { border-color: var(--winter); background: var(--winter-bg); }

.season-info {
    text-align: center;
    padding: 14px;
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 16px;
    min-height: 60px;
    transition: all 0.3s;
}
.season-info .info-icon { font-size: 2rem; }
.season-info .info-text { font-size: 1rem; font-weight: 700; margin-top: 4px; }

/* Sort game */
.sort-title {
    text-align: center;
    font-size: 1rem;
    font-weight: 800;
    margin-bottom: 12px;
    padding: 10px;
    border-radius: 12px;
}

.sort-items {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin-bottom: 16px;
    min-height: 60px;
    padding: 10px;
    background: rgba(255,255,255,0.5);
    border-radius: var(--radius);
}

.sort-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    padding: 10px 14px;
    background: var(--card-bg);
    border: 3px solid var(--border);
    border-radius: 14px;
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: all 0.25s;
    touch-action: manipulation;
}
.sort-item:hover { transform: scale(1.08); }
.sort-item .item-icon { font-size: 1.8rem; }
.sort-item .item-name { font-size: 0.68rem; font-weight: 700; }
.sort-item.correct { border-color: #22c55e; background: #dcfce7; animation: correctBounce 0.4s; }
.sort-item.wrong { animation: wobble 0.4s; border-color: #ef4444; }
.sort-item.placed { opacity: 0.3; pointer-events: none; }

@keyframes correctBounce { 0%,100% { transform: scale(1); } 50% { transform: scale(1.15); } }
@keyframes wobble { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }

.score-bar {
    display: flex;
    justify-content: space-between;
    padding: 10px 14px;
    background: var(--card-bg);
    border-radius: 12px;
    box-shadow: var(--shadow);
    margin-bottom: 14px;
    font-size: 0.85rem;
    font-weight: 700;
}

.sorted-area {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 14px;
    margin-bottom: 14px;
}
.sorted-area h3 { font-size: 0.78rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.sorted-items {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    min-height: 36px;
}
.sorted-chip {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 700;
    color: white;
    animation: popIn 0.3s ease;
    display: flex;
    align-items: center;
    gap: 4px;
}

.complete-msg {
    text-align: center;
    padding: 20px;
    font-size: 1.2rem;
    font-weight: 900;
    background: #dcfce7;
    border: 3px solid #22c55e;
    border-radius: var(--radius);
    color: #166534;
    display: none;
    animation: popIn 0.4s ease;
}

@keyframes popIn { from { opacity: 0; transform: scale(0.7); } to { opacity: 1; transform: scale(1); } }

.celebration { position: fixed; inset: 0; pointer-events: none; z-index: 1000; }
.confetti { position: absolute; border-radius: 2px; animation: confettiFall linear forwards; }
@keyframes confettiFall { 0% { opacity:1; transform: translateY(0) rotate(0); } 100% { opacity:0; transform: translateY(100vh) rotate(720deg) scale(0.3); } }

@media (max-width: 400px) {
    .season-wheel { width: 240px; gap: 8px; }
    .season-btn { padding: 12px 6px; }
    .sort-item .item-icon { font-size: 1.4rem; }
}
</style>
</head>
<body>

<div class="header">
    <h1>Seasons Wheel</h1>
    <p>Spin through the seasons and sort the items!</p>
</div>

<div class="main">
    <div class="wheel-area">
        <div class="season-wheel" id="seasonWheel"></div>
    </div>

    <div class="season-info" id="seasonInfo">
        <div class="info-text">Tap a season to start!</div>
    </div>

    <div class="score-bar">
        <span id="scoreLabel" style="color:#22c55e;">Sorted: 0</span>
        <span id="roundLabel" style="color:var(--text-light);"></span>
    </div>

    <div class="sort-title" id="sortTitle" style="display:none;">Which items belong in this season?</div>

    <div class="sort-items" id="sortItems"></div>

    <div class="sorted-area" id="sortedArea" style="display:none;">
        <h3 id="sortedLabel">Sorted Items</h3>
        <div class="sorted-items" id="sortedItems"></div>
    </div>

    <div class="complete-msg" id="completeMsg"></div>
</div>

<div class="celebration" id="celebration"></div>

<script>
const SEASONS = [
    {
        id: 'spring', icon: '\u{1F338}', name: 'Spring', colour: '#4ade80',
        desc: 'Spring is when flowers bloom, birds sing, and baby animals are born!',
        items: [
            { icon: '\u{1F338}', name: 'Blossom' },
            { icon: '\u{1F423}', name: 'Chick' },
            { icon: '\u{1F327}\uFE0F', name: 'Showers' },
            { icon: '\u{1F33F}', name: 'New leaves' }
        ]
    },
    {
        id: 'summer', icon: '\u2600\uFE0F', name: 'Summer', colour: '#fbbf24',
        desc: 'Summer is the hottest season with long sunny days and holidays!',
        items: [
            { icon: '\u{1F366}', name: 'Ice cream' },
            { icon: '\u{1F3D6}\uFE0F', name: 'Beach' },
            { icon: '\u{1F33B}', name: 'Sunflower' },
            { icon: '\u{1F576}\uFE0F', name: 'Sunglasses' }
        ]
    },
    {
        id: 'autumn', icon: '\u{1F342}', name: 'Autumn', colour: '#f97316',
        desc: 'Autumn is when leaves change colour and fall. Conkers and pumpkins appear!',
        items: [
            { icon: '\u{1F342}', name: 'Fallen leaf' },
            { icon: '\u{1F383}', name: 'Pumpkin' },
            { icon: '\u{1F330}', name: 'Conker' },
            { icon: '\u{1F9E3}', name: 'Scarf' }
        ]
    },
    {
        id: 'winter', icon: '\u2744\uFE0F', name: 'Winter', colour: '#60a5fa',
        desc: 'Winter is cold! We might see snow, frost, and enjoy cosy times inside.',
        items: [
            { icon: '\u2744\uFE0F', name: 'Snowflake' },
            { icon: '\u26C4', name: 'Snowman' },
            { icon: '\u{1F9E4}', name: 'Gloves' },
            { icon: '\u{1F384}', name: 'Christmas tree' }
        ]
    }
];

let currentSeason = null;
let sortedCount = 0;
let totalItems = 0;
let roundItems = [];
let correctItems = [];
let placedItems = new Set();

const seasonWheel = document.getElementById('seasonWheel');
const sortItems = document.getElementById('sortItems');

// Build season buttons
SEASONS.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'season-btn';
    btn.dataset.season = s.id;
    btn.innerHTML = `<span class="season-icon">${s.icon}</span><span class="season-name">${s.name}</span>`;
    btn.addEventListener('click', () => selectSeason(s.id));
    seasonWheel.appendChild(btn);
});

function selectSeason(id) {
    currentSeason = SEASONS.find(s => s.id === id);
    document.querySelectorAll('.season-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`[data-season="${id}"]`).classList.add('active');

    const info = document.getElementById('seasonInfo');
    info.innerHTML = `<div class="info-icon">${currentSeason.icon}</div><div class="info-text">${currentSeason.desc}</div>`;
    info.style.borderLeft = `5px solid ${currentSeason.colour}`;

    document.getElementById('sortTitle').style.display = 'block';
    document.getElementById('sortTitle').style.background = `${currentSeason.colour}20`;
    document.getElementById('sortTitle').style.color = currentSeason.colour;

    document.getElementById('sortedArea').style.display = 'block';
    document.getElementById('sortedLabel').textContent = `${currentSeason.name} items`;
    document.getElementById('sortedItems').innerHTML = '';
    document.getElementById('completeMsg').style.display = 'none';

    correctItems = currentSeason.items.map(i => i.name);
    placedItems = new Set();

    // Build shuffled item list: correct items + 4 distractors from other seasons
    const distractors = SEASONS.filter(s => s.id !== id)
        .flatMap(s => s.items)
        .sort(() => Math.random() - 0.5)
        .slice(0, 4);
    roundItems = [...currentSeason.items, ...distractors].sort(() => Math.random() - 0.5);

    renderSortItems();
    document.getElementById('roundLabel').textContent = `${currentSeason.name}`;
}

function renderSortItems() {
    sortItems.innerHTML = '';
    roundItems.forEach((item, i) => {
        const el = document.createElement('div');
        el.className = 'sort-item';
        if (placedItems.has(item.name)) el.classList.add('placed');
        el.innerHTML = `<span class="item-icon">${item.icon}</span><span class="item-name">${item.name}</span>`;
        el.addEventListener('click', () => sortItem(item, el));
        sortItems.appendChild(el);
    });
}

function sortItem(item, el) {
    if (placedItems.has(item.name)) return;

    if (correctItems.includes(item.name)) {
        el.classList.add('correct');
        placedItems.add(item.name);
        sortedCount++;
        document.getElementById('scoreLabel').textContent = `Sorted: ${sortedCount}`;

        // Add to sorted area
        const chip = document.createElement('span');
        chip.className = 'sorted-chip';
        chip.style.background = currentSeason.colour;
        chip.innerHTML = `${item.icon} ${item.name}`;
        document.getElementById('sortedItems').appendChild(chip);

        setTimeout(() => {
            el.classList.add('placed');
            // Check if all correct items found
            if (correctItems.every(n => placedItems.has(n))) {
                celebrate();
                document.getElementById('completeMsg').style.display = 'block';
                document.getElementById('completeMsg').textContent = `\u2B50 You found all the ${currentSeason.name} items! Try another season!`;
            }
        }, 400);

        spawnMini();
    } else {
        el.classList.add('wrong');
        setTimeout(() => el.classList.remove('wrong'), 400);
    }
}

function spawnMini() {
    const container = document.getElementById('celebration');
    const colours = ['#4ade80','#fbbf24','#f97316','#60a5fa','#22c55e'];
    for (let i = 0; i < 8; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.style.cssText = `left:${Math.random()*100}vw;top:-10px;background:${colours[Math.floor(Math.random()*colours.length)]};width:${5+Math.random()*6}px;height:${5+Math.random()*6}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${1+Math.random()*1.5}s;animation-delay:${Math.random()*0.3}s;`;
        container.appendChild(el);
        setTimeout(() => el.remove(), 3000);
    }
}

function celebrate() {
    const container = document.getElementById('celebration');
    const colours = ['#4ade80','#fbbf24','#f97316','#60a5fa','#ec4899','#ef4444'];
    for (let i = 0; i < 30; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.style.cssText = `left:${Math.random()*100}vw;top:-12px;background:${colours[Math.floor(Math.random()*colours.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*0.5}s;`;
        container.appendChild(el);
        setTimeout(() => el.remove(), 4000);
    }
}
</script>
</body>
</html>
