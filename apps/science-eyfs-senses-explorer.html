<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Senses Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #f0fdf4;
    --card-bg: #ffffff;
    --text: #14532d;
    --text-light: #4ade80;
    --accent: #16a34a;
    --sight: #3b82f6;
    --sight-bg: #dbeafe;
    --hearing: #a855f7;
    --hearing-bg: #f3e8ff;
    --touch: #f97316;
    --touch-bg: #fff7ed;
    --smell: #ec4899;
    --smell-bg: #fdf2f8;
    --taste: #ef4444;
    --taste-bg: #fef2f2;
    --border: #bbf7d0;
    --shadow: 0 4px 16px rgba(20,80,40,0.10);
    --shadow-lg: 0 8px 32px rgba(20,80,40,0.16);
    --radius: 20px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
    overflow-x: hidden;
    user-select: none;
    -webkit-user-select: none;
}

.header {
    background: linear-gradient(135deg, #16a34a, #4ade80, #86efac);
    color: white;
    padding: 16px 20px;
    text-align: center;
    box-shadow: var(--shadow);
    position: relative; z-index: 10;
}
.header h1 { font-size: 1.6rem; font-weight: 900; text-shadow: 2px 2px 0 rgba(0,0,0,0.1); }
.header p { font-size: 0.85rem; opacity: 0.9; font-weight: 600; margin-top: 2px; }

.main { max-width: 600px; margin: 0 auto; padding: 16px; }

.sense-bar {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 16px;
    flex-wrap: wrap;
}
.sense-tab {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 10px 14px;
    border: 3px solid transparent;
    border-radius: 16px;
    background: var(--card-bg);
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: all 0.25s;
    touch-action: manipulation;
}
.sense-tab:hover { transform: scale(1.06); }
.sense-tab.active { transform: scale(1.08); box-shadow: var(--shadow-lg); }
.sense-tab .icon { font-size: 2rem; }
.sense-tab .label { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
.sense-tab[data-sense="sight"] { --sc: var(--sight); --sb: var(--sight-bg); }
.sense-tab[data-sense="hearing"] { --sc: var(--hearing); --sb: var(--hearing-bg); }
.sense-tab[data-sense="touch"] { --sc: var(--touch); --sb: var(--touch-bg); }
.sense-tab[data-sense="smell"] { --sc: var(--smell); --sb: var(--smell-bg); }
.sense-tab[data-sense="taste"] { --sc: var(--taste); --sb: var(--taste-bg); }
.sense-tab.active { border-color: var(--sc); background: var(--sb); }
.sense-tab .label { color: var(--sc); }

.instruction {
    text-align: center;
    font-size: 1.05rem;
    font-weight: 700;
    padding: 12px;
    background: var(--card-bg);
    border-radius: 14px;
    box-shadow: var(--shadow);
    margin-bottom: 16px;
}

.objects-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 16px;
}

.object-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 18px 10px;
    background: var(--card-bg);
    border: 3px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: all 0.3s ease;
    touch-action: manipulation;
    min-height: 120px;
}
.object-card:hover { transform: scale(1.06); }
.object-card:active { transform: scale(0.97); }
.object-card .obj-icon { font-size: 3rem; margin-bottom: 6px; transition: transform 0.3s; }
.object-card .obj-name { font-size: 0.82rem; font-weight: 700; text-align: center; }
.object-card.revealed { border-width: 4px; }
.object-card.revealed .obj-icon { animation: bounce 0.5s ease; }

@keyframes bounce { 0%,100% { transform: scale(1); } 40% { transform: scale(1.3); } 60% { transform: scale(0.9); } }

.result-panel {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow-lg);
    padding: 20px;
    text-align: center;
    margin-bottom: 16px;
    display: none;
    animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
.result-panel.show { display: block; }
.result-panel .result-icon { font-size: 3.5rem; margin-bottom: 8px; }
.result-panel .result-obj { font-size: 1.3rem; font-weight: 900; margin-bottom: 4px; }
.result-panel .result-senses {
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
    margin: 12px 0;
}
.result-panel .sense-badge {
    padding: 6px 14px;
    border-radius: 50px;
    font-size: 0.78rem;
    font-weight: 700;
    color: white;
    display: flex;
    align-items: center;
    gap: 4px;
}
.result-panel .result-desc {
    font-size: 0.88rem;
    color: var(--text);
    font-weight: 600;
    margin-top: 8px;
    line-height: 1.6;
}

.progress-bar {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 14px;
}
.progress-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #d1fae5;
    transition: background 0.3s;
}
.progress-dot.done { background: var(--accent); }

@keyframes popIn { from { opacity: 0; transform: scale(0.7); } to { opacity: 1; transform: scale(1); } }

.celebration { position: fixed; inset: 0; pointer-events: none; z-index: 1000; }
.confetti { position: absolute; border-radius: 2px; animation: confettiFall linear forwards; }
@keyframes confettiFall { 0% { opacity:1; transform: translateY(0) rotate(0); } 100% { opacity:0; transform: translateY(100vh) rotate(720deg) scale(0.3); } }
.star-burst { position: absolute; font-size: 2rem; animation: starPop 0.8s ease forwards; }
@keyframes starPop { 0% { opacity:1; transform: scale(0); } 50% { transform: scale(1.3) rotate(180deg); } 100% { opacity:0; transform: scale(0.5) translateY(-60px); } }

@media (max-width: 420px) {
    .objects-grid { grid-template-columns: repeat(2, 1fr); }
    .object-card .obj-icon { font-size: 2.4rem; }
    .sense-tab { padding: 8px 10px; }
    .sense-tab .icon { font-size: 1.6rem; }
}
</style>
</head>
<body>

<div class="header">
    <h1>Senses Explorer</h1>
    <p>Tap objects to explore your five senses!</p>
</div>

<div class="main">
    <div class="sense-bar" id="senseBar"></div>
    <div class="instruction" id="instruction">Tap an object to find out which senses we use!</div>
    <div class="progress-bar" id="progressBar"></div>
    <div class="objects-grid" id="objectsGrid"></div>
    <div class="result-panel" id="resultPanel">
        <div class="result-icon" id="resultIcon"></div>
        <div class="result-obj" id="resultObj"></div>
        <div class="result-senses" id="resultSenses"></div>
        <div class="result-desc" id="resultDesc"></div>
    </div>
</div>

<div class="celebration" id="celebration"></div>

<script>
const SENSES = [
    { id: 'sight', icon: '\u{1F440}', label: 'See', colour: '#3b82f6' },
    { id: 'hearing', icon: '\u{1F442}', label: 'Hear', colour: '#a855f7' },
    { id: 'touch', icon: '\u270B', label: 'Touch', colour: '#f97316' },
    { id: 'smell', icon: '\u{1F443}', label: 'Smell', colour: '#ec4899' },
    { id: 'taste', icon: '\u{1F445}', label: 'Taste', colour: '#ef4444' }
];

const OBJECTS = [
    { icon: '\u{1F308}', name: 'Rainbow', senses: ['sight'], desc: 'We use our eyes to see the beautiful colours of a rainbow in the sky!' },
    { icon: '\u{1F3B5}', name: 'Music', senses: ['hearing'], desc: 'We use our ears to hear music. It can be loud or quiet, fast or slow!' },
    { icon: '\u{1F9F8}', name: 'Teddy Bear', senses: ['sight', 'touch'], desc: 'We can see teddy bear\'s colour and feel how soft and fluffy it is!' },
    { icon: '\u{1F353}', name: 'Strawberry', senses: ['sight', 'smell', 'taste', 'touch'], desc: 'Strawberries are red to see, sweet to taste, lovely to smell, and bumpy to touch!' },
    { icon: '\u{1F514}', name: 'Bell', senses: ['sight', 'hearing', 'touch'], desc: 'We can see a shiny bell, hear it ring, and feel it vibrate in our hand!' },
    { icon: '\u{1F33A}', name: 'Flower', senses: ['sight', 'smell', 'touch'], desc: 'Flowers are colourful to see, lovely to smell, and soft to touch!' },
    { icon: '\u{1F36B}', name: 'Chocolate', senses: ['sight', 'smell', 'taste', 'touch'], desc: 'Chocolate is brown to see, yummy to smell and taste, and smooth to touch!' },
    { icon: '\u{1F327}\uFE0F', name: 'Rain', senses: ['sight', 'hearing', 'touch'], desc: 'We can see rain falling, hear it patter, and feel the cold drops on our skin!' },
    { icon: '\u{1F35E}', name: 'Fresh Bread', senses: ['sight', 'smell', 'taste', 'touch'], desc: 'Fresh bread looks golden, smells warm and lovely, tastes delicious, and feels crusty!' },
    { icon: '\u{1F986}', name: 'Duck', senses: ['sight', 'hearing', 'touch'], desc: 'We can see a duck\'s feathers, hear it quack, and feel its smooth feathers!' },
    { icon: '\u{1F9CA}', name: 'Ice Cube', senses: ['sight', 'touch'], desc: 'Ice is clear to see and very cold and slippery to touch!' },
    { icon: '\u{1F3B8}', name: 'Guitar', senses: ['sight', 'hearing', 'touch'], desc: 'A guitar is lovely to look at, makes beautiful sounds, and the strings feel bumpy!' }
];

let explored = new Set();
let activeSenseFilter = null;

const senseBar = document.getElementById('senseBar');
const objectsGrid = document.getElementById('objectsGrid');
const progressBar = document.getElementById('progressBar');

// Build sense tabs
SENSES.forEach(s => {
    const tab = document.createElement('button');
    tab.className = 'sense-tab';
    tab.dataset.sense = s.id;
    tab.innerHTML = `<span class="icon">${s.icon}</span><span class="label">${s.label}</span>`;
    tab.addEventListener('click', () => {
        if (activeSenseFilter === s.id) {
            activeSenseFilter = null;
            tab.classList.remove('active');
            document.getElementById('instruction').textContent = 'Tap an object to find out which senses we use!';
        } else {
            activeSenseFilter = s.id;
            document.querySelectorAll('.sense-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById('instruction').textContent = `Which objects can you ${s.label.toLowerCase()}?`;
        }
        renderObjects();
    });
    senseBar.appendChild(tab);
});

// Build progress dots
OBJECTS.forEach(() => {
    const dot = document.createElement('div');
    dot.className = 'progress-dot';
    progressBar.appendChild(dot);
});

function renderObjects() {
    objectsGrid.innerHTML = '';
    OBJECTS.forEach((obj, i) => {
        const card = document.createElement('div');
        card.className = 'object-card';

        if (activeSenseFilter) {
            const matches = obj.senses.includes(activeSenseFilter);
            if (!matches) card.style.opacity = '0.3';
            const sc = SENSES.find(s => s.id === activeSenseFilter).colour;
            if (matches) {
                card.style.borderColor = sc;
                card.style.background = `${sc}10`;
            }
        }

        if (explored.has(i)) {
            card.classList.add('revealed');
            card.style.borderColor = '#16a34a';
            card.style.background = '#f0fdf4';
        }

        card.innerHTML = `<span class="obj-icon">${obj.icon}</span><span class="obj-name">${obj.name}</span>`;
        card.addEventListener('click', () => showObject(i));
        objectsGrid.appendChild(card);
    });
}

function showObject(idx) {
    const obj = OBJECTS[idx];
    explored.add(idx);

    // Update progress
    progressBar.children[idx].classList.add('done');

    const panel = document.getElementById('resultPanel');
    panel.classList.remove('show');
    void panel.offsetWidth;
    panel.classList.add('show');

    document.getElementById('resultIcon').textContent = obj.icon;
    document.getElementById('resultObj').textContent = obj.name;
    document.getElementById('resultDesc').textContent = obj.desc;

    const sensesDiv = document.getElementById('resultSenses');
    sensesDiv.innerHTML = '';
    obj.senses.forEach(sId => {
        const sense = SENSES.find(s => s.id === sId);
        const badge = document.createElement('span');
        badge.className = 'sense-badge';
        badge.style.background = sense.colour;
        badge.innerHTML = `${sense.icon} ${sense.label}`;
        sensesDiv.appendChild(badge);
    });

    renderObjects();
    spawnMini();

    if (explored.size === OBJECTS.length) {
        setTimeout(() => {
            document.getElementById('instruction').textContent = '\u{1F389} Amazing! You explored every object!';
            celebrate();
        }, 600);
    }
}

function spawnMini() {
    const container = document.getElementById('celebration');
    const colours = ['#16a34a','#3b82f6','#a855f7','#f97316','#ec4899','#ef4444'];
    for (let i = 0; i < 10; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.style.cssText = `left:${Math.random()*100}vw;top:-10px;background:${colours[Math.floor(Math.random()*colours.length)]};width:${5+Math.random()*6}px;height:${5+Math.random()*6}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${1+Math.random()*1.5}s;animation-delay:${Math.random()*0.3}s;`;
        container.appendChild(el);
        setTimeout(() => el.remove(), 3000);
    }
}

function celebrate() {
    const container = document.getElementById('celebration');
    const colours = ['#16a34a','#4ade80','#86efac','#3b82f6','#f97316','#ec4899','#ef4444'];
    for (let i = 0; i < 35; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.style.cssText = `left:${Math.random()*100}vw;top:-12px;background:${colours[Math.floor(Math.random()*colours.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*0.5}s;`;
        container.appendChild(el);
        setTimeout(() => el.remove(), 4000);
    }
    const symbols = ['\u2B50','\u2728','\u{1F31F}'];
    for (let i = 0; i < 6; i++) {
        const el = document.createElement('div');
        el.className = 'star-burst';
        el.textContent = symbols[Math.floor(Math.random()*symbols.length)];
        el.style.left = (15+Math.random()*70)+'vw';
        el.style.top = (15+Math.random()*50)+'vh';
        container.appendChild(el);
        setTimeout(() => el.remove(), 1200);
    }
}

renderObjects();
</script>
</body>
</html>
