<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Religious Stories</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#fdf2f8;--card:#fff;--text:#831843;--text2:#be185d;--accent:#be185d;--accent-bg:#fce7f3;--border:#fbcfe8;--shadow:0 4px 16px rgba(131,24,67,.1);--radius:18px;--success:#22c55e}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh;user-select:none;-webkit-user-select:none}
.header{background:linear-gradient(135deg,#be185d,#ec4899);color:#fff;padding:16px 20px;text-align:center;box-shadow:var(--shadow)}
.header h1{font-size:1.5rem;font-weight:900;text-shadow:2px 2px 0 rgba(0,0,0,.1)}
.header p{font-size:.82rem;opacity:.9;font-weight:600;margin-top:2px}
.main{max-width:600px;margin:0 auto;padding:16px}

.story-tabs{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
.story-tab{display:flex;align-items:center;gap:8px;padding:10px 12px;border:3px solid var(--border);border-radius:14px;background:var(--card);cursor:pointer;transition:all .25s;box-shadow:var(--shadow)}
.story-tab:hover{transform:scale(1.03)}
.story-tab.active{border-color:var(--accent);background:var(--accent-bg)}
.story-tab.done{border-color:var(--success)}
.story-tab .t-icon{font-size:1.6rem;flex-shrink:0}
.story-tab .t-name{font-size:.78rem;font-weight:700}
.story-tab .t-religion{font-size:.62rem;color:var(--text2)}

.story-card{background:var(--card);border-radius:var(--radius);box-shadow:0 8px 32px rgba(131,24,67,.12);overflow:hidden;margin-bottom:14px;display:none;animation:slideUp .3s ease}
.story-card.show{display:block}
.story-banner{padding:14px 16px;color:#fff;display:flex;align-items:center;gap:10px}
.story-banner .s-icon{font-size:2rem}
.story-banner h2{font-size:1rem;font-weight:800}
.story-banner .s-religion{font-size:.72rem;opacity:.85}

.story-pages{padding:16px}
.page{display:none;animation:fadeIn .3s ease}
.page.active{display:block}
.page-icon{font-size:3rem;text-align:center;margin-bottom:8px;display:block}
.page-text{font-size:.95rem;line-height:1.7;margin-bottom:10px;text-align:center}
.page-num{font-size:.68rem;color:var(--text2);text-align:center;font-weight:700}

.nav-btns{display:flex;gap:8px;margin-top:10px}
.nav-btn{flex:1;padding:10px;border:none;border-radius:50px;font-family:'Inter',sans-serif;font-size:.85rem;font-weight:800;cursor:pointer;transition:all .2s;box-shadow:var(--shadow)}
.nav-btn:hover{transform:scale(1.03)}
.nav-btn.prev{background:var(--card);color:var(--text2);border:2px solid var(--border)}
.nav-btn.next{background:var(--accent);color:#fff}
.nav-btn:disabled{opacity:.3;cursor:default;transform:none}

.lesson-box{padding:12px;background:#fef3c7;border-radius:12px;font-size:.85rem;border-left:4px solid #f59e0b;margin-top:10px}
.lesson-box strong{color:#92400e}

.progress-dots{display:flex;justify-content:center;gap:6px;margin-top:10px}
.p-dot{width:10px;height:10px;border-radius:50%;background:var(--border);transition:all .2s}
.p-dot.active{background:var(--accent);transform:scale(1.3)}
.p-dot.done{background:var(--success)}

@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.celebration{position:fixed;inset:0;pointer-events:none;z-index:1000}
.confetti{position:absolute;border-radius:2px;animation:confettiFall linear forwards}
@keyframes confettiFall{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(100vh) rotate(720deg) scale(.3)}}
</style>
</head>
<body>
<div class="header"><h1>Religious Stories</h1><p>Read and learn stories from different religions!</p></div>
<div class="main">
<div class="story-tabs" id="storyTabs"></div>
<div class="story-card" id="storyCard"></div>
</div>
<div class="celebration" id="celebration"></div>
<script>
const STORIES=[
{name:'Noah\'s Ark',icon:'&#x1F6A2;',religion:'Christianity / Judaism / Islam',colour:'#2563eb',
pages:[
{icon:'&#x1F30A;',text:'God saw that people had become very wicked. He decided to send a great flood to wash the world clean.'},
{icon:'&#x1F6A2;',text:'God told Noah, a good man, to build a huge boat called an ark. Noah worked hard for many years to build it.'},
{icon:'&#x1F98E;',text:'Noah brought two of every animal onto the ark: lions, elephants, birds, insects, and many more!'},
{icon:'&#x1F327;&#xFE0F;',text:'It rained for 40 days and 40 nights. Water covered everything, but Noah, his family and all the animals were safe inside the ark.'},
{icon:'&#x1F54A;&#xFE0F;',text:'Noah sent out a dove. It came back with an olive branch, showing that the water was going down and dry land was near.'},
{icon:'&#x1F308;',text:'When the flood ended, God put a rainbow in the sky as a promise that He would never flood the whole world again.'}
],
lesson:'This story teaches that God rewards those who are good and keep faith, even when others do not. The rainbow is a sign of hope and promise.'},
{name:'The Good Samaritan',icon:'&#x1F91D;',religion:'Christianity',colour:'#7c3aed',
pages:[
{icon:'&#x1F6B6;',text:'A man was walking along a road when robbers attacked him. They took his money and left him hurt by the side of the road.'},
{icon:'&#x1F6B7;',text:'A priest came along the road. He saw the hurt man but walked past on the other side without helping.'},
{icon:'&#x1F6B7;',text:'Another important man walked by too. He looked at the hurt man but also kept walking without stopping.'},
{icon:'&#x1F91D;',text:'Then a Samaritan came along. Even though Samaritans and the hurt man\'s people did not usually get along, he stopped to help.'},
{icon:'&#x1F489;',text:'The Samaritan cleaned the man\'s wounds, put him on his donkey, and took him to an inn to rest and get better.'},
{icon:'&#x1F4B0;',text:'He paid the innkeeper to look after the man and promised to come back and pay for anything else he needed.'}
],
lesson:'Jesus told this story to teach that we should help everyone, even people who are different from us. Being a good neighbour means being kind to all.'},
{name:'The Prophet and the Cat',icon:'&#x1F431;',religion:'Islam',colour:'#059669',
pages:[
{icon:'&#x1F54C;',text:'The Prophet Muhammad (peace be upon him) was known for his kindness to all living things, including animals.'},
{icon:'&#x1F431;',text:'One day, his favourite cat, Muezza, fell asleep on the sleeve of his prayer robe.'},
{icon:'&#x1F64F;',text:'When it was time for the Prophet to go to prayers, he did not want to wake his sleeping cat.'},
{icon:'&#x2702;&#xFE0F;',text:'Instead of disturbing Muezza, he carefully cut the sleeve off his robe so the cat could continue sleeping peacefully.'},
{icon:'&#x1F60A;',text:'When he returned from prayers, Muezza woke up and bowed to the Prophet. He stroked the cat gently three times.'}
],
lesson:'This story teaches that Islam values kindness and compassion to all creatures, no matter how small. Even a tiny act of kindness is important.'},
{name:'Rama and Sita',icon:'&#x1FA94;',religion:'Hinduism',colour:'#f59e0b',
pages:[
{icon:'&#x1F451;',text:'Prince Rama and his wife Sita were sent away from their kingdom to live in the forest for 14 years.'},
{icon:'&#x1F479;',text:'The evil demon king Ravana kidnapped Sita and took her to his island kingdom of Lanka.'},
{icon:'&#x1F435;',text:'Rama asked the monkey god Hanuman for help. Hanuman flew across the sea to find Sita and tell her Rama was coming.'},
{icon:'&#x2694;&#xFE0F;',text:'Rama and his army of monkeys built a bridge across the sea and fought a great battle against Ravana.'},
{icon:'&#x2B50;',text:'Rama defeated Ravana and rescued Sita. They travelled home together after their long time away.'},
{icon:'&#x1FA94;',text:'The people lit thousands of lamps (diyas) to guide Rama and Sita home. This is why we celebrate Diwali, the Festival of Lights!'}
],
lesson:'This story teaches that good always wins over evil. Diwali celebrates the triumph of light over darkness and the importance of loyalty and courage.'}
];

let currentStory=0,currentPage=0,completed=new Set();
const storyTabs=document.getElementById('storyTabs');
const storyCard=document.getElementById('storyCard');

STORIES.forEach((s,i)=>{
const tab=document.createElement('div');tab.className='story-tab';tab.dataset.idx=i;
tab.innerHTML=`<span class="t-icon">${s.icon}</span><div><div class="t-name">${s.name}</div><div class="t-religion">${s.religion}</div></div>`;
tab.addEventListener('click',()=>{currentStory=i;currentPage=0;renderStory();});
storyTabs.appendChild(tab);
});

function renderStory(){
storyTabs.querySelectorAll('.story-tab').forEach((t,i)=>{t.classList.toggle('active',i===currentStory);t.classList.toggle('done',completed.has(i));});
const s=STORIES[currentStory];
storyCard.classList.remove('show');void storyCard.offsetWidth;storyCard.classList.add('show');

let pagesHtml='';
s.pages.forEach((p,i)=>{
pagesHtml+=`<div class="page${i===currentPage?' active':''}" data-p="${i}"><span class="page-icon">${p.icon}</span><div class="page-text">${p.text}</div><div class="page-num">Page ${i+1} of ${s.pages.length}</div></div>`;
});

const isLast=currentPage===s.pages.length-1;
const showLesson=isLast;

storyCard.innerHTML=`
<div class="story-banner" style="background:linear-gradient(135deg,${s.colour},${s.colour}cc)"><span class="s-icon">${s.icon}</span><div><h2>${s.name}</h2><div class="s-religion">${s.religion}</div></div></div>
<div class="story-pages">${pagesHtml}
<div class="progress-dots">${s.pages.map((_,i)=>`<div class="p-dot${i===currentPage?' active':''}${i<currentPage?' done':''}"></div>`).join('')}</div>
${showLesson?`<div class="lesson-box"><strong>What does this story teach us?</strong> ${s.lesson}</div>`:''}
<div class="nav-btns"><button class="nav-btn prev" id="prevBtn"${currentPage===0?' disabled':''}>&laquo; Back</button><button class="nav-btn next" id="nextBtn">${isLast?'Finish &#x2B50;':'Next &raquo;'}</button></div>
</div>`;

document.getElementById('prevBtn').addEventListener('click',()=>{if(currentPage>0){currentPage--;renderStory();}});
document.getElementById('nextBtn').addEventListener('click',()=>{
if(currentPage<s.pages.length-1){currentPage++;renderStory();}
else{completed.add(currentStory);storyTabs.querySelectorAll('.story-tab').forEach((t,i)=>t.classList.toggle('done',completed.has(i)));spawnMini();
if(completed.size===STORIES.length)celebrate();}
});
}

function spawnMini(){const c=document.getElementById('celebration');const cols=['#be185d','#ec4899','#22c55e','#f59e0b','#3b82f6'];for(let i=0;i<10;i++){const e=document.createElement('div');e.className='confetti';e.style.cssText=`left:${Math.random()*100}vw;top:-10px;background:${cols[Math.floor(Math.random()*cols.length)]};width:${5+Math.random()*6}px;height:${5+Math.random()*6}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1+Math.random()*1.5}s;animation-delay:${Math.random()*.3}s;`;c.appendChild(e);setTimeout(()=>e.remove(),3000);}}
function celebrate(){const c=document.getElementById('celebration');const cols=['#be185d','#ec4899','#22c55e','#f59e0b','#3b82f6','#a855f7'];for(let i=0;i<35;i++){const e=document.createElement('div');e.className='confetti';e.style.cssText=`left:${Math.random()*100}vw;top:-12px;background:${cols[Math.floor(Math.random()*cols.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*.5}s;`;c.appendChild(e);setTimeout(()=>e.remove(),4500);}}

renderStory();
</script>
</body>
</html>
