<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Literary Text Analysis</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#faf8f5;--card:#fff;--text:#1c1917;--text2:#78716c;--accent:#7c3aed;--accent-bg:#f5f3ff;--grammar:#2563eb;--grammar-bg:rgba(37,99,235,.1);--style:#ec4899;--style-bg:rgba(236,72,153,.1);--theme:#059669;--theme-bg:rgba(5,150,105,.1);--border:#e7e5e4;--shadow:0 2px 12px rgba(0,0,0,.05);--radius:10px;--font-d:'Playfair Display',Georgia,serif;--font-u:'DM Sans',system-ui,sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-u);background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
.masthead{background:#1c1917;color:#e7e5e4;padding:16px 24px;display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
.masthead h1{font-family:var(--font-d);font-size:1.3rem;font-weight:900}
.masthead h1 span{color:var(--accent);font-style:italic;font-weight:400}
.masthead .tag{font-size:.6rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#a8a29e;background:#292524;padding:3px 10px;border-radius:3px}
.main{max-width:880px;margin:0 auto;padding:20px}
.app-layout{display:grid;grid-template-columns:1fr 300px;gap:20px}

.text-selector{display:flex;gap:0;margin-bottom:16px;border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.text-btn{flex:1;padding:10px;border:none;background:var(--card);font-family:var(--font-u);font-size:.72rem;font-weight:600;cursor:pointer;color:var(--text2);transition:all .2s}
.text-btn.active{background:var(--accent);color:#fff}

.tool-bar{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.tool-btn{padding:5px 14px;border:1.5px solid var(--border);border-radius:5px;background:var(--card);font-family:var(--font-u);font-size:.68rem;font-weight:600;cursor:pointer;color:var(--text2);transition:all .2s}
.tool-btn:hover{border-color:var(--accent)}
.tool-btn.active{color:#fff}
.tool-btn[data-tool="grammar"].active{background:var(--grammar);border-color:var(--grammar)}
.tool-btn[data-tool="style"].active{background:var(--style);border-color:var(--style)}
.tool-btn[data-tool="theme"].active{background:var(--theme);border-color:var(--theme)}

.passage-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.passage-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.passage-header h2{font-family:var(--font-d);font-size:1rem;font-weight:700;font-style:italic}
.passage-header .author{font-size:.72rem;color:var(--text2)}
.passage-text{padding:20px;font-family:var(--font-d);font-size:1rem;line-height:2;color:#44403c}
.passage-text .anno{position:relative;cursor:help;border-bottom:2px solid;padding-bottom:1px;transition:all .2s}
.passage-text .anno:hover{filter:brightness(1.1)}
.passage-text .anno.grammar{border-color:var(--grammar);color:var(--grammar);background:var(--grammar-bg)}
.passage-text .anno.style{border-color:var(--style);color:var(--style);background:var(--style-bg)}
.passage-text .anno.theme{border-color:var(--theme);color:var(--theme);background:var(--theme-bg)}

.side-panel{display:flex;flex-direction:column;gap:14px}
.panel-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow)}
.panel-card h3{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text2);margin-bottom:8px}
.panel-card p{font-size:.82rem;line-height:1.5;color:var(--text2)}
.legend{display:flex;flex-direction:column;gap:6px}
.legend-item{display:flex;align-items:center;gap:8px;font-size:.75rem;font-weight:600}
.legend-dot{width:14px;height:14px;border-radius:3px}

.annotation-list{display:flex;flex-direction:column;gap:6px;max-height:300px;overflow-y:auto}
.anno-item{padding:8px;border-radius:6px;font-size:.78rem;line-height:1.4;border-left:3px solid}
.anno-item.grammar{background:var(--grammar-bg);border-left-color:var(--grammar);color:#1e40af}
.anno-item.style{background:var(--style-bg);border-left-color:var(--style);color:#9d174d}
.anno-item.theme{background:var(--theme-bg);border-left-color:var(--theme);color:#065f46}
.anno-item .anno-phrase{font-weight:700}
.anno-item .anno-note{font-size:.72rem;margin-top:2px}

.tooltip{position:fixed;max-width:280px;padding:10px 14px;background:#1c1917;color:#e7e5e4;border-radius:6px;font-size:.75rem;line-height:1.4;pointer-events:none;opacity:0;transform:translateY(4px);transition:all .15s;z-index:1000;box-shadow:0 8px 30px rgba(0,0,0,.3)}
.tooltip.visible{opacity:1;transform:translateY(0)}
.tooltip .tt-type{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;display:block}

@media(max-width:700px){.app-layout{grid-template-columns:1fr}.side-panel{order:-1}}
</style>
</head>
<body>
<div class="masthead"><h1>Literary Text <span>Analysis</span></h1><span class="tag">A-Level MFL</span></div>
<div class="main">
<div class="text-selector" id="textSelector"></div>
<div class="tool-bar" id="toolBar">
<button class="tool-btn active" data-tool="all">All</button>
<button class="tool-btn" data-tool="grammar">Grammar</button>
<button class="tool-btn" data-tool="style">Style</button>
<button class="tool-btn" data-tool="theme">Theme</button>
</div>
<div class="app-layout">
<div class="passage-card" id="passageCard"></div>
<div class="side-panel">
<div class="panel-card"><h3>Analysis Tools</h3><div class="legend">
<div class="legend-item"><div class="legend-dot" style="background:var(--grammar)"></div> Grammar (tense, mood, syntax)</div>
<div class="legend-item"><div class="legend-dot" style="background:var(--style)"></div> Style (imagery, rhetoric, register)</div>
<div class="legend-item"><div class="legend-dot" style="background:var(--theme)"></div> Theme (meaning, context, symbolism)</div>
</div></div>
<div class="panel-card"><h3>Annotations</h3><div class="annotation-list" id="annoList"></div></div>
</div>
</div>
</div>
<div class="tooltip" id="tooltip"></div>
<script>
const TEXTS=[
{
title:'L\'&#xC9;tranger',author:'Albert Camus (1942)',lang:'French',
passage:'Aujourd\'hui, maman est morte. Ou peut-&#xEA;tre hier, je ne sais pas. J\'ai re&#xE7;u un t&#xE9;l&#xE9;gramme de l\'asile: "M&#xE8;re d&#xE9;c&#xE9;d&#xE9;e. Enterrement demain. Sentiments distingu&#xE9;s." Cela ne veut rien dire. C\'&#xE9;tait peut-&#xEA;tre hier.',
annotations:[
{phrase:'Aujourd\'hui, maman est morte',type:'grammar',note:'Pass&#xE9; compos&#xE9; ("est morte") signals completed past action. "Maman" (informal) rather than "m&#xE8;re" (formal) creates an unsettling mix of intimacy and detachment.'},
{phrase:'Ou peut-&#xEA;tre hier, je ne sais pas',type:'style',note:'The narrator\'s uncertainty about his own mother\'s death is the most famous opening in French literature. The flat, affectless tone establishes Meursault\'s existential indifference.'},
{phrase:'Sentiments distingu&#xE9;s',type:'theme',note:'A formulaic closing phrase from the telegram. Its bureaucratic politeness contrasts grotesquely with the content (a death announcement), highlighting the absurdity Camus explores.'},
{phrase:'Cela ne veut rien dire',type:'theme',note:'"That doesn\'t mean anything." A statement that resonates through the entire novel: the search for meaning in an absurd world. The referent of "cela" is deliberately ambiguous.'},
{phrase:'C\'&#xE9;tait peut-&#xEA;tre hier',type:'grammar',note:'Imparfait ("c\'&#xE9;tait") creates temporal vagueness. The repetition of "peut-&#xEA;tre" (perhaps) reinforces Meursault\'s detachment from conventional emotional responses.'}
]
},
{
title:'La casa de Bernarda Alba',author:'Federico Garc&#xED;a Lorca (1936)',lang:'Spanish',
passage:'&#xA1;Silencio! No os hag&#xE1;is ilusiones de que vais a poder conmigo. &#xA1;Hasta que salga de esta casa con los pies delante mandar&#xE9; en lo m&#xED;o y en lo vuestro!',
annotations:[
{phrase:'&#xA1;Silencio!',type:'style',note:'The imperative opens with a single-word exclamation. Bernarda\'s first and last words in the play are both "&#xA1;Silencio!", framing the entire drama as an exercise in suppression.'},
{phrase:'No os hag&#xE1;is ilusiones',type:'grammar',note:'Negative imperative using the subjunctive ("hag&#xE1;is"). The use of "vosotros" form shows Bernarda addressing her daughters collectively as subordinates.'},
{phrase:'Hasta que salga de esta casa con los pies delante',type:'theme',note:'"Until I leave this house feet first" (i.e. in a coffin). Death is the only escape from Bernarda\'s tyranny. The house symbolises patriarchal oppression.'},
{phrase:'mandar&#xE9; en lo m&#xED;o y en lo vuestro',type:'grammar',note:'Future tense ("mandar&#xE9;") asserts absolute authority. "Lo m&#xED;o y lo vuestro" (what is mine and what is yours) shows Bernarda claims ownership over her daughters\' autonomy.'},
{phrase:'con los pies delante',type:'style',note:'A colloquial euphemism for death. Lorca uses rural Andalusian speech patterns throughout, grounding the play\'s universal themes in specific cultural context.'}
]
}
];

let currentText=0,activeTool='all';
const passageCard=document.getElementById('passageCard');
const annoList=document.getElementById('annoList');
const tooltipEl=document.getElementById('tooltip');
const textSelector=document.getElementById('textSelector');

TEXTS.forEach((t,i)=>{
const btn=document.createElement('button');
btn.className='text-btn'+(i===0?' active':'');
btn.innerHTML=`${t.title} <small>(${t.lang})</small>`;
btn.addEventListener('click',()=>{currentText=i;textSelector.querySelectorAll('.text-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render();});
textSelector.appendChild(btn);
});

document.querySelectorAll('.tool-btn').forEach(btn=>{
btn.addEventListener('click',()=>{
activeTool=btn.dataset.tool;
document.querySelectorAll('.tool-btn').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
render();
});
});

function render(){
const t=TEXTS[currentText];
const filtered=activeTool==='all'?t.annotations:t.annotations.filter(a=>a.type===activeTool);

let html=t.passage;
const sorted=[...filtered].sort((a,b)=>b.phrase.length-a.phrase.length);
sorted.forEach(a=>{
const esc=a.phrase.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
html=html.replace(new RegExp(esc,'g'),`<span class="anno ${a.type}" data-note="${a.note.replace(/"/g,'&quot;')}" data-type="${a.type}">${a.phrase}</span>`);
});

passageCard.innerHTML=`<div class="passage-header"><div><h2>${t.title}</h2><div class="author">${t.author}</div></div></div><div class="passage-text">${html}</div>`;

annoList.innerHTML='';
filtered.forEach(a=>{
const item=document.createElement('div');
item.className='anno-item '+a.type;
item.innerHTML=`<div class="anno-phrase">"${a.phrase}"</div><div class="anno-note">${a.note}</div>`;
annoList.appendChild(item);
});
}

document.addEventListener('mouseover',e=>{const el=e.target.closest('.anno');if(!el)return;const types={grammar:'Grammar',style:'Style',theme:'Theme'};tooltipEl.innerHTML=`<span class="tt-type" style="color:var(--${el.dataset.type})">${types[el.dataset.type]}</span>${el.dataset.note}`;tooltipEl.classList.add('visible');});
document.addEventListener('mousemove',e=>{if(tooltipEl.classList.contains('visible')){tooltipEl.style.left=Math.min(e.clientX+12,window.innerWidth-300)+'px';tooltipEl.style.top=Math.min(e.clientY+16,window.innerHeight-100)+'px';}});
document.addEventListener('mouseout',e=>{if(e.target.closest('.anno'))tooltipEl.classList.remove('visible');});

render();
</script>
</body>
</html>
