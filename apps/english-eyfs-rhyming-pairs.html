<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rhyming Pairs Match</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #f0f4ff;
    --card-bg: #ffffff;
    --text: #1e2a4a;
    --text-light: #6b7ba0;
    --accent: #6366f1;
    --accent-light: #eef2ff;
    --success: #22c55e;
    --success-light: #dcfce7;
    --pink: #ec4899;
    --orange: #f97316;
    --yellow: #eab308;
    --teal: #14b8a6;
    --border: #e0e7ff;
    --shadow: 0 4px 16px rgba(40,40,120,0.10);
    --shadow-lg: 0 8px 32px rgba(40,40,120,0.18);
    --radius: 20px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
    overflow-x: hidden;
    user-select: none;
    -webkit-user-select: none;
}

.header {
    background: linear-gradient(135deg, #6366f1, #a78bfa, #ec4899);
    color: white;
    padding: 16px 20px;
    text-align: center;
    box-shadow: var(--shadow);
    position: relative;
    z-index: 10;
}
.header h1 { font-size: 1.6rem; font-weight: 900; text-shadow: 2px 2px 0 rgba(0,0,0,0.1); letter-spacing: -0.5px; }
.header p { font-size: 0.85rem; opacity: 0.9; font-weight: 600; margin-top: 2px; }

.main { max-width: 560px; margin: 0 auto; padding: 16px; }

.score-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 16px;
    background: var(--card-bg);
    border-radius: 14px;
    box-shadow: var(--shadow);
    margin-bottom: 14px;
    font-weight: 700;
    font-size: 0.9rem;
}
.score-bar .pairs { color: var(--accent); }
.score-bar .round { color: var(--text-light); }

.instruction {
    text-align: center;
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 14px;
    padding: 10px;
    background: var(--accent-light);
    border-radius: 12px;
    border: 2px solid var(--border);
}

.card-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 16px;
}

.rhyme-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 16px 8px;
    background: var(--card-bg);
    border: 4px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: all 0.25s ease;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    min-height: 110px;
    position: relative;
}
.rhyme-card:hover { transform: scale(1.05); }
.rhyme-card.selected { border-color: var(--accent); transform: scale(1.08); box-shadow: var(--shadow-lg); background: var(--accent-light); }
.rhyme-card.matched { border-color: var(--success); background: var(--success-light); pointer-events: none; }
.rhyme-card.wrong { animation: wobble 0.5s ease; border-color: #ef4444; }
.rhyme-card .emoji { font-size: 2.6rem; line-height: 1; }
.rhyme-card .word { font-size: 0.95rem; font-weight: 800; color: var(--text); }

.next-btn {
    display: block;
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, var(--accent), var(--pink));
    color: white;
    font-family: 'Inter', sans-serif;
    font-size: 1.1rem;
    font-weight: 900;
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: all 0.25s;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    display: none;
}
.next-btn:hover { transform: scale(1.04); box-shadow: var(--shadow-lg); }

.complete-msg {
    text-align: center;
    font-size: 1.3rem;
    font-weight: 900;
    padding: 20px;
    background: var(--success-light);
    border: 3px solid var(--success);
    border-radius: var(--radius);
    color: #166534;
    display: none;
    animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
}

@keyframes popIn { from { opacity: 0; transform: scale(0.7); } to { opacity: 1; transform: scale(1); } }
@keyframes wobble {
    0%,100% { transform: translateX(0) rotate(0); }
    20% { transform: translateX(-8px) rotate(-3deg); }
    40% { transform: translateX(8px) rotate(3deg); }
    60% { transform: translateX(-4px) rotate(-1deg); }
    80% { transform: translateX(4px) rotate(1deg); }
}

.celebration { position: fixed; inset: 0; pointer-events: none; z-index: 1000; }
.confetti {
    position: absolute;
    border-radius: 2px;
    animation: confettiFall linear forwards;
}
@keyframes confettiFall {
    0% { opacity: 1; transform: translateY(0) rotate(0deg); }
    100% { opacity: 0; transform: translateY(100vh) rotate(720deg) scale(0.3); }
}
.star-burst {
    position: absolute;
    font-size: 2rem;
    animation: starPop 0.8s ease forwards;
}
@keyframes starPop {
    0% { opacity: 1; transform: scale(0); }
    50% { opacity: 1; transform: scale(1.3) rotate(180deg); }
    100% { opacity: 0; transform: scale(0.5) translateY(-60px); }
}

@media (max-width: 400px) {
    .card-grid { grid-template-columns: repeat(2, 1fr); }
    .rhyme-card .emoji { font-size: 2rem; }
    .rhyme-card { min-height: 90px; padding: 12px 6px; }
}
</style>
</head>
<body>

<div class="header">
    <h1>Rhyming Pairs</h1>
    <p>Find the words that rhyme!</p>
</div>

<div class="main">
    <div class="score-bar">
        <span class="pairs" id="pairsFound">Pairs: 0</span>
        <span class="round" id="roundLabel">Round 1 of 4</span>
    </div>
    <div class="instruction" id="instruction">Tap two cards that rhyme!</div>
    <div class="card-grid" id="cardGrid"></div>
    <button class="next-btn" id="nextBtn">Next Round!</button>
    <div class="complete-msg" id="completeMsg"></div>
</div>

<div class="celebration" id="celebration"></div>

<script>
const ROUNDS = [
    [
        { word: 'cat', emoji: '\u{1F431}' },
        { word: 'hat', emoji: '\u{1F3A9}' },
        { word: 'dog', emoji: '\u{1F436}' },
        { word: 'log', emoji: '\u{1FAB5}' },
        { word: 'bee', emoji: '\u{1F41D}' },
        { word: 'tree', emoji: '\u{1F333}' }
    ],
    [
        { word: 'star', emoji: '\u2B50' },
        { word: 'car', emoji: '\u{1F697}' },
        { word: 'moon', emoji: '\u{1F319}' },
        { word: 'spoon', emoji: '\u{1F944}' },
        { word: 'fish', emoji: '\u{1F41F}' },
        { word: 'dish', emoji: '\u{1F37D}\uFE0F' }
    ],
    [
        { word: 'house', emoji: '\u{1F3E0}' },
        { word: 'mouse', emoji: '\u{1F42D}' },
        { word: 'cake', emoji: '\u{1F370}' },
        { word: 'snake', emoji: '\u{1F40D}' },
        { word: 'rain', emoji: '\u{1F327}\uFE0F' },
        { word: 'train', emoji: '\u{1F682}' }
    ],
    [
        { word: 'boat', emoji: '\u26F5' },
        { word: 'coat', emoji: '\u{1F9E5}' },
        { word: 'frog', emoji: '\u{1F438}' },
        { word: 'fog', emoji: '\u{1F32B}\uFE0F' },
        { word: 'king', emoji: '\u{1F451}' },
        { word: 'ring', emoji: '\u{1F48D}' }
    ]
];

const PAIR_COLOURS = ['#6366f1', '#ec4899', '#14b8a6', '#f97316', '#eab308', '#22c55e'];

let round = 0;
let totalPairs = 0;
let selected = null;
let matchedCount = 0;
let cards = [];

const grid = document.getElementById('cardGrid');
const nextBtn = document.getElementById('nextBtn');
const completeMsg = document.getElementById('completeMsg');

nextBtn.addEventListener('click', () => {
    round++;
    if (round < ROUNDS.length) {
        startRound();
    }
});

function startRound() {
    matchedCount = 0;
    selected = null;
    nextBtn.style.display = 'none';
    completeMsg.style.display = 'none';
    document.getElementById('roundLabel').textContent = `Round ${round + 1} of ${ROUNDS.length}`;
    document.getElementById('instruction').textContent = 'Tap two cards that rhyme!';

    // Shuffle cards
    cards = [...ROUNDS[round]];
    shuffle(cards);

    grid.innerHTML = '';
    cards.forEach((card, i) => {
        const el = document.createElement('div');
        el.className = 'rhyme-card';
        el.dataset.idx = i;
        el.dataset.word = card.word;
        el.innerHTML = `<span class="emoji">${card.emoji}</span><span class="word">${card.word}</span>`;
        el.addEventListener('click', () => onCardClick(i));
        grid.appendChild(el);
    });
}

function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
}

function getRhymeGroup(word) {
    const pairs = ROUNDS[round];
    for (let i = 0; i < pairs.length; i += 2) {
        if (pairs[i].word === word || pairs[i + 1].word === word) return Math.floor(i / 2);
    }
    return -1;
}

function onCardClick(idx) {
    const el = grid.children[idx];
    if (el.classList.contains('matched')) return;

    if (selected === null) {
        selected = idx;
        el.classList.add('selected');
        return;
    }

    if (selected === idx) {
        el.classList.remove('selected');
        selected = null;
        return;
    }

    const firstEl = grid.children[selected];
    const word1 = cards[selected].word;
    const word2 = cards[idx].word;
    const group1 = getRhymeGroup(word1);
    const group2 = getRhymeGroup(word2);

    if (group1 === group2 && group1 !== -1) {
        // Match!
        const colour = PAIR_COLOURS[matchedCount % PAIR_COLOURS.length];
        firstEl.classList.remove('selected');
        firstEl.classList.add('matched');
        firstEl.style.borderColor = colour;
        el.classList.add('matched');
        el.style.borderColor = colour;
        matchedCount++;
        totalPairs++;
        document.getElementById('pairsFound').textContent = `Pairs: ${totalPairs}`;
        spawnStars(3);

        if (matchedCount === 3) {
            // Round complete
            celebrate();
            if (round < ROUNDS.length - 1) {
                document.getElementById('instruction').textContent = 'All pairs found! Great job!';
                nextBtn.style.display = 'block';
            } else {
                document.getElementById('instruction').textContent = '';
                completeMsg.style.display = 'block';
                completeMsg.textContent = '\u{1F389} You found all the rhyming pairs! Superstar! \u{1F31F}';
                celebrate();
                setTimeout(celebrate, 600);
            }
        }
    } else {
        // No match
        firstEl.classList.remove('selected');
        firstEl.classList.add('wrong');
        el.classList.add('wrong');
        setTimeout(() => {
            firstEl.classList.remove('wrong');
            el.classList.remove('wrong');
        }, 500);
    }
    selected = null;
}

// Celebrations
function celebrate() {
    const container = document.getElementById('celebration');
    const colours = ['#6366f1', '#a78bfa', '#ec4899', '#22c55e', '#f97316', '#eab308', '#14b8a6'];
    for (let i = 0; i < 30; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.style.left = Math.random() * 100 + 'vw';
        el.style.top = '-12px';
        el.style.background = colours[Math.floor(Math.random() * colours.length)];
        el.style.width = (6 + Math.random() * 8) + 'px';
        el.style.height = (6 + Math.random() * 8) + 'px';
        el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        el.style.animationDuration = (1.5 + Math.random() * 2) + 's';
        el.style.animationDelay = (Math.random() * 0.5) + 's';
        container.appendChild(el);
        setTimeout(() => el.remove(), 4000);
    }
    spawnStars(5);
}

function spawnStars(count) {
    const container = document.getElementById('celebration');
    const symbols = ['\u2B50', '\u2728', '\u{1F31F}'];
    for (let i = 0; i < count; i++) {
        const el = document.createElement('div');
        el.className = 'star-burst';
        el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
        el.style.left = (15 + Math.random() * 70) + 'vw';
        el.style.top = (15 + Math.random() * 50) + 'vh';
        el.style.animationDelay = (Math.random() * 0.3) + 's';
        container.appendChild(el);
        setTimeout(() => el.remove(), 1200);
    }
}

// Start
startRound();
</script>
</body>
</html>
