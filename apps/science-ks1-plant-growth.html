<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plant Growth Diary</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #f0fdf4;
    --card-bg: #ffffff;
    --text: #14532d;
    --text-light: #4d7c5e;
    --accent: #16a34a;
    --accent-light: #dcfce7;
    --soil: #78350f;
    --soil-bg: #fef3c7;
    --water: #0284c7;
    --sun: #f59e0b;
    --border: #bbf7d0;
    --shadow: 0 4px 16px rgba(20,80,40,0.10);
    --shadow-lg: 0 8px 32px rgba(20,80,40,0.16);
    --radius: 18px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
    user-select: none;
    -webkit-user-select: none;
}

.header {
    background: linear-gradient(135deg, #16a34a, #4ade80, #86efac);
    color: white;
    padding: 16px 20px;
    text-align: center;
    box-shadow: var(--shadow);
}
.header h1 { font-size: 1.5rem; font-weight: 900; text-shadow: 2px 2px 0 rgba(0,0,0,0.1); }
.header p { font-size: 0.82rem; opacity: 0.9; font-weight: 600; margin-top: 2px; }

.main { max-width: 500px; margin: 0 auto; padding: 16px; }

.day-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    background: var(--card-bg);
    border-radius: 12px;
    box-shadow: var(--shadow);
    margin-bottom: 14px;
}
.day-bar .day { font-size: 1rem; font-weight: 800; color: var(--accent); }
.day-bar .stage { font-size: 0.78rem; font-weight: 600; color: var(--text-light); }

/* Plant display */
.plant-scene {
    position: relative;
    width: 100%;
    height: 340px;
    background: linear-gradient(180deg, #87ceeb 0%, #b5e6f7 50%, var(--soil) 50%, #5c2d0e 100%);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 14px;
    box-shadow: var(--shadow-lg);
}
.sun-icon {
    position: absolute;
    top: 16px;
    right: 20px;
    font-size: 2.5rem;
    transition: all 1s;
    filter: drop-shadow(0 0 10px rgba(245,158,11,0.5));
}
.sun-icon.dim { opacity: 0.3; filter: none; }
.cloud {
    position: absolute;
    font-size: 1.5rem;
    opacity: 0.6;
    animation: cloudDrift 20s linear infinite;
}
@keyframes cloudDrift { 0% { transform: translateX(-50px); } 100% { transform: translateX(calc(100vw + 50px)); } }

/* Plant SVG container */
.plant-container {
    position: absolute;
    bottom: 50%;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    height: 260px;
}

/* Pot */
.pot {
    position: absolute;
    bottom: -30px;
    left: 50%;
    transform: translateX(-50%);
    width: 80px;
    height: 60px;
    background: #c2410c;
    border-radius: 0 0 12px 12px;
    border-top: 8px solid #9a3412;
}

/* Controls */
.controls {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
}
.ctrl-btn {
    flex: 1;
    padding: 14px;
    border: 3px solid var(--border);
    border-radius: var(--radius);
    background: var(--card-bg);
    font-family: 'Inter', sans-serif;
    font-size: 0.88rem;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.25s;
    touch-action: manipulation;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    box-shadow: var(--shadow);
}
.ctrl-btn:hover { transform: scale(1.04); }
.ctrl-btn:active { transform: scale(0.97); }
.ctrl-btn .btn-icon { font-size: 1.8rem; }
.ctrl-btn .btn-label { font-size: 0.72rem; color: var(--text-light); }
.ctrl-btn.water { border-color: var(--water); }
.ctrl-btn.water:hover { background: #e0f2fe; }
.ctrl-btn.sun { border-color: var(--sun); }
.ctrl-btn.sun:hover { background: #fef3c7; }
.ctrl-btn.next { border-color: var(--accent); background: var(--accent-light); }
.ctrl-btn.next:hover { background: #bbf7d0; }

/* Meters */
.meters {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
}
.meter {
    flex: 1;
    background: var(--card-bg);
    border-radius: 12px;
    padding: 10px;
    box-shadow: var(--shadow);
    text-align: center;
}
.meter .meter-label { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-light); margin-bottom: 4px; }
.meter .meter-bar {
    height: 12px;
    background: #e5e7eb;
    border-radius: 6px;
    overflow: hidden;
}
.meter .meter-fill {
    height: 100%;
    border-radius: 6px;
    transition: width 0.5s ease;
}
.meter.water-meter .meter-fill { background: var(--water); }
.meter.sun-meter .meter-fill { background: var(--sun); }

/* Diary */
.diary {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 14px;
    max-height: 200px;
    overflow-y: auto;
}
.diary h3 { font-size: 0.82rem; font-weight: 800; margin-bottom: 8px; color: var(--accent); }
.diary-entry {
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.82rem;
    animation: fadeIn 0.3s ease;
}
.diary-entry:last-child { border-bottom: none; }
.diary-entry .entry-day { font-weight: 800; color: var(--accent); }
.diary-entry .entry-text { color: var(--text-light); }

.complete-banner {
    text-align: center;
    padding: 16px;
    background: var(--accent-light);
    border: 3px solid var(--accent);
    border-radius: var(--radius);
    font-size: 1.1rem;
    font-weight: 900;
    color: var(--accent);
    display: none;
    animation: popIn 0.4s ease;
    margin-bottom: 14px;
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes popIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }

.celebration { position: fixed; inset: 0; pointer-events: none; z-index: 1000; }
.confetti { position: absolute; border-radius: 2px; animation: confettiFall linear forwards; }
@keyframes confettiFall { 0% { opacity:1; transform: translateY(0) rotate(0); } 100% { opacity:0; transform: translateY(100vh) rotate(720deg) scale(0.3); } }
</style>
</head>
<body>

<div class="header">
    <h1>Plant Growth Diary</h1>
    <p>Water and care for your plant and watch it grow!</p>
</div>

<div class="main">
    <div class="day-bar">
        <span class="day" id="dayLabel">Day 1</span>
        <span class="stage" id="stageLabel">Seed</span>
    </div>

    <div class="plant-scene" id="plantScene">
        <div class="sun-icon dim" id="sunIcon">&#x2600;&#xFE0F;</div>
        <div class="cloud" style="top:20px;left:-30px;">&#x2601;&#xFE0F;</div>
        <div class="cloud" style="top:40px;left:30%;animation-delay:-8s;">&#x2601;&#xFE0F;</div>
        <div class="plant-container" id="plantContainer"></div>
        <div class="pot"></div>
    </div>

    <div class="meters">
        <div class="meter water-meter">
            <div class="meter-label">&#x1F4A7; Water</div>
            <div class="meter-bar"><div class="meter-fill" id="waterFill" style="width:0%"></div></div>
        </div>
        <div class="meter sun-meter">
            <div class="meter-label">&#x2600;&#xFE0F; Sunlight</div>
            <div class="meter-bar"><div class="meter-fill" id="sunFill" style="width:0%"></div></div>
        </div>
    </div>

    <div class="controls">
        <button class="ctrl-btn water" id="waterBtn"><span class="btn-icon">&#x1F4A7;</span><span class="btn-label">Water</span></button>
        <button class="ctrl-btn sun" id="sunBtn"><span class="btn-icon">&#x2600;&#xFE0F;</span><span class="btn-label">Sunlight</span></button>
        <button class="ctrl-btn next" id="nextBtn"><span class="btn-icon">&#x23ED;&#xFE0F;</span><span class="btn-label">Next Day</span></button>
    </div>

    <div class="complete-banner" id="completeBanner"></div>

    <div class="diary">
        <h3>Growth Diary</h3>
        <div id="diaryEntries"></div>
    </div>
</div>

<div class="celebration" id="celebration"></div>

<script>
const STAGES = [
    { name: 'Seed', minDay: 1, needsWater: 1, needsSun: 0 },
    { name: 'Sprouting', minDay: 3, needsWater: 2, needsSun: 1 },
    { name: 'Seedling', minDay: 5, needsWater: 2, needsSun: 2 },
    { name: 'Growing', minDay: 8, needsWater: 3, needsSun: 2 },
    { name: 'Budding', minDay: 11, needsWater: 2, needsSun: 3 },
    { name: 'Flowering!', minDay: 14, needsWater: 2, needsSun: 2 }
];

const DIARY_MESSAGES = {
    0: ['You planted a tiny seed in the soil!', 'The seed is hiding under the earth.'],
    1: ['A tiny green shoot is poking through!', 'The seed has started to sprout!'],
    2: ['Little leaves are opening up!', 'The seedling is reaching for the light!'],
    3: ['The stem is getting taller and stronger!', 'More leaves are growing on the stem!'],
    4: ['A flower bud is forming at the top!', 'The bud is getting ready to bloom!'],
    5: ['A beautiful flower has bloomed!', 'Your plant is fully grown! Well done!']
};

let day = 1;
let stage = 0;
let waterLevel = 0;
let sunLevel = 0;
let totalWater = 0;
let totalSun = 0;
let diaryLog = [];

const plantContainer = document.getElementById('plantContainer');

function addDiary(text) {
    diaryLog.unshift({ day, text });
    renderDiary();
}

function renderDiary() {
    const el = document.getElementById('diaryEntries');
    el.innerHTML = '';
    diaryLog.forEach(entry => {
        const div = document.createElement('div');
        div.className = 'diary-entry';
        div.innerHTML = `<span class="entry-day">Day ${entry.day}:</span> <span class="entry-text">${entry.text}</span>`;
        el.appendChild(div);
    });
}

function renderPlant() {
    const container = plantContainer;
    container.innerHTML = '';

    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('viewBox', '0 0 200 260');
    svg.setAttribute('width', '100%');
    svg.setAttribute('height', '100%');

    if (stage === 0) {
        // Just soil bump
        svg.innerHTML = `<ellipse cx="100" cy="240" rx="20" ry="8" fill="#92400e"/>`;
    } else if (stage === 1) {
        // Tiny sprout
        svg.innerHTML = `
            <path d="M100,240 L100,220" stroke="#16a34a" stroke-width="4" stroke-linecap="round"/>
            <ellipse cx="96" cy="218" rx="8" ry="5" fill="#4ade80" transform="rotate(-20,96,218)"/>
            <ellipse cx="104" cy="218" rx="8" ry="5" fill="#4ade80" transform="rotate(20,104,218)"/>
        `;
    } else if (stage === 2) {
        // Seedling
        svg.innerHTML = `
            <path d="M100,240 L100,190" stroke="#16a34a" stroke-width="5" stroke-linecap="round"/>
            <ellipse cx="86" cy="200" rx="14" ry="7" fill="#4ade80" transform="rotate(-30,86,200)"/>
            <ellipse cx="114" cy="200" rx="14" ry="7" fill="#4ade80" transform="rotate(30,114,200)"/>
            <ellipse cx="90" cy="188" rx="12" ry="6" fill="#22c55e" transform="rotate(-20,90,188)"/>
            <ellipse cx="110" cy="188" rx="12" ry="6" fill="#22c55e" transform="rotate(20,110,188)"/>
        `;
    } else if (stage === 3) {
        // Growing
        svg.innerHTML = `
            <path d="M100,240 L100,150" stroke="#16a34a" stroke-width="6" stroke-linecap="round"/>
            <ellipse cx="80" cy="210" rx="18" ry="8" fill="#4ade80" transform="rotate(-35,80,210)"/>
            <ellipse cx="120" cy="210" rx="18" ry="8" fill="#4ade80" transform="rotate(35,120,210)"/>
            <ellipse cx="78" cy="185" rx="16" ry="7" fill="#22c55e" transform="rotate(-25,78,185)"/>
            <ellipse cx="122" cy="185" rx="16" ry="7" fill="#22c55e" transform="rotate(25,122,185)"/>
            <ellipse cx="82" cy="162" rx="14" ry="6" fill="#16a34a" transform="rotate(-30,82,162)"/>
            <ellipse cx="118" cy="162" rx="14" ry="6" fill="#16a34a" transform="rotate(30,118,162)"/>
        `;
    } else if (stage === 4) {
        // Budding
        svg.innerHTML = `
            <path d="M100,240 L100,130" stroke="#16a34a" stroke-width="7" stroke-linecap="round"/>
            <ellipse cx="76" cy="215" rx="20" ry="8" fill="#4ade80" transform="rotate(-35,76,215)"/>
            <ellipse cx="124" cy="215" rx="20" ry="8" fill="#4ade80" transform="rotate(35,124,215)"/>
            <ellipse cx="74" cy="185" rx="18" ry="7" fill="#22c55e" transform="rotate(-25,74,185)"/>
            <ellipse cx="126" cy="185" rx="18" ry="7" fill="#22c55e" transform="rotate(25,126,185)"/>
            <ellipse cx="78" cy="158" rx="16" ry="6" fill="#16a34a" transform="rotate(-30,78,158)"/>
            <ellipse cx="122" cy="158" rx="16" ry="6" fill="#16a34a" transform="rotate(30,122,158)"/>
            <circle cx="100" cy="125" r="12" fill="#86efac" stroke="#16a34a" stroke-width="2"/>
        `;
    } else if (stage >= 5) {
        // Flowering
        svg.innerHTML = `
            <path d="M100,240 L100,120" stroke="#16a34a" stroke-width="7" stroke-linecap="round"/>
            <ellipse cx="74" cy="220" rx="22" ry="9" fill="#4ade80" transform="rotate(-35,74,220)"/>
            <ellipse cx="126" cy="220" rx="22" ry="9" fill="#4ade80" transform="rotate(35,126,220)"/>
            <ellipse cx="72" cy="190" rx="20" ry="8" fill="#22c55e" transform="rotate(-25,72,190)"/>
            <ellipse cx="128" cy="190" rx="20" ry="8" fill="#22c55e" transform="rotate(25,128,190)"/>
            <ellipse cx="76" cy="160" rx="18" ry="7" fill="#16a34a" transform="rotate(-30,76,160)"/>
            <ellipse cx="124" cy="160" rx="18" ry="7" fill="#16a34a" transform="rotate(30,124,160)"/>
            <circle cx="100" cy="100" r="20" fill="#fbbf24"/>
            <ellipse cx="80" cy="95" rx="14" ry="10" fill="#f472b6" transform="rotate(-30,80,95)"/>
            <ellipse cx="120" cy="95" rx="14" ry="10" fill="#f472b6" transform="rotate(30,120,95)"/>
            <ellipse cx="85" cy="80" rx="14" ry="10" fill="#fb7185" transform="rotate(-60,85,80)"/>
            <ellipse cx="115" cy="80" rx="14" ry="10" fill="#fb7185" transform="rotate(60,115,80)"/>
            <ellipse cx="100" cy="75" rx="14" ry="10" fill="#f472b6"/>
            <circle cx="100" cy="95" r="10" fill="#fbbf24"/>
        `;
    }

    container.appendChild(svg);
}

document.getElementById('waterBtn').addEventListener('click', () => {
    waterLevel = Math.min(waterLevel + 34, 100);
    totalWater++;
    document.getElementById('waterFill').style.width = waterLevel + '%';
    addDiary('You watered the plant. \u{1F4A7}');
    // Water droplet animation
    const scene = document.getElementById('plantScene');
    for (let i = 0; i < 5; i++) {
        const drop = document.createElement('div');
        drop.style.cssText = `position:absolute;font-size:1.2rem;left:${40+Math.random()*20}%;top:10%;animation:dropFall 1s ease forwards;animation-delay:${i*0.1}s;z-index:5;`;
        drop.textContent = '\u{1F4A7}';
        scene.appendChild(drop);
        setTimeout(() => drop.remove(), 1500);
    }
});

document.getElementById('sunBtn').addEventListener('click', () => {
    sunLevel = Math.min(sunLevel + 34, 100);
    totalSun++;
    document.getElementById('sunFill').style.width = sunLevel + '%';
    document.getElementById('sunIcon').classList.remove('dim');
    addDiary('You gave the plant some sunlight. \u2600\uFE0F');
});

document.getElementById('nextBtn').addEventListener('click', () => {
    day++;
    document.getElementById('dayLabel').textContent = `Day ${day}`;

    // Check stage progression
    const nextStage = STAGES[stage + 1];
    if (nextStage && day >= nextStage.minDay && totalWater >= nextStage.needsWater && totalSun >= nextStage.needsSun) {
        stage++;
        const msgs = DIARY_MESSAGES[stage];
        addDiary(msgs[Math.floor(Math.random() * msgs.length)]);
        spawnCelebration();

        if (stage >= 5) {
            document.getElementById('completeBanner').style.display = 'block';
            document.getElementById('completeBanner').textContent = '\u{1F33B} Your plant has flowered! You are a brilliant gardener! \u{1F33B}';
            bigCelebrate();
        }
    } else {
        addDiary('A new day begins.');
    }

    document.getElementById('stageLabel').textContent = STAGES[Math.min(stage, 5)].name;

    // Reduce meters slightly each day
    waterLevel = Math.max(waterLevel - 20, 0);
    sunLevel = Math.max(sunLevel - 25, 0);
    document.getElementById('waterFill').style.width = waterLevel + '%';
    document.getElementById('sunFill').style.width = sunLevel + '%';
    if (sunLevel < 30) document.getElementById('sunIcon').classList.add('dim');

    renderPlant();
});

function spawnCelebration() {
    const container = document.getElementById('celebration');
    const colours = ['#16a34a','#4ade80','#86efac','#fbbf24','#f472b6'];
    for (let i = 0; i < 15; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.style.cssText = `left:${Math.random()*100}vw;top:-10px;background:${colours[Math.floor(Math.random()*colours.length)]};width:${5+Math.random()*7}px;height:${5+Math.random()*7}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*0.4}s;`;
        container.appendChild(el);
        setTimeout(() => el.remove(), 4000);
    }
}

function bigCelebrate() {
    const container = document.getElementById('celebration');
    const colours = ['#16a34a','#4ade80','#86efac','#fbbf24','#f472b6','#ef4444','#3b82f6'];
    for (let i = 0; i < 40; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.style.cssText = `left:${Math.random()*100}vw;top:-12px;background:${colours[Math.floor(Math.random()*colours.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*0.6}s;`;
        container.appendChild(el);
        setTimeout(() => el.remove(), 4500);
    }
}

// Init
addDiary('You planted a seed in the pot!');
renderPlant();
</script>
<style>
@keyframes dropFall {
    0% { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(150px); }
}
</style>
</body>
</html>
