<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Civilisation Comparison</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #faf5f0;
    --card-bg: #ffffff;
    --text: #292524;
    --text-light: #78716c;
    --egypt: #d97706;
    --egypt-bg: #fef3c7;
    --greece: #2563eb;
    --greece-bg: #dbeafe;
    --maya: #16a34a;
    --maya-bg: #dcfce7;
    --rome: #dc2626;
    --rome-bg: #fef2f2;
    --border: #e7e5e4;
    --shadow: 0 4px 16px rgba(0,0,0,0.06);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.10);
    --radius: 12px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
}

.header {
    background: linear-gradient(135deg, #92400e, #b45309, #78350f);
    color: #fef3c7;
    padding: 16px 20px;
    text-align: center;
    box-shadow: var(--shadow);
}
.header h1 { font-size: 1.4rem; font-weight: 900; }
.header p { font-size: 0.8rem; opacity: 0.85; font-weight: 600; margin-top: 2px; }

.main { max-width: 800px; margin: 0 auto; padding: 16px; }

.civ-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
}
.civ-tab {
    flex: 1;
    min-width: 100px;
    padding: 10px 8px;
    border: 3px solid var(--border);
    border-radius: 12px;
    background: var(--card-bg);
    font-family: 'Inter', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.25s;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    touch-action: manipulation;
}
.civ-tab:hover { transform: scale(1.04); }
.civ-tab .t-icon { font-size: 1.6rem; }
.civ-tab[data-civ="egypt"].active { border-color: var(--egypt); background: var(--egypt-bg); color: var(--egypt); }
.civ-tab[data-civ="greece"].active { border-color: var(--greece); background: var(--greece-bg); color: var(--greece); }
.civ-tab[data-civ="maya"].active { border-color: var(--maya); background: var(--maya-bg); color: var(--maya); }
.civ-tab[data-civ="rome"].active { border-color: var(--rome); background: var(--rome-bg); color: var(--rome); }

.mode-toggle {
    display: flex;
    gap: 0;
    margin-bottom: 16px;
    border-radius: 8px;
    overflow: hidden;
    border: 2px solid var(--border);
}
.mode-btn {
    flex: 1;
    padding: 8px;
    border: none;
    background: var(--card-bg);
    font-family: 'Inter', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    cursor: pointer;
    color: var(--text-light);
    transition: all 0.2s;
}
.mode-btn.active { background: var(--text); color: white; }

/* Single civilisation view */
.civ-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    margin-bottom: 16px;
    animation: fadeIn 0.3s ease;
}
.civ-banner {
    padding: 16px 20px;
    color: white;
    display: flex;
    align-items: center;
    gap: 12px;
}
.civ-banner .c-icon { font-size: 2.2rem; }
.civ-banner h2 { font-size: 1.1rem; font-weight: 900; }
.civ-banner .c-period { font-size: 0.78rem; opacity: 0.85; }

.civ-body { padding: 16px; }

.category-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
}
.cat-card {
    padding: 12px;
    background: var(--bg);
    border-radius: 10px;
    border: 1px solid var(--border);
}
.cat-card h4 {
    font-size: 0.68rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-light);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
}
.cat-card p { font-size: 0.82rem; line-height: 1.5; }

/* Comparison table */
.compare-table-wrap {
    overflow-x: auto;
    margin-bottom: 16px;
}
.compare-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.78rem;
    background: var(--card-bg);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
}
.compare-table th {
    padding: 10px;
    text-align: left;
    font-weight: 800;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: white;
}
.compare-table td {
    padding: 10px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
    line-height: 1.5;
}
.compare-table tr:last-child td { border-bottom: none; }
.compare-table .cat-header {
    font-weight: 800;
    background: var(--bg);
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-light);
}

.fun-fact {
    padding: 12px;
    background: #fef3c7;
    border-radius: 10px;
    border-left: 4px solid #f59e0b;
    font-size: 0.82rem;
    margin-top: 10px;
}
.fun-fact strong { color: #92400e; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

@media (max-width: 600px) {
    .category-grid { grid-template-columns: 1fr; }
    .civ-tabs { gap: 6px; }
    .civ-tab { min-width: 70px; padding: 8px 4px; font-size: 0.68rem; }
}
</style>
</head>
<body>

<div class="header">
    <h1>Civilisation Comparison</h1>
    <p>Compare ancient civilisations across different categories!</p>
</div>

<div class="main">
    <div class="mode-toggle">
        <button class="mode-btn active" data-mode="explore">Explore</button>
        <button class="mode-btn" data-mode="compare">Compare All</button>
    </div>

    <div class="civ-tabs" id="civTabs"></div>
    <div id="display"></div>
</div>

<script>
const CIVS = {
    egypt: {
        name: 'Ancient Egypt', icon: '&#x1F3DB;&#xFE0F;', colour: '#d97706', period: '3100 BC - 30 BC',
        categories: {
            government: { icon: '&#x1F451;', title: 'Government', text: 'Ruled by pharaohs who were believed to be living gods. They had total power over everything in Egypt.' },
            religion: { icon: '&#x26EA;', title: 'Religion', text: 'Worshipped many gods including Ra (sun), Osiris (afterlife) and Anubis (death). They believed in life after death and made mummies.' },
            buildings: { icon: '&#x1F3D7;&#xFE0F;', title: 'Buildings', text: 'Built enormous pyramids as tombs for pharaohs, plus great temples along the Nile. The Great Pyramid is one of the Seven Wonders.' },
            writing: { icon: '&#x270D;&#xFE0F;', title: 'Writing', text: 'Used hieroglyphics (picture writing) carved on walls and written on papyrus scrolls. The Rosetta Stone helped us decode them.' },
            inventions: { icon: '&#x1F4A1;', title: 'Inventions', text: 'Invented paper (papyrus), a 365-day calendar, toothpaste, and advanced farming methods using the Nile floods.' },
            food: { icon: '&#x1F35E;', title: 'Food & Farming', text: 'Farmed along the River Nile which flooded each year making the soil rich. Grew wheat and barley for bread and beer.' }
        },
        fact: 'The Ancient Egyptian civilisation lasted over 3,000 years, longer than any other in history!'
    },
    greece: {
        name: 'Ancient Greece', icon: '&#x1F3DB;&#xFE0F;', colour: '#2563eb', period: '800 BC - 146 BC',
        categories: {
            government: { icon: '&#x1F451;', title: 'Government', text: 'Invented democracy in Athens where citizens voted on laws. Sparta had two kings and focused on military training.' },
            religion: { icon: '&#x26EA;', title: 'Religion', text: 'Believed in many gods living on Mount Olympus, including Zeus, Athena and Poseidon. Held the Olympic Games to honour them.' },
            buildings: { icon: '&#x1F3D7;&#xFE0F;', title: 'Buildings', text: 'Built beautiful marble temples like the Parthenon. Invented columns and theatres that we still copy today.' },
            writing: { icon: '&#x270D;&#xFE0F;', title: 'Writing', text: 'Created an alphabet that became the basis for many modern alphabets. Wrote plays, poetry and philosophy.' },
            inventions: { icon: '&#x1F4A1;', title: 'Inventions', text: 'Invented democracy, the Olympic Games, philosophy, theatre, and made huge advances in maths and science.' },
            food: { icon: '&#x1F35E;', title: 'Food & Farming', text: 'Grew olives, grapes and wheat. Olive oil was used for cooking, soap and lamp fuel. Diet included fish, bread and cheese.' }
        },
        fact: 'The word "democracy" comes from the Greek words "demos" (people) and "kratos" (power)!'
    },
    maya: {
        name: 'Maya Civilisation', icon: '&#x1F3DB;&#xFE0F;', colour: '#16a34a', period: '2000 BC - 1500 AD',
        categories: {
            government: { icon: '&#x1F451;', title: 'Government', text: 'Had powerful kings who ruled city-states. Each city (like Tikal and Chichen Itza) had its own ruler and often fought each other.' },
            religion: { icon: '&#x26EA;', title: 'Religion', text: 'Believed in many nature gods. Built huge step pyramids as temples. The gods controlled rain, harvests and war.' },
            buildings: { icon: '&#x1F3D7;&#xFE0F;', title: 'Buildings', text: 'Built enormous stepped pyramids in the jungle, grand palaces, and ball courts for a sacred ball game.' },
            writing: { icon: '&#x270D;&#xFE0F;', title: 'Writing', text: 'Created the most advanced writing system in the Americas using glyphs (symbols). Wrote books called codices on bark paper.' },
            inventions: { icon: '&#x1F4A1;', title: 'Inventions', text: 'Created an incredibly accurate calendar, invented the concept of zero in maths, and built raised roads through the jungle.' },
            food: { icon: '&#x1F35E;', title: 'Food & Farming', text: 'Grew maize (corn), beans and squash (the "three sisters"). Also grew cacao beans to make chocolate drinks for rulers!' }
        },
        fact: 'The Maya invented chocolate! Their rulers drank a bitter, spicy chocolate drink mixed with chillies.'
    },
    rome: {
        name: 'Ancient Rome', icon: '&#x1F3DB;&#xFE0F;', colour: '#dc2626', period: '753 BC - 476 AD',
        categories: {
            government: { icon: '&#x1F451;', title: 'Government', text: 'Started as a republic with a senate and elected leaders. Later became an empire ruled by emperors like Julius Caesar and Augustus.' },
            religion: { icon: '&#x26EA;', title: 'Religion', text: 'Worshipped many gods (Jupiter, Mars, Venus). Later adopted Christianity as the official religion of the empire.' },
            buildings: { icon: '&#x1F3D7;&#xFE0F;', title: 'Buildings', text: 'Built the Colosseum, aqueducts, roads and public baths. Roman roads were so well built that some are still used today!' },
            writing: { icon: '&#x270D;&#xFE0F;', title: 'Writing', text: 'Used the Latin alphabet (the same letters we use in English today). Latin became the basis for French, Spanish and Italian.' },
            inventions: { icon: '&#x1F4A1;', title: 'Inventions', text: 'Invented concrete, central heating (hypocaust), sewers, and a road network spanning the entire empire.' },
            food: { icon: '&#x1F35E;', title: 'Food & Farming', text: 'Rich Romans had feasts with exotic foods. Ordinary people ate bread, olives, cheese and porridge. Imported spices from Asia.' }
        },
        fact: 'The Romans built over 400,000 km of roads across their empire. The saying "All roads lead to Rome" was almost literally true!'
    }
};

const CATEGORIES = ['government', 'religion', 'buildings', 'writing', 'inventions', 'food'];
let currentCiv = 'egypt';
let mode = 'explore';

const civTabs = document.getElementById('civTabs');
const display = document.getElementById('display');

// Build tabs
Object.entries(CIVS).forEach(([key, civ]) => {
    const tab = document.createElement('button');
    tab.className = 'civ-tab';
    tab.dataset.civ = key;
    tab.innerHTML = `<span class="t-icon">${civ.icon}</span>${civ.name}`;
    tab.addEventListener('click', () => { currentCiv = key; render(); });
    civTabs.appendChild(tab);
});

// Mode toggle
document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        mode = btn.dataset.mode;
        render();
    });
});

function render() {
    document.querySelectorAll('.civ-tab').forEach(t => t.classList.toggle('active', t.dataset.civ === currentCiv));

    if (mode === 'explore') {
        renderExplore();
    } else {
        renderCompare();
    }
}

function renderExplore() {
    const civ = CIVS[currentCiv];
    let html = `<div class="civ-card">
        <div class="civ-banner" style="background:linear-gradient(135deg,${civ.colour},${civ.colour}cc);">
            <span class="c-icon">${civ.icon}</span>
            <div><h2>${civ.name}</h2><div class="c-period">${civ.period}</div></div>
        </div>
        <div class="civ-body">
            <div class="category-grid">`;

    CATEGORIES.forEach(cat => {
        const c = civ.categories[cat];
        html += `<div class="cat-card"><h4>${c.icon} ${c.title}</h4><p>${c.text}</p></div>`;
    });

    html += `</div><div class="fun-fact"><strong>Fun fact:</strong> ${civ.fact}</div></div></div>`;
    display.innerHTML = html;
}

function renderCompare() {
    const catNames = { government: 'Government', religion: 'Religion', buildings: 'Buildings', writing: 'Writing', inventions: 'Inventions', food: 'Food & Farming' };
    const civKeys = Object.keys(CIVS);

    let html = '<div class="compare-table-wrap"><table class="compare-table"><thead><tr><th style="background:#44403c;">Category</th>';
    civKeys.forEach(k => {
        html += `<th style="background:${CIVS[k].colour};">${CIVS[k].name}</th>`;
    });
    html += '</tr></thead><tbody>';

    CATEGORIES.forEach(cat => {
        html += `<tr><td class="cat-header">${catNames[cat]}</td>`;
        civKeys.forEach(k => {
            html += `<td>${CIVS[k].categories[cat].text}</td>`;
        });
        html += '</tr>';
    });

    html += '</tbody></table></div>';
    display.innerHTML = html;
}

render();
</script>
</body>
</html>
