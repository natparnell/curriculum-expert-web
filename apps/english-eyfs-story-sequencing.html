<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Story Sequencing Cards</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #fef6ee;
    --card-bg: #ffffff;
    --text: #3b2314;
    --text-light: #8a7060;
    --accent: #e07020;
    --accent-light: #fff4e8;
    --success: #4caf50;
    --success-light: #e8f5e9;
    --border: #f0dcc4;
    --shadow: 0 4px 16px rgba(100,60,20,0.12);
    --shadow-lg: 0 8px 32px rgba(100,60,20,0.18);
    --radius: 20px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
    overflow-x: hidden;
    user-select: none;
    -webkit-user-select: none;
}

.header {
    background: linear-gradient(135deg, #f97316, #fb923c, #fdba74);
    color: white;
    padding: 16px 20px;
    text-align: center;
    box-shadow: var(--shadow);
    position: relative;
    z-index: 10;
}
.header h1 { font-size: 1.6rem; font-weight: 900; text-shadow: 2px 2px 0 rgba(0,0,0,0.1); letter-spacing: -0.5px; }
.header p { font-size: 0.85rem; opacity: 0.9; font-weight: 600; margin-top: 2px; }

.main { max-width: 600px; margin: 0 auto; padding: 16px; }

.story-picker {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-bottom: 16px;
}
.story-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px;
    border: 3px solid transparent;
    border-radius: 16px;
    background: var(--card-bg);
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: all 0.25s ease;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
}
.story-btn:hover { transform: scale(1.04); }
.story-btn.active { border-color: var(--accent); transform: scale(1.04); box-shadow: var(--shadow-lg); }
.story-btn.done { border-color: var(--success); background: var(--success-light); }
.story-btn .icon { font-size: 2rem; line-height: 1; }
.story-btn .info { text-align: left; }
.story-btn .title { font-size: 0.9rem; font-weight: 800; }
.story-btn .subtitle { font-size: 0.72rem; color: var(--text-light); font-weight: 600; }

.section-title {
    text-align: center;
    font-size: 1.1rem;
    font-weight: 800;
    color: var(--text);
    margin: 16px 0 10px;
}

.instruction {
    text-align: center;
    font-size: 1rem;
    font-weight: 600;
    padding: 10px 16px;
    color: var(--text-light);
    background: var(--accent-light);
    border-radius: 12px;
    margin-bottom: 14px;
    border: 2px solid var(--border);
}

.card-area {
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-height: 120px;
    margin-bottom: 16px;
}

.seq-card {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    background: var(--card-bg);
    border: 3px solid var(--border);
    border-radius: 16px;
    box-shadow: var(--shadow);
    cursor: grab;
    transition: all 0.2s ease;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    position: relative;
}
.seq-card:active { cursor: grabbing; }
.seq-card.dragging { opacity: 0.5; transform: scale(0.96); }
.seq-card.over { border-color: var(--accent); background: var(--accent-light); transform: scale(1.03); }
.seq-card.correct { border-color: var(--success); background: var(--success-light); }
.seq-card.correct .card-num { background: var(--success); }
.seq-card .card-icon { font-size: 2.4rem; line-height: 1; flex-shrink: 0; }
.seq-card .card-text { font-size: 1rem; font-weight: 700; flex: 1; }
.seq-card .card-num {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--accent);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.9rem;
    font-weight: 900;
    flex-shrink: 0;
}

.check-btn {
    display: block;
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, var(--accent), #f59e0b);
    color: white;
    font-family: 'Inter', sans-serif;
    font-size: 1.1rem;
    font-weight: 900;
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: all 0.25s;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    margin-bottom: 12px;
}
.check-btn:hover { transform: scale(1.04); box-shadow: var(--shadow-lg); }
.check-btn:disabled { opacity: 0.5; cursor: default; transform: none; }

.result-msg {
    text-align: center;
    font-size: 1.2rem;
    font-weight: 800;
    padding: 14px;
    border-radius: 16px;
    margin-bottom: 14px;
    animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
    display: none;
}
.result-msg.show { display: block; }
.result-msg.win { background: var(--success-light); color: #2e7d32; border: 3px solid var(--success); }
.result-msg.try { background: #fff3e0; color: #e65100; border: 3px solid #ffb74d; }

.progress-bar {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin: 12px 0;
}
.progress-dot {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: #e8ddd0;
    transition: background 0.3s;
}
.progress-dot.done { background: var(--success); }
.progress-dot.current { background: var(--accent); animation: pulseDot 1s infinite; }
@keyframes pulseDot { 0%,100% { transform: scale(1); } 50% { transform: scale(1.3); } }

@keyframes popIn { from { opacity: 0; transform: scale(0.7); } to { opacity: 1; transform: scale(1); } }

.celebration {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1000;
}
.confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    animation: confettiFall linear forwards;
}
@keyframes confettiFall {
    0% { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
    100% { opacity: 0; transform: translateY(100vh) rotate(720deg) scale(0.3); }
}
.star-burst {
    position: absolute;
    font-size: 2rem;
    animation: starPop 0.8s ease forwards;
    pointer-events: none;
}
@keyframes starPop {
    0% { opacity: 1; transform: scale(0) rotate(0deg); }
    50% { opacity: 1; transform: scale(1.3) rotate(180deg); }
    100% { opacity: 0; transform: scale(0.5) rotate(360deg) translateY(-60px); }
}

@media (max-width: 420px) {
    .story-picker { grid-template-columns: 1fr; }
    .seq-card .card-icon { font-size: 1.8rem; }
    .seq-card .card-text { font-size: 0.88rem; }
}
</style>
</head>
<body>

<div class="header">
    <h1>Story Sequencing Cards</h1>
    <p>Put the pictures in the right order!</p>
</div>

<div class="main">
    <div class="section-title">Choose a Story</div>
    <div class="story-picker" id="storyPicker"></div>

    <div class="progress-bar" id="progressBar"></div>

    <div id="gameArea" style="display:none;">
        <div class="instruction" id="instruction">Drag the cards into the right order!</div>
        <div class="card-area" id="cardArea"></div>
        <button class="check-btn" id="checkBtn">Check My Order!</button>
        <div class="result-msg" id="resultMsg"></div>
    </div>
</div>

<div class="celebration" id="celebration"></div>

<script>
const STORIES = [
    {
        title: 'Making Toast',
        icon: '\u{1F35E}',
        cards: [
            { icon: '\u{1F35E}', text: 'Get the bread from the cupboard' },
            { icon: '\u{1F525}', text: 'Put the bread in the toaster' },
            { icon: '\u23F0', text: 'Wait for the toast to pop up' },
            { icon: '\u{1F9C8}', text: 'Spread butter on the warm toast' }
        ]
    },
    {
        title: 'Getting Ready',
        icon: '\u{1F3D2}',
        cards: [
            { icon: '\u23F0', text: 'Wake up when the alarm rings' },
            { icon: '\u{1F6BF}', text: 'Have a wash and brush your teeth' },
            { icon: '\u{1F455}', text: 'Put on your school uniform' },
            { icon: '\u{1F6B6}', text: 'Walk to school with your grown-up' }
        ]
    },
    {
        title: 'Planting a Seed',
        icon: '\u{1F331}',
        cards: [
            { icon: '\u{1F4A7}', text: 'Fill a pot with soil' },
            { icon: '\u{1F330}', text: 'Push a seed into the soil' },
            { icon: '\u{1F6BF}', text: 'Water the seed gently' },
            { icon: '\u{1F33B}', text: 'Watch the plant grow tall' }
        ]
    },
    {
        title: 'Building a Snowman',
        icon: '\u26C4',
        cards: [
            { icon: '\u2744\uFE0F', text: 'Snow falls and covers the ground' },
            { icon: '\u26F7\uFE0F', text: 'Roll three balls of snow, big to small' },
            { icon: '\u{1F955}', text: 'Add a carrot nose and button eyes' },
            { icon: '\u{1F3A9}', text: 'Put a hat and scarf on the snowman' }
        ]
    },
    {
        title: 'A Rainy Day',
        icon: '\u{1F327}\uFE0F',
        cards: [
            { icon: '\u2601\uFE0F', text: 'Dark clouds fill up the sky' },
            { icon: '\u{1F327}\uFE0F', text: 'Rain starts to fall down' },
            { icon: '\u{1F302}', text: 'Open your umbrella to stay dry' },
            { icon: '\u{1F308}', text: 'A rainbow appears when the sun comes out' }
        ]
    },
    {
        title: 'The Lost Teddy',
        icon: '\u{1F9F8}',
        cards: [
            { icon: '\u{1F9F8}', text: 'Teddy falls out of the bag at the park' },
            { icon: '\u{1F622}', text: 'You feel sad that teddy is missing' },
            { icon: '\u{1F50D}', text: 'Go back to the park to look for teddy' },
            { icon: '\u{1F917}', text: 'Find teddy on the bench and give it a hug' }
        ]
    }
];

let currentStory = null;
let completed = new Set();
let cardOrder = [];
let dragIdx = null;

const picker = document.getElementById('storyPicker');
const gameArea = document.getElementById('gameArea');
const cardArea = document.getElementById('cardArea');
const checkBtn = document.getElementById('checkBtn');
const resultMsg = document.getElementById('resultMsg');
const progressBar = document.getElementById('progressBar');

// Build story picker
STORIES.forEach((story, i) => {
    const btn = document.createElement('button');
    btn.className = 'story-btn';
    btn.dataset.idx = i;
    btn.innerHTML = `<span class="icon">${story.icon}</span><div class="info"><div class="title">${story.title}</div><div class="subtitle">${story.cards.length} cards</div></div>`;
    btn.addEventListener('click', () => selectStory(i));
    picker.appendChild(btn);
});

// Build progress dots
STORIES.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'progress-dot';
    dot.dataset.idx = i;
    progressBar.appendChild(dot);
});

function selectStory(idx) {
    currentStory = idx;
    resultMsg.className = 'result-msg';
    resultMsg.style.display = 'none';

    // Update picker
    document.querySelectorAll('.story-btn').forEach(b => {
        b.classList.remove('active');
        if (completed.has(parseInt(b.dataset.idx))) b.classList.add('done');
    });
    picker.children[idx].classList.add('active');

    // Update progress
    document.querySelectorAll('.progress-dot').forEach(d => {
        d.classList.remove('current');
        if (completed.has(parseInt(d.dataset.idx))) d.classList.add('done');
    });
    progressBar.children[idx].classList.add('current');

    // Shuffle cards
    const story = STORIES[idx];
    cardOrder = story.cards.map((c, i) => ({ ...c, correctIdx: i }));
    shuffle(cardOrder);

    gameArea.style.display = 'block';
    renderCards();
}

function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    // Ensure not already in order
    if (arr.every((c, i) => c.correctIdx === i)) {
        [arr[0], arr[arr.length - 1]] = [arr[arr.length - 1], arr[0]];
    }
}

function renderCards() {
    cardArea.innerHTML = '';
    cardOrder.forEach((card, i) => {
        const el = document.createElement('div');
        el.className = 'seq-card';
        el.draggable = true;
        el.dataset.idx = i;
        el.innerHTML = `<div class="card-num">${i + 1}</div><span class="card-icon">${card.icon}</span><span class="card-text">${card.text}</span>`;

        // Drag events
        el.addEventListener('dragstart', onDragStart);
        el.addEventListener('dragend', onDragEnd);
        el.addEventListener('dragover', onDragOver);
        el.addEventListener('dragenter', onDragEnter);
        el.addEventListener('dragleave', onDragLeave);
        el.addEventListener('drop', onDrop);

        // Touch events for mobile
        el.addEventListener('touchstart', onTouchStart, { passive: false });
        el.addEventListener('touchmove', onTouchMove, { passive: false });
        el.addEventListener('touchend', onTouchEnd);

        cardArea.appendChild(el);
    });
}

// Drag and drop
function onDragStart(e) {
    dragIdx = parseInt(e.currentTarget.dataset.idx);
    e.currentTarget.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
}
function onDragEnd(e) {
    e.currentTarget.classList.remove('dragging');
    document.querySelectorAll('.seq-card').forEach(c => c.classList.remove('over'));
}
function onDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
function onDragEnter(e) {
    e.preventDefault();
    const target = e.currentTarget;
    if (parseInt(target.dataset.idx) !== dragIdx) target.classList.add('over');
}
function onDragLeave(e) { e.currentTarget.classList.remove('over'); }
function onDrop(e) {
    e.preventDefault();
    const dropIdx = parseInt(e.currentTarget.dataset.idx);
    e.currentTarget.classList.remove('over');
    if (dragIdx !== null && dragIdx !== dropIdx) {
        [cardOrder[dragIdx], cardOrder[dropIdx]] = [cardOrder[dropIdx], cardOrder[dragIdx]];
        renderCards();
    }
    dragIdx = null;
}

// Touch support
let touchCard = null;
let touchClone = null;
let touchStartIdx = null;

function onTouchStart(e) {
    const card = e.currentTarget;
    touchStartIdx = parseInt(card.dataset.idx);
    touchCard = card;

    touchClone = card.cloneNode(true);
    touchClone.style.position = 'fixed';
    touchClone.style.zIndex = '9999';
    touchClone.style.width = card.offsetWidth + 'px';
    touchClone.style.opacity = '0.85';
    touchClone.style.pointerEvents = 'none';
    touchClone.style.transform = 'scale(1.06) rotate(2deg)';
    touchClone.style.boxShadow = 'var(--shadow-lg)';
    document.body.appendChild(touchClone);

    const touch = e.touches[0];
    touchClone.style.left = (touch.clientX - card.offsetWidth / 2) + 'px';
    touchClone.style.top = (touch.clientY - 30) + 'px';

    card.classList.add('dragging');
    e.preventDefault();
}

function onTouchMove(e) {
    if (!touchClone) return;
    const touch = e.touches[0];
    touchClone.style.left = (touch.clientX - touchClone.offsetWidth / 2) + 'px';
    touchClone.style.top = (touch.clientY - 30) + 'px';

    // Highlight card under finger
    document.querySelectorAll('.seq-card').forEach(c => c.classList.remove('over'));
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    if (el) {
        const target = el.closest('.seq-card');
        if (target && parseInt(target.dataset.idx) !== touchStartIdx) {
            target.classList.add('over');
        }
    }
    e.preventDefault();
}

function onTouchEnd(e) {
    if (!touchClone) return;
    if (touchCard) touchCard.classList.remove('dragging');

    const touch = e.changedTouches[0];
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    if (el) {
        const target = el.closest('.seq-card');
        if (target) {
            const dropIdx = parseInt(target.dataset.idx);
            if (touchStartIdx !== null && touchStartIdx !== dropIdx) {
                [cardOrder[touchStartIdx], cardOrder[dropIdx]] = [cardOrder[dropIdx], cardOrder[touchStartIdx]];
                renderCards();
            }
        }
    }

    document.querySelectorAll('.seq-card').forEach(c => c.classList.remove('over'));
    touchClone.remove();
    touchClone = null;
    touchCard = null;
    touchStartIdx = null;
}

// Check order
checkBtn.addEventListener('click', () => {
    const isCorrect = cardOrder.every((c, i) => c.correctIdx === i);
    resultMsg.className = 'result-msg show';

    if (isCorrect) {
        resultMsg.classList.add('win');
        resultMsg.textContent = '\u2B50 Well done! That is the right order! \u2B50';
        completed.add(currentStory);
        // Mark cards green
        document.querySelectorAll('.seq-card').forEach(c => c.classList.add('correct'));
        // Update picker
        picker.children[currentStory].classList.add('done');
        progressBar.children[currentStory].classList.add('done');
        celebrate();

        // Check all done
        if (completed.size === STORIES.length) {
            setTimeout(() => {
                resultMsg.textContent = '\u{1F389} Amazing! You finished all the stories! \u{1F389}';
                celebrate();
                celebrate();
            }, 1500);
        }
    } else {
        resultMsg.classList.add('try');
        resultMsg.textContent = '\u{1F914} Not quite right. Try swapping some cards!';
        // Briefly shake wrong cards
        cardOrder.forEach((c, i) => {
            if (c.correctIdx !== i) {
                const el = cardArea.children[i];
                el.style.animation = 'none';
                void el.offsetWidth;
                el.style.animation = 'shake 0.4s ease';
            }
        });
    }
});

// Celebrations
function celebrate() {
    spawnConfetti(30);
    spawnStars(6);
}

function spawnConfetti(count) {
    const container = document.getElementById('celebration');
    const colours = ['#f97316', '#fb923c', '#fdba74', '#4caf50', '#fbbf24', '#ef4444', '#3b82f6', '#a855f7'];
    for (let i = 0; i < count; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.style.left = Math.random() * 100 + 'vw';
        el.style.top = '-12px';
        el.style.background = colours[Math.floor(Math.random() * colours.length)];
        el.style.width = (6 + Math.random() * 8) + 'px';
        el.style.height = (6 + Math.random() * 8) + 'px';
        el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        el.style.animationDuration = (1.5 + Math.random() * 2) + 's';
        el.style.animationDelay = (Math.random() * 0.5) + 's';
        container.appendChild(el);
        setTimeout(() => el.remove(), 4000);
    }
}

function spawnStars(count) {
    const container = document.getElementById('celebration');
    const symbols = ['\u2B50', '\u2728', '\u{1F31F}', '\u{1F4AB}'];
    for (let i = 0; i < count; i++) {
        const el = document.createElement('div');
        el.className = 'star-burst';
        el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
        el.style.left = (15 + Math.random() * 70) + 'vw';
        el.style.top = (15 + Math.random() * 50) + 'vh';
        el.style.animationDelay = (Math.random() * 0.3) + 's';
        container.appendChild(el);
        setTimeout(() => el.remove(), 1200);
    }
}
</script>
<style>
@keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    50% { transform: translateX(8px); }
    75% { transform: translateX(-4px); }
}
</style>
</body>
</html>
