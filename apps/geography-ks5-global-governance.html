<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Governance Mapper</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #f8fafc;
    --card: #ffffff;
    --text: #0f172a;
    --text2: #64748b;
    --accent: #0d9488;
    --accent-bg: #ccfbf1;
    --un: #009edb;
    --un-bg: #e0f2fe;
    --eu: #003399;
    --eu-bg: #dbeafe;
    --nato: #003f87;
    --wto: #8b5cf6;
    --wto-bg: #f3e8ff;
    --au: #009739;
    --ngo: #ec4899;
    --ngo-bg: #fce7f3;
    --border: #e2e8f0;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.10);
    --radius: 10px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}

.masthead{background:#0f172a;color:#e2e8f0;padding:16px 24px;display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
.masthead h1{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:900}
.masthead h1 span{color:var(--accent);font-style:italic;font-weight:400}
.masthead .tag{font-size:0.6rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#94a3b8;background:#1e293b;padding:3px 10px;border-radius:3px}

.main{max-width:880px;margin:0 auto;padding:20px}

.org-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.org-tab{padding:7px 16px;border:1.5px solid var(--border);border-radius:6px;background:var(--card);font-family:'DM Sans',sans-serif;font-size:0.72rem;font-weight:600;cursor:pointer;transition:all 0.2s;color:var(--text2)}
.org-tab:hover{border-color:var(--accent);color:var(--text)}
.org-tab.active{color:white}

.org-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:20px;box-shadow:var(--shadow);animation:fadeIn 0.3s ease}
.org-banner{padding:18px 20px;color:white;display:flex;align-items:center;gap:14px}
.org-banner .org-icon{font-size:2rem}
.org-banner h2{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700}
.org-banner .org-type{font-size:0.62rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;opacity:0.8}
.org-body{padding:20px}

.meta-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.meta-box{padding:10px;background:var(--bg);border-radius:8px;text-align:center}
.meta-box .m-val{font-size:1rem;font-weight:800;color:var(--accent)}
.meta-box .m-label{font-size:0.62rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px}

.desc{font-size:0.88rem;color:var(--text2);line-height:1.7;margin-bottom:14px}
.desc strong{color:var(--text)}

.section-h{font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text2);margin-bottom:8px;margin-top:14px;padding-bottom:4px;border-bottom:1px solid var(--border)}

.purpose-list{list-style:none;margin-bottom:12px}
.purpose-list li{font-size:0.82rem;padding:6px 0;border-bottom:1px solid #f1f5f9;display:flex;align-items:flex-start;gap:8px;color:var(--text)}
.purpose-list li::before{content:'\u2022';font-weight:900;flex-shrink:0;margin-top:1px}

.case-study{padding:14px;background:#fffbeb;border-radius:8px;border-left:4px solid #f59e0b;margin-bottom:12px}
.case-study h4{font-size:0.78rem;font-weight:800;color:#92400e;margin-bottom:4px}
.case-study p{font-size:0.82rem;color:#78350f;line-height:1.5}

.critique-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.critique-box{padding:12px;border-radius:8px;font-size:0.82rem;line-height:1.5}
.critique-box.strength{background:#dcfce7;color:#166534;border:1px solid #86efac}
.critique-box.weakness{background:#fef2f2;color:#991b1b;border:1px solid #fca5a5}
.critique-box h4{font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}

.compare-section{margin-top:20px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
.compare-section h3{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;margin-bottom:12px;color:var(--accent)}
.compare-table{width:100%;border-collapse:collapse;font-size:0.78rem}
.compare-table th{text-align:left;padding:8px;background:var(--bg);font-weight:700;font-size:0.68rem;text-transform:uppercase;letter-spacing:0.5px;color:var(--text2);border-bottom:2px solid var(--border)}
.compare-table td{padding:8px;border-bottom:1px solid #f1f5f9;color:var(--text)}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:600px){
    .meta-row{grid-template-columns:1fr 1fr}
    .critique-grid{grid-template-columns:1fr}
    .masthead{padding:12px 16px}
    .main{padding:12px}
}
</style>
</head>
<body>

<div class="masthead">
    <h1>Global Governance <span>Mapper</span></h1>
    <span class="tag">A-Level Geography</span>
</div>

<div class="main">
    <div class="org-tabs" id="orgTabs"></div>
    <div id="orgDisplay"></div>

    <div class="compare-section">
        <h3>Comparison Table</h3>
        <table class="compare-table">
            <thead><tr><th>Organisation</th><th>Type</th><th>Members</th><th>Focus</th><th>Binding Power</th></tr></thead>
            <tbody id="compareBody"></tbody>
        </table>
    </div>
</div>

<script>
const ORGS = [
    {
        id: 'un', name: 'United Nations', icon: '\u{1F30D}', colour: '#009edb', type: 'Intergovernmental',
        founded: 1945, hq: 'New York', members: '193 states',
        desc: 'The United Nations is the most important international organisation for global governance. Founded after World War II to prevent future conflicts, it provides a forum for all nations to discuss and cooperate on global challenges. Its Security Council can authorise peacekeeping operations and sanctions.',
        purposes: ['Maintaining international peace and security','Promoting sustainable development','Protecting human rights','Delivering humanitarian aid','Upholding international law'],
        caseStudy: { title: 'UN Climate Change (COP)', text: 'The annual COP summits bring together nearly every nation to negotiate climate targets. The Paris Agreement (2015) committed countries to limiting warming to 1.5\u00B0C, but enforcement relies on voluntary national pledges, highlighting the tension between sovereignty and collective action.' },
        strengths: ['Universal membership gives legitimacy','Agencies like WHO and UNICEF deliver vital aid','International Court of Justice provides legal framework'],
        weaknesses: ['Security Council veto power (P5) can block action','No standing army for enforcement','Relies on member state cooperation and funding'],
        bindingPower: 'Mixed: Security Council resolutions are binding; General Assembly resolutions are advisory',
        focus: 'Peace, development, human rights'
    },
    {
        id: 'eu', name: 'European Union', icon: '\u{1F1EA}\u{1F1FA}', colour: '#003399', type: 'Supranational',
        founded: 1993, hq: 'Brussels', members: '27 states',
        desc: 'The EU is a unique supranational body where member states pool sovereignty in certain policy areas. It has its own parliament, court, and central bank. The single market allows free movement of goods, services, capital and people across member states.',
        purposes: ['Creating a single market and customs union','Promoting peace and stability in Europe','Coordinating environmental and climate policy','Managing a common currency (euro)','Setting regulatory standards (e.g. GDPR)'],
        caseStudy: { title: 'EU Green Deal', text: 'The European Green Deal aims to make the EU carbon neutral by 2050. It includes binding emissions targets, a carbon border tax, and massive investment in renewable energy. It demonstrates how supranational governance can drive ambitious environmental policy beyond what individual states might achieve.' },
        strengths: ['Binding legislation on member states','Single market boosts trade and growth','Strong environmental and consumer protections'],
        weaknesses: ['Democratic deficit: decisions feel remote from citizens','Tensions between national sovereignty and EU rules','Brexit showed members can leave (integration is reversible)'],
        bindingPower: 'Strong: EU law has primacy over national law in agreed areas',
        focus: 'Economic integration, regulation'
    },
    {
        id: 'wto', name: 'World Trade Organization', icon: '\u{1F4CA}', colour: '#8b5cf6', type: 'Intergovernmental',
        founded: 1995, hq: 'Geneva', members: '164 states',
        desc: 'The WTO manages the rules of international trade. It provides a framework for negotiating trade agreements and a dispute resolution process for enforcing them. Its goal is to ensure trade flows as smoothly, predictably and freely as possible.',
        purposes: ['Administering WTO trade agreements','Handling trade disputes between members','Monitoring national trade policies','Reducing tariffs and trade barriers','Supporting developing countries in trade'],
        caseStudy: { title: 'Banana Wars', text: 'The US challenged EU trade preferences for Caribbean bananas, which favoured former European colonies. The WTO ruled against the EU, illustrating how trade rules can override historical relationships and how the dispute mechanism works, but also raised questions about fairness for small developing nations.' },
        strengths: ['Dispute settlement mechanism has "teeth" (can authorise sanctions)','Rules-based system provides predictability','Covers 98% of world trade'],
        weaknesses: ['Doha Round of negotiations stalled since 2001','Dominated by wealthy nations in practice','Criticised for prioritising trade over environment and labour rights'],
        bindingPower: 'Strong in trade: rulings allow retaliatory tariffs',
        focus: 'Trade rules, dispute resolution'
    },
    {
        id: 'ngo', name: 'NGOs (Non-Governmental)', icon: '\u{1F91D}', colour: '#ec4899', type: 'Non-governmental',
        founded: 0, hq: 'Various', members: 'Thousands globally',
        desc: 'NGOs are independent organisations that operate outside government. They range from small community groups to global bodies like Amnesty International, Oxfam and Greenpeace. They play a crucial role in global governance by advocating, monitoring and delivering services where governments cannot or will not.',
        purposes: ['Humanitarian relief and development aid','Campaigning and advocacy on global issues','Monitoring human rights and environmental standards','Providing expertise and research to inform policy','Holding governments and corporations accountable'],
        caseStudy: { title: 'MSF (Doctors Without Borders)', text: 'MSF provides emergency medical care in conflict zones and disease outbreaks where governments cannot reach. During the Ebola crisis in West Africa (2014), MSF was the first major responder, treating patients months before the international community mobilised. This shows how NGOs fill governance gaps.' },
        strengths: ['Can operate where governments are absent or unwilling','Grassroots connections give legitimacy and local knowledge','Flexible and fast in responding to crises'],
        weaknesses: ['No enforcement power or legal authority','Dependent on donations (can distort priorities)','Can be seen as unelected and unaccountable','May clash with national sovereignty'],
        bindingPower: 'None: influence through advocacy, expertise and public pressure',
        focus: 'Advocacy, aid, accountability'
    }
];

const tabs = document.getElementById('orgTabs');
const display = document.getElementById('orgDisplay');
const compareBody = document.getElementById('compareBody');

ORGS.forEach(org => {
    const tab = document.createElement('button');
    tab.className = 'org-tab';
    tab.dataset.id = org.id;
    tab.textContent = org.name;
    tab.addEventListener('click', () => showOrg(org.id));
    tabs.appendChild(tab);
});

// Comparison table
ORGS.forEach(org => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td><strong>${org.name}</strong></td><td>${org.type}</td><td>${org.members}</td><td>${org.focus}</td><td style="font-size:0.72rem;">${org.bindingPower.split(':')[0]}</td>`;
    compareBody.appendChild(tr);
});

function showOrg(id) {
    const org = ORGS.find(o => o.id === id);
    document.querySelectorAll('.org-tab').forEach(t => {
        t.classList.toggle('active', t.dataset.id === id);
        if (t.dataset.id === id) { t.style.background = org.colour; t.style.borderColor = org.colour; }
        else { t.style.background = ''; t.style.borderColor = ''; }
    });

    display.innerHTML = `
        <div class="org-card">
            <div class="org-banner" style="background:linear-gradient(135deg,${org.colour},${org.colour}cc);">
                <span class="org-icon">${org.icon}</span>
                <div><h2>${org.name}</h2><div class="org-type">${org.type} Organisation</div></div>
            </div>
            <div class="org-body">
                <div class="meta-row">
                    <div class="meta-box"><div class="m-val">${org.founded || 'Various'}</div><div class="m-label">Founded</div></div>
                    <div class="meta-box"><div class="m-val">${org.hq}</div><div class="m-label">Headquarters</div></div>
                    <div class="meta-box"><div class="m-val">${org.members}</div><div class="m-label">Members</div></div>
                </div>
                <div class="desc">${org.desc}</div>

                <div class="section-h">Key Purposes</div>
                <ul class="purpose-list">${org.purposes.map(p => `<li>${p}</li>`).join('')}</ul>

                <div class="section-h">Case Study</div>
                <div class="case-study"><h4>${org.caseStudy.title}</h4><p>${org.caseStudy.text}</p></div>

                <div class="section-h">Evaluation</div>
                <div class="critique-grid">
                    <div class="critique-box strength"><h4>Strengths</h4>${org.strengths.map(s => `<div>\u2022 ${s}</div>`).join('')}</div>
                    <div class="critique-box weakness"><h4>Weaknesses</h4>${org.weaknesses.map(w => `<div>\u2022 ${w}</div>`).join('')}</div>
                </div>
            </div>
        </div>
    `;
}

showOrg('un');
</script>
</body>
</html>
