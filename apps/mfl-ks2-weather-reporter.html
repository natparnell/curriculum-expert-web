<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Reporter</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#eff6ff;--card:#fff;--text:#1e3a5f;--text2:#3b82f6;--accent:#2563eb;--accent-bg:#dbeafe;--border:#bfdbfe;--shadow:0 4px 16px rgba(30,58,95,.08);--radius:14px;--success:#22c55e}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
.header{background:linear-gradient(135deg,#2563eb,#60a5fa);color:#fff;padding:16px 20px;text-align:center}
.header h1{font-size:1.4rem;font-weight:900}
.header p{font-size:.8rem;opacity:.9;font-weight:600;margin-top:2px}
.main{max-width:640px;margin:0 auto;padding:16px}

.lang-bar{display:flex;gap:0;margin-bottom:14px;border-radius:10px;overflow:hidden;border:2px solid var(--border)}
.lang-btn{flex:1;padding:10px;border:none;background:var(--card);font-family:'Inter',sans-serif;font-size:.78rem;font-weight:700;cursor:pointer;color:var(--text2);transition:all .2s}
.lang-btn.active{background:var(--accent);color:#fff}

.weather-picker{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.w-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;border:3px solid var(--border);border-radius:12px;background:var(--card);cursor:pointer;transition:all .25s;font-size:.65rem;font-weight:700;touch-action:manipulation}
.w-btn:hover{transform:scale(1.06)}
.w-btn.selected{border-color:var(--accent);background:var(--accent-bg)}
.w-btn .w-icon{font-size:1.6rem}

.forecast-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:14px;border-left:4px solid var(--accent)}
.forecast-card h3{font-size:.78rem;font-weight:800;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.forecast-phrase{font-size:1.2rem;font-weight:800;color:var(--text);margin-bottom:4px}
.forecast-english{font-size:.85rem;color:var(--text2);font-weight:600}
.forecast-pron{font-size:.75rem;color:#93c5fd;font-style:italic;margin-top:4px}

.sentence-builder{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:14px}
.sentence-builder h3{font-size:.78rem;font-weight:800;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.built-sentence{min-height:50px;padding:12px;background:var(--accent-bg);border-radius:10px;border:2px dashed var(--border);margin-bottom:10px;font-size:1rem;font-weight:700;text-align:center;display:flex;flex-wrap:wrap;gap:6px;justify-content:center;align-items:center}
.built-word{padding:4px 12px;background:var(--accent);color:#fff;border-radius:20px;font-size:.82rem;font-weight:700;cursor:pointer;animation:popIn .2s ease}
.built-word:hover{opacity:.7}

.word-bank{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.bank-word{padding:6px 14px;border:2px solid var(--border);border-radius:20px;background:var(--card);font-family:'Inter',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer;transition:all .2s;color:var(--text)}
.bank-word:hover{border-color:var(--accent);background:var(--accent-bg)}
.bank-word.used{opacity:.3;pointer-events:none}

.check-btn{display:block;width:100%;padding:12px;border:none;border-radius:50px;background:var(--accent);color:#fff;font-family:'Inter',sans-serif;font-size:.92rem;font-weight:800;cursor:pointer;transition:all .2s;box-shadow:var(--shadow);margin-bottom:10px}
.check-btn:hover{transform:scale(1.03)}

.feedback{text-align:center;font-size:.9rem;font-weight:700;padding:10px;border-radius:10px;display:none;margin-bottom:10px}
.feedback.show{display:block;animation:popIn .3s ease}
.feedback.win{background:#dcfce7;color:#166534;border:2px solid var(--success)}
.feedback.try{background:#fef2f2;color:#991b1b;border:2px solid #ef4444}

@keyframes popIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
.celebration{position:fixed;inset:0;pointer-events:none;z-index:1000}
.confetti{position:absolute;border-radius:2px;animation:confettiFall linear forwards}
@keyframes confettiFall{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(100vh) rotate(720deg) scale(.3)}}
</style>
</head>
<body>
<div class="header"><h1>Weather Reporter</h1><p>Present a weather forecast in another language!</p></div>
<div class="main">
<div class="lang-bar">
<button class="lang-btn active" data-l="french">&#x1F1EB;&#x1F1F7; French</button>
<button class="lang-btn" data-l="spanish">&#x1F1EA;&#x1F1F8; Spanish</button>
<button class="lang-btn" data-l="german">&#x1F1E9;&#x1F1EA; German</button>
</div>

<div class="weather-picker" id="weatherPicker"></div>
<div class="forecast-card" id="forecastCard" style="display:none"></div>
<div class="sentence-builder" id="sentenceBuilder" style="display:none">
<h3>Build the sentence</h3>
<div class="built-sentence" id="builtSentence"><span style="color:#ccc;font-weight:600;font-size:.82rem;">Tap words to build the forecast</span></div>
<div class="word-bank" id="wordBank"></div>
<button class="check-btn" id="checkBtn">Check!</button>
<div class="feedback" id="feedback"></div>
</div>
</div>
<div class="celebration" id="celebration"></div>
<script>
const WEATHER={
french:[
{icon:'&#x2600;&#xFE0F;',type:'Sunny',phrase:'Il fait beau',english:'The weather is fine',pron:'eel fay BOH',words:['Il','fait','beau']},
{icon:'&#x1F327;&#xFE0F;',type:'Rainy',phrase:'Il pleut',english:'It is raining',pron:'eel PLUH',words:['Il','pleut']},
{icon:'&#x2744;&#xFE0F;',type:'Snowy',phrase:'Il neige',english:'It is snowing',pron:'eel NAYZH',words:['Il','neige']},
{icon:'&#x1F32C;&#xFE0F;',type:'Windy',phrase:'Il fait du vent',english:'It is windy',pron:'eel fay doo VON',words:['Il','fait','du','vent']},
{icon:'&#x2601;&#xFE0F;',type:'Cloudy',phrase:'Il fait nuageux',english:'It is cloudy',pron:'eel fay noo-ah-ZHUH',words:['Il','fait','nuageux']},
{icon:'&#x1F321;&#xFE0F;',type:'Hot',phrase:'Il fait chaud',english:'It is hot',pron:'eel fay SHOW',words:['Il','fait','chaud']},
{icon:'&#x2603;&#xFE0F;',type:'Cold',phrase:'Il fait froid',english:'It is cold',pron:'eel fay FWAH',words:['Il','fait','froid']},
{icon:'&#x26C8;&#xFE0F;',type:'Stormy',phrase:'Il y a un orage',english:'There is a storm',pron:'eel ee ah un or-AHZH',words:['Il','y','a','un','orage']}
],
spanish:[
{icon:'&#x2600;&#xFE0F;',type:'Sunny',phrase:'Hace sol',english:'It is sunny',pron:'AH-theh sol',words:['Hace','sol']},
{icon:'&#x1F327;&#xFE0F;',type:'Rainy',phrase:'Llueve',english:'It is raining',pron:'YEH-veh',words:['Llueve']},
{icon:'&#x2744;&#xFE0F;',type:'Snowy',phrase:'Nieva',english:'It is snowing',pron:'nee-EH-vah',words:['Nieva']},
{icon:'&#x1F32C;&#xFE0F;',type:'Windy',phrase:'Hace viento',english:'It is windy',pron:'AH-theh vee-EN-toh',words:['Hace','viento']},
{icon:'&#x2601;&#xFE0F;',type:'Cloudy',phrase:'Est&#xE1; nublado',english:'It is cloudy',pron:'es-TAH noo-BLAH-doh',words:['Est\u00e1','nublado']},
{icon:'&#x1F321;&#xFE0F;',type:'Hot',phrase:'Hace calor',english:'It is hot',pron:'AH-theh kah-LOR',words:['Hace','calor']},
{icon:'&#x2603;&#xFE0F;',type:'Cold',phrase:'Hace fr&#xED;o',english:'It is cold',pron:'AH-theh FREE-oh',words:['Hace','fr\u00edo']},
{icon:'&#x26C8;&#xFE0F;',type:'Stormy',phrase:'Hay tormenta',english:'There is a storm',pron:'eye tor-MEN-tah',words:['Hay','tormenta']}
],
german:[
{icon:'&#x2600;&#xFE0F;',type:'Sunny',phrase:'Es ist sonnig',english:'It is sunny',pron:'es ist ZON-ig',words:['Es','ist','sonnig']},
{icon:'&#x1F327;&#xFE0F;',type:'Rainy',phrase:'Es regnet',english:'It is raining',pron:'es REG-net',words:['Es','regnet']},
{icon:'&#x2744;&#xFE0F;',type:'Snowy',phrase:'Es schneit',english:'It is snowing',pron:'es SHNITE',words:['Es','schneit']},
{icon:'&#x1F32C;&#xFE0F;',type:'Windy',phrase:'Es ist windig',english:'It is windy',pron:'es ist VIN-dig',words:['Es','ist','windig']},
{icon:'&#x2601;&#xFE0F;',type:'Cloudy',phrase:'Es ist bew&#xF6;lkt',english:'It is cloudy',pron:'es ist beh-VULKT',words:['Es','ist','bew\u00f6lkt']},
{icon:'&#x1F321;&#xFE0F;',type:'Hot',phrase:'Es ist hei&#xDF;',english:'It is hot',pron:'es ist HICE',words:['Es','ist','hei\u00df']},
{icon:'&#x2603;&#xFE0F;',type:'Cold',phrase:'Es ist kalt',english:'It is cold',pron:'es ist KALT',words:['Es','ist','kalt']},
{icon:'&#x26C8;&#xFE0F;',type:'Stormy',phrase:'Es gibt ein Gewitter',english:'There is a thunderstorm',pron:'es gipt ine geh-VIT-er',words:['Es','gibt','ein','Gewitter']}
]
};

let lang='french',selectedWeather=null,builtWords=[],usedIdxs=new Set();

document.querySelectorAll('.lang-btn').forEach(b=>b.addEventListener('click',()=>{
lang=b.dataset.l;document.querySelectorAll('.lang-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');
selectedWeather=null;renderPicker();document.getElementById('forecastCard').style.display='none';document.getElementById('sentenceBuilder').style.display='none';
}));

function renderPicker(){
const p=document.getElementById('weatherPicker');p.innerHTML='';
WEATHER[lang].forEach((w,i)=>{
const btn=document.createElement('button');
btn.className='w-btn'+(selectedWeather===i?' selected':'');
btn.innerHTML=`<span class="w-icon">${w.icon}</span>${w.type}`;
btn.addEventListener('click',()=>{selectedWeather=i;renderPicker();showForecast(i);});
p.appendChild(btn);
});
}

function showForecast(idx){
const w=WEATHER[lang][idx];
const fc=document.getElementById('forecastCard');fc.style.display='block';
fc.innerHTML=`<h3>${w.icon} ${w.type}</h3><div class="forecast-phrase">${w.phrase}</div><div class="forecast-english">${w.english}</div><div class="forecast-pron">${w.pron}</div>`;
// Set up sentence builder
builtWords=[];usedIdxs=new Set();
const sb=document.getElementById('sentenceBuilder');sb.style.display='block';
document.getElementById('feedback').className='feedback';
renderBuilder(idx);
}

function renderBuilder(idx){
const w=WEATHER[lang][idx];
const bs=document.getElementById('builtSentence');
bs.innerHTML=builtWords.length?builtWords.map((word,i)=>`<span class="built-word" data-i="${i}">${word}</span>`).join(''):'<span style="color:#ccc;font-weight:600;font-size:.82rem;">Tap words to build the forecast</span>';
bs.querySelectorAll('.built-word').forEach(el=>el.addEventListener('click',()=>{
const i=parseInt(el.dataset.i);
builtWords.splice(i,1);
usedIdxs=new Set();
builtWords.forEach(bw=>{const fi=shuffledWords.indexOf(bw);if(fi>=0)usedIdxs.add(fi);});
renderBuilder(idx);
}));

// Shuffle words (with extras)
if(!window.shuffledWords||window.lastIdx!==idx){
const extras=getExtraWords();
window.shuffledWords=shuffle([...w.words,...extras]);
window.lastIdx=idx;
}
const wb=document.getElementById('wordBank');wb.innerHTML='';
window.shuffledWords.forEach((word,i)=>{
const btn=document.createElement('span');
btn.className='bank-word'+(usedIdxs.has(i)?' used':'');
btn.textContent=word;
btn.addEventListener('click',()=>{if(usedIdxs.has(i))return;builtWords.push(word);usedIdxs.add(i);renderBuilder(idx);});
wb.appendChild(btn);
});
}

function getExtraWords(){
const allWords=WEATHER[lang].flatMap(w=>w.words);
const unique=[...new Set(allWords)];
return shuffle(unique).slice(0,3);
}

document.getElementById('checkBtn').addEventListener('click',()=>{
if(selectedWeather===null)return;
const w=WEATHER[lang][selectedWeather];
const built=builtWords.join(' ');
const correct=w.words.join(' ');
const fb=document.getElementById('feedback');
if(built===correct){
fb.className='feedback show win';fb.textContent='\u2705 Perfect! '+w.phrase+' = '+w.english;
celebrate();
}else{
fb.className='feedback show try';fb.textContent='\u274C Not quite. The correct phrase is: '+w.phrase;
}
});

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function celebrate(){const c=document.getElementById('celebration');const cols=['#2563eb','#60a5fa','#22c55e','#f59e0b','#ec4899'];for(let i=0;i<25;i++){const e=document.createElement('div');e.className='confetti';e.style.cssText=`left:${Math.random()*100}vw;top:-12px;background:${cols[Math.floor(Math.random()*cols.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*.5}s;`;c.appendChild(e);setTimeout(()=>e.remove(),4000);}}

renderPicker();
</script>
</body>
</html>
