<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hello World</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #ede9fe;
    --card-bg: #ffffff;
    --text: #3b0764;
    --text-light: #7c3aed;
    --accent: #7c3aed;
    --accent-light: #f5f3ff;
    --border: #c4b5fd;
    --shadow: 0 4px 16px rgba(60,7,100,0.10);
    --shadow-lg: 0 8px 32px rgba(60,7,100,0.16);
    --radius: 20px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
    user-select: none;
    -webkit-user-select: none;
}

.header {
    background: linear-gradient(135deg, #7c3aed, #a78bfa, #c4b5fd);
    color: white;
    padding: 16px 20px;
    text-align: center;
    box-shadow: var(--shadow);
}
.header h1 { font-size: 1.6rem; font-weight: 900; text-shadow: 2px 2px 0 rgba(0,0,0,0.1); }
.header p { font-size: 0.85rem; opacity: 0.9; font-weight: 600; margin-top: 2px; }

.main { max-width: 560px; margin: 0 auto; padding: 16px; }

.instruction {
    text-align: center;
    font-size: 1rem;
    font-weight: 700;
    padding: 10px;
    background: var(--accent-light);
    border-radius: 14px;
    margin-bottom: 14px;
    border: 2px solid var(--border);
}

.flags-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    margin-bottom: 16px;
}
.flag-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 12px 6px;
    border: 3px solid transparent;
    border-radius: 16px;
    background: var(--card-bg);
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: all 0.25s;
    touch-action: manipulation;
}
.flag-btn:hover { transform: scale(1.08); }
.flag-btn.active { border-color: var(--accent); background: var(--accent-light); transform: scale(1.08); box-shadow: var(--shadow-lg); }
.flag-btn .flag { font-size: 2.2rem; }
.flag-btn .lang { font-size: 0.62rem; font-weight: 800; }

/* Character and speech bubble */
.character-area {
    text-align: center;
    margin-bottom: 16px;
}
.character { font-size: 5rem; display: block; margin-bottom: 8px; }
.speech-bubble {
    display: inline-block;
    padding: 14px 24px;
    background: var(--card-bg);
    border-radius: 20px;
    box-shadow: var(--shadow-lg);
    position: relative;
    min-width: 200px;
    animation: popIn 0.4s ease;
}
.speech-bubble::after {
    content: '';
    position: absolute;
    bottom: -12px;
    left: 50%;
    transform: translateX(-50%);
    border-left: 12px solid transparent;
    border-right: 12px solid transparent;
    border-top: 14px solid var(--card-bg);
}
.greeting-text {
    font-size: 1.8rem;
    font-weight: 900;
    color: var(--accent);
    display: block;
}
.greeting-english {
    font-size: 0.82rem;
    color: var(--text-light);
    font-weight: 600;
    margin-top: 4px;
}

/* Greetings list */
.greetings-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 14px;
    margin-bottom: 14px;
}
.greetings-card h3 {
    font-size: 0.78rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-light);
    margin-bottom: 10px;
}
.greeting-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px;
    border-radius: 12px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.2s;
    border: 2px solid transparent;
}
.greeting-row:hover { background: var(--accent-light); }
.greeting-row.playing { border-color: var(--accent); background: var(--accent-light); }
.greeting-row .g-emoji { font-size: 1.3rem; }
.greeting-row .g-foreign { font-size: 1rem; font-weight: 800; }
.greeting-row .g-english { font-size: 0.78rem; color: var(--text-light); }
.greeting-row .g-pron { font-size: 0.68rem; color: #a78bfa; font-style: italic; }

.explored-bar {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 14px;
}
.explored-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #ddd6fe;
    transition: all 0.3s;
}
.explored-dot.done { background: var(--accent); }

.complete-msg {
    text-align: center;
    padding: 16px;
    background: #dcfce7;
    border: 3px solid #22c55e;
    border-radius: var(--radius);
    font-size: 1.1rem;
    font-weight: 900;
    color: #166534;
    display: none;
    animation: popIn 0.4s ease;
}

@keyframes popIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }

.celebration { position: fixed; inset: 0; pointer-events: none; z-index: 1000; }
.confetti { position: absolute; border-radius: 2px; animation: confettiFall linear forwards; }
@keyframes confettiFall { 0% { opacity:1; transform: translateY(0) rotate(0); } 100% { opacity:0; transform: translateY(100vh) rotate(720deg) scale(0.3); } }

@media (max-width: 420px) {
    .flags-grid { grid-template-columns: repeat(3, 1fr); }
    .greeting-text { font-size: 1.4rem; }
}
</style>
</head>
<body>

<div class="header">
    <h1>Hello World!</h1>
    <p>Learn to say hello in different languages!</p>
</div>

<div class="main">
    <div class="instruction">Tap a flag to hear greetings in that language!</div>

    <div class="explored-bar" id="exploredBar"></div>

    <div class="flags-grid" id="flagsGrid"></div>

    <div class="character-area" id="characterArea">
        <span class="character">&#x1F9D2;</span>
        <div class="speech-bubble">
            <span class="greeting-text">Hello!</span>
            <span class="greeting-english">Tap a flag to start</span>
        </div>
    </div>

    <div class="greetings-card" id="greetingsCard" style="display:none;">
        <h3 id="greetingsTitle">Greetings</h3>
        <div id="greetingsList"></div>
    </div>

    <div class="complete-msg" id="completeMsg"></div>
</div>

<div class="celebration" id="celebration"></div>

<script>
const LANGUAGES = [
    {
        name: 'French',
        flag: '&#x1F1EB;&#x1F1F7;',
        character: '&#x1F9D2;',
        colour: '#2563eb',
        greetings: [
            { foreign: 'Bonjour!', english: 'Hello / Good day', pron: 'bon-ZHOOR', emoji: '&#x1F44B;' },
            { foreign: 'Salut!', english: 'Hi (informal)', pron: 'sa-LOO', emoji: '&#x270B;' },
            { foreign: 'Au revoir!', english: 'Goodbye', pron: 'oh ruh-VWAR', emoji: '&#x1F44B;' },
            { foreign: 'Merci!', english: 'Thank you', pron: 'mair-SEE', emoji: '&#x1F64F;' },
            { foreign: 'Comment tu t\'appelles?', english: 'What is your name?', pron: 'KOM-on too ta-PEL', emoji: '&#x2753;' }
        ]
    },
    {
        name: 'Spanish',
        flag: '&#x1F1EA;&#x1F1F8;',
        character: '&#x1F9D2;',
        colour: '#dc2626',
        greetings: [
            { foreign: '&#xA1;Hola!', english: 'Hello', pron: 'OH-la', emoji: '&#x1F44B;' },
            { foreign: 'Buenos d&#xED;as!', english: 'Good morning', pron: 'BWAY-nos DEE-as', emoji: '&#x2600;&#xFE0F;' },
            { foreign: 'Adi&#xF3;s!', english: 'Goodbye', pron: 'ah-dee-OS', emoji: '&#x1F44B;' },
            { foreign: 'Gracias!', english: 'Thank you', pron: 'GRAH-thee-as', emoji: '&#x1F64F;' },
            { foreign: '&#xBF;C&#xF3;mo te llamas?', english: 'What is your name?', pron: 'KOH-mo tay YAH-mas', emoji: '&#x2753;' }
        ]
    },
    {
        name: 'German',
        flag: '&#x1F1E9;&#x1F1EA;',
        character: '&#x1F9D2;',
        colour: '#f59e0b',
        greetings: [
            { foreign: 'Hallo!', english: 'Hello', pron: 'HA-lo', emoji: '&#x1F44B;' },
            { foreign: 'Guten Morgen!', english: 'Good morning', pron: 'GOO-ten MOR-gen', emoji: '&#x2600;&#xFE0F;' },
            { foreign: 'Tsch&#xFC;ss!', english: 'Bye', pron: 'CHOOS', emoji: '&#x1F44B;' },
            { foreign: 'Danke!', english: 'Thank you', pron: 'DANK-uh', emoji: '&#x1F64F;' },
            { foreign: 'Wie hei&#xDF;t du?', english: 'What is your name?', pron: 'vee HYST doo', emoji: '&#x2753;' }
        ]
    },
    {
        name: 'Italian',
        flag: '&#x1F1EE;&#x1F1F9;',
        character: '&#x1F9D2;',
        colour: '#16a34a',
        greetings: [
            { foreign: 'Ciao!', english: 'Hello / Bye', pron: 'CHOW', emoji: '&#x1F44B;' },
            { foreign: 'Buongiorno!', english: 'Good morning', pron: 'bwon-JOR-no', emoji: '&#x2600;&#xFE0F;' },
            { foreign: 'Arrivederci!', english: 'Goodbye', pron: 'ah-ree-veh-DAIR-chee', emoji: '&#x1F44B;' },
            { foreign: 'Grazie!', english: 'Thank you', pron: 'GRAT-see-eh', emoji: '&#x1F64F;' },
            { foreign: 'Come ti chiami?', english: 'What is your name?', pron: 'KOH-meh tee key-AH-mee', emoji: '&#x2753;' }
        ]
    },
    {
        name: 'Japanese',
        flag: '&#x1F1EF;&#x1F1F5;',
        character: '&#x1F9D2;',
        colour: '#ef4444',
        greetings: [
            { foreign: 'Konnichiwa!', english: 'Hello', pron: 'kon-NEE-chee-wa', emoji: '&#x1F44B;' },
            { foreign: 'Ohay&#x14D; gozaimasu!', english: 'Good morning', pron: 'oh-HA-yoh go-ZAI-mass', emoji: '&#x2600;&#xFE0F;' },
            { foreign: 'Say&#x14D;nara!', english: 'Goodbye', pron: 'sigh-OH-na-ra', emoji: '&#x1F44B;' },
            { foreign: 'Arigat&#x14D;!', english: 'Thank you', pron: 'ah-ree-GAH-toh', emoji: '&#x1F64F;' },
            { foreign: 'Onamae wa?', english: 'What is your name?', pron: 'oh-na-MA-eh wa', emoji: '&#x2753;' }
        ]
    }
];

let currentLang = null;
let explored = new Set();
const exploredBar = document.getElementById('exploredBar');
const flagsGrid = document.getElementById('flagsGrid');

// Build explored dots
LANGUAGES.forEach(() => {
    const dot = document.createElement('div');
    dot.className = 'explored-dot';
    exploredBar.appendChild(dot);
});

// Build flag buttons
LANGUAGES.forEach((lang, i) => {
    const btn = document.createElement('button');
    btn.className = 'flag-btn';
    btn.innerHTML = `<span class="flag">${lang.flag}</span><span class="lang">${lang.name}</span>`;
    btn.addEventListener('click', () => selectLanguage(i));
    flagsGrid.appendChild(btn);
});

function selectLanguage(idx) {
    currentLang = idx;
    explored.add(idx);
    const lang = LANGUAGES[idx];

    // Update flags
    flagsGrid.querySelectorAll('.flag-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
    exploredBar.querySelectorAll('.explored-dot').forEach((d, i) => d.classList.toggle('done', explored.has(i)));

    // Update character
    const area = document.getElementById('characterArea');
    area.innerHTML = `
        <span class="character">${lang.character}</span>
        <div class="speech-bubble" style="border-color:${lang.colour};">
            <span class="greeting-text" style="color:${lang.colour};">${lang.greetings[0].foreign}</span>
            <span class="greeting-english">${lang.greetings[0].english}</span>
        </div>
    `;

    // Update greetings list
    const card = document.getElementById('greetingsCard');
    card.style.display = 'block';
    document.getElementById('greetingsTitle').textContent = lang.name + ' Greetings';
    const list = document.getElementById('greetingsList');
    list.innerHTML = '';

    lang.greetings.forEach((g, gi) => {
        const row = document.createElement('div');
        row.className = 'greeting-row';
        row.innerHTML = `<span class="g-emoji">${g.emoji}</span><div><div class="g-foreign" style="color:${lang.colour};">${g.foreign}</div><div class="g-english">${g.english}</div><div class="g-pron">${g.pron}</div></div>`;
        row.addEventListener('click', () => {
            list.querySelectorAll('.greeting-row').forEach(r => r.classList.remove('playing'));
            row.classList.add('playing');
            area.querySelector('.greeting-text').innerHTML = g.foreign;
            area.querySelector('.greeting-english').textContent = g.english;
            setTimeout(() => row.classList.remove('playing'), 1000);
        });
        list.appendChild(row);
    });

    spawnMini();

    if (explored.size === LANGUAGES.length) {
        const msg = document.getElementById('completeMsg');
        msg.style.display = 'block';
        msg.innerHTML = '&#x1F389; You can say hello in ' + LANGUAGES.length + ' languages! Amazing!';
        celebrate();
    }
}

function spawnMini() {
    const container = document.getElementById('celebration');
    const colours = ['#7c3aed','#a78bfa','#c4b5fd','#22c55e','#f59e0b','#3b82f6'];
    for (let i = 0; i < 8; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.style.cssText = `left:${Math.random()*100}vw;top:-10px;background:${colours[Math.floor(Math.random()*colours.length)]};width:${5+Math.random()*6}px;height:${5+Math.random()*6}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${1+Math.random()*1.5}s;animation-delay:${Math.random()*0.3}s;`;
        container.appendChild(el);
        setTimeout(() => el.remove(), 3000);
    }
}

function celebrate() {
    const container = document.getElementById('celebration');
    const colours = ['#7c3aed','#a78bfa','#dc2626','#2563eb','#16a34a','#f59e0b','#ef4444'];
    for (let i = 0; i < 35; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.style.cssText = `left:${Math.random()*100}vw;top:-12px;background:${colours[Math.floor(Math.random()*colours.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*0.5}s;`;
        container.appendChild(el);
        setTimeout(() => el.remove(), 4500);
    }
}
</script>
</body>
</html>
