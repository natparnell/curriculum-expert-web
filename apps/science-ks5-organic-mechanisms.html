<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Organic Reaction Mechanisms</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #0f172a;
    --panel: #1e293b;
    --panel2: #334155;
    --card: #1e293b;
    --border: #475569;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --accent: #a78bfa;
    --accent2: #c4b5fd;
    --positive: #f87171;
    --negative: #60a5fa;
    --arrow: #fbbf24;
    --bond: #94a3b8;
    --carbon: #64748b;
    --oxygen: #ef4444;
    --nitrogen: #3b82f6;
    --halogen: #22c55e;
    --hydrogen: #e2e8f0;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

.app-bar{background:var(--panel);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.app-bar h1{font-size:1.1rem;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--arrow));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.app-bar .tag{font-size:0.62rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text2);background:var(--panel2);padding:3px 10px;border-radius:3px}

.main{max-width:900px;margin:0 auto;padding:20px}

.reaction-tabs{display:flex;gap:0;margin-bottom:20px;border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.tab-btn{flex:1;padding:10px 8px;border:none;background:var(--panel);font-family:'DM Sans',sans-serif;font-size:0.72rem;font-weight:600;color:var(--text2);cursor:pointer;transition:all 0.2s;text-align:center}
.tab-btn:not(:last-child){border-right:1px solid var(--border)}
.tab-btn:hover{background:var(--panel2);color:var(--text)}
.tab-btn.active{background:var(--accent);color:white}

.mechanism-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:20px}
.mech-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.mech-header h2{font-size:1rem;font-weight:700}
.mech-header .type-badge{font-size:0.62rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 10px;border-radius:3px;background:rgba(167,139,250,0.15);color:var(--accent);border:1px solid rgba(167,139,250,0.3)}

.mech-body{padding:20px}

/* Step display */
.step-controls{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.step-label{font-family:'JetBrains Mono',monospace;font-size:0.78rem;font-weight:700;color:var(--accent);min-width:80px}
.step-dots{display:flex;gap:6px;flex:1}
.step-dot{width:10px;height:10px;border-radius:50%;background:var(--panel2);border:2px solid var(--border);cursor:pointer;transition:all 0.2s}
.step-dot.active{background:var(--accent);border-color:var(--accent);transform:scale(1.3)}
.step-dot.done{background:var(--arrow);border-color:var(--arrow)}
.step-nav{display:flex;gap:6px}
.nav-btn{padding:5px 14px;border:1px solid var(--border);background:var(--panel2);color:var(--text);border-radius:5px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:0.72rem;font-weight:600;transition:all 0.15s}
.nav-btn:hover{border-color:var(--accent)}
.nav-btn:disabled{opacity:0.3;cursor:default}

/* Canvas for mechanism */
.mech-canvas{width:100%;height:280px;background:var(--bg);border-radius:8px;border:1px solid var(--border);margin-bottom:16px;position:relative;overflow:hidden}
.mech-canvas canvas{width:100%;height:100%}

.step-desc{font-size:0.88rem;line-height:1.7;color:var(--text2);padding:12px 16px;background:var(--bg);border-radius:8px;border-left:3px solid var(--accent)}
.step-desc strong{color:var(--text)}
.step-desc .curly{color:var(--arrow);font-weight:700}
.step-desc .nuc{color:var(--negative);font-weight:700}
.step-desc .elec{color:var(--positive);font-weight:700}
.step-desc .leaving{color:var(--halogen);font-weight:700}

/* Info section */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
.info-box{background:var(--bg);border-radius:8px;padding:12px;border:1px solid var(--border)}
.info-box h4{font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text2);margin-bottom:6px}
.info-box p{font-size:0.82rem;color:var(--text);line-height:1.5}
.info-box .tag-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.info-box .mini-tag{font-size:0.65rem;font-weight:600;padding:2px 8px;border-radius:3px;background:var(--panel2);color:var(--text2)}

@media(max-width:600px){
    .info-grid{grid-template-columns:1fr}
    .mech-canvas{height:220px}
    .tab-btn{font-size:0.65rem;padding:8px 4px}
}
</style>
</head>
<body>

<div class="app-bar">
    <h1>Organic Reaction Mechanisms</h1>
    <span class="tag">A-Level Chemistry</span>
</div>

<div class="main">
    <div class="reaction-tabs" id="reactionTabs">
        <button class="tab-btn active" data-rxn="sn2">S<sub>N</sub>2</button>
        <button class="tab-btn" data-rxn="sn1">S<sub>N</sub>1</button>
        <button class="tab-btn" data-rxn="e2">E2 Elimination</button>
        <button class="tab-btn" data-rxn="e_addition">Electrophilic Addition</button>
    </div>

    <div class="mechanism-card" id="mechCard">
        <div class="mech-header">
            <h2 id="mechTitle"></h2>
            <span class="type-badge" id="mechType"></span>
        </div>
        <div class="mech-body">
            <div class="step-controls">
                <span class="step-label" id="stepLabel"></span>
                <div class="step-dots" id="stepDots"></div>
                <div class="step-nav">
                    <button class="nav-btn" id="prevBtn" disabled>&laquo; Back</button>
                    <button class="nav-btn" id="nextBtn">Next &raquo;</button>
                </div>
            </div>
            <div class="mech-canvas"><canvas id="mechCanvas"></canvas></div>
            <div class="step-desc" id="stepDesc"></div>
            <div class="info-grid" id="infoGrid"></div>
        </div>
    </div>
</div>

<script>
const REACTIONS = {
    sn2: {
        title: 'Nucleophilic Substitution (S\u2099\u2082)',
        type: 'Substitution',
        steps: [
            {
                desc: '<strong>Starting materials:</strong> A <span class="nuc">nucleophile</span> (OH\u207b) approaches a haloalkane (CH\u2083Br) from the <strong>back side</strong>, opposite to the <span class="leaving">leaving group</span> (Br).',
                draw: (ctx, w, h) => {
                    drawMolecule(ctx, w*0.55, h*0.5, 'CH3', 'Br', w);
                    drawNucleophile(ctx, w*0.15, h*0.5, 'OH\u207b', w);
                    drawLabel(ctx, w*0.55, h*0.85, 'Haloalkane', w);
                    drawLabel(ctx, w*0.15, h*0.85, 'Nucleophile', w);
                }
            },
            {
                desc: 'The <span class="nuc">nucleophile</span> donates a <span class="curly">lone pair</span> to the carbon. A <span class="curly">curly arrow</span> shows electron movement from OH\u207b to the carbon atom. This happens in a <strong>single concerted step</strong>.',
                draw: (ctx, w, h) => {
                    drawMolecule(ctx, w*0.55, h*0.5, 'CH3', 'Br', w);
                    drawNucleophile(ctx, w*0.25, h*0.5, 'OH\u207b', w);
                    drawCurlyArrow(ctx, w*0.30, h*0.48, w*0.45, h*0.48, w);
                    drawLabel(ctx, w*0.37, h*0.32, 'Curly arrow: lone pair attacks C', w);
                }
            },
            {
                desc: 'A <strong>transition state</strong> forms where the carbon has <strong>five partial bonds</strong>. Both the nucleophile and leaving group are partially bonded. The molecule is briefly pentacoordinate.',
                draw: (ctx, w, h) => {
                    drawTransitionState(ctx, w*0.5, h*0.5, 'OH', 'CH3', 'Br', w);
                    drawLabel(ctx, w*0.5, h*0.18, 'Transition State [\u2021]', w);
                    drawLabel(ctx, w*0.2, h*0.5, '\u03B4\u207b', w);
                    drawLabel(ctx, w*0.8, h*0.5, '\u03B4\u207b', w);
                }
            },
            {
                desc: 'The C\u2013Br bond breaks. A <span class="curly">curly arrow</span> shows the bonding pair moving to the <span class="leaving">leaving group</span> (Br). Bromide departs as Br\u207b. The <span class="nuc">OH</span> is now fully bonded to carbon.',
                draw: (ctx, w, h) => {
                    drawMolecule(ctx, w*0.45, h*0.5, 'HO', 'CH3', w);
                    drawLeavingGroup(ctx, w*0.8, h*0.5, 'Br\u207b', w);
                    drawCurlyArrow(ctx, w*0.55, h*0.48, w*0.72, h*0.48, w);
                    drawLabel(ctx, w*0.45, h*0.85, 'Product: CH\u2083OH', w);
                    drawLabel(ctx, w*0.8, h*0.85, 'Leaving group', w);
                }
            },
            {
                desc: '<strong>Products:</strong> Methanol (CH\u2083OH) and bromide ion (Br\u207b). The reaction is <strong>one step</strong> (concerted), <strong>second order</strong> (rate depends on both reactants), and proceeds with <strong>inversion of configuration</strong> (Walden inversion).',
                draw: (ctx, w, h) => {
                    drawProduct(ctx, w*0.35, h*0.5, 'CH\u2083OH', '#60a5fa', w);
                    drawProduct(ctx, w*0.65, h*0.5, 'Br\u207b', '#22c55e', w);
                    drawLabel(ctx, w*0.35, h*0.8, 'Methanol', w);
                    drawLabel(ctx, w*0.65, h*0.8, 'Bromide ion', w);
                    drawLabel(ctx, w*0.5, h*0.15, 'Inversion of configuration', w);
                }
            }
        ],
        info: [
            { title: 'Rate Equation', text: 'Rate = k[nucleophile][haloalkane]. Second order: depends on both concentrations.' },
            { title: 'Stereochemistry', text: 'Inversion of configuration (Walden inversion). The nucleophile attacks from the opposite side to the leaving group.' },
            { title: 'Favoured by', text: 'Primary haloalkanes (less steric hindrance), strong nucleophiles, polar aprotic solvents.' },
            { title: 'Key Feature', text: 'One-step concerted mechanism. Bond making and breaking happen simultaneously.' }
        ]
    },
    sn1: {
        title: 'Nucleophilic Substitution (S\u2099\u2081)',
        type: 'Substitution',
        steps: [
            {
                desc: '<strong>Step 1:</strong> The <span class="leaving">leaving group</span> (Br) departs on its own, taking the bonding pair with it. The C\u2013Br bond breaks <strong>heterolytically</strong>. This is the <strong>rate-determining step</strong>.',
                draw: (ctx, w, h) => {
                    drawMolecule(ctx, w*0.4, h*0.5, '(CH3)3C', 'Br', w);
                    drawCurlyArrow(ctx, w*0.55, h*0.48, w*0.72, h*0.48, w);
                    drawLabel(ctx, w*0.4, h*0.85, 'Tertiary haloalkane', w);
                    drawLabel(ctx, w*0.65, h*0.3, 'Slow step (RDS)', w);
                }
            },
            {
                desc: 'A <strong>carbocation</strong> (positively charged carbon) forms. Tertiary carbocations are most stable because three alkyl groups donate electron density through induction, stabilising the positive charge.',
                draw: (ctx, w, h) => {
                    drawProduct(ctx, w*0.35, h*0.5, '(CH\u2083)\u2083C\u207a', '#f87171', w);
                    drawProduct(ctx, w*0.7, h*0.5, 'Br\u207b', '#22c55e', w);
                    drawLabel(ctx, w*0.35, h*0.8, 'Carbocation (planar)', w);
                    drawLabel(ctx, w*0.7, h*0.8, 'Bromide leaves', w);
                }
            },
            {
                desc: '<strong>Step 2:</strong> The <span class="nuc">nucleophile</span> (OH\u207b) rapidly attacks the <span class="elec">electrophilic</span> carbocation. It can attack from <strong>either side</strong> of the planar carbocation, giving a racemic mixture.',
                draw: (ctx, w, h) => {
                    drawProduct(ctx, w*0.5, h*0.5, '(CH\u2083)\u2083C\u207a', '#f87171', w);
                    drawNucleophile(ctx, w*0.15, h*0.4, 'OH\u207b', w);
                    drawNucleophile(ctx, w*0.85, h*0.6, 'OH\u207b', w);
                    drawCurlyArrow(ctx, w*0.22, h*0.42, w*0.4, h*0.48, w);
                    drawCurlyArrow(ctx, w*0.78, h*0.58, w*0.6, h*0.52, w);
                    drawLabel(ctx, w*0.5, h*0.15, 'Attack from either side (fast step)', w);
                }
            },
            {
                desc: '<strong>Products:</strong> (CH\u2083)\u2083COH and Br\u207b. Because the carbocation is planar, nucleophilic attack from both sides gives a <strong>racemic mixture</strong> (50:50 mix of enantiomers).',
                draw: (ctx, w, h) => {
                    drawProduct(ctx, w*0.35, h*0.5, '(CH\u2083)\u2083COH', '#60a5fa', w);
                    drawProduct(ctx, w*0.65, h*0.5, 'Br\u207b', '#22c55e', w);
                    drawLabel(ctx, w*0.5, h*0.15, 'Racemic mixture', w);
                    drawLabel(ctx, w*0.35, h*0.8, 'Tertiary alcohol', w);
                }
            }
        ],
        info: [
            { title: 'Rate Equation', text: 'Rate = k[haloalkane]. First order: depends only on haloalkane concentration.' },
            { title: 'Stereochemistry', text: 'Racemic mixture. The planar carbocation allows attack from both sides equally.' },
            { title: 'Favoured by', text: 'Tertiary haloalkanes (stable carbocation), weak nucleophiles, polar protic solvents.' },
            { title: 'Key Feature', text: 'Two-step mechanism. Carbocation intermediate. Rate-determining step is ionisation.' }
        ]
    },
    e2: {
        title: 'Elimination (E2)',
        type: 'Elimination',
        steps: [
            {
                desc: '<strong>Starting materials:</strong> A strong <span class="nuc">base</span> (OH\u207b) approaches the haloalkane. The base will abstract a hydrogen from the carbon adjacent (beta) to the C bearing the <span class="leaving">leaving group</span>.',
                draw: (ctx, w, h) => {
                    drawMolecule(ctx, w*0.55, h*0.5, 'CH\u2083CH\u2082', 'Br', w);
                    drawNucleophile(ctx, w*0.15, h*0.35, 'OH\u207b', w);
                    drawLabel(ctx, w*0.55, h*0.85, 'Bromoethane', w);
                    drawLabel(ctx, w*0.15, h*0.2, 'Strong base', w);
                }
            },
            {
                desc: 'The base abstracts a <strong>beta hydrogen</strong>. Simultaneously, the C\u2013H electrons form a <strong>C=C double bond</strong> and the <span class="leaving">leaving group</span> departs. Three <span class="curly">curly arrows</span> show: base to H, C\u2013H bond to C=C, C\u2013Br bond to Br.',
                draw: (ctx, w, h) => {
                    drawMolecule(ctx, w*0.55, h*0.5, 'CH\u2083CH\u2082', 'Br', w);
                    drawNucleophile(ctx, w*0.2, h*0.3, 'OH\u207b', w);
                    drawCurlyArrow(ctx, w*0.25, h*0.33, w*0.42, h*0.42, w);
                    drawCurlyArrow(ctx, w*0.45, h*0.45, w*0.52, h*0.48, w);
                    drawCurlyArrow(ctx, w*0.6, h*0.48, w*0.75, h*0.48, w);
                    drawLabel(ctx, w*0.5, h*0.15, 'Three simultaneous curly arrows', w);
                }
            },
            {
                desc: '<strong>Products:</strong> An <strong>alkene</strong> (CH\u2082=CH\u2082, ethene), water (H\u2082O) and bromide (Br\u207b). This is a <strong>concerted</strong> one-step mechanism like S\u2099\u2082. The H and Br must be <strong>anti-periplanar</strong> (opposite sides).',
                draw: (ctx, w, h) => {
                    drawProduct(ctx, w*0.25, h*0.5, 'CH\u2082=CH\u2082', '#a78bfa', w);
                    drawProduct(ctx, w*0.5, h*0.5, 'H\u2082O', '#60a5fa', w);
                    drawProduct(ctx, w*0.75, h*0.5, 'Br\u207b', '#22c55e', w);
                    drawLabel(ctx, w*0.25, h*0.8, 'Alkene', w);
                    drawLabel(ctx, w*0.5, h*0.8, 'Water', w);
                    drawLabel(ctx, w*0.75, h*0.8, 'Bromide', w);
                }
            }
        ],
        info: [
            { title: 'Rate Equation', text: 'Rate = k[base][haloalkane]. Second order, concerted mechanism.' },
            { title: 'Geometry', text: 'H and leaving group must be anti-periplanar (180\u00B0 dihedral) for orbital overlap.' },
            { title: 'Favoured by', text: 'Strong, bulky bases (e.g. KOH in ethanol), higher temperatures.' },
            { title: 'vs S\u2099\u20822', text: 'E2 competes with S\u2099\u20822. Bulky bases and high temperature favour elimination.' }
        ]
    },
    e_addition: {
        title: 'Electrophilic Addition to Alkenes',
        type: 'Addition',
        steps: [
            {
                desc: '<strong>Starting materials:</strong> An alkene (CH\u2082=CH\u2082) has a region of <strong>high electron density</strong> in the C=C double bond. An <span class="elec">electrophile</span> (HBr) is attracted to this electron-rich area.',
                draw: (ctx, w, h) => {
                    drawProduct(ctx, w*0.35, h*0.5, 'CH\u2082=CH\u2082', '#a78bfa', w);
                    drawProduct(ctx, w*0.7, h*0.5, 'H\u2013Br', '#f87171', w);
                    drawLabel(ctx, w*0.35, h*0.8, 'Alkene (\u03C0 bond)', w);
                    drawLabel(ctx, w*0.7, h*0.8, 'Electrophile', w);
                }
            },
            {
                desc: '<strong>Step 1:</strong> The <strong>\u03C0 bond electrons</strong> in the C=C attack the H\u03B4\u207a of HBr (a <span class="curly">curly arrow</span> from C=C to H). Simultaneously, the H\u2013Br bond breaks heterolytically (arrow from bond to Br). A <strong>carbocation</strong> intermediate forms.',
                draw: (ctx, w, h) => {
                    drawProduct(ctx, w*0.35, h*0.5, 'CH\u2082=CH\u2082', '#a78bfa', w);
                    drawProduct(ctx, w*0.65, h*0.45, 'H\u2013Br', '#f87171', w);
                    drawCurlyArrow(ctx, w*0.45, h*0.48, w*0.58, h*0.45, w);
                    drawCurlyArrow(ctx, w*0.68, h*0.43, w*0.82, h*0.4, w);
                    drawLabel(ctx, w*0.5, h*0.18, '\u03C0 electrons attack H\u03B4\u207a', w);
                }
            },
            {
                desc: '<strong>Step 2:</strong> The <span class="nuc">bromide ion</span> (Br\u207b) acts as a nucleophile and attacks the <span class="elec">carbocation</span>. A curly arrow goes from Br\u207b lone pair to the positively charged carbon.',
                draw: (ctx, w, h) => {
                    drawProduct(ctx, w*0.4, h*0.5, 'CH\u2083CH\u2082\u207a', '#f87171', w);
                    drawNucleophile(ctx, w*0.75, h*0.5, 'Br\u207b', w);
                    drawCurlyArrow(ctx, w*0.7, h*0.48, w*0.55, h*0.48, w);
                    drawLabel(ctx, w*0.5, h*0.15, 'Br\u207b attacks carbocation', w);
                }
            },
            {
                desc: '<strong>Product:</strong> Bromoethane (CH\u2083CH\u2082Br). The double bond has been replaced by two new single bonds (one to H, one to Br). This is why it is called an <strong>addition</strong> reaction: atoms are added across the double bond.',
                draw: (ctx, w, h) => {
                    drawProduct(ctx, w*0.5, h*0.5, 'CH\u2083CH\u2082Br', '#22c55e', w);
                    drawLabel(ctx, w*0.5, h*0.8, 'Bromoethane (product)', w);
                    drawLabel(ctx, w*0.5, h*0.15, 'Addition complete', w);
                }
            }
        ],
        info: [
            { title: 'Mechanism Type', text: 'Two-step via carbocation intermediate. The \u03C0 bond acts as the nucleophile.' },
            { title: 'Markovnikov\'s Rule', text: 'With unsymmetrical alkenes, H adds to the carbon with more hydrogens (gives more stable carbocation).' },
            { title: 'Reagents', text: 'HBr, HCl, H\u2082SO\u2084, Br\u2082 (in different conditions). Br\u2082 test: orange to colourless.' },
            { title: 'Key Feature', text: '\u03C0 bond electrons are the nucleophile. Electrophile is attracted to the electron-rich double bond.' }
        ]
    }
};

let currentRxn = 'sn2';
let currentStep = 0;

const canvas = document.getElementById('mechCanvas');
const ctx = canvas.getContext('2d');

// Tab switching
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentRxn = btn.dataset.rxn;
        currentStep = 0;
        render();
    });
});

document.getElementById('prevBtn').addEventListener('click', () => { if (currentStep > 0) { currentStep--; render(); } });
document.getElementById('nextBtn').addEventListener('click', () => {
    const rxn = REACTIONS[currentRxn];
    if (currentStep < rxn.steps.length - 1) { currentStep++; render(); }
});

function render() {
    const rxn = REACTIONS[currentRxn];
    const step = rxn.steps[currentStep];

    document.getElementById('mechTitle').innerHTML = rxn.title;
    document.getElementById('mechType').textContent = rxn.type;
    document.getElementById('stepLabel').textContent = `Step ${currentStep + 1}/${rxn.steps.length}`;
    document.getElementById('stepDesc').innerHTML = step.desc;

    // Step dots
    const dots = document.getElementById('stepDots');
    dots.innerHTML = '';
    rxn.steps.forEach((_, i) => {
        const dot = document.createElement('div');
        dot.className = 'step-dot' + (i === currentStep ? ' active' : i < currentStep ? ' done' : '');
        dot.addEventListener('click', () => { currentStep = i; render(); });
        dots.appendChild(dot);
    });

    // Nav buttons
    document.getElementById('prevBtn').disabled = currentStep === 0;
    document.getElementById('nextBtn').disabled = currentStep === rxn.steps.length - 1;

    // Draw mechanism
    canvas.width = canvas.parentElement.clientWidth;
    canvas.height = canvas.parentElement.clientHeight;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    step.draw(ctx, canvas.width, canvas.height);

    // Info grid
    const grid = document.getElementById('infoGrid');
    grid.innerHTML = '';
    rxn.info.forEach(info => {
        const box = document.createElement('div');
        box.className = 'info-box';
        box.innerHTML = `<h4>${info.title}</h4><p>${info.text}</p>`;
        grid.appendChild(box);
    });
}

// Drawing helpers
function drawMolecule(ctx, x, y, left, right, w) {
    const s = Math.min(w/600, 1.5);
    ctx.font = `bold ${18*s}px "JetBrains Mono"`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#e2e8f0';
    ctx.fillText(left, x - 30*s, y);
    ctx.fillStyle = '#94a3b8';
    ctx.fillText('\u2014', x, y);
    ctx.fillStyle = '#22c55e';
    ctx.fillText(right, x + 35*s, y);
}

function drawNucleophile(ctx, x, y, label, w) {
    const s = Math.min(w/600, 1.5);
    ctx.beginPath();
    ctx.arc(x, y, 22*s, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(96,165,250,0.15)';
    ctx.fill();
    ctx.strokeStyle = '#60a5fa';
    ctx.lineWidth = 2*s;
    ctx.stroke();
    ctx.font = `bold ${14*s}px "JetBrains Mono"`;
    ctx.fillStyle = '#60a5fa';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, x, y);
}

function drawLeavingGroup(ctx, x, y, label, w) {
    const s = Math.min(w/600, 1.5);
    ctx.beginPath();
    ctx.arc(x, y, 22*s, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(34,197,94,0.15)';
    ctx.fill();
    ctx.strokeStyle = '#22c55e';
    ctx.lineWidth = 2*s;
    ctx.stroke();
    ctx.font = `bold ${14*s}px "JetBrains Mono"`;
    ctx.fillStyle = '#22c55e';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, x, y);
}

function drawProduct(ctx, x, y, label, colour, w) {
    const s = Math.min(w/600, 1.5);
    ctx.beginPath();
    ctx.arc(x, y, 30*s, 0, Math.PI*2);
    ctx.fillStyle = colour + '20';
    ctx.fill();
    ctx.strokeStyle = colour;
    ctx.lineWidth = 2*s;
    ctx.stroke();
    ctx.font = `bold ${13*s}px "JetBrains Mono"`;
    ctx.fillStyle = colour;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, x, y);
}

function drawTransitionState(ctx, x, y, left, mid, right, w) {
    const s = Math.min(w/600, 1.5);
    ctx.setLineDash([4*s, 4*s]);
    ctx.strokeStyle = '#fbbf24';
    ctx.lineWidth = 2*s;
    ctx.beginPath();
    ctx.moveTo(x - 80*s, y);
    ctx.lineTo(x - 30*s, y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x + 30*s, y);
    ctx.lineTo(x + 80*s, y);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.font = `bold ${16*s}px "JetBrains Mono"`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#60a5fa';
    ctx.fillText(left, x - 100*s, y);
    ctx.fillStyle = '#e2e8f0';
    ctx.fillText(mid, x, y);
    ctx.fillStyle = '#22c55e';
    ctx.fillText(right, x + 100*s, y);

    // Brackets
    ctx.font = `${28*s}px "JetBrains Mono"`;
    ctx.fillStyle = '#fbbf24';
    ctx.fillText('[', x - 130*s, y);
    ctx.fillText(']\u2021', x + 125*s, y);
}

function drawCurlyArrow(ctx, x1, y1, x2, y2, w) {
    const s = Math.min(w/600, 1.5);
    ctx.strokeStyle = '#fbbf24';
    ctx.lineWidth = 2.5*s;
    ctx.setLineDash([]);

    const cp1x = x1 + (x2-x1)*0.3;
    const cp1y = y1 - 25*s;
    const cp2x = x1 + (x2-x1)*0.7;
    const cp2y = y2 - 25*s;

    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, x2, y2);
    ctx.stroke();

    // Arrowhead
    const angle = Math.atan2(y2 - cp2y, x2 - cp2x);
    ctx.beginPath();
    ctx.moveTo(x2, y2);
    ctx.lineTo(x2 - 10*s * Math.cos(angle - 0.4), y2 - 10*s * Math.sin(angle - 0.4));
    ctx.lineTo(x2 - 10*s * Math.cos(angle + 0.4), y2 - 10*s * Math.sin(angle + 0.4));
    ctx.fillStyle = '#fbbf24';
    ctx.fill();
}

function drawLabel(ctx, x, y, text, w) {
    const s = Math.min(w/600, 1.5);
    ctx.font = `600 ${11*s}px "DM Sans"`;
    ctx.fillStyle = '#94a3b8';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, x, y);
}

window.addEventListener('resize', () => {
    canvas.width = canvas.parentElement.clientWidth;
    canvas.height = canvas.parentElement.clientHeight;
    const rxn = REACTIONS[currentRxn];
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    rxn.steps[currentStep].draw(ctx, canvas.width, canvas.height);
});

render();
</script>
