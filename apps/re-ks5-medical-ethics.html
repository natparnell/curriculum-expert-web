<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medical Ethics Analyser</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#faf8f5;--card:#fff;--text:#1c1917;--text2:#78716c;--accent:#be185d;--accent-bg:#fce7f3;--religious:#7c3aed;--religious-bg:#f5f3ff;--secular:#0d9488;--secular-bg:#ccfbf1;--border:#e7e5e4;--shadow:0 2px 12px rgba(0,0,0,.05);--shadow-lg:0 8px 32px rgba(0,0,0,.08);--radius:10px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
.masthead{background:#1c1917;color:#e7e5e4;padding:16px 24px;display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
.masthead h1{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:900}
.masthead h1 span{color:var(--accent);font-style:italic;font-weight:400}
.masthead .tag{font-size:.6rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#a8a29e;background:#292524;padding:3px 10px;border-radius:3px}
.main{max-width:880px;margin:0 auto;padding:20px}

.dilemma-tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.dil-tab{padding:8px 16px;border:1.5px solid var(--border);border-radius:6px;background:var(--card);font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:600;cursor:pointer;color:var(--text2);transition:all .2s}
.dil-tab:hover{border-color:var(--accent)}
.dil-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}

.dilemma-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px;box-shadow:var(--shadow)}
.dil-banner{padding:16px 20px;color:#fff;background:linear-gradient(135deg,var(--accent),#ec4899)}
.dil-banner h2{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700}
.dil-banner .d-desc{font-size:.82rem;opacity:.9;margin-top:4px}
.dil-body{padding:20px}

.scenario{padding:14px;background:#fef3c7;border-radius:8px;border-left:4px solid #f59e0b;font-size:.88rem;line-height:1.6;margin-bottom:16px;font-style:italic}

.section-h{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text2);margin:16px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--border)}

.framework-tabs{display:flex;gap:0;margin-bottom:14px;border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.fw-tab{flex:1;padding:8px;border:none;background:var(--card);font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:600;cursor:pointer;color:var(--text2);transition:all .2s}
.fw-tab.active.religious{background:var(--religious);color:#fff}
.fw-tab.active.secular{background:var(--secular);color:#fff}

.perspective-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.perspective-card{padding:14px;border-radius:8px;border-left:4px solid;font-size:.82rem;line-height:1.5}
.perspective-card.for{background:#dcfce7;border-left-color:#22c55e;color:#166534}
.perspective-card.against{background:#fef2f2;border-left-color:#ef4444;color:#991b1b}
.perspective-card h4{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}

.view-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:10px}
.view-card .v-name{font-size:.85rem;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.view-card .v-badge{font-size:.58rem;font-weight:700;padding:2px 8px;border-radius:3px;color:#fff}
.view-card .v-badge.religious{background:var(--religious)}
.view-card .v-badge.secular{background:var(--secular)}
.view-card .v-position{font-size:.82rem;color:var(--text2);line-height:1.5}
.view-card .v-reason{font-size:.78rem;color:var(--text2);font-style:italic;margin-top:4px;padding-top:4px;border-top:1px solid var(--border)}

.evaluation{padding:14px;background:var(--accent-bg);border-radius:8px;border-left:4px solid var(--accent);font-size:.85rem;line-height:1.7;margin-top:14px}
.evaluation strong{color:var(--accent)}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:600px){.perspective-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="masthead"><h1>Medical Ethics <span>Analyser</span></h1><span class="tag">A-Level RE</span></div>
<div class="main">
<div class="dilemma-tabs" id="dilTabs"></div>
<div id="display"></div>
</div>
<script>
const DILEMMAS=[
{id:'euthanasia',name:'Euthanasia',desc:'Should terminally ill patients have the right to choose when and how they die?',
scenario:'A 72-year-old woman with terminal motor neurone disease is in constant pain and has been given six months to live. She is mentally competent and repeatedly asks her doctors to help her die peacefully. Her family is divided: her husband supports her wish, but her daughter believes life should be preserved.',
views:[
{name:'Christianity (Catholic)',badge:'religious',position:'Against euthanasia. Life is a sacred gift from God (sanctity of life). Only God has the authority to decide when life ends.',reason:'"You shall not murder" (Exodus 20:13). Suffering can have spiritual meaning and bring people closer to God. The Catechism calls euthanasia "morally unacceptable."'},
{name:'Christianity (Liberal Protestant)',badge:'religious',position:'Some liberal Christians argue that compassion (agape love) may justify helping someone die with dignity in extreme circumstances.',reason:'Jesus showed compassion to the suffering. The principle of "love your neighbour" could include relieving unbearable suffering when there is no hope of recovery.'},
{name:'Islam',badge:'religious',position:'Strongly against euthanasia. Life belongs to Allah and only Allah can decide when it ends. Suffering is a test from God.',reason:'"Do not kill yourselves, for God has been to you most merciful" (Quran 4:29). Muslims believe suffering can be a way to earn forgiveness.'},
{name:'Utilitarianism',badge:'secular',position:'Would consider the greatest happiness for the greatest number. If euthanasia reduces overall suffering, it may be morally justified.',reason:'Bentham\'s hedonic calculus weighs pain against pleasure. If continued life causes only suffering with no prospect of recovery, ending it may maximise well-being for patient and family.'},
{name:'Kantian Ethics',badge:'secular',position:'Complex. Kant would argue against treating a person merely as a means, but respecting autonomy is central. The categorical imperative creates tension.',reason:'Could a universal law be made that "everyone in unbearable terminal suffering may choose to die"? Kant valued rational autonomy but also said we have a duty to preserve life.'},
{name:'Situation Ethics (Fletcher)',badge:'secular',position:'The most loving thing to do depends on the situation. If allowing death is the most compassionate act, it may be justified.',reason:'Fletcher argued that love (agape) is the only absolute. Rules can be broken if the situation demands a more loving response.'}
],
forPoints:['Respects patient autonomy and right to choose','Ends unbearable suffering when there is no hope','Allows death with dignity rather than prolonged agony','Frees medical resources for patients who can recover'],
againstPoints:['Violates the sanctity of life (religious view)','Slippery slope: could lead to pressure on vulnerable people','Palliative care can manage pain without killing','Doctors should heal, not kill (Hippocratic Oath)'],
evaluation:'Euthanasia remains one of the most contested issues in medical ethics. The tension between sanctity of life and quality of life, between divine authority and personal autonomy, makes this a question where reasonable people of faith and none can disagree. A Level answers must show awareness of multiple perspectives and avoid simplistic either/or conclusions.'
},
{id:'genetic',name:'Genetic Engineering',desc:'Should we edit human DNA to prevent disease or enhance human capabilities?',
scenario:'Scientists can now use CRISPR technology to edit the DNA of human embryos. A couple who both carry the gene for a fatal childhood disease want to use gene editing to ensure their baby will not inherit the condition. The clinic also offers "enhancement" options: selecting for higher intelligence or specific physical traits.',
views:[
{name:'Christianity',badge:'religious',position:'Therapeutic gene editing (to cure disease) may be acceptable as an act of healing. Enhancement ("designer babies") is seen as playing God.',reason:'"God created mankind in his own image" (Genesis 1:27). Christians generally accept medical treatment but fear that enhancement undermines God\'s role as creator and could create inequality.'},
{name:'Islam',badge:'religious',position:'Curing genetic diseases is generally permitted as a form of medicine. Enhancement that changes God\'s creation is prohibited.',reason:'"We have certainly created man in the best of stature" (Quran 95:4). Islam supports medical advances that reduce suffering but draws a clear line at altering what Allah has designed.'},
{name:'Buddhism',badge:'religious',position:'Reducing suffering is central to Buddhism, so therapeutic gene editing aligns with compassion. Enhancement driven by craving or attachment is problematic.',reason:'The first precept is to avoid harming living beings. If gene editing reduces suffering, it fulfils this. But desire for "perfect" children reflects attachment (tanha) which causes suffering.'},
{name:'Utilitarianism',badge:'secular',position:'If gene editing produces more happiness than harm, it is justified. Both therapy and enhancement could be acceptable if consequences are positive.',reason:'The greatest good for the greatest number. Eliminating genetic diseases reduces suffering. Enhancement could benefit society, but risks creating inequality must be weighed.'},
{name:'Natural Law (Aquinas)',badge:'secular',position:'Therapeutic editing may fulfil the primary precept of preserving life. Enhancement may violate the natural order established by God.',reason:'Aquinas identified five primary precepts including preservation of life and reproduction. Gene therapy to save life aligns with these; enhancement may not.'},
{name:'Kantian Ethics',badge:'secular',position:'People must never be treated merely as means. "Designer babies" risk treating children as products. Therapy to prevent suffering respects human dignity.',reason:'Kant\'s second formulation: treat humanity always as an end, never merely as a means. Choosing a child\'s traits for parental satisfaction may violate this principle.'}
],
forPoints:['Could eliminate devastating genetic diseases','Parents have a right to give their children the best start','Medical science should be used to reduce suffering','Could benefit society through healthier populations'],
againstPoints:['Crosses the line from healing to "playing God"','Could create a genetic divide between rich and poor','Embryos that do not meet criteria may be destroyed','Unforeseen consequences of editing DNA could emerge in future generations'],
evaluation:'Genetic engineering forces us to ask what it means to be human. Most ethical frameworks can accept therapeutic gene editing (fixing diseases), but the line between therapy and enhancement is blurred. The potential to create inequality between those who can and cannot afford enhancement raises serious justice concerns that both religious and secular thinkers find troubling.'
}
];

let currentDil=0;
const dilTabs=document.getElementById('dilTabs');

DILEMMAS.forEach((d,i)=>{
const tab=document.createElement('button');tab.className='dil-tab'+(i===0?' active':'');tab.textContent=d.name;
tab.addEventListener('click',()=>{currentDil=i;render();});
dilTabs.appendChild(tab);
});

function render(){
dilTabs.querySelectorAll('.dil-tab').forEach((t,i)=>t.classList.toggle('active',i===currentDil));
const d=DILEMMAS[currentDil];

let viewsHtml=d.views.map(v=>`<div class="view-card"><div class="v-name">${v.name} <span class="v-badge ${v.badge}">${v.badge}</span></div><div class="v-position">${v.position}</div><div class="v-reason">${v.reason}</div></div>`).join('');

document.getElementById('display').innerHTML=`
<div class="dilemma-card" style="animation:fadeIn .3s ease">
<div class="dil-banner"><h2>${d.name}</h2><div class="d-desc">${d.desc}</div></div>
<div class="dil-body">
<div class="scenario">${d.scenario}</div>

<div class="section-h">Arguments For and Against</div>
<div class="perspective-grid">
<div class="perspective-card for"><h4>Arguments For</h4>${d.forPoints.map(p=>`<div>&#x2022; ${p}</div>`).join('')}</div>
<div class="perspective-card against"><h4>Arguments Against</h4>${d.againstPoints.map(p=>`<div>&#x2022; ${p}</div>`).join('')}</div>
</div>

<div class="section-h">Religious and Secular Perspectives</div>
${viewsHtml}

<div class="evaluation"><strong>Evaluative conclusion:</strong> ${d.evaluation}</div>
</div>
</div>`;
}

render();
</script>
</body>
</html>
