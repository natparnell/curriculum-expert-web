<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prayer and Meditation</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f3ff;--card:#fff;--text:#3b0764;--text2:#7c3aed;--accent:#7c3aed;--accent-bg:#ede9fe;--border:#ddd6fe;--shadow:0 4px 16px rgba(60,7,100,.08);--radius:14px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
.header{background:linear-gradient(135deg,#7c3aed,#a78bfa);color:#fff;padding:16px 20px;text-align:center}
.header h1{font-size:1.4rem;font-weight:900}
.header p{font-size:.8rem;opacity:.9;font-weight:600;margin-top:2px}
.main{max-width:700px;margin:0 auto;padding:16px}

.religion-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.rel-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 6px;border:3px solid var(--border);border-radius:14px;background:var(--card);cursor:pointer;transition:all .25s;box-shadow:var(--shadow);touch-action:manipulation}
.rel-btn:hover{transform:scale(1.04)}
.rel-btn.active{border-color:var(--accent);background:var(--accent-bg);transform:scale(1.04)}
.rel-btn .r-icon{font-size:1.8rem}
.rel-btn .r-name{font-size:.68rem;font-weight:800}

.prayer-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:14px;box-shadow:var(--shadow);animation:fadeIn .3s ease}
.prayer-banner{padding:14px 16px;color:#fff;display:flex;align-items:center;gap:10px}
.prayer-banner .p-icon{font-size:2rem}
.prayer-banner h2{font-size:1rem;font-weight:800}
.prayer-body{padding:16px}
.prayer-body p{font-size:.85rem;color:var(--text2);line-height:1.6;margin-bottom:10px}

.section-h{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);margin-bottom:6px;margin-top:12px}

.practice-list{list-style:none;margin-bottom:10px}
.practice-list li{padding:8px 0;border-bottom:1px solid #f1f5f9;font-size:.82rem;display:flex;gap:8px;align-items:flex-start}
.practice-list li .pl-icon{font-size:1rem;flex-shrink:0}

.prayer-text{padding:12px;background:#fef3c7;border-radius:10px;font-size:.85rem;font-style:italic;border-left:4px solid #f59e0b;margin-bottom:10px}
.prayer-text .pt-label{font-size:.68rem;font-weight:800;color:#92400e;font-style:normal;margin-bottom:4px;display:block}

.compare-box{padding:12px;background:var(--accent-bg);border-radius:10px;font-size:.82rem;border-left:3px solid var(--accent)}
.compare-box strong{color:var(--accent)}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:500px){.religion-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="header"><h1>Prayer and Meditation</h1><p>Explore how different religions pray and meditate!</p></div>
<div class="main">
<div class="religion-grid" id="relGrid"></div>
<div id="display"></div>
</div>
<script>
const RELIGIONS=[
{id:'christianity',name:'Christianity',icon:'&#x271D;&#xFE0F;',colour:'#7c3aed',
desc:'Christians pray to God, often through Jesus. Prayer can be private or in a group at church. Many Christians use set prayers like the Lord\'s Prayer, and also pray in their own words.',
practices:[{icon:'&#x1F64F;',text:'Hands together and eyes closed during prayer'},{icon:'&#x1F4D6;',text:'Read the Bible and reflect on its meaning'},{icon:'&#x1F3B5;',text:'Sing hymns as a form of worship'},{icon:'&#x26EA;',text:'Attend church services, especially on Sundays'},{icon:'&#x1F56F;&#xFE0F;',text:'Light candles as a sign of prayer in some traditions'}],
prayer:{label:'The Lord\'s Prayer (beginning)',text:'Our Father, who art in heaven, hallowed be thy name. Thy kingdom come, thy will be done, on earth as it is in heaven...'},
compare:'Christians believe they can talk to God at any time, anywhere. Some use rosary beads to count their prayers.'},
{id:'islam',name:'Islam',icon:'&#x1F54C;',colour:'#059669',
desc:'Muslims pray five times a day (Salah), facing the direction of Makkah. Before praying, they wash (Wudu) and kneel on a prayer mat. Friday is the most important day for communal prayer at the mosque.',
practices:[{icon:'&#x1F9F9;',text:'Perform Wudu (washing) before prayer to be clean'},{icon:'&#x1F9CE;',text:'Kneel on a prayer mat facing Makkah'},{icon:'&#x1F4DC;',text:'Recite verses from the Quran in Arabic'},{icon:'&#x1F54C;',text:'Attend Friday prayers (Jummah) at the mosque'},{icon:'&#x23F0;',text:'Pray at five set times: dawn, midday, afternoon, sunset, night'}],
prayer:{label:'The Shahadah (declaration of faith)',text:'There is no god but Allah, and Muhammad is the messenger of Allah.'},
compare:'The Adhan (call to prayer) is called from the minaret of the mosque five times a day, reminding Muslims it is time to pray.'},
{id:'hinduism',name:'Hinduism',icon:'&#x1F549;&#xFE0F;',colour:'#f59e0b',
desc:'Hindus worship (puja) at home with a shrine and at the mandir (temple). They offer flowers, food and light to images of the gods. Meditation and chanting mantras are also important.',
practices:[{icon:'&#x1FA94;',text:'Light a lamp (diya) at the home shrine each day'},{icon:'&#x1F33A;',text:'Offer flowers, fruit and incense to the gods'},{icon:'&#x1F514;',text:'Ring a bell to welcome the gods during puja'},{icon:'&#x1F9D8;',text:'Practise meditation and yoga for inner peace'},{icon:'&#x1F4FF;',text:'Chant mantras using prayer beads (mala)'}],
prayer:{label:'The Gayatri Mantra (translation)',text:'We meditate on the glory of the Creator who has created the universe, who is worthy of worship, who is the embodiment of knowledge and light.'},
compare:'Many Hindu families have a special room or corner at home with a shrine where they perform daily puja.'},
{id:'buddhism',name:'Buddhism',icon:'&#x2638;&#xFE0F;',colour:'#0ea5e9',
desc:'Buddhists focus on meditation to calm the mind and develop wisdom and compassion. They may chant mantras, make offerings at temples, and follow the teachings of the Buddha.',
practices:[{icon:'&#x1F9D8;',text:'Sit in meditation, focusing on the breath'},{icon:'&#x1F4FF;',text:'Chant mantras or sutras (teachings)'},{icon:'&#x1F56F;&#xFE0F;',text:'Light incense and candles at a shrine'},{icon:'&#x1F3DB;&#xFE0F;',text:'Visit temples to make offerings and meditate'},{icon:'&#x1F333;',text:'Practise mindfulness in daily life'}],
prayer:{label:'A Buddhist teaching',text:'Peace comes from within. Do not seek it without.'},
compare:'Meditation is central to Buddhism. Even children can learn simple breathing meditation to feel calm and focused.'},
{id:'sikhism',name:'Sikhism',icon:'&#x1F3DB;&#xFE0F;',colour:'#f97316',
desc:'Sikhs pray to one God (Waheguru). They recite prayers from the Guru Granth Sahib (holy book) in the morning, evening and at bedtime. The gurdwara is the place of communal worship.',
practices:[{icon:'&#x1F4D6;',text:'Read passages from the Guru Granth Sahib daily'},{icon:'&#x1F3B5;',text:'Sing Kirtan (hymns) together at the gurdwara'},{icon:'&#x1F64F;',text:'Recite the Mool Mantar (core prayer) each morning'},{icon:'&#x1F37D;&#xFE0F;',text:'Share langar (free communal meal) after worship'},{icon:'&#x1F9E3;',text:'Cover the head as a sign of respect during prayer'}],
prayer:{label:'The Mool Mantar (beginning)',text:'There is one God. Truth is His name. He is the Creator. He is without fear. He is without hate.'},
compare:'The langar (free kitchen) at every gurdwara feeds anyone who comes, regardless of religion, showing the Sikh value of equality.'},
{id:'judaism',name:'Judaism',icon:'&#x2721;&#xFE0F;',colour:'#2563eb',
desc:'Jewish people pray three times a day: morning, afternoon and evening. Shabbat (Saturday) is the most important day of the week for rest and worship at the synagogue.',
practices:[{icon:'&#x1F4DC;',text:'Read from the Torah at the synagogue'},{icon:'&#x1F56F;&#xFE0F;',text:'Light Shabbat candles on Friday evening'},{icon:'&#x1F64F;',text:'Wear a kippah (head covering) during prayer'},{icon:'&#x1F3B5;',text:'Sing psalms and prayers in Hebrew'},{icon:'&#x1F4FF;',text:'Some men wear tefillin (small leather boxes) during weekday morning prayers'}],
prayer:{label:'The Shema (most important Jewish prayer)',text:'Hear, O Israel: the Lord our God, the Lord is One.'},
compare:'The Shema is the first prayer Jewish children learn. It is said morning and evening, and is the last thing many Jewish people say at night.'}
];

let currentRel=0;
const relGrid=document.getElementById('relGrid');

RELIGIONS.forEach((r,i)=>{
const btn=document.createElement('button');btn.className='rel-btn';
btn.innerHTML=`<span class="r-icon">${r.icon}</span><span class="r-name">${r.name}</span>`;
btn.addEventListener('click',()=>{currentRel=i;render();});
relGrid.appendChild(btn);
});

function render(){
relGrid.querySelectorAll('.rel-btn').forEach((b,i)=>b.classList.toggle('active',i===currentRel));
const r=RELIGIONS[currentRel];
document.getElementById('display').innerHTML=`
<div class="prayer-card">
<div class="prayer-banner" style="background:linear-gradient(135deg,${r.colour},${r.colour}cc)"><span class="p-icon">${r.icon}</span><div><h2>${r.name}</h2></div></div>
<div class="prayer-body">
<p>${r.desc}</p>
<div class="section-h">Prayer Practices</div>
<ul class="practice-list">${r.practices.map(p=>`<li><span class="pl-icon">${p.icon}</span>${p.text}</li>`).join('')}</ul>
<div class="prayer-text"><span class="pt-label">${r.prayer.label}</span>"${r.prayer.text}"</div>
<div class="compare-box"><strong>Did you know?</strong> ${r.compare}</div>
</div>
</div>`;
}

render();
</script>
</body>
</html>
