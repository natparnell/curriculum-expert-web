<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Philosophy of Religion</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#faf8f5;--card:#fff;--text:#1c1917;--text2:#78716c;--accent:#be185d;--accent-bg:#fce7f3;--border:#e7e5e4;--shadow:0 2px 12px rgba(0,0,0,.05);--shadow-lg:0 8px 32px rgba(0,0,0,.08);--radius:10px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
.masthead{background:#1c1917;color:#e7e5e4;padding:16px 24px;display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
.masthead h1{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:900}
.masthead h1 span{color:var(--accent);font-style:italic;font-weight:400}
.masthead .tag{font-size:.6rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#a8a29e;background:#292524;padding:3px 10px;border-radius:3px}
.main{max-width:880px;margin:0 auto;padding:20px}

.arg-tabs{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.arg-tab{padding:8px 16px;border:1.5px solid var(--border);border-radius:6px;background:var(--card);font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:600;cursor:pointer;color:var(--text2);transition:all .2s}
.arg-tab:hover{border-color:var(--accent)}
.arg-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}

.arg-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px;box-shadow:var(--shadow);animation:fadeIn .3s ease}
.arg-banner{padding:16px 20px;color:#fff;background:linear-gradient(135deg,var(--accent),#ec4899)}
.arg-banner h2{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700}
.arg-banner .a-type{font-size:.68rem;opacity:.85;font-weight:600;margin-top:2px}
.arg-body{padding:20px}

.step-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:12px;border-left:4px solid var(--accent)}
.step-card .step-num{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--accent);margin-bottom:4px}
.step-card .step-text{font-size:.88rem;line-height:1.6}

.section-h{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text2);margin:16px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--border)}

.critique-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.critique-box{padding:12px;border-radius:8px;font-size:.82rem;line-height:1.5}
.critique-box.strength{background:#dcfce7;color:#166534;border:1px solid #86efac}
.critique-box.weakness{background:#fef2f2;color:#991b1b;border:1px solid #fca5a5}
.critique-box h4{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}

.thinker-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.thinker-chip{font-size:.7rem;font-weight:600;padding:3px 10px;border-radius:3px;background:var(--accent-bg);color:var(--accent);border:1px solid #f9a8d4}

.evaluation{padding:14px;background:#fef3c7;border-radius:8px;border-left:4px solid #f59e0b;font-size:.85rem;line-height:1.6}
.evaluation strong{color:#92400e}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:600px){.critique-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="masthead"><h1>Philosophy of <span>Religion</span></h1><span class="tag">A-Level RE</span></div>
<div class="main">
<div class="arg-tabs" id="argTabs"></div>
<div id="display"></div>
</div>
<script>
const ARGUMENTS=[
{id:'ontological',name:'Ontological Argument',type:'A Priori (from reason alone)',
summary:'God is defined as "that than which nothing greater can be conceived." If such a being existed only in the mind, a greater being (one existing in reality) could be conceived. Therefore, God must exist in reality.',
steps:[
{num:'Premise 1',text:'God is defined as the greatest conceivable being (that than which nothing greater can be conceived).'},
{num:'Premise 2',text:'It is greater to exist in reality than to exist only in the mind (the understanding).'},
{num:'Premise 3',text:'If God existed only in the mind, then a greater being could be conceived (one that exists in reality).'},
{num:'Conclusion',text:'Therefore, God must exist in reality, not just in the mind. To deny God\'s existence is self-contradictory.'}
],
thinkers:['Anselm of Canterbury','Ren\u00e9 Descartes','Alvin Plantinga','Norman Malcolm'],
strengths:['Does not depend on empirical evidence; uses pure logic','If the definition of God is accepted, the conclusion follows necessarily','Plantinga\'s modal version uses possible worlds logic to strengthen the argument'],
weaknesses:['Gaunilo\'s "perfect island" objection: you could prove anything "perfect" exists','Kant: existence is not a predicate (property). Saying God exists adds nothing to the concept of God','Defining something into existence seems like a logical trick, not a proof','Hume: we cannot move from concepts to existence through reason alone'],
evaluation:'The ontological argument remains one of the most debated in philosophy. While many find it logically compelling, the key issue is whether existence can be treated as a property that makes something "greater." Kant\'s objection is widely considered the strongest counter, but Plantinga\'s reformulation continues to generate debate.'
},
{id:'cosmological',name:'Cosmological Argument',type:'A Posteriori (from observation of the world)',
summary:'Everything that exists has a cause. The universe exists, so it must have a cause. This cause must be an uncaused first cause, which we call God.',
steps:[
{num:'Premise 1',text:'Everything that begins to exist has a cause (the principle of causation).'},
{num:'Premise 2',text:'The universe began to exist (it has not existed forever).'},
{num:'Premise 3',text:'An infinite chain of causes is impossible (infinite regress); there must be a first cause.'},
{num:'Conclusion',text:'Therefore, there must be an uncaused first cause that started everything. This is what we mean by God.'}
],
thinkers:['Thomas Aquinas (Five Ways)','Kal\u0101m argument (al-Ghazali)','Gottfried Leibniz','William Lane Craig'],
strengths:['Based on everyday experience: everything we observe has a cause','Supported by Big Bang cosmology (the universe had a beginning)','Appeals to our intuition that "something cannot come from nothing"','Leibniz\'s version asks "why is there something rather than nothing?" which is a profound question'],
weaknesses:['Why must the chain of causes stop at God? Why can\'t God also have a cause?','Quantum physics suggests some events at the subatomic level may be uncaused','Hume: just because everything in the universe has a cause doesn\'t mean the universe itself needs one (fallacy of composition)','Even if a first cause exists, it does not prove it is the God of any particular religion'],
evaluation:'The cosmological argument is perhaps the most intuitively powerful argument for God\'s existence. The discovery of the Big Bang seemed to support it. However, the question of "what caused God?" remains a significant challenge, and modern physics has complicated our understanding of causation.'
},
{id:'teleological',name:'Teleological (Design) Argument',type:'A Posteriori (from observation of the world)',
summary:'The universe shows evidence of design and purpose (order, complexity, fine-tuning). Design implies a designer. Therefore, God exists as the designer of the universe.',
steps:[
{num:'Premise 1',text:'The natural world shows evidence of design: order, complexity, and purpose (e.g. the human eye, the laws of physics).'},
{num:'Premise 2',text:'Design implies a designer, just as a watch implies a watchmaker.'},
{num:'Premise 3',text:'The universe is far more complex than any human-made object.'},
{num:'Conclusion',text:'Therefore, the universe must have an intelligent designer, which we call God.'}
],
thinkers:['William Paley (watchmaker analogy)','Thomas Aquinas (Fifth Way)','F.R. Tennant (Anthropic Principle)','Richard Swinburne'],
strengths:['The "fine-tuning" of physical constants seems remarkably precise for life to exist','The complexity of DNA and biological systems seems to point to design','Paley\'s watchmaker analogy is simple and compelling','Modern physics reveals extraordinary mathematical elegance in natural laws'],
weaknesses:['Darwin\'s theory of evolution explains biological complexity without a designer','Hume: we cannot compare the universe to a watch because we have no other universes to compare','The argument from evil: a "designed" universe contains suffering, disease and natural disasters','The multiverse theory: if there are billions of universes, ours just happens to support life by chance'],
evaluation:'The design argument has been profoundly challenged by evolutionary biology, which provides a naturalistic explanation for apparent design. However, the "fine-tuning" version (why are the laws of physics so precisely calibrated for life?) remains a live philosophical debate. The argument works best as a cumulative case alongside other evidence.'
}
];

let currentArg=0;
const argTabs=document.getElementById('argTabs');

ARGUMENTS.forEach((a,i)=>{
const tab=document.createElement('button');tab.className='arg-tab'+(i===0?' active':'');tab.textContent=a.name;
tab.addEventListener('click',()=>{currentArg=i;render();});
argTabs.appendChild(tab);
});

function render(){
argTabs.querySelectorAll('.arg-tab').forEach((t,i)=>t.classList.toggle('active',i===currentArg));
const a=ARGUMENTS[currentArg];
document.getElementById('display').innerHTML=`
<div class="arg-card">
<div class="arg-banner"><h2>${a.name}</h2><div class="a-type">${a.type}</div></div>
<div class="arg-body">
<p style="font-size:.88rem;color:var(--text2);line-height:1.7;margin-bottom:14px;font-style:italic;">${a.summary}</p>
<div class="section-h">The Argument Step by Step</div>
${a.steps.map(s=>`<div class="step-card"><div class="step-num">${s.num}</div><div class="step-text">${s.text}</div></div>`).join('')}
<div class="section-h">Key Thinkers</div>
<div class="thinker-chips">${a.thinkers.map(t=>`<span class="thinker-chip">${t}</span>`).join('')}</div>
<div class="section-h">Evaluation</div>
<div class="critique-grid">
<div class="critique-box strength"><h4>Strengths</h4>${a.strengths.map(s=>`<div>&#x2022; ${s}</div>`).join('')}</div>
<div class="critique-box weakness"><h4>Weaknesses</h4>${a.weaknesses.map(w=>`<div>&#x2022; ${w}</div>`).join('')}</div>
</div>
<div class="evaluation"><strong>Overall assessment:</strong> ${a.evaluation}</div>
</div>
</div>`;
}

render();
</script>
</body>
</html>
