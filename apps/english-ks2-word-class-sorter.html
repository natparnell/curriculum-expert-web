<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Class Sorter</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #fafaf9;
    --card-bg: #ffffff;
    --text: #1c1917;
    --text-light: #78716c;
    --noun: #3b82f6;
    --noun-bg: #dbeafe;
    --verb: #22c55e;
    --verb-bg: #dcfce7;
    --adj: #f59e0b;
    --adj-bg: #fef3c7;
    --adv: #a855f7;
    --adv-bg: #f3e8ff;
    --prep: #ec4899;
    --prep-bg: #fce7f3;
    --border: #e7e5e4;
    --shadow: 0 4px 16px rgba(20,20,20,0.08);
    --shadow-lg: 0 8px 32px rgba(20,20,20,0.14);
    --radius: 14px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
}

.header {
    background: linear-gradient(135deg, #3b82f6, #22c55e, #f59e0b);
    color: white;
    padding: 16px 20px;
    text-align: center;
    box-shadow: var(--shadow);
}
.header h1 { font-size: 1.4rem; font-weight: 900; text-shadow: 1px 1px 0 rgba(0,0,0,0.15); }
.header p { font-size: 0.8rem; opacity: 0.9; font-weight: 600; margin-top: 2px; }

.main { max-width: 700px; margin: 0 auto; padding: 16px; }

.score-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    background: var(--card-bg);
    border-radius: 10px;
    box-shadow: var(--shadow);
    margin-bottom: 14px;
    font-size: 0.85rem;
    font-weight: 700;
}

.word-display {
    text-align: center;
    padding: 20px;
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow-lg);
    margin-bottom: 16px;
}
.current-word {
    font-size: 2.2rem;
    font-weight: 900;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
}
.word-sentence {
    font-size: 0.88rem;
    color: var(--text-light);
    font-weight: 500;
    font-style: italic;
}
.word-sentence strong { color: var(--text); font-weight: 800; font-style: normal; }

.sort-bins {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    margin-bottom: 16px;
}

.bin {
    background: var(--card-bg);
    border: 3px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 4px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
}
.bin:hover { transform: scale(1.05); }
.bin:active { transform: scale(0.97); }
.bin .bin-icon { font-size: 1.8rem; margin-bottom: 4px; }
.bin .bin-label { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
.bin .bin-count { font-size: 0.68rem; font-weight: 600; color: var(--text-light); margin-top: 2px; }

.bin.noun { border-color: var(--noun); background: var(--noun-bg); }
.bin.noun .bin-label { color: var(--noun); }
.bin.verb { border-color: var(--verb); background: var(--verb-bg); }
.bin.verb .bin-label { color: var(--verb); }
.bin.adj { border-color: var(--adj); background: var(--adj-bg); }
.bin.adj .bin-label { color: var(--adj); }
.bin.adv { border-color: var(--adv); background: var(--adv-bg); }
.bin.adv .bin-label { color: var(--adv); }
.bin.prep { border-color: var(--prep); background: var(--prep-bg); }
.bin.prep .bin-label { color: var(--prep); }

.bin.correct { animation: correctPulse 0.5s ease; }
.bin.wrong { animation: wobble 0.4s ease; }

@keyframes correctPulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); box-shadow: 0 0 20px rgba(34,197,94,0.4); }
    100% { transform: scale(1); }
}
@keyframes wobble {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
}

.feedback {
    text-align: center;
    font-size: 1rem;
    font-weight: 800;
    padding: 12px;
    border-radius: var(--radius);
    margin-bottom: 14px;
    min-height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
}
.feedback.correct { background: #dcfce7; color: #166534; border: 2px solid #22c55e; }
.feedback.wrong { background: #fef2f2; color: #991b1b; border: 2px solid #fca5a5; }
.feedback.neutral { background: var(--card-bg); color: var(--text-light); border: 2px solid var(--border); }

.sorted-list {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 14px;
    margin-bottom: 14px;
}
.sorted-list h3 { font-size: 0.82rem; font-weight: 800; color: var(--text-light); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.sorted-words {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
}
.sorted-word {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.78rem;
    font-weight: 700;
    color: white;
    animation: popIn 0.3s ease;
}
.sorted-word.noun { background: var(--noun); }
.sorted-word.verb { background: var(--verb); }
.sorted-word.adj { background: var(--adj); }
.sorted-word.adv { background: var(--adv); }
.sorted-word.prep { background: var(--prep); }

.complete-card {
    text-align: center;
    padding: 24px;
    background: #dcfce7;
    border: 3px solid #22c55e;
    border-radius: var(--radius);
    display: none;
    animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
.complete-card h2 { font-size: 1.3rem; color: #166534; margin-bottom: 8px; }
.complete-card p { color: #166534; font-weight: 600; }
.complete-card .play-again {
    margin-top: 14px;
    padding: 12px 28px;
    border: none;
    border-radius: 50px;
    background: #22c55e;
    color: white;
    font-family: 'Inter', sans-serif;
    font-size: 1rem;
    font-weight: 800;
    cursor: pointer;
    transition: transform 0.2s;
}
.complete-card .play-again:hover { transform: scale(1.05); }

@keyframes popIn { from { opacity: 0; transform: scale(0.85); } to { opacity: 1; transform: scale(1); } }

.celebration { position: fixed; inset: 0; pointer-events: none; z-index: 1000; }
.confetti { position: absolute; border-radius: 2px; animation: confettiFall linear forwards; }
@keyframes confettiFall { 0% { opacity:1; transform: translateY(0) rotate(0); } 100% { opacity:0; transform: translateY(100vh) rotate(720deg) scale(0.3); } }

@media (max-width: 500px) {
    .sort-bins { grid-template-columns: repeat(3, 1fr); }
    .current-word { font-size: 1.8rem; }
}
</style>
</head>
<body>

<div class="header">
    <h1>Word Class Sorter</h1>
    <p>Sort each word into the right class!</p>
</div>

<div class="main">
    <div class="score-bar">
        <span id="progressLabel">Word 1 of 15</span>
        <span id="scoreLabel" style="color:#22c55e;">Score: 0</span>
    </div>

    <div class="word-display" id="wordDisplay">
        <div class="current-word" id="currentWord"></div>
        <div class="word-sentence" id="wordSentence"></div>
    </div>

    <div class="sort-bins" id="sortBins">
        <div class="bin noun" data-type="noun"><div class="bin-icon">&#x1F4E6;</div><div class="bin-label">Noun</div><div class="bin-count" id="countNoun">0</div></div>
        <div class="bin verb" data-type="verb"><div class="bin-icon">&#x26A1;</div><div class="bin-label">Verb</div><div class="bin-count" id="countVerb">0</div></div>
        <div class="bin adj" data-type="adj"><div class="bin-icon">&#x1F308;</div><div class="bin-label">Adjective</div><div class="bin-count" id="countAdj">0</div></div>
        <div class="bin adv" data-type="adv"><div class="bin-icon">&#x1F680;</div><div class="bin-label">Adverb</div><div class="bin-count" id="countAdv">0</div></div>
        <div class="bin prep" data-type="prep"><div class="bin-icon">&#x1F4CD;</div><div class="bin-label">Preposition</div><div class="bin-count" id="countPrep">0</div></div>
    </div>

    <div class="feedback neutral" id="feedback">Tap the bin where this word belongs!</div>

    <div class="sorted-list">
        <h3>Sorted Words</h3>
        <div class="sorted-words" id="sortedWords"></div>
    </div>

    <div class="complete-card" id="completeCard">
        <h2>&#x1F389; Round Complete!</h2>
        <p id="finalScore"></p>
        <button class="play-again" id="playAgain">Play Again</button>
    </div>
</div>

<div class="celebration" id="celebration"></div>

<script>
const WORDS = [
    { word: 'castle', type: 'noun', sentence: 'The old <strong>castle</strong> stood on the hill.' },
    { word: 'quickly', type: 'adv', sentence: 'She ran <strong>quickly</strong> to the door.' },
    { word: 'beautiful', type: 'adj', sentence: 'What a <strong>beautiful</strong> sunset!' },
    { word: 'jumped', type: 'verb', sentence: 'The fox <strong>jumped</strong> over the fence.' },
    { word: 'under', type: 'prep', sentence: 'The cat hid <strong>under</strong> the table.' },
    { word: 'mountain', type: 'noun', sentence: 'We climbed the <strong>mountain</strong> all morning.' },
    { word: 'whispered', type: 'verb', sentence: 'He <strong>whispered</strong> the secret to her.' },
    { word: 'enormous', type: 'adj', sentence: 'An <strong>enormous</strong> wave crashed onto the shore.' },
    { word: 'carefully', type: 'adv', sentence: 'She <strong>carefully</strong> opened the box.' },
    { word: 'between', type: 'prep', sentence: 'The path ran <strong>between</strong> two tall trees.' },
    { word: 'treasure', type: 'noun', sentence: 'Pirates buried the <strong>treasure</strong> on the island.' },
    { word: 'fierce', type: 'adj', sentence: 'The <strong>fierce</strong> dragon guarded the cave.' },
    { word: 'explored', type: 'verb', sentence: 'They <strong>explored</strong> the dark tunnel.' },
    { word: 'silently', type: 'adv', sentence: 'The owl flew <strong>silently</strong> through the night.' },
    { word: 'beside', type: 'prep', sentence: 'She sat <strong>beside</strong> the river.' }
];

let shuffled = [];
let currentIdx = 0;
let score = 0;
let counts = { noun: 0, verb: 0, adj: 0, adv: 0, prep: 0 };

function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function startGame() {
    shuffled = shuffle(WORDS);
    currentIdx = 0;
    score = 0;
    counts = { noun: 0, verb: 0, adj: 0, adv: 0, prep: 0 };
    document.getElementById('sortedWords').innerHTML = '';
    document.getElementById('completeCard').style.display = 'none';
    document.getElementById('wordDisplay').style.display = 'block';
    document.getElementById('sortBins').style.display = 'grid';
    updateCounts();
    loadWord();
}

function loadWord() {
    if (currentIdx >= shuffled.length) {
        endGame();
        return;
    }
    const w = shuffled[currentIdx];
    document.getElementById('currentWord').textContent = w.word;
    document.getElementById('wordSentence').innerHTML = w.sentence;
    document.getElementById('progressLabel').textContent = `Word ${currentIdx + 1} of ${shuffled.length}`;
    document.getElementById('scoreLabel').textContent = `Score: ${score}`;
    document.getElementById('feedback').className = 'feedback neutral';
    document.getElementById('feedback').textContent = 'Tap the bin where this word belongs!';
}

function updateCounts() {
    Object.keys(counts).forEach(k => {
        const id = 'count' + k.charAt(0).toUpperCase() + k.slice(1);
        document.getElementById(id).textContent = counts[k];
    });
}

// Bin clicks
document.querySelectorAll('.bin').forEach(bin => {
    bin.addEventListener('click', () => {
        const chosen = bin.dataset.type;
        const correct = shuffled[currentIdx].type;
        const fb = document.getElementById('feedback');
        const labels = { noun: 'Noun', verb: 'Verb', adj: 'Adjective', adv: 'Adverb', prep: 'Preposition' };

        if (chosen === correct) {
            score++;
            counts[correct]++;
            bin.classList.add('correct');
            setTimeout(() => bin.classList.remove('correct'), 500);
            fb.className = 'feedback correct';
            fb.textContent = '\u2705 Correct! "' + shuffled[currentIdx].word + '" is a ' + labels[correct].toLowerCase() + '.';

            // Add to sorted list
            const tag = document.createElement('span');
            tag.className = 'sorted-word ' + correct;
            tag.textContent = shuffled[currentIdx].word;
            document.getElementById('sortedWords').appendChild(tag);
            updateCounts();
            spawnMiniCelebration();

            setTimeout(() => {
                currentIdx++;
                loadWord();
            }, 1200);
        } else {
            bin.classList.add('wrong');
            setTimeout(() => bin.classList.remove('wrong'), 400);
            fb.className = 'feedback wrong';
            fb.textContent = '\u274C Not quite. "' + shuffled[currentIdx].word + '" is not a ' + labels[chosen].toLowerCase() + '. Try again!';
        }
    });
});

function endGame() {
    document.getElementById('wordDisplay').style.display = 'none';
    document.getElementById('sortBins').style.display = 'none';
    document.getElementById('feedback').style.display = 'none';
    const card = document.getElementById('completeCard');
    card.style.display = 'block';
    document.getElementById('finalScore').textContent = `You scored ${score} out of ${shuffled.length}!`;
    celebrate();
}

document.getElementById('playAgain').addEventListener('click', () => {
    document.getElementById('feedback').style.display = 'flex';
    startGame();
});

function spawnMiniCelebration() {
    const container = document.getElementById('celebration');
    const colours = ['#3b82f6','#22c55e','#f59e0b','#a855f7','#ec4899'];
    for (let i = 0; i < 8; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.style.cssText = `left:${Math.random()*100}vw;top:-10px;background:${colours[Math.floor(Math.random()*colours.length)]};width:${5+Math.random()*6}px;height:${5+Math.random()*6}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${1+Math.random()*1.5}s;animation-delay:${Math.random()*0.3}s;`;
        container.appendChild(el);
        setTimeout(() => el.remove(), 3000);
    }
}

function celebrate() {
    const container = document.getElementById('celebration');
    const colours = ['#3b82f6','#22c55e','#f59e0b','#a855f7','#ec4899','#ef4444'];
    for (let i = 0; i < 35; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.style.cssText = `left:${Math.random()*100}vw;top:-12px;background:${colours[Math.floor(Math.random()*colours.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*0.6}s;`;
        container.appendChild(el);
        setTimeout(() => el.remove(), 4500);
    }
}

startGame();
</script>
</body>
</html>
