<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Historiography Debate</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #faf8f5;
    --card: #ffffff;
    --text: #1c1917;
    --text2: #78716c;
    --accent: #92400e;
    --accent-bg: #fef3c7;
    --orthodox: #2563eb;
    --orthodox-bg: #dbeafe;
    --revisionist: #dc2626;
    --revisionist-bg: #fef2f2;
    --postrev: #7c3aed;
    --postrev-bg: #f3e8ff;
    --border: #e7e5e4;
    --shadow: 0 2px 12px rgba(0,0,0,0.05);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.08);
    --radius: 10px;
    --font-display: 'Playfair Display', Georgia, serif;
    --font-ui: 'DM Sans', system-ui, sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-ui);background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}

.masthead{background:#1c1917;color:#e7e5e4;padding:18px 24px;display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
.masthead h1{font-family:var(--font-display);font-size:1.4rem;font-weight:900}
.masthead h1 span{color:var(--accent);font-style:italic;font-weight:400}
.masthead .tag{font-size:0.6rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#a8a29e;background:#292524;padding:3px 10px;border-radius:3px}

.main{max-width:880px;margin:0 auto;padding:20px}

.event-tabs{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.event-tab{padding:8px 16px;border:1.5px solid var(--border);border-radius:6px;background:var(--card);font-family:var(--font-ui);font-size:0.72rem;font-weight:600;cursor:pointer;color:var(--text2);transition:all 0.2s}
.event-tab:hover{border-color:var(--accent);color:var(--text)}
.event-tab.active{background:var(--accent);color:white;border-color:var(--accent)}

.event-header{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;margin-bottom:16px;box-shadow:var(--shadow)}
.event-header h2{font-family:var(--font-display);font-size:1.2rem;font-weight:700;margin-bottom:4px}
.event-header .period{font-size:0.78rem;color:var(--text2);font-weight:500}
.event-header .context{font-size:0.85rem;color:var(--text2);margin-top:8px;line-height:1.6}

.schools-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}

.school-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);transition:all 0.2s;cursor:pointer}
.school-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.school-card.active{transform:translateY(-2px)}
.school-banner{padding:12px 14px;color:white;font-size:0.68rem;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.school-card.orthodox .school-banner{background:var(--orthodox)}
.school-card.revisionist .school-banner{background:var(--revisionist)}
.school-card.postrev .school-banner{background:var(--postrev)}

.school-body{padding:14px}
.school-body h3{font-family:var(--font-display);font-size:0.95rem;font-weight:700;margin-bottom:6px}
.school-body .core-arg{font-size:0.82rem;color:var(--text2);line-height:1.5;margin-bottom:10px;font-style:italic}
.school-body .historians{display:flex;flex-wrap:wrap;gap:4px}
.historian-chip{font-size:0.65rem;font-weight:600;padding:2px 8px;border-radius:3px;border:1px solid var(--border);background:var(--bg);color:var(--text2)}

.evidence-section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px;box-shadow:var(--shadow)}
.evidence-section h3{font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text2);margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--border)}

.evidence-card{padding:12px;border-radius:8px;margin-bottom:10px;border-left:4px solid;font-size:0.82rem;line-height:1.6}
.evidence-card.orthodox{background:var(--orthodox-bg);border-left-color:var(--orthodox)}
.evidence-card.revisionist{background:var(--revisionist-bg);border-left-color:var(--revisionist)}
.evidence-card.postrev{background:var(--postrev-bg);border-left-color:var(--postrev)}
.evidence-card .ev-school{font-size:0.62rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.evidence-card.orthodox .ev-school{color:var(--orthodox)}
.evidence-card.revisionist .ev-school{color:var(--revisionist)}
.evidence-card.postrev .ev-school{color:var(--postrev)}
.evidence-card .ev-text{color:var(--text)}
.evidence-card .ev-source{font-size:0.72rem;color:var(--text2);margin-top:4px;font-style:italic}

.evaluation{background:var(--accent-bg);border:1px solid #fde68a;border-radius:var(--radius);padding:16px;margin-bottom:16px}
.evaluation h3{font-family:var(--font-display);font-size:1rem;font-weight:700;color:var(--accent);margin-bottom:8px}
.evaluation p{font-size:0.85rem;line-height:1.7;color:#78350f}

.legend{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:6px;font-size:0.72rem;font-weight:600}
.legend-dot{width:12px;height:12px;border-radius:3px}

@media(max-width:700px){
    .schools-grid{grid-template-columns:1fr}
    .masthead{padding:14px 16px}
}
</style>
</head>
<body>

<div class="masthead">
    <h1>Historiography <span>Debate</span></h1>
    <span class="tag">A-Level History</span>
</div>

<div class="main">
    <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--orthodox);"></div> Orthodox</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--revisionist);"></div> Revisionist</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--postrev);"></div> Post-Revisionist</div>
    </div>

    <div class="event-tabs" id="eventTabs"></div>
    <div id="display"></div>
</div>

<script>
const EVENTS = [
    {
        id: 'coldwar',
        name: 'Origins of the Cold War',
        period: '1945 - 1991',
        context: 'After World War II, the wartime alliance between the USA and USSR collapsed into decades of ideological, political and military tension. Historians have debated who was responsible for this breakdown.',
        schools: {
            orthodox: {
                title: 'Orthodox (Traditionalist)',
                argument: 'The Soviet Union, under Stalin, was primarily responsible. Soviet expansionism, the imposition of communist regimes in Eastern Europe, and ideological aggression forced the West to respond defensively.',
                historians: ['Arthur Schlesinger Jr', 'Herbert Feis', 'Thomas Bailey'],
                evidence: [
                    { text: 'Stalin imposed communist governments across Eastern Europe between 1945 and 1948, breaking promises made at Yalta about free elections.', source: 'Schlesinger, "Origins of the Cold War" (1967)' },
                    { text: 'Soviet espionage in the Manhattan Project (revealed by decoded Venona cables) showed aggressive intent to undermine Western security.', source: 'Feis, "From Trust to Terror" (1970)' }
                ]
            },
            revisionist: {
                title: 'Revisionist',
                argument: 'The United States bore significant responsibility. American economic imperialism, the use of atomic diplomacy, and the Truman Doctrine provoked Soviet defensive reactions rather than addressing legitimate security concerns.',
                historians: ['William Appleman Williams', 'Gabriel Kolko', 'Gar Alperovitz'],
                evidence: [
                    { text: 'The USA used its atomic monopoly (1945-49) as leverage, and the bombing of Hiroshima was partly intended to intimidate the Soviets.', source: 'Alperovitz, "Atomic Diplomacy" (1965)' },
                    { text: 'The Marshall Plan, while presented as humanitarian aid, was designed to create markets for American capitalism and draw Eastern Europe away from Soviet influence.', source: 'Williams, "The Tragedy of American Diplomacy" (1959)' }
                ]
            },
            postrev: {
                title: 'Post-Revisionist',
                argument: 'Both superpowers contributed to the Cold War through mutual misperceptions, security dilemmas, and the structural logic of a bipolar system. Neither side bears sole responsibility.',
                historians: ['John Lewis Gaddis', 'Melvyn Leffler', 'Vladislav Zubok'],
                evidence: [
                    { text: 'Stalin was both opportunistic and defensive: he wanted a buffer zone in Eastern Europe primarily for security after two devastating German invasions, not world revolution.', source: 'Gaddis, "We Now Know" (1997)' },
                    { text: 'Newly released Soviet archives show that Stalin was more cautious and reactive than orthodox historians assumed, but also more calculating than revisionists suggested.', source: 'Zubok & Pleshakov, "Inside the Kremlin\'s Cold War" (1996)' }
                ]
            }
        },
        evaluation: 'The post-revisionist synthesis has become the dominant interpretation since the 1990s, partly because the opening of Soviet archives allowed historians to move beyond the either/or framing of earlier debates. However, elements of both orthodox and revisionist arguments remain valuable. The key historiographical lesson is that interpretations change as new evidence emerges and as the political context of the historians themselves shifts.'
    },
    {
        id: 'hitler',
        name: 'Hitler\'s Rise to Power',
        period: '1919 - 1933',
        context: 'How and why Adolf Hitler came to power in Germany remains one of the most debated questions in modern history. Was it inevitable, a product of unique circumstances, or driven by specific individuals and decisions?',
        schools: {
            orthodox: {
                title: 'Intentionalist',
                argument: 'Hitler\'s ideology, charisma and personal will were the driving forces. He had a clear programme outlined in Mein Kampf and systematically worked to achieve it. His rise was driven by deliberate strategy.',
                historians: ['Alan Bullock', 'Karl Bracher', 'Lucy Dawidowicz'],
                evidence: [
                    { text: 'Hitler outlined his core ideas (antisemitism, Lebensraum, racial hierarchy) in Mein Kampf (1925) and pursued them consistently once in power.', source: 'Bullock, "Hitler: A Study in Tyranny" (1952)' },
                    { text: 'The Nazi Party\'s propaganda machine, led by Goebbels, was deliberately engineered to exploit economic fears and nationalist sentiment.', source: 'Bracher, "The German Dictatorship" (1969)' }
                ]
            },
            revisionist: {
                title: 'Structuralist',
                argument: 'Deep structural factors (economic crisis, Weimar\'s constitutional weaknesses, conservative elite complicity) were more important than Hitler as an individual. Any number of authoritarian leaders could have filled the role.',
                historians: ['Hans Mommsen', 'Martin Broszat', 'Ian Kershaw (early work)'],
                evidence: [
                    { text: 'The Great Depression devastated Germany: unemployment reached 6 million by 1932, creating mass desperation that any demagogue could have exploited.', source: 'Mommsen, "The Rise and Fall of Weimar Democracy" (1989)' },
                    { text: 'Conservative elites (Hindenburg, von Papen) handed Hitler the chancellorship believing they could control him. The structural failure was theirs.', source: 'Broszat, "Hitler and the Collapse of Weimar Germany" (1987)' }
                ]
            },
            postrev: {
                title: 'Synthesis',
                argument: 'Hitler\'s rise required both structural preconditions (economic crisis, political instability) and the agency of individuals (Hitler\'s skills, conservative miscalculations). Neither factor alone is sufficient as an explanation.',
                historians: ['Ian Kershaw', 'Richard Evans', 'Peter Fritzsche'],
                evidence: [
                    { text: 'Hitler was a "charismatic leader" whose power depended on followers\' willingness to "work towards the F\u00fchrer." Structure and agency were inseparable.', source: 'Kershaw, "Hitler: Hubris" (1998)' },
                    { text: 'The Nazi movement succeeded because it offered different things to different groups: nationalism to the middle class, work to the unemployed, order to the frightened.', source: 'Evans, "The Coming of the Third Reich" (2003)' }
                ]
            }
        },
        evaluation: 'Kershaw\'s synthesis is widely regarded as the most convincing account. It avoids the trap of "great man" history while acknowledging that Hitler was not interchangeable with any other leader. The debate illustrates how structure vs agency is a fundamental tension in all historical explanation, not just this topic.'
    }
];

let currentEvent = 0;
const eventTabs = document.getElementById('eventTabs');
const display = document.getElementById('display');

EVENTS.forEach((evt, i) => {
    const tab = document.createElement('button');
    tab.className = 'event-tab';
    tab.textContent = evt.name;
    tab.addEventListener('click', () => { currentEvent = i; render(); });
    eventTabs.appendChild(tab);
});

function render() {
    eventTabs.querySelectorAll('.event-tab').forEach((t, i) => t.classList.toggle('active', i === currentEvent));
    const evt = EVENTS[currentEvent];

    let html = `<div class="event-header"><h2>${evt.name}</h2><div class="period">${evt.period}</div><div class="context">${evt.context}</div></div>`;

    html += '<div class="schools-grid">';
    ['orthodox', 'revisionist', 'postrev'].forEach(key => {
        const school = evt.schools[key];
        html += `<div class="school-card ${key}">
            <div class="school-banner">${school.title}</div>
            <div class="school-body">
                <h3>Core Argument</h3>
                <div class="core-arg">${school.argument}</div>
                <div class="historians">${school.historians.map(h => `<span class="historian-chip">${h}</span>`).join('')}</div>
            </div>
        </div>`;
    });
    html += '</div>';

    html += '<div class="evidence-section"><h3>Key Evidence</h3>';
    ['orthodox', 'revisionist', 'postrev'].forEach(key => {
        const school = evt.schools[key];
        school.evidence.forEach(ev => {
            html += `<div class="evidence-card ${key}"><div class="ev-school">${school.title}</div><div class="ev-text">${ev.text}</div><div class="ev-source">${ev.source}</div></div>`;
        });
    });
    html += '</div>';

    html += `<div class="evaluation"><h3>Historiographical Evaluation</h3><p>${evt.evaluation}</p></div>`;

    display.innerHTML = html;
}

render();
</script>
</body>
</html>
