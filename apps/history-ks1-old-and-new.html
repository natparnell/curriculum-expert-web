<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Old and New Sort</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #fef7ed;
    --card-bg: #ffffff;
    --text: #451a03;
    --text-light: #92400e;
    --old: #92400e;
    --old-bg: #fef3c7;
    --new: #7c3aed;
    --new-bg: #f3e8ff;
    --border: #fed7aa;
    --shadow: 0 4px 16px rgba(120,60,10,0.10);
    --shadow-lg: 0 8px 32px rgba(120,60,10,0.16);
    --radius: 18px;
    --success: #22c55e;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
    user-select: none;
    -webkit-user-select: none;
}

.header {
    background: linear-gradient(135deg, #92400e, #d97706);
    color: #fef3c7;
    padding: 16px 20px;
    text-align: center;
    box-shadow: var(--shadow);
}
.header h1 { font-size: 1.5rem; font-weight: 900; text-shadow: 2px 2px 0 rgba(0,0,0,0.1); }
.header p { font-size: 0.82rem; opacity: 0.9; font-weight: 600; margin-top: 2px; }

.main { max-width: 600px; margin: 0 auto; padding: 16px; }

.score-bar {
    display: flex;
    justify-content: space-between;
    padding: 10px 14px;
    background: var(--card-bg);
    border-radius: 12px;
    box-shadow: var(--shadow);
    margin-bottom: 14px;
    font-size: 0.85rem;
    font-weight: 700;
}

.item-display {
    text-align: center;
    padding: 20px;
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow-lg);
    margin-bottom: 16px;
}
.item-icon { font-size: 4rem; margin-bottom: 8px; display: block; }
.item-name { font-size: 1.2rem; font-weight: 800; }
.item-hint { font-size: 0.82rem; color: var(--text-light); font-weight: 600; margin-top: 4px; }

.sort-buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
}
.sort-btn {
    padding: 20px;
    border: 4px solid;
    border-radius: var(--radius);
    font-family: 'Inter', sans-serif;
    font-size: 1.1rem;
    font-weight: 900;
    cursor: pointer;
    transition: all 0.25s;
    touch-action: manipulation;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
}
.sort-btn:hover { transform: scale(1.04); }
.sort-btn:active { transform: scale(0.97); }
.sort-btn.old {
    border-color: var(--old);
    background: var(--old-bg);
    color: var(--old);
}
.sort-btn.new {
    border-color: var(--new);
    background: var(--new-bg);
    color: var(--new);
}
.sort-btn .btn-icon { font-size: 2rem; }
.sort-btn.correct { background: #dcfce7; border-color: var(--success); color: #166534; animation: correctPulse 0.4s; }
.sort-btn.wrong { animation: wobble 0.4s; }

@keyframes correctPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.06); } }
@keyframes wobble { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }

.feedback {
    text-align: center;
    font-size: 1rem;
    font-weight: 800;
    padding: 12px;
    border-radius: var(--radius);
    min-height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 14px;
    transition: all 0.3s;
}
.feedback.correct { background: #dcfce7; color: #166534; border: 2px solid var(--success); }
.feedback.wrong { background: #fef2f2; color: #991b1b; border: 2px solid #fca5a5; }
.feedback.neutral { background: var(--card-bg); color: var(--text-light); border: 2px solid var(--border); }

.sorted-area {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}
.sorted-column {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 12px;
    min-height: 100px;
}
.sorted-column h3 {
    font-size: 0.72rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
    text-align: center;
    padding: 4px;
    border-radius: 8px;
}
.sorted-column.old h3 { background: var(--old-bg); color: var(--old); }
.sorted-column.new h3 { background: var(--new-bg); color: var(--new); }
.sorted-items { display: flex; flex-direction: column; gap: 4px; }
.sorted-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 8px;
    border-radius: 8px;
    font-size: 0.72rem;
    font-weight: 700;
    animation: popIn 0.3s ease;
}
.sorted-chip.old { background: var(--old-bg); color: var(--old); }
.sorted-chip.new { background: var(--new-bg); color: var(--new); }
.sorted-chip .chip-icon { font-size: 1rem; }

.complete-msg {
    text-align: center;
    padding: 16px;
    background: #dcfce7;
    border: 3px solid var(--success);
    border-radius: var(--radius);
    font-size: 1.1rem;
    font-weight: 900;
    color: #166534;
    display: none;
    animation: popIn 0.4s ease;
    margin-bottom: 14px;
}

@keyframes popIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }

.celebration { position: fixed; inset: 0; pointer-events: none; z-index: 1000; }
.confetti { position: absolute; border-radius: 2px; animation: confettiFall linear forwards; }
@keyframes confettiFall { 0% { opacity:1; transform: translateY(0) rotate(0); } 100% { opacity:0; transform: translateY(100vh) rotate(720deg) scale(0.3); } }

@media (max-width: 400px) {
    .sort-btn { padding: 14px; font-size: 0.95rem; }
    .sort-btn .btn-icon { font-size: 1.5rem; }
}
</style>
</head>
<body>

<div class="header">
    <h1>Old and New Sort</h1>
    <p>Is it from long ago or from today?</p>
</div>

<div class="main">
    <div class="score-bar">
        <span id="progressLabel" style="color:var(--old);">Item 1 of 12</span>
        <span id="scoreLabel" style="color:var(--success);">Score: 0</span>
    </div>

    <div class="item-display" id="itemDisplay">
        <span class="item-icon" id="itemIcon"></span>
        <div class="item-name" id="itemName"></div>
        <div class="item-hint" id="itemHint"></div>
    </div>

    <div class="sort-buttons">
        <button class="sort-btn old" id="oldBtn">
            <span class="btn-icon">&#x1F3DA;&#xFE0F;</span>
            Long Ago
        </button>
        <button class="sort-btn new" id="newBtn">
            <span class="btn-icon">&#x2728;</span>
            Today
        </button>
    </div>

    <div class="feedback neutral" id="feedback">Which group does this belong to?</div>

    <div class="complete-msg" id="completeMsg"></div>

    <div class="sorted-area">
        <div class="sorted-column old">
            <h3>Long Ago</h3>
            <div class="sorted-items" id="sortedOld"></div>
        </div>
        <div class="sorted-column new">
            <h3>Today</h3>
            <div class="sorted-items" id="sortedNew"></div>
        </div>
    </div>
</div>

<div class="celebration" id="celebration"></div>

<script>
const ITEMS = [
    { icon: '&#x1F3A9;', name: 'Top Hat', era: 'old', hint: 'People wore these fancy hats long ago' },
    { icon: '&#x1F4F1;', name: 'Smartphone', era: 'new', hint: 'We use these every day to call and text' },
    { icon: '&#x1F56F;&#xFE0F;', name: 'Candle', era: 'old', hint: 'This was used to light rooms before electricity' },
    { icon: '&#x1F4BB;', name: 'Laptop Computer', era: 'new', hint: 'We use these at school and at home' },
    { icon: '&#x1F40E;', name: 'Horse and Cart', era: 'old', hint: 'This is how people used to travel around' },
    { icon: '&#x1F697;', name: 'Modern Car', era: 'new', hint: 'Families drive these to school and the shops' },
    { icon: '&#x1F4DC;', name: 'Scroll', era: 'old', hint: 'People wrote on these before books were invented' },
    { icon: '&#x1F4FA;', name: 'Television', era: 'new', hint: 'We watch programmes and films on this' },
    { icon: '&#x2694;&#xFE0F;', name: 'Sword', era: 'old', hint: 'Knights and warriors fought with these' },
    { icon: '&#x1F6F8;', name: 'Space Rocket', era: 'new', hint: 'These take astronauts into space' },
    { icon: '&#x1F3F0;', name: 'Castle', era: 'old', hint: 'Kings and queens lived in these stone buildings' },
    { icon: '&#x1F3E0;', name: 'Modern House', era: 'new', hint: 'Most families live in houses like this today' }
];

let shuffled = [];
let currentIdx = 0;
let score = 0;

function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function startGame() {
    shuffled = shuffle(ITEMS);
    currentIdx = 0;
    score = 0;
    document.getElementById('sortedOld').innerHTML = '';
    document.getElementById('sortedNew').innerHTML = '';
    document.getElementById('completeMsg').style.display = 'none';
    loadItem();
}

function loadItem() {
    if (currentIdx >= shuffled.length) {
        endGame();
        return;
    }
    const item = shuffled[currentIdx];
    document.getElementById('itemIcon').innerHTML = item.icon;
    document.getElementById('itemName').textContent = item.name;
    document.getElementById('itemHint').textContent = item.hint;
    document.getElementById('progressLabel').textContent = `Item ${currentIdx + 1} of ${shuffled.length}`;
    document.getElementById('scoreLabel').textContent = `Score: ${score}`;
    document.getElementById('feedback').className = 'feedback neutral';
    document.getElementById('feedback').textContent = 'Which group does this belong to?';

    document.getElementById('oldBtn').classList.remove('correct', 'wrong');
    document.getElementById('newBtn').classList.remove('correct', 'wrong');
    document.getElementById('oldBtn').disabled = false;
    document.getElementById('newBtn').disabled = false;
}

function checkAnswer(picked) {
    const item = shuffled[currentIdx];
    const fb = document.getElementById('feedback');
    const oldBtn = document.getElementById('oldBtn');
    const newBtn = document.getElementById('newBtn');

    oldBtn.disabled = true;
    newBtn.disabled = true;

    if (picked === item.era) {
        score++;
        const btn = picked === 'old' ? oldBtn : newBtn;
        btn.classList.add('correct');
        fb.className = 'feedback correct';
        fb.textContent = '\u2705 Correct! ' + item.name + ' is from ' + (picked === 'old' ? 'long ago' : 'today') + '!';
        spawnMini();
    } else {
        const btn = picked === 'old' ? oldBtn : newBtn;
        btn.classList.add('wrong');
        const correctBtn = item.era === 'old' ? oldBtn : newBtn;
        correctBtn.classList.add('correct');
        fb.className = 'feedback wrong';
        fb.textContent = '\u274C ' + item.name + ' is actually from ' + (item.era === 'old' ? 'long ago' : 'today') + '!';
    }

    // Add to sorted column
    const chip = document.createElement('div');
    chip.className = 'sorted-chip ' + item.era;
    chip.innerHTML = `<span class="chip-icon">${item.icon}</span>${item.name}`;
    document.getElementById(item.era === 'old' ? 'sortedOld' : 'sortedNew').appendChild(chip);

    setTimeout(() => {
        currentIdx++;
        loadItem();
    }, 1500);
}

function endGame() {
    document.getElementById('itemDisplay').style.display = 'none';
    document.querySelector('.sort-buttons').style.display = 'none';
    document.getElementById('feedback').style.display = 'none';
    const msg = document.getElementById('completeMsg');
    msg.style.display = 'block';
    msg.innerHTML = `&#x1F389; You scored ${score} out of ${shuffled.length}! Great sorting!`;
    celebrate();
}

document.getElementById('oldBtn').addEventListener('click', () => checkAnswer('old'));
document.getElementById('newBtn').addEventListener('click', () => checkAnswer('new'));

function spawnMini() {
    const container = document.getElementById('celebration');
    const colours = ['#92400e','#d97706','#f59e0b','#7c3aed','#22c55e'];
    for (let i = 0; i < 8; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.style.cssText = `left:${Math.random()*100}vw;top:-10px;background:${colours[Math.floor(Math.random()*colours.length)]};width:${5+Math.random()*6}px;height:${5+Math.random()*6}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${1+Math.random()*1.5}s;animation-delay:${Math.random()*0.3}s;`;
        container.appendChild(el);
        setTimeout(() => el.remove(), 3000);
    }
}

function celebrate() {
    const container = document.getElementById('celebration');
    const colours = ['#92400e','#d97706','#f59e0b','#7c3aed','#22c55e','#ec4899','#3b82f6'];
    for (let i = 0; i < 35; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.style.cssText = `left:${Math.random()*100}vw;top:-12px;background:${colours[Math.floor(Math.random()*colours.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*0.5}s;`;
        container.appendChild(el);
        setTimeout(() => el.remove(), 4500);
    }
}

startGame();
</script>
</body>
</html>
