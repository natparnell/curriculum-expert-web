<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animal Names</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#faf5ff;--card-bg:#fff;--text:#3b0764;--text-light:#7c3aed;--accent:#8b5cf6;--accent-light:#f5f3ff;--border:#ddd6fe;--shadow:0 4px 16px rgba(60,7,100,.1);--shadow-lg:0 8px 32px rgba(60,7,100,.16);--radius:18px;--success:#22c55e}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh;user-select:none;-webkit-user-select:none}
.header{background:linear-gradient(135deg,#8b5cf6,#a78bfa,#c4b5fd);color:#fff;padding:16px 20px;text-align:center;box-shadow:var(--shadow)}
.header h1{font-size:1.5rem;font-weight:900;text-shadow:2px 2px 0 rgba(0,0,0,.1)}
.header p{font-size:.82rem;opacity:.9;font-weight:600;margin-top:2px}
.main{max-width:560px;margin:0 auto;padding:16px}

.lang-bar{display:flex;gap:8px;justify-content:center;margin-bottom:14px}
.lang-btn{padding:8px 16px;border:3px solid transparent;border-radius:14px;background:var(--card-bg);font-family:'Inter',sans-serif;font-size:.78rem;font-weight:700;cursor:pointer;transition:all .25s;box-shadow:var(--shadow);display:flex;align-items:center;gap:6px}
.lang-btn:hover{transform:scale(1.05)}
.lang-btn.active{border-color:var(--accent);background:var(--accent-light)}

.score-bar{display:flex;justify-content:space-between;padding:8px 14px;background:var(--card-bg);border-radius:10px;box-shadow:var(--shadow);margin-bottom:14px;font-size:.82rem;font-weight:700}

.game-area{text-align:center;margin-bottom:14px}
.animal-display{font-size:5rem;margin-bottom:8px;display:block}
.animal-english{font-size:1rem;font-weight:700;color:var(--text-light);margin-bottom:14px}

.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.option-btn{padding:14px 10px;border:3px solid var(--border);border-radius:14px;background:var(--card-bg);font-family:'Inter',sans-serif;font-size:1rem;font-weight:800;cursor:pointer;transition:all .25s;box-shadow:var(--shadow);touch-action:manipulation}
.option-btn:hover{transform:scale(1.04);border-color:var(--accent)}
.option-btn.correct{border-color:var(--success);background:#dcfce7;color:#166534}
.option-btn.wrong{border-color:#ef4444;background:#fef2f2;color:#991b1b;animation:wobble .4s}
.option-btn .o-pron{font-size:.68rem;color:var(--text-light);font-style:italic;font-weight:600;margin-top:2px;display:block}

.feedback{text-align:center;font-size:1rem;font-weight:800;padding:12px;border-radius:var(--radius);display:none;animation:popIn .3s ease;margin-bottom:12px}
.feedback.show{display:block}
.feedback.win{background:#dcfce7;color:#166534;border:2px solid var(--success)}
.feedback.try{background:#fef2f2;color:#991b1b;border:2px solid #fca5a5}

.complete-msg{text-align:center;padding:16px;background:#dcfce7;border:3px solid var(--success);border-radius:var(--radius);font-size:1.1rem;font-weight:900;color:#166534;display:none;animation:popIn .4s ease}

@keyframes popIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
@keyframes wobble{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.celebration{position:fixed;inset:0;pointer-events:none;z-index:1000}
.confetti{position:absolute;border-radius:2px;animation:confettiFall linear forwards}
@keyframes confettiFall{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(100vh) rotate(720deg) scale(.3)}}
</style>
</head>
<body>
<div class="header"><h1>Animal Names</h1><p>Match animals to their names in different languages!</p></div>
<div class="main">
<div class="lang-bar" id="langBar">
<button class="lang-btn active" data-lang="french">&#x1F1EB;&#x1F1F7; French</button>
<button class="lang-btn" data-lang="spanish">&#x1F1EA;&#x1F1F8; Spanish</button>
<button class="lang-btn" data-lang="german">&#x1F1E9;&#x1F1EA; German</button>
</div>
<div class="score-bar"><span id="scoreLabel" style="color:var(--success)">Score: 0</span><span id="roundLabel" style="color:var(--text-light)">Round 1/8</span></div>
<div class="game-area"><span class="animal-display" id="animalIcon"></span><div class="animal-english" id="animalEnglish"></div></div>
<div class="options-grid" id="optionsGrid"></div>
<div class="feedback" id="feedback"></div>
<div class="complete-msg" id="completeMsg"></div>
</div>
<div class="celebration" id="celebration"></div>
<script>
const ANIMALS={
french:[
{icon:'&#x1F431;',english:'Cat',word:'le chat',pron:'luh sha'},
{icon:'&#x1F436;',english:'Dog',word:'le chien',pron:'luh shee-EN'},
{icon:'&#x1F407;',english:'Rabbit',word:'le lapin',pron:'luh la-PAN'},
{icon:'&#x1F41F;',english:'Fish',word:'le poisson',pron:'luh pwa-SON'},
{icon:'&#x1F426;',english:'Bird',word:'l\'oiseau',pron:'lwa-ZOH'},
{icon:'&#x1F42D;',english:'Mouse',word:'la souris',pron:'la soo-REE'},
{icon:'&#x1F434;',english:'Horse',word:'le cheval',pron:'luh shuh-VAL'},
{icon:'&#x1F404;',english:'Cow',word:'la vache',pron:'la vash'}
],
spanish:[
{icon:'&#x1F431;',english:'Cat',word:'el gato',pron:'el GAH-toh'},
{icon:'&#x1F436;',english:'Dog',word:'el perro',pron:'el PEH-roh'},
{icon:'&#x1F407;',english:'Rabbit',word:'el conejo',pron:'el koh-NEH-ho'},
{icon:'&#x1F41F;',english:'Fish',word:'el pez',pron:'el peth'},
{icon:'&#x1F426;',english:'Bird',word:'el p&#xE1;jaro',pron:'el PAH-ha-roh'},
{icon:'&#x1F42D;',english:'Mouse',word:'el rat&#xF3;n',pron:'el rah-TON'},
{icon:'&#x1F434;',english:'Horse',word:'el caballo',pron:'el kah-BAH-yoh'},
{icon:'&#x1F404;',english:'Cow',word:'la vaca',pron:'la BAH-kah'}
],
german:[
{icon:'&#x1F431;',english:'Cat',word:'die Katze',pron:'dee KAT-suh'},
{icon:'&#x1F436;',english:'Dog',word:'der Hund',pron:'dair hoont'},
{icon:'&#x1F407;',english:'Rabbit',word:'das Kaninchen',pron:'das ka-NEEN-shen'},
{icon:'&#x1F41F;',english:'Fish',word:'der Fisch',pron:'dair fish'},
{icon:'&#x1F426;',english:'Bird',word:'der Vogel',pron:'dair FOH-gel'},
{icon:'&#x1F42D;',english:'Mouse',word:'die Maus',pron:'dee mows'},
{icon:'&#x1F434;',english:'Horse',word:'das Pferd',pron:'das pfairt'},
{icon:'&#x1F404;',english:'Cow',word:'die Kuh',pron:'dee koo'}
]
};

let lang='french',score=0,round=0,shuffled=[];

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

document.querySelectorAll('.lang-btn').forEach(btn=>{
btn.addEventListener('click',()=>{
lang=btn.dataset.lang;
document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
score=0;round=0;
startGame();
});
});

function startGame(){
shuffled=shuffle(ANIMALS[lang]);
document.getElementById('completeMsg').style.display='none';
loadRound();
}

function loadRound(){
if(round>=shuffled.length){endGame();return;}
const animal=shuffled[round];
document.getElementById('animalIcon').innerHTML=animal.icon;
document.getElementById('animalEnglish').textContent=animal.english;
document.getElementById('roundLabel').textContent=`Round ${round+1}/${shuffled.length}`;
document.getElementById('scoreLabel').textContent=`Score: ${score}`;
document.getElementById('feedback').className='feedback';

const others=ANIMALS[lang].filter(a=>a.word!==animal.word);
const wrongOpts=shuffle(others).slice(0,3);
const options=shuffle([animal,...wrongOpts]);

const grid=document.getElementById('optionsGrid');
grid.innerHTML='';
options.forEach(opt=>{
const btn=document.createElement('button');
btn.className='option-btn';
btn.innerHTML=`${opt.word}<span class="o-pron">${opt.pron}</span>`;
btn.addEventListener('click',()=>checkAnswer(opt.word,animal.word,btn));
grid.appendChild(btn);
});
}

function checkAnswer(picked,correct,btn){
const fb=document.getElementById('feedback');
document.querySelectorAll('.option-btn').forEach(b=>b.style.pointerEvents='none');

if(picked===correct){
btn.classList.add('correct');
fb.className='feedback show win';
fb.textContent='\u2705 Correct!';
score++;
spawnMini();
}else{
btn.classList.add('wrong');
document.querySelectorAll('.option-btn').forEach(b=>{if(b.innerHTML.includes(correct))b.classList.add('correct');});
fb.className='feedback show try';
fb.textContent='\u274C The answer is: '+correct;
}
setTimeout(()=>{round++;loadRound();},1500);
}

function endGame(){
document.getElementById('optionsGrid').innerHTML='';
document.getElementById('animalIcon').innerHTML='&#x1F389;';
document.getElementById('animalEnglish').textContent='';
const msg=document.getElementById('completeMsg');
msg.style.display='block';
msg.innerHTML='&#x2B50; You scored '+score+' out of '+shuffled.length+'! Great job!';
celebrate();
}

function spawnMini(){const c=document.getElementById('celebration');const cols=['#8b5cf6','#a78bfa','#22c55e','#f59e0b','#ec4899'];for(let i=0;i<8;i++){const e=document.createElement('div');e.className='confetti';e.style.cssText=`left:${Math.random()*100}vw;top:-10px;background:${cols[Math.floor(Math.random()*cols.length)]};width:${5+Math.random()*6}px;height:${5+Math.random()*6}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1+Math.random()*1.5}s;animation-delay:${Math.random()*.3}s;`;c.appendChild(e);setTimeout(()=>e.remove(),3000);}}
function celebrate(){const c=document.getElementById('celebration');const cols=['#8b5cf6','#a78bfa','#22c55e','#f59e0b','#ec4899','#3b82f6'];for(let i=0;i<30;i++){const e=document.createElement('div');e.className='confetti';e.style.cssText=`left:${Math.random()*100}vw;top:-12px;background:${cols[Math.floor(Math.random()*cols.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*.5}s;`;c.appendChild(e);setTimeout(()=>e.remove(),4500);}}

startGame();
</script>
</body>
</html>
