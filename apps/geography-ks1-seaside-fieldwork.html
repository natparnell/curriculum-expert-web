<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seaside Fieldwork</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #f0f9ff;
    --card-bg: #ffffff;
    --text: #0c4a6e;
    --text-light: #0369a1;
    --sand: #fbbf24;
    --sand-bg: #fef3c7;
    --sea: #0ea5e9;
    --sea-bg: #e0f2fe;
    --human: #f97316;
    --physical: #22c55e;
    --border: #bae6fd;
    --shadow: 0 4px 16px rgba(12,74,110,0.10);
    --shadow-lg: 0 8px 32px rgba(12,74,110,0.16);
    --radius: 18px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
    user-select: none;
    -webkit-user-select: none;
}

.header {
    background: linear-gradient(135deg, #0ea5e9, #38bdf8, #fbbf24);
    color: white;
    padding: 16px 20px;
    text-align: center;
    box-shadow: var(--shadow);
}
.header h1 { font-size: 1.5rem; font-weight: 900; text-shadow: 2px 2px 0 rgba(0,0,0,0.1); }
.header p { font-size: 0.82rem; opacity: 0.9; font-weight: 600; margin-top: 2px; }

.main { max-width: 600px; margin: 0 auto; padding: 16px; }

.instruction {
    text-align: center;
    font-size: 0.95rem;
    font-weight: 700;
    padding: 10px;
    background: var(--sea-bg);
    border-radius: 14px;
    margin-bottom: 14px;
    border: 2px solid var(--border);
}

/* Seaside scene */
.scene {
    position: relative;
    width: 100%;
    height: 280px;
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 14px;
    box-shadow: var(--shadow-lg);
    background: linear-gradient(180deg, #7dd3fc 0%, #bae6fd 40%, #fef3c7 40%, #fde68a 60%, #0ea5e9 60%, #0284c7 100%);
}

.scene-item {
    position: absolute;
    font-size: 2rem;
    cursor: pointer;
    transition: transform 0.2s;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
    z-index: 2;
}
.scene-item:hover { transform: scale(1.2); z-index: 5; }
.scene-item.found { animation: bounce 0.4s; }
.scene-item.found::after {
    content: '\2705';
    position: absolute;
    top: -8px;
    right: -8px;
    font-size: 0.8rem;
}

@keyframes bounce { 0%,100% { transform: scale(1); } 50% { transform: scale(1.3); } }

/* Tally chart */
.tally-section {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 16px;
    margin-bottom: 14px;
}
.tally-section h3 { font-size: 0.85rem; font-weight: 800; margin-bottom: 10px; }

.tally-table {
    width: 100%;
    border-collapse: collapse;
}
.tally-table th, .tally-table td {
    padding: 8px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    font-size: 0.82rem;
}
.tally-table th {
    font-size: 0.68rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-light);
}
.tally-table .type-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 0.65rem;
    font-weight: 700;
    color: white;
}
.tally-table .human .type-badge { background: var(--human); }
.tally-table .physical .type-badge { background: var(--physical); }
.tally-marks { font-family: 'Inter', sans-serif; font-weight: 900; font-size: 1.1rem; color: var(--text); letter-spacing: 2px; }
.count-num { font-weight: 800; color: var(--sea); }

/* Legend */
.legend {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 14px;
}
.legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.78rem;
    font-weight: 700;
}
.legend-dot { width: 12px; height: 12px; border-radius: 50%; }

.score-bar {
    display: flex;
    justify-content: space-between;
    padding: 10px 14px;
    background: var(--card-bg);
    border-radius: 12px;
    box-shadow: var(--shadow);
    margin-bottom: 14px;
    font-size: 0.85rem;
    font-weight: 700;
}

.complete-msg {
    text-align: center;
    padding: 16px;
    background: #dcfce7;
    border: 3px solid #22c55e;
    border-radius: var(--radius);
    font-size: 1.1rem;
    font-weight: 900;
    color: #166534;
    display: none;
    animation: popIn 0.4s ease;
}

@keyframes popIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }

.celebration { position: fixed; inset: 0; pointer-events: none; z-index: 1000; }
.confetti { position: absolute; border-radius: 2px; animation: confettiFall linear forwards; }
@keyframes confettiFall { 0% { opacity:1; transform: translateY(0) rotate(0); } 100% { opacity:0; transform: translateY(100vh) rotate(720deg) scale(0.3); } }

@media (max-width: 420px) {
    .scene { height: 220px; }
    .scene-item { font-size: 1.6rem; }
}
</style>
</head>
<body>

<div class="header">
    <h1>Seaside Fieldwork</h1>
    <p>Explore the seaside and record what you find!</p>
</div>

<div class="main">
    <div class="instruction" id="instruction">Tap things you can see at the seaside! Is each one human or physical?</div>

    <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--human);"></div> Human (made by people)</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--physical);"></div> Physical (natural)</div>
    </div>

    <div class="scene" id="scene"></div>

    <div class="score-bar">
        <span id="foundLabel" style="color:var(--sea);">Found: 0/14</span>
        <span id="typeLabel" style="color:var(--text-light);">Tap items on the scene!</span>
    </div>

    <div class="tally-section">
        <h3>My Seaside Tally Chart</h3>
        <table class="tally-table">
            <thead>
                <tr><th>Feature</th><th>Type</th><th>Tally</th></tr>
            </thead>
            <tbody id="tallyBody"></tbody>
        </table>
    </div>

    <div class="complete-msg" id="completeMsg"></div>
</div>

<div class="celebration" id="celebration"></div>

<script>
const ITEMS = [
    // Physical features (natural)
    { icon: '\u{1F30A}', name: 'Waves', type: 'physical', x: 75, y: 75, desc: 'Waves crash onto the shore' },
    { icon: '\u{1FAA8}', name: 'Rocks', type: 'physical', x: 88, y: 50, desc: 'Rocks are found on the beach' },
    { icon: '\u{1F41A}', name: 'Shells', type: 'physical', x: 35, y: 52, desc: 'Shells wash up from the sea' },
    { icon: '\u{1F980}', name: 'Crab', type: 'physical', x: 70, y: 48, desc: 'Crabs live in rock pools' },
    { icon: '\u2600\uFE0F', name: 'Sun', type: 'physical', x: 15, y: 8, desc: 'The sun shines in the sky' },
    { icon: '\u2601\uFE0F', name: 'Clouds', type: 'physical', x: 55, y: 5, desc: 'Clouds float across the sky' },
    { icon: '\u{1F426}', name: 'Seagull', type: 'physical', x: 40, y: 15, desc: 'Seagulls fly over the beach' },
    { icon: '\u{1F3D6}\uFE0F', name: 'Sand', type: 'physical', x: 50, y: 48, desc: 'Sandy beach stretches along the coast' },
    // Human features (made by people)
    { icon: '\u{1F3D7}\uFE0F', name: 'Pier', type: 'human', x: 8, y: 55, desc: 'The pier goes out over the sea' },
    { icon: '\u26F5', name: 'Boat', type: 'human', x: 25, y: 70, desc: 'Boats sail on the water' },
    { icon: '\u{1F3E0}', name: 'Beach Hut', type: 'human', x: 90, y: 30, desc: 'Colourful beach huts line the shore' },
    { icon: '\u{1F9F1}', name: 'Sea Wall', type: 'human', x: 15, y: 42, desc: 'The sea wall protects the land' },
    { icon: '\u{1F6A9}', name: 'Flag', type: 'human', x: 58, y: 35, desc: 'Flags mark safe swimming areas' },
    { icon: '\u{1F6A3}', name: 'Steps', type: 'human', x: 45, y: 38, desc: 'Steps lead down to the beach' }
];

let found = new Set();
const scene = document.getElementById('scene');
const tallyBody = document.getElementById('tallyBody');

// Place items on scene
ITEMS.forEach((item, i) => {
    const el = document.createElement('div');
    el.className = 'scene-item';
    el.style.left = item.x + '%';
    el.style.top = item.y + '%';
    el.textContent = item.icon;
    el.title = item.name;
    el.addEventListener('click', () => findItem(i, el));
    scene.appendChild(el);
});

function findItem(idx, el) {
    if (found.has(idx)) return;
    found.add(idx);
    el.classList.add('found');

    const item = ITEMS[idx];
    document.getElementById('foundLabel').textContent = `Found: ${found.size}/${ITEMS.length}`;
    document.getElementById('typeLabel').textContent = `${item.name}: ${item.type === 'human' ? 'Human feature' : 'Physical feature'}`;

    renderTally();
    spawnMini();

    if (found.size === ITEMS.length) {
        setTimeout(() => {
            document.getElementById('completeMsg').style.display = 'block';
            const physCount = ITEMS.filter((it, i) => found.has(i) && it.type === 'physical').length;
            const humCount = ITEMS.filter((it, i) => found.has(i) && it.type === 'human').length;
            document.getElementById('completeMsg').textContent = `\u{1F389} You found everything! ${physCount} physical features and ${humCount} human features!`;
            celebrate();
        }, 400);
    }
}

function renderTally() {
    tallyBody.innerHTML = '';
    const foundItems = ITEMS.filter((_, i) => found.has(i));
    foundItems.forEach(item => {
        const tr = document.createElement('tr');
        tr.className = item.type;
        tr.innerHTML = `
            <td>${item.icon} ${item.name}</td>
            <td><span class="type-badge">${item.type === 'human' ? 'Human' : 'Physical'}</span></td>
            <td class="tally-marks">|</td>
        `;
        tallyBody.appendChild(tr);
    });

    // Summary row
    if (foundItems.length > 0) {
        const physCount = foundItems.filter(i => i.type === 'physical').length;
        const humCount = foundItems.filter(i => i.type === 'human').length;
        const sumRow = document.createElement('tr');
        sumRow.innerHTML = `<td colspan="2" style="font-weight:800;">Total: Physical ${physCount}, Human ${humCount}</td><td class="count-num">${foundItems.length}</td>`;
        tallyBody.appendChild(sumRow);
    }
}

function spawnMini() {
    const container = document.getElementById('celebration');
    const colours = ['#0ea5e9','#fbbf24','#22c55e','#f97316','#38bdf8'];
    for (let i = 0; i < 8; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.style.cssText = `left:${Math.random()*100}vw;top:-10px;background:${colours[Math.floor(Math.random()*colours.length)]};width:${5+Math.random()*6}px;height:${5+Math.random()*6}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${1+Math.random()*1.5}s;animation-delay:${Math.random()*0.3}s;`;
        container.appendChild(el);
        setTimeout(() => el.remove(), 3000);
    }
}

function celebrate() {
    const container = document.getElementById('celebration');
    const colours = ['#0ea5e9','#fbbf24','#22c55e','#f97316','#ec4899','#a855f7'];
    for (let i = 0; i < 35; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.style.cssText = `left:${Math.random()*100}vw;top:-12px;background:${colours[Math.floor(Math.random()*colours.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*0.5}s;`;
        container.appendChild(el);
        setTimeout(() => el.remove(), 4500);
    }
}
</script>
</body>
</html>
