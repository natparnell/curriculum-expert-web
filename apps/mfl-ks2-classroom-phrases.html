<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classroom Phrases</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f3ff;--card:#fff;--text:#3b0764;--text2:#7c3aed;--accent:#7c3aed;--accent-bg:#ede9fe;--french:#2563eb;--spanish:#dc2626;--german:#f59e0b;--border:#ddd6fe;--shadow:0 4px 16px rgba(60,7,100,.08);--radius:14px;--success:#22c55e}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
.header{background:linear-gradient(135deg,#7c3aed,#a78bfa);color:#fff;padding:16px 20px;text-align:center}
.header h1{font-size:1.4rem;font-weight:900}
.header p{font-size:.8rem;opacity:.9;font-weight:600;margin-top:2px}
.main{max-width:640px;margin:0 auto;padding:16px}
.lang-bar{display:flex;gap:6px;margin-bottom:14px;border-radius:10px;overflow:hidden;border:2px solid var(--border)}
.lang-btn{flex:1;padding:10px;border:none;background:var(--card);font-family:'Inter',sans-serif;font-size:.78rem;font-weight:700;cursor:pointer;color:var(--text2);transition:all .2s}
.lang-btn.active{color:#fff}
.lang-btn[data-l="french"].active{background:var(--french)}
.lang-btn[data-l="spanish"].active{background:var(--spanish)}
.lang-btn[data-l="german"].active{background:var(--german)}

.mode-bar{display:flex;gap:0;margin-bottom:14px;border-radius:8px;overflow:hidden;border:2px solid var(--border)}
.mode-btn{flex:1;padding:8px;border:none;background:var(--card);font-family:'Inter',sans-serif;font-size:.72rem;font-weight:700;cursor:pointer;color:var(--text2);transition:all .2s}
.mode-btn.active{background:var(--accent);color:#fff}

.phrase-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.phrase-card{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--card);border:2px solid var(--border);border-radius:12px;cursor:pointer;transition:all .2s;box-shadow:var(--shadow)}
.phrase-card:hover{border-color:var(--accent);transform:translateX(4px)}
.phrase-card.active{border-color:var(--accent);background:var(--accent-bg)}
.phrase-card .p-icon{font-size:1.6rem;flex-shrink:0}
.phrase-card .p-foreign{font-size:.88rem;font-weight:700}
.phrase-card .p-english{font-size:.72rem;color:var(--text2)}
.phrase-card .p-pron{font-size:.65rem;color:#a78bfa;font-style:italic}

.quiz-area{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:16px}
.quiz-area h3{font-size:.82rem;font-weight:800;color:var(--accent);margin-bottom:10px}
.quiz-q{font-size:1rem;font-weight:700;margin-bottom:10px;text-align:center}
.quiz-q .q-phrase{font-size:1.2rem;color:var(--accent);display:block;margin-top:4px}
.quiz-options{display:flex;flex-direction:column;gap:8px}
.quiz-opt{padding:10px 14px;border:2px solid var(--border);border-radius:10px;background:var(--bg);font-family:'Inter',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s;text-align:left}
.quiz-opt:hover{border-color:var(--accent)}
.quiz-opt.correct{border-color:var(--success);background:#dcfce7;color:#166534}
.quiz-opt.wrong{border-color:#ef4444;background:#fef2f2;animation:wobble .4s}
.quiz-fb{text-align:center;font-size:.85rem;font-weight:700;padding:8px;border-radius:8px;margin-top:8px;display:none}
.quiz-fb.show{display:block}
.quiz-fb.right{background:#dcfce7;color:#166534}
.quiz-fb.wrong-fb{background:#fef2f2;color:#991b1b}
.score-bar{display:flex;justify-content:space-between;padding:8px 14px;background:var(--card);border-radius:10px;box-shadow:var(--shadow);margin-bottom:14px;font-size:.82rem;font-weight:700}

@keyframes wobble{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.celebration{position:fixed;inset:0;pointer-events:none;z-index:1000}
.confetti{position:absolute;border-radius:2px;animation:confettiFall linear forwards}
@keyframes confettiFall{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(100vh) rotate(720deg) scale(.3)}}
</style>
</head>
<body>
<div class="header"><h1>Classroom Phrases</h1><p>Learn essential classroom instructions!</p></div>
<div class="main">
<div class="lang-bar">
<button class="lang-btn active" data-l="french">&#x1F1EB;&#x1F1F7; French</button>
<button class="lang-btn" data-l="spanish">&#x1F1EA;&#x1F1F8; Spanish</button>
<button class="lang-btn" data-l="german">&#x1F1E9;&#x1F1EA; German</button>
</div>
<div class="mode-bar">
<button class="mode-btn active" data-m="learn">Learn</button>
<button class="mode-btn" data-m="quiz">Quiz</button>
</div>
<div class="score-bar"><span id="scoreLabel" style="color:var(--success)">Score: 0</span><span id="modeLabel" style="color:var(--text2)">Tap a phrase to explore</span></div>
<div id="learnView"></div>
<div id="quizView" style="display:none"></div>
</div>
<div class="celebration" id="celebration"></div>
<script>
const PHRASES={
french:[
{icon:'&#x1F44B;',foreign:'Bonjour!',english:'Hello!',pron:'bon-ZHOOR'},
{icon:'&#x1F4D6;',foreign:'Ouvrez vos livres',english:'Open your books',pron:'oo-VRAY voh LEEV-ruh'},
{icon:'&#x270D;&#xFE0F;',foreign:'&#xC9;crivez',english:'Write',pron:'ay-kree-VAY'},
{icon:'&#x1F442;',foreign:'&#xC9;coutez',english:'Listen',pron:'ay-koo-TAY'},
{icon:'&#x1F4AC;',foreign:'R&#xE9;p&#xE9;tez',english:'Repeat',pron:'ray-pay-TAY'},
{icon:'&#x2753;',foreign:'Vous comprenez?',english:'Do you understand?',pron:'voo kom-pruh-NAY'},
{icon:'&#x270B;',foreign:'Levez la main',english:'Raise your hand',pron:'luh-VAY la MAN'},
{icon:'&#x1F6AA;',foreign:'Asseyez-vous',english:'Sit down',pron:'ah-say-YAY voo'},
{icon:'&#x1F64F;',foreign:'S\'il vous pla&#xEE;t',english:'Please',pron:'seel voo PLAY'},
{icon:'&#x2705;',foreign:'Tr&#xE8;s bien!',english:'Very good!',pron:'tray bee-EN'}
],
spanish:[
{icon:'&#x1F44B;',foreign:'&#xA1;Buenos d&#xED;as!',english:'Good morning!',pron:'BWAY-nos DEE-as'},
{icon:'&#x1F4D6;',foreign:'Abrid los libros',english:'Open your books',pron:'ah-BREED los LEE-bros'},
{icon:'&#x270D;&#xFE0F;',foreign:'Escribid',english:'Write',pron:'es-kree-BEED'},
{icon:'&#x1F442;',foreign:'Escuchad',english:'Listen',pron:'es-koo-CHAD'},
{icon:'&#x1F4AC;',foreign:'Repetid',english:'Repeat',pron:'reh-peh-TEED'},
{icon:'&#x2753;',foreign:'&#xBF;Entend&#xE9;is?',english:'Do you understand?',pron:'en-ten-DAYS'},
{icon:'&#x270B;',foreign:'Levantad la mano',english:'Raise your hand',pron:'leh-van-TAD la MAH-no'},
{icon:'&#x1F6AA;',foreign:'Sentaos',english:'Sit down',pron:'sen-TAH-os'},
{icon:'&#x1F64F;',foreign:'Por favor',english:'Please',pron:'por fah-VOR'},
{icon:'&#x2705;',foreign:'&#xA1;Muy bien!',english:'Very good!',pron:'mwee bee-EN'}
],
german:[
{icon:'&#x1F44B;',foreign:'Guten Morgen!',english:'Good morning!',pron:'GOO-ten MOR-gen'},
{icon:'&#x1F4D6;',foreign:'&#xD6;ffnet eure B&#xFC;cher',english:'Open your books',pron:'UFF-net OY-ruh BOO-sher'},
{icon:'&#x270D;&#xFE0F;',foreign:'Schreibt',english:'Write',pron:'shrypte'},
{icon:'&#x1F442;',foreign:'H&#xF6;rt zu',english:'Listen',pron:'huhrt tsoo'},
{icon:'&#x1F4AC;',foreign:'Wiederholt',english:'Repeat',pron:'VEE-der-holt'},
{icon:'&#x2753;',foreign:'Versteht ihr?',english:'Do you understand?',pron:'fair-SHTAYT eer'},
{icon:'&#x270B;',foreign:'Hebt die Hand',english:'Raise your hand',pron:'haybt dee hant'},
{icon:'&#x1F6AA;',foreign:'Setzt euch',english:'Sit down',pron:'zetst oysh'},
{icon:'&#x1F64F;',foreign:'Bitte',english:'Please',pron:'BIT-uh'},
{icon:'&#x2705;',foreign:'Sehr gut!',english:'Very good!',pron:'zair goot'}
]
};

let lang='french',mode='learn',score=0,quizIdx=0,quizOrder=[];

document.querySelectorAll('.lang-btn').forEach(b=>b.addEventListener('click',()=>{
lang=b.dataset.l;document.querySelectorAll('.lang-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');
score=0;render();
}));
document.querySelectorAll('.mode-btn').forEach(b=>b.addEventListener('click',()=>{
mode=b.dataset.m;document.querySelectorAll('.mode-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');
score=0;quizIdx=0;render();
}));

function render(){
document.getElementById('scoreLabel').textContent='Score: '+score;
if(mode==='learn'){
document.getElementById('learnView').style.display='block';
document.getElementById('quizView').style.display='none';
document.getElementById('modeLabel').textContent='Tap a phrase to explore';
renderLearn();
}else{
document.getElementById('learnView').style.display='none';
document.getElementById('quizView').style.display='block';
document.getElementById('modeLabel').textContent='Match the phrase!';
quizOrder=shuffle(PHRASES[lang]);
quizIdx=0;
renderQuiz();
}
}

function renderLearn(){
const v=document.getElementById('learnView');
v.innerHTML='<div class="phrase-list">'+PHRASES[lang].map(p=>`<div class="phrase-card"><span class="p-icon">${p.icon}</span><div><div class="p-foreign">${p.foreign}</div><div class="p-english">${p.english}</div><div class="p-pron">${p.pron}</div></div></div>`).join('')+'</div>';
}

function renderQuiz(){
if(quizIdx>=quizOrder.length){
document.getElementById('quizView').innerHTML=`<div style="text-align:center;padding:20px;font-size:1.1rem;font-weight:900;color:#166534;">&#x1F389; You scored ${score}/${quizOrder.length}! Well done!</div>`;
celebrate();return;
}
const p=quizOrder[quizIdx];
const others=PHRASES[lang].filter(x=>x.english!==p.english);
const opts=shuffle([p,...shuffle(others).slice(0,3)]);
document.getElementById('quizView').innerHTML=`<div class="quiz-area"><h3>Question ${quizIdx+1}/${quizOrder.length}</h3><div class="quiz-q">What does this mean?<span class="q-phrase">${p.foreign}</span></div><div class="quiz-options" id="qOpts"></div><div class="quiz-fb" id="qFb"></div></div>`;
const qOpts=document.getElementById('qOpts');
opts.forEach(o=>{
const btn=document.createElement('button');
btn.className='quiz-opt';
btn.textContent=o.english;
btn.addEventListener('click',()=>{
qOpts.querySelectorAll('.quiz-opt').forEach(b=>b.style.pointerEvents='none');
const fb=document.getElementById('qFb');
if(o.english===p.english){btn.classList.add('correct');fb.className='quiz-fb show right';fb.textContent='\u2705 Correct!';score++;spawnMini();}
else{btn.classList.add('wrong');qOpts.querySelectorAll('.quiz-opt').forEach(b=>{if(b.textContent===p.english)b.classList.add('correct');});fb.className='quiz-fb show wrong-fb';fb.textContent='\u274C It means: '+p.english;}
document.getElementById('scoreLabel').textContent='Score: '+score;
setTimeout(()=>{quizIdx++;renderQuiz();},1500);
});
qOpts.appendChild(btn);
});
}

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function spawnMini(){const c=document.getElementById('celebration');const cols=['#7c3aed','#a78bfa','#22c55e','#f59e0b','#ec4899'];for(let i=0;i<8;i++){const e=document.createElement('div');e.className='confetti';e.style.cssText=`left:${Math.random()*100}vw;top:-10px;background:${cols[Math.floor(Math.random()*cols.length)]};width:${5+Math.random()*6}px;height:${5+Math.random()*6}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1+Math.random()*1.5}s;animation-delay:${Math.random()*.3}s;`;c.appendChild(e);setTimeout(()=>e.remove(),3000);}}
function celebrate(){const c=document.getElementById('celebration');const cols=['#7c3aed','#22c55e','#f59e0b','#ec4899','#3b82f6'];for(let i=0;i<30;i++){const e=document.createElement('div');e.className='confetti';e.style.cssText=`left:${Math.random()*100}vw;top:-12px;background:${cols[Math.floor(Math.random()*cols.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*.5}s;`;c.appendChild(e);setTimeout(()=>e.remove(),4500);}}
render();
</script>
</body>
</html>
