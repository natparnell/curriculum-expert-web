<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Continents & Oceans</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #e0f2fe;
    --card-bg: #ffffff;
    --text: #0c4a6e;
    --text-light: #0369a1;
    --land: #22c55e;
    --land-bg: #dcfce7;
    --ocean: #3b82f6;
    --ocean-bg: #dbeafe;
    --border: #bae6fd;
    --shadow: 0 4px 16px rgba(12,74,110,0.10);
    --shadow-lg: 0 8px 32px rgba(12,74,110,0.16);
    --radius: 16px;
    --success: #22c55e;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
    user-select: none;
    -webkit-user-select: none;
}

.header {
    background: linear-gradient(135deg, #0ea5e9, #22c55e);
    color: white;
    padding: 16px 20px;
    text-align: center;
    box-shadow: var(--shadow);
}
.header h1 { font-size: 1.5rem; font-weight: 900; text-shadow: 2px 2px 0 rgba(0,0,0,0.1); }
.header p { font-size: 0.82rem; opacity: 0.9; font-weight: 600; margin-top: 2px; }

.main { max-width: 700px; margin: 0 auto; padding: 16px; }

.mode-tabs {
    display: flex;
    gap: 0;
    margin-bottom: 14px;
    border-radius: 10px;
    overflow: hidden;
    border: 2px solid var(--border);
}
.mode-tab {
    flex: 1;
    padding: 10px;
    border: none;
    background: var(--card-bg);
    font-family: 'Inter', sans-serif;
    font-size: 0.82rem;
    font-weight: 700;
    cursor: pointer;
    color: var(--text-light);
    transition: all 0.2s;
}
.mode-tab.active { background: var(--ocean); color: white; }

.score-bar {
    display: flex;
    justify-content: space-between;
    padding: 8px 14px;
    background: var(--card-bg);
    border-radius: 10px;
    box-shadow: var(--shadow);
    margin-bottom: 14px;
    font-size: 0.82rem;
    font-weight: 700;
}

/* Map area */
.map-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 2/1;
    background: #93c5fd;
    border-radius: var(--radius);
    box-shadow: var(--shadow-lg);
    overflow: hidden;
    margin-bottom: 14px;
    border: 2px solid var(--border);
}

/* Simple world map using positioned divs */
.continent {
    position: absolute;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.25s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.6rem;
    font-weight: 800;
    color: rgba(255,255,255,0.8);
    text-align: center;
    padding: 2px;
}
.continent:hover { transform: scale(1.05); filter: brightness(1.1); z-index: 5; }
.continent.correct { outline: 3px solid #fbbf24; animation: pulse 0.5s; }
.continent.labelled::after {
    content: attr(data-name);
    position: absolute;
    bottom: -18px;
    font-size: 0.55rem;
    font-weight: 800;
    background: white;
    padding: 1px 6px;
    border-radius: 6px;
    color: var(--text);
    white-space: nowrap;
    box-shadow: 0 1px 4px rgba(0,0,0,0.15);
}

.ocean-zone {
    position: absolute;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.55rem;
    font-weight: 700;
    color: rgba(255,255,255,0.4);
    transition: all 0.2s;
    border-radius: 8px;
}
.ocean-zone:hover { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); }
.ocean-zone.labelled { color: rgba(255,255,255,0.8); font-weight: 800; }
.ocean-zone.correct { animation: pulse 0.5s; }

/* Labels bank */
.label-bank {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 14px;
    margin-bottom: 14px;
}
.label-bank h3 {
    font-size: 0.72rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-light);
    margin-bottom: 8px;
}
.labels-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
}
.label-chip {
    padding: 6px 14px;
    border-radius: 50px;
    font-size: 0.78rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    border: 2px solid;
    touch-action: manipulation;
}
.label-chip:hover { transform: scale(1.06); }
.label-chip.land { background: var(--land-bg); border-color: var(--land); color: #166534; }
.label-chip.sea { background: var(--ocean-bg); border-color: var(--ocean); color: #1e40af; }
.label-chip.selected { transform: scale(1.08); box-shadow: var(--shadow-lg); }
.label-chip.land.selected { background: var(--land); color: white; }
.label-chip.sea.selected { background: var(--ocean); color: white; }
.label-chip.used { opacity: 0.3; pointer-events: none; }

.feedback {
    text-align: center;
    font-size: 0.95rem;
    font-weight: 800;
    padding: 12px;
    border-radius: var(--radius);
    display: none;
    animation: popIn 0.3s ease;
    margin-bottom: 12px;
}
.feedback.show { display: block; }
.feedback.win { background: #dcfce7; color: #166534; border: 2px solid #22c55e; }
.feedback.wrong { background: #fef2f2; color: #991b1b; border: 2px solid #fca5a5; }

.info-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 14px;
    display: none;
    animation: popIn 0.3s ease;
}
.info-card.show { display: block; }
.info-card .info-icon { font-size: 2rem; margin-right: 8px; }
.info-card h3 { font-size: 0.95rem; font-weight: 800; margin-bottom: 4px; display: flex; align-items: center; }
.info-card p { font-size: 0.82rem; color: var(--text-light); line-height: 1.5; }

@keyframes popIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }

.celebration { position: fixed; inset: 0; pointer-events: none; z-index: 1000; }
.confetti { position: absolute; border-radius: 2px; animation: confettiFall linear forwards; }
@keyframes confettiFall { 0% { opacity:1; transform: translateY(0) rotate(0); } 100% { opacity:0; transform: translateY(100vh) rotate(720deg) scale(0.3); } }

@media (max-width: 500px) {
    .label-chip { padding: 5px 10px; font-size: 0.7rem; }
    .continent { font-size: 0.5rem; }
}
</style>
</head>
<body>

<div class="header">
    <h1>Continents & Oceans</h1>
    <p>Learn the 7 continents and 5 oceans!</p>
</div>

<div class="main">
    <div class="mode-tabs">
        <button class="mode-tab active" data-mode="learn">Learn</button>
        <button class="mode-tab" data-mode="label">Label Game</button>
    </div>

    <div class="score-bar">
        <span id="scoreLabel" style="color:var(--success);">Labelled: 0/12</span>
        <span id="modeLabel" style="color:var(--text-light);">Tap to explore</span>
    </div>

    <div class="map-wrap" id="mapWrap">
        <!-- Continents (simplified positions) -->
        <div class="continent" data-id="north-america" data-name="North America" style="left:8%;top:15%;width:18%;height:35%;background:#4ade80;border-radius:30% 40% 20% 50%;">N. America</div>
        <div class="continent" data-id="south-america" data-name="South America" style="left:18%;top:52%;width:12%;height:36%;background:#22c55e;border-radius:40% 30% 50% 20%;">S. America</div>
        <div class="continent" data-id="europe" data-name="Europe" style="left:42%;top:12%;width:12%;height:22%;background:#86efac;border-radius:20% 40% 30% 50%;">Europe</div>
        <div class="continent" data-id="africa" data-name="Africa" style="left:40%;top:35%;width:16%;height:42%;background:#16a34a;border-radius:30% 35% 45% 25%;">Africa</div>
        <div class="continent" data-id="asia" data-name="Asia" style="left:55%;top:8%;width:28%;height:40%;background:#4ade80;border-radius:20% 30% 40% 50%;">Asia</div>
        <div class="continent" data-id="australia" data-name="Australasia" style="left:75%;top:55%;width:14%;height:22%;background:#22c55e;border-radius:30% 20% 40% 50%;">Australasia</div>
        <div class="continent" data-id="antarctica" data-name="Antarctica" style="left:25%;top:88%;width:50%;height:10%;background:#e0e7ff;border-radius:50% 50% 0 0;">Antarctica</div>

        <!-- Oceans -->
        <div class="ocean-zone" data-id="atlantic" data-name="Atlantic Ocean" style="left:28%;top:25%;width:14%;height:40%;">Atlantic</div>
        <div class="ocean-zone" data-id="pacific" data-name="Pacific Ocean" style="left:82%;top:20%;width:16%;height:40%;">Pacific</div>
        <div class="ocean-zone" data-id="indian" data-name="Indian Ocean" style="left:58%;top:50%;width:16%;height:25%;">Indian</div>
        <div class="ocean-zone" data-id="arctic" data-name="Arctic Ocean" style="left:40%;top:0%;width:20%;height:10%;">Arctic</div>
        <div class="ocean-zone" data-id="southern" data-name="Southern Ocean" style="left:25%;top:80%;width:30%;height:8%;">Southern</div>
    </div>

    <div class="label-bank" id="labelBank">
        <h3>Labels (tap a label, then tap the map)</h3>
        <div class="labels-row" id="labelsRow"></div>
    </div>

    <div class="feedback" id="feedback"></div>
    <div class="info-card" id="infoCard"></div>
</div>

<div class="celebration" id="celebration"></div>

<script>
const CONTINENTS = {
    'north-america': { name: 'North America', icon: '\u{1F30E}', fact: 'North America has the Grand Canyon, Niagara Falls, and includes countries like Canada, USA and Mexico!' },
    'south-america': { name: 'South America', icon: '\u{1F30E}', fact: 'South America has the Amazon rainforest, the longest river in the world, and the Andes mountains!' },
    'europe': { name: 'Europe', icon: '\u{1F30D}', fact: 'Europe has 44 countries including the UK! It has the Eiffel Tower and Big Ben.' },
    'africa': { name: 'Africa', icon: '\u{1F30D}', fact: 'Africa is the second largest continent. It has the Sahara Desert and amazing animals like lions and elephants!' },
    'asia': { name: 'Asia', icon: '\u{1F30F}', fact: 'Asia is the biggest continent. It includes China, India and Japan. Mount Everest is here!' },
    'australia': { name: 'Australasia', icon: '\u{1F30F}', fact: 'Australasia includes Australia and New Zealand. It has kangaroos, koalas and the Great Barrier Reef!' },
    'antarctica': { name: 'Antarctica', icon: '\u{1F9CA}', fact: 'Antarctica is the coldest continent. It is covered in ice and home to penguins. No one lives there permanently!' }
};

const OCEANS = {
    'atlantic': { name: 'Atlantic Ocean', icon: '\u{1F30A}', fact: 'The Atlantic Ocean is between Europe/Africa and the Americas. The Titanic sank here!' },
    'pacific': { name: 'Pacific Ocean', icon: '\u{1F30A}', fact: 'The Pacific Ocean is the biggest and deepest ocean. It covers more area than all the land on Earth!' },
    'indian': { name: 'Indian Ocean', icon: '\u{1F30A}', fact: 'The Indian Ocean is the warmest ocean. It is between Africa, Asia and Australia.' },
    'arctic': { name: 'Arctic Ocean', icon: '\u2744\uFE0F', fact: 'The Arctic Ocean is the smallest and coldest ocean. It is mostly covered in sea ice!' },
    'southern': { name: 'Southern Ocean', icon: '\u{1F30A}', fact: 'The Southern Ocean surrounds Antarctica. It has very strong winds and massive waves!' }
};

let mode = 'learn';
let selectedLabel = null;
let labelled = new Set();
let totalItems = 12;

const labelsRow = document.getElementById('labelsRow');
const feedback = document.getElementById('feedback');
const infoCard = document.getElementById('infoCard');

// Mode tabs
document.querySelectorAll('.mode-tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        mode = tab.dataset.mode;
        labelled = new Set();
        selectedLabel = null;
        feedback.className = 'feedback';
        infoCard.className = 'info-card';
        document.querySelectorAll('.continent').forEach(c => c.classList.remove('labelled','correct'));
        document.querySelectorAll('.ocean-zone').forEach(o => o.classList.remove('labelled','correct'));
        document.getElementById('modeLabel').textContent = mode === 'learn' ? 'Tap to explore' : 'Label the map!';
        document.getElementById('scoreLabel').textContent = 'Labelled: 0/12';
        buildLabels();
    });
});

function buildLabels() {
    labelsRow.innerHTML = '';
    if (mode === 'learn') {
        document.getElementById('labelBank').style.display = 'none';
        return;
    }
    document.getElementById('labelBank').style.display = 'block';

    const allLabels = [
        ...Object.entries(CONTINENTS).map(([id, c]) => ({ id, name: c.name, type: 'land' })),
        ...Object.entries(OCEANS).map(([id, o]) => ({ id, name: o.name, type: 'sea' }))
    ];
    // Shuffle
    allLabels.sort(() => Math.random() - 0.5);

    allLabels.forEach(l => {
        const chip = document.createElement('span');
        chip.className = `label-chip ${l.type}`;
        chip.dataset.id = l.id;
        chip.textContent = l.name;
        if (labelled.has(l.id)) chip.classList.add('used');
        chip.addEventListener('click', () => {
            if (labelled.has(l.id)) return;
            selectedLabel = l.id;
            document.querySelectorAll('.label-chip').forEach(c => c.classList.remove('selected'));
            chip.classList.add('selected');
        });
        labelsRow.appendChild(chip);
    });
}

// Continent clicks
document.querySelectorAll('.continent').forEach(c => {
    c.addEventListener('click', () => {
        const id = c.dataset.id;
        if (mode === 'learn') {
            showInfo(CONTINENTS[id], 'land');
        } else {
            tryLabel(id, c);
        }
    });
});

// Ocean clicks
document.querySelectorAll('.ocean-zone').forEach(o => {
    o.addEventListener('click', () => {
        const id = o.dataset.id;
        if (mode === 'learn') {
            showInfo(OCEANS[id], 'sea');
        } else {
            tryLabel(id, o);
        }
    });
});

function showInfo(item, type) {
    infoCard.className = 'info-card show';
    const colour = type === 'land' ? 'var(--land)' : 'var(--ocean)';
    infoCard.innerHTML = `<h3><span class="info-icon">${item.icon}</span><span style="color:${colour};">${item.name}</span></h3><p>${item.fact}</p>`;
}

function tryLabel(targetId, el) {
    if (!selectedLabel) {
        feedback.className = 'feedback show wrong';
        feedback.textContent = 'Tap a label first, then tap the map!';
        setTimeout(() => { feedback.className = 'feedback'; }, 1500);
        return;
    }

    if (selectedLabel === targetId) {
        // Correct!
        labelled.add(targetId);
        el.classList.add('labelled', 'correct');
        feedback.className = 'feedback show win';
        feedback.textContent = '\u2705 Correct!';
        spawnMini();

        document.getElementById('scoreLabel').textContent = `Labelled: ${labelled.size}/${totalItems}`;
        selectedLabel = null;
        buildLabels();

        if (labelled.size === totalItems) {
            setTimeout(() => {
                feedback.textContent = '\u{1F389} You labelled the whole world! Amazing geographer!';
                celebrate();
            }, 500);
        } else {
            setTimeout(() => { feedback.className = 'feedback'; }, 1200);
        }
    } else {
        feedback.className = 'feedback show wrong';
        feedback.textContent = '\u274C That is not the right place. Try again!';
        setTimeout(() => { feedback.className = 'feedback'; }, 1500);
    }
}

function spawnMini() {
    const container = document.getElementById('celebration');
    const colours = ['#22c55e','#3b82f6','#fbbf24','#0ea5e9','#86efac'];
    for (let i = 0; i < 10; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.style.cssText = `left:${Math.random()*100}vw;top:-10px;background:${colours[Math.floor(Math.random()*colours.length)]};width:${5+Math.random()*6}px;height:${5+Math.random()*6}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${1+Math.random()*1.5}s;animation-delay:${Math.random()*0.3}s;`;
        container.appendChild(el);
        setTimeout(() => el.remove(), 3000);
    }
}

function celebrate() {
    const container = document.getElementById('celebration');
    const colours = ['#22c55e','#3b82f6','#fbbf24','#0ea5e9','#ec4899','#a855f7'];
    for (let i = 0; i < 35; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.style.cssText = `left:${Math.random()*100}vw;top:-12px;background:${colours[Math.floor(Math.random()*colours.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*0.5}s;`;
        container.appendChild(el);
        setTimeout(() => el.remove(), 4500);
    }
}

buildLabels();
</script>
</body>
</html>
