<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colours Around the World</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#fdf2f8;--card-bg:#fff;--text:#831843;--text-light:#be185d;--accent:#ec4899;--accent-light:#fce7f3;--border:#fbcfe8;--shadow:0 4px 16px rgba(131,24,67,.1);--shadow-lg:0 8px 32px rgba(131,24,67,.16);--radius:18px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh;user-select:none;-webkit-user-select:none}
.header{background:linear-gradient(135deg,#ec4899,#f472b6,#f9a8d4);color:#fff;padding:16px 20px;text-align:center;box-shadow:var(--shadow)}
.header h1{font-size:1.5rem;font-weight:900;text-shadow:2px 2px 0 rgba(0,0,0,.1)}
.header p{font-size:.82rem;opacity:.9;font-weight:600;margin-top:2px}
.main{max-width:560px;margin:0 auto;padding:16px}

.lang-bar{display:flex;gap:8px;justify-content:center;margin-bottom:14px}
.lang-btn{padding:8px 16px;border:3px solid transparent;border-radius:14px;background:var(--card-bg);font-family:'Inter',sans-serif;font-size:.78rem;font-weight:700;cursor:pointer;transition:all .25s;box-shadow:var(--shadow);display:flex;align-items:center;gap:6px}
.lang-btn:hover{transform:scale(1.05)}
.lang-btn.active{border-color:var(--accent);background:var(--accent-light);transform:scale(1.05)}

.colour-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.colour-card{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 8px;border:3px solid var(--border);border-radius:var(--radius);background:var(--card-bg);cursor:pointer;transition:all .25s;box-shadow:var(--shadow);touch-action:manipulation}
.colour-card:hover{transform:scale(1.06)}
.colour-card.active{border-color:var(--accent);box-shadow:var(--shadow-lg)}
.colour-swatch{width:50px;height:50px;border-radius:50%;border:3px solid rgba(0,0,0,.1);transition:transform .3s}
.colour-card.active .colour-swatch{transform:scale(1.15)}
.colour-word{font-size:.85rem;font-weight:800;text-align:center}
.colour-pron{font-size:.65rem;color:var(--text-light);font-style:italic}
.colour-english{font-size:.62rem;color:#aaa;font-weight:600}

.paint-area{background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow-lg);padding:16px;margin-bottom:14px;text-align:center}
.paint-area h3{font-size:.78rem;font-weight:800;color:var(--text-light);margin-bottom:10px}
.canvas-wrap{position:relative;width:100%;aspect-ratio:4/3;background:#f8fafc;border-radius:12px;border:2px solid var(--border);overflow:hidden;cursor:crosshair}
.canvas-wrap canvas{width:100%;height:100%}

.btn-row{display:flex;gap:8px;margin-bottom:14px}
.action-btn{flex:1;padding:10px;border:none;border-radius:50px;font-family:'Inter',sans-serif;font-size:.82rem;font-weight:800;cursor:pointer;transition:all .2s;box-shadow:var(--shadow)}
.action-btn:hover{transform:scale(1.03)}
.action-btn.clear-canvas{background:var(--card-bg);color:var(--text-light);border:2px solid var(--border)}
.action-btn.fill{background:var(--accent);color:#fff}

.score-bar{display:flex;justify-content:center;gap:6px;margin-bottom:14px}
.score-dot{width:14px;height:14px;border-radius:50%;background:#fce7f3;transition:all .3s}
.score-dot.done{background:var(--accent)}

.celebration{position:fixed;inset:0;pointer-events:none;z-index:1000}
.confetti{position:absolute;border-radius:2px;animation:confettiFall linear forwards}
@keyframes confettiFall{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(100vh) rotate(720deg) scale(.3)}}

@media(max-width:420px){.colour-grid{grid-template-columns:repeat(2,1fr)}.colour-swatch{width:40px;height:40px}}
</style>
</head>
<body>
<div class="header"><h1>Colours Around the World</h1><p>Learn colour words and paint a picture!</p></div>
<div class="main">
<div class="lang-bar" id="langBar">
<button class="lang-btn active" data-lang="french">&#x1F1EB;&#x1F1F7; French</button>
<button class="lang-btn" data-lang="spanish">&#x1F1EA;&#x1F1F8; Spanish</button>
<button class="lang-btn" data-lang="german">&#x1F1E9;&#x1F1EA; German</button>
</div>

<div class="score-bar" id="scoreBar"></div>

<div class="colour-grid" id="colourGrid"></div>

<div class="paint-area">
<h3>Paint with your chosen colour!</h3>
<div class="canvas-wrap"><canvas id="paintCanvas"></canvas></div>
</div>

<div class="btn-row">
<button class="action-btn clear-canvas" id="clearCanvasBtn">Clear Canvas</button>
</div>
</div>
<div class="celebration" id="celebration"></div>

<script>
const COLOURS={
french:[
{hex:'#ef4444',word:'rouge',pron:'roozh',english:'red'},
{hex:'#3b82f6',word:'bleu',pron:'bluh',english:'blue'},
{hex:'#22c55e',word:'vert',pron:'vair',english:'green'},
{hex:'#f59e0b',word:'jaune',pron:'zhohn',english:'yellow'},
{hex:'#1c1917',word:'noir',pron:'nwar',english:'black'},
{hex:'#ffffff',word:'blanc',pron:'blon',english:'white'},
{hex:'#f97316',word:'orange',pron:'or-ONZH',english:'orange'},
{hex:'#ec4899',word:'rose',pron:'rohz',english:'pink'},
{hex:'#8b5cf6',word:'violet',pron:'vee-oh-LAY',english:'purple'}
],
spanish:[
{hex:'#ef4444',word:'rojo',pron:'ROH-ho',english:'red'},
{hex:'#3b82f6',word:'azul',pron:'ah-THOOL',english:'blue'},
{hex:'#22c55e',word:'verde',pron:'VAIR-deh',english:'green'},
{hex:'#f59e0b',word:'amarillo',pron:'ah-mah-REE-yo',english:'yellow'},
{hex:'#1c1917',word:'negro',pron:'NEH-groh',english:'black'},
{hex:'#ffffff',word:'blanco',pron:'BLAHN-koh',english:'white'},
{hex:'#f97316',word:'naranja',pron:'nah-RAHN-ha',english:'orange'},
{hex:'#ec4899',word:'rosa',pron:'ROH-sah',english:'pink'},
{hex:'#8b5cf6',word:'morado',pron:'moh-RAH-doh',english:'purple'}
],
german:[
{hex:'#ef4444',word:'rot',pron:'roht',english:'red'},
{hex:'#3b82f6',word:'blau',pron:'blow',english:'blue'},
{hex:'#22c55e',word:'gr\u00fcn',pron:'groon',english:'green'},
{hex:'#f59e0b',word:'gelb',pron:'gelp',english:'yellow'},
{hex:'#1c1917',word:'schwarz',pron:'shvarts',english:'black'},
{hex:'#ffffff',word:'wei\u00df',pron:'vice',english:'white'},
{hex:'#f97316',word:'orange',pron:'or-ON-zhuh',english:'orange'},
{hex:'#ec4899',word:'rosa',pron:'ROH-zah',english:'pink'},
{hex:'#8b5cf6',word:'lila',pron:'LEE-lah',english:'purple'}
]
};

let lang='french',selectedColour='#ef4444',explored=new Set(),painting=false;
const canvas=document.getElementById('paintCanvas');
const ctx=canvas.getContext('2d');
const wrap=canvas.parentElement;

function resize(){canvas.width=wrap.clientWidth;canvas.height=wrap.clientHeight;}
window.addEventListener('resize',resize);
setTimeout(resize,50);

document.querySelectorAll('.lang-btn').forEach(btn=>{
btn.addEventListener('click',()=>{
lang=btn.dataset.lang;
document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
explored=new Set();
renderColours();
renderScore();
});
});

function renderColours(){
const grid=document.getElementById('colourGrid');
grid.innerHTML='';
COLOURS[lang].forEach((c,i)=>{
const card=document.createElement('div');
card.className='colour-card'+(selectedColour===c.hex?' active':'');
card.innerHTML=`<div class="colour-swatch" style="background:${c.hex};${c.hex==='#ffffff'?'border:3px solid #ddd;':''}"></div><div class="colour-word">${c.word}</div><div class="colour-pron">${c.pron}</div><div class="colour-english">${c.english}</div>`;
card.addEventListener('click',()=>{
selectedColour=c.hex;
explored.add(i);
renderColours();
renderScore();
if(explored.size===COLOURS[lang].length)celebrate();
else spawnMini();
});
grid.appendChild(card);
});
}

function renderScore(){
const bar=document.getElementById('scoreBar');
bar.innerHTML='';
COLOURS[lang].forEach((_,i)=>{
const dot=document.createElement('div');
dot.className='score-dot'+(explored.has(i)?' done':'');
bar.appendChild(dot);
});
}

// Paint
canvas.addEventListener('mousedown',e=>{painting=true;paint(e);});
canvas.addEventListener('mousemove',e=>{if(painting)paint(e);});
canvas.addEventListener('mouseup',()=>{painting=false;});
canvas.addEventListener('mouseleave',()=>{painting=false;});
canvas.addEventListener('touchstart',e=>{painting=true;paintTouch(e);e.preventDefault();},{passive:false});
canvas.addEventListener('touchmove',e=>{if(painting)paintTouch(e);e.preventDefault();},{passive:false});
canvas.addEventListener('touchend',()=>{painting=false;});

function paint(e){
const rect=canvas.getBoundingClientRect();
const x=(e.clientX-rect.left)*(canvas.width/rect.width);
const y=(e.clientY-rect.top)*(canvas.height/rect.height);
ctx.beginPath();
ctx.arc(x,y,12,0,Math.PI*2);
ctx.fillStyle=selectedColour;
ctx.fill();
}
function paintTouch(e){
const t=e.touches[0];
const rect=canvas.getBoundingClientRect();
const x=(t.clientX-rect.left)*(canvas.width/rect.width);
const y=(t.clientY-rect.top)*(canvas.height/rect.height);
ctx.beginPath();
ctx.arc(x,y,12,0,Math.PI*2);
ctx.fillStyle=selectedColour;
ctx.fill();
}

document.getElementById('clearCanvasBtn').addEventListener('click',()=>{
ctx.clearRect(0,0,canvas.width,canvas.height);
});

function spawnMini(){const c=document.getElementById('celebration');const cols=['#ec4899','#f472b6','#3b82f6','#22c55e','#f59e0b'];for(let i=0;i<6;i++){const e=document.createElement('div');e.className='confetti';e.style.cssText=`left:${Math.random()*100}vw;top:-10px;background:${cols[Math.floor(Math.random()*cols.length)]};width:${5+Math.random()*5}px;height:${5+Math.random()*5}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1+Math.random()*1.5}s;animation-delay:${Math.random()*.3}s;`;c.appendChild(e);setTimeout(()=>e.remove(),3000);}}
function celebrate(){const c=document.getElementById('celebration');const cols=['#ec4899','#f472b6','#3b82f6','#22c55e','#f59e0b','#8b5cf6','#ef4444'];for(let i=0;i<30;i++){const e=document.createElement('div');e.className='confetti';e.style.cssText=`left:${Math.random()*100}vw;top:-12px;background:${cols[Math.floor(Math.random()*cols.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*.5}s;`;c.appendChild(e);setTimeout(()=>e.remove(),4500);}}

renderColours();
renderScore();
</script>
</body>
</html>
