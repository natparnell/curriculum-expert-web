<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rock Cycle Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #fafaf9;
    --card-bg: #ffffff;
    --text: #1c1917;
    --text-light: #78716c;
    --igneous: #ef4444;
    --igneous-bg: #fef2f2;
    --sedimentary: #f59e0b;
    --sedimentary-bg: #fffbeb;
    --metamorphic: #8b5cf6;
    --metamorphic-bg: #f5f3ff;
    --process: #059669;
    --border: #e7e5e4;
    --shadow: 0 4px 16px rgba(20,20,20,0.08);
    --shadow-lg: 0 8px 32px rgba(20,20,20,0.14);
    --radius: 14px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
}

.header {
    background: linear-gradient(135deg, #78350f, #92400e, #b45309);
    color: #fef3c7;
    padding: 16px 20px;
    text-align: center;
    box-shadow: var(--shadow);
}
.header h1 { font-size: 1.4rem; font-weight: 900; }
.header p { font-size: 0.8rem; opacity: 0.85; font-weight: 600; margin-top: 2px; }

.main { max-width: 700px; margin: 0 auto; padding: 16px; }

/* Cycle diagram */
.cycle-diagram {
    position: relative;
    width: 100%;
    max-width: 500px;
    margin: 0 auto 20px;
    aspect-ratio: 1;
}

.rock-node {
    position: absolute;
    width: 130px;
    padding: 14px 10px;
    border-radius: var(--radius);
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: var(--shadow);
    border: 3px solid;
    z-index: 2;
}
.rock-node:hover { transform: scale(1.08); box-shadow: var(--shadow-lg); }
.rock-node.active { transform: scale(1.1); box-shadow: var(--shadow-lg); z-index: 3; }
.rock-node .node-icon { font-size: 2rem; display: block; margin-bottom: 4px; }
.rock-node .node-name { font-size: 0.78rem; font-weight: 800; }

.rock-node.igneous { background: var(--igneous-bg); border-color: var(--igneous); color: var(--igneous); top: 5%; left: 50%; transform: translateX(-50%); }
.rock-node.igneous.active { transform: translateX(-50%) scale(1.1); }
.rock-node.sedimentary { background: var(--sedimentary-bg); border-color: var(--sedimentary); color: var(--sedimentary); bottom: 10%; left: 5%; }
.rock-node.metamorphic { background: var(--metamorphic-bg); border-color: var(--metamorphic); color: var(--metamorphic); bottom: 10%; right: 5%; }

/* Process arrows */
.process-arrow {
    position: absolute;
    z-index: 1;
    cursor: pointer;
    transition: all 0.3s;
}
.process-arrow:hover { transform: scale(1.1); }
.process-label {
    position: absolute;
    font-size: 0.62rem;
    font-weight: 700;
    color: var(--process);
    background: white;
    padding: 2px 8px;
    border-radius: 10px;
    border: 1.5px solid var(--process);
    white-space: nowrap;
    cursor: pointer;
    transition: all 0.25s;
    z-index: 2;
}
.process-label:hover { background: #d1fae5; transform: scale(1.1); }
.process-label.active { background: #059669; color: white; }

/* Info panel */
.info-panel {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow-lg);
    padding: 20px;
    margin-bottom: 16px;
    min-height: 120px;
    animation: slideUp 0.3s ease;
}
.info-panel .info-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
}
.info-panel .info-icon { font-size: 2rem; }
.info-panel .info-title { font-size: 1.1rem; font-weight: 800; }
.info-panel .info-type {
    font-size: 0.65rem;
    font-weight: 700;
    padding: 2px 10px;
    border-radius: 20px;
    color: white;
}
.info-panel .info-desc { font-size: 0.88rem; color: var(--text-light); line-height: 1.6; margin-bottom: 10px; }
.info-panel .examples { font-size: 0.82rem; }
.info-panel .examples strong { color: var(--text); }
.info-panel .examples span { display: inline-block; margin: 2px 4px; padding: 3px 10px; background: var(--bg); border-radius: 8px; font-weight: 600; font-size: 0.78rem; }

.quiz-section {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 16px;
    margin-bottom: 16px;
}
.quiz-section h3 { font-size: 0.9rem; font-weight: 800; margin-bottom: 10px; color: var(--process); }
.quiz-q { font-size: 0.88rem; font-weight: 600; margin-bottom: 10px; }
.quiz-options { display: flex; flex-direction: column; gap: 8px; }
.quiz-opt {
    padding: 10px 14px;
    border: 2px solid var(--border);
    border-radius: 10px;
    background: var(--bg);
    font-family: 'Inter', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
}
.quiz-opt:hover { border-color: var(--process); background: #d1fae5; }
.quiz-opt.correct { border-color: #22c55e; background: #dcfce7; color: #166534; }
.quiz-opt.wrong { border-color: #ef4444; background: #fef2f2; color: #991b1b; animation: wobble 0.4s; }
.quiz-feedback { font-size: 0.85rem; font-weight: 700; margin-top: 8px; padding: 8px; border-radius: 8px; display: none; }
.quiz-feedback.show { display: block; animation: fadeIn 0.3s; }
.quiz-feedback.right { background: #dcfce7; color: #166534; }
.quiz-feedback.wrong-fb { background: #fef2f2; color: #991b1b; }

@keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes wobble { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

@media (max-width: 500px) {
    .rock-node { width: 100px; padding: 10px 6px; }
    .rock-node .node-icon { font-size: 1.5rem; }
    .rock-node .node-name { font-size: 0.68rem; }
    .process-label { font-size: 0.55rem; }
}
</style>
</head>
<body>

<div class="header">
    <h1>Rock Cycle Explorer</h1>
    <p>Discover how rocks change and transform!</p>
</div>

<div class="main">
    <div class="cycle-diagram" id="cycleDiagram">
        <div class="rock-node igneous" data-rock="igneous">
            <span class="node-icon">&#x1F30B;</span>
            <span class="node-name">Igneous</span>
        </div>
        <div class="rock-node sedimentary" data-rock="sedimentary">
            <span class="node-icon">&#x1F3D6;&#xFE0F;</span>
            <span class="node-name">Sedimentary</span>
        </div>
        <div class="rock-node metamorphic" data-rock="metamorphic">
            <span class="node-icon">&#x1F48E;</span>
            <span class="node-name">Metamorphic</span>
        </div>

        <!-- Process labels positioned between nodes -->
        <div class="process-label" data-process="weathering" style="top:35%;left:15%;">Weathering &amp; Erosion</div>
        <div class="process-label" data-process="heat_pressure" style="bottom:35%;left:50%;transform:translateX(-50%);">Heat &amp; Pressure</div>
        <div class="process-label" data-process="melting" style="top:35%;right:10%;">Melting &amp; Cooling</div>
        <div class="process-label" data-process="compaction" style="bottom:2%;left:30%;">Compaction &amp; Cementation</div>
        <div class="process-label" data-process="uplift" style="top:50%;right:2%;">Uplift</div>

        <!-- SVG arrows -->
        <svg style="position:absolute;inset:0;width:100%;height:100%;z-index:0;" viewBox="0 0 500 500">
            <!-- Igneous to Sedimentary (weathering) -->
            <path d="M200,120 Q80,250 120,380" fill="none" stroke="#059669" stroke-width="3" stroke-dasharray="8,4" marker-end="url(#arrowhead)"/>
            <!-- Sedimentary to Metamorphic (heat & pressure) -->
            <path d="M230,420 Q320,460 380,420" fill="none" stroke="#059669" stroke-width="3" stroke-dasharray="8,4" marker-end="url(#arrowhead)"/>
            <!-- Metamorphic to Igneous (melting) -->
            <path d="M420,370 Q450,200 300,110" fill="none" stroke="#059669" stroke-width="3" stroke-dasharray="8,4" marker-end="url(#arrowhead)"/>
            <defs>
                <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#059669"/></marker>
            </defs>
        </svg>
    </div>

    <div class="info-panel" id="infoPanel">
        <div style="text-align:center;color:var(--text-light);padding:20px;">
            <div style="font-size:2rem;margin-bottom:8px;">&#x1F50D;</div>
            <div style="font-weight:600;">Tap a rock type or process to learn about it!</div>
        </div>
    </div>

    <div class="quiz-section" id="quizSection">
        <h3>Test Your Knowledge</h3>
        <div class="quiz-q" id="quizQ"></div>
        <div class="quiz-options" id="quizOptions"></div>
        <div class="quiz-feedback" id="quizFeedback"></div>
    </div>
</div>

<script>
const ROCKS = {
    igneous: {
        name: 'Igneous Rock',
        icon: '\u{1F30B}',
        colour: '#ef4444',
        desc: 'Igneous rocks form when hot melted rock (magma or lava) cools down and becomes solid. "Igneous" means "made from fire." They can form deep underground or on the surface after a volcanic eruption.',
        examples: ['Granite', 'Basalt', 'Obsidian', 'Pumice'],
        funFact: 'Pumice is the only rock that floats on water because it is full of tiny air bubbles!'
    },
    sedimentary: {
        name: 'Sedimentary Rock',
        icon: '\u{1F3D6}\uFE0F',
        colour: '#f59e0b',
        desc: 'Sedimentary rocks form when tiny pieces of rock, sand, mud, and even dead plants and animals build up in layers over millions of years. The weight of the layers squashes them together into solid rock.',
        examples: ['Sandstone', 'Limestone', 'Chalk', 'Mudstone'],
        funFact: 'Fossils are almost always found in sedimentary rocks because the layers buried and preserved ancient creatures!'
    },
    metamorphic: {
        name: 'Metamorphic Rock',
        icon: '\u{1F48E}',
        colour: '#8b5cf6',
        desc: 'Metamorphic rocks form when existing rocks are changed by extreme heat and pressure deep underground. "Metamorphic" means "changed form." The original rock transforms into something completely different!',
        examples: ['Marble', 'Slate', 'Quartzite', 'Schist'],
        funFact: 'Marble (used in statues) is actually limestone that has been transformed by heat and pressure!'
    }
};

const PROCESSES = {
    weathering: {
        name: 'Weathering and Erosion',
        desc: 'Wind, rain, ice, and rivers break rocks into smaller and smaller pieces. These tiny fragments (sediments) get carried away by rivers and wind and eventually settle in new places, often at the bottom of seas and lakes.',
        from: 'Any rock type',
        to: 'Sediments'
    },
    compaction: {
        name: 'Compaction and Cementation',
        desc: 'Layers of sediment pile up over millions of years. The weight of the top layers squashes the bottom layers together (compaction). Minerals in the water act like glue, sticking the grains together (cementation).',
        from: 'Sediments',
        to: 'Sedimentary rock'
    },
    heat_pressure: {
        name: 'Heat and Pressure',
        desc: 'Deep underground, rocks get squeezed by enormous pressure and heated by the Earth\'s hot interior. This transforms the minerals and structure of the rock without actually melting it.',
        from: 'Sedimentary (or other) rock',
        to: 'Metamorphic rock'
    },
    melting: {
        name: 'Melting and Cooling',
        desc: 'If rock goes deep enough underground, the heat becomes so intense that the rock melts into magma. When this magma rises and cools (either underground or as lava on the surface), it becomes new igneous rock.',
        from: 'Any rock type',
        to: 'Igneous rock'
    },
    uplift: {
        name: 'Uplift',
        desc: 'Forces inside the Earth push rocks upward toward the surface over millions of years. This exposes deep rocks to weathering and erosion, starting the cycle again.',
        from: 'Deep underground rock',
        to: 'Surface rock (exposed to weathering)'
    }
};

const QUIZ = [
    { q: 'Which type of rock forms from cooled magma or lava?', opts: ['Sedimentary', 'Igneous', 'Metamorphic'], answer: 1 },
    { q: 'What process squashes sediments into solid rock?', opts: ['Melting', 'Weathering', 'Compaction and cementation'], answer: 2 },
    { q: 'Fossils are most commonly found in which type of rock?', opts: ['Igneous', 'Metamorphic', 'Sedimentary'], answer: 2 },
    { q: 'What happens to rock when it is heated and squeezed deep underground?', opts: ['It becomes metamorphic', 'It becomes sedimentary', 'It floats away'], answer: 0 },
    { q: 'Marble is a metamorphic rock made from which sedimentary rock?', opts: ['Sandstone', 'Limestone', 'Mudstone'], answer: 1 },
    { q: 'What breaks rocks into smaller pieces over time?', opts: ['Heat and pressure', 'Compaction', 'Weathering and erosion'], answer: 2 }
];

let currentQuiz = 0;

// Rock node clicks
document.querySelectorAll('.rock-node').forEach(node => {
    node.addEventListener('click', () => {
        document.querySelectorAll('.rock-node').forEach(n => n.classList.remove('active'));
        document.querySelectorAll('.process-label').forEach(p => p.classList.remove('active'));
        node.classList.add('active');
        showRockInfo(node.dataset.rock);
    });
});

// Process label clicks
document.querySelectorAll('.process-label').forEach(label => {
    label.addEventListener('click', () => {
        document.querySelectorAll('.rock-node').forEach(n => n.classList.remove('active'));
        document.querySelectorAll('.process-label').forEach(p => p.classList.remove('active'));
        label.classList.add('active');
        showProcessInfo(label.dataset.process);
    });
});

function showRockInfo(key) {
    const rock = ROCKS[key];
    const panel = document.getElementById('infoPanel');
    panel.innerHTML = `
        <div class="info-header">
            <span class="info-icon">${rock.icon}</span>
            <span class="info-title">${rock.name}</span>
            <span class="info-type" style="background:${rock.colour};">${key}</span>
        </div>
        <div class="info-desc">${rock.desc}</div>
        <div class="examples"><strong>Examples:</strong> ${rock.examples.map(e => `<span>${e}</span>`).join('')}</div>
        <div style="margin-top:10px;padding:8px 12px;background:#fef3c7;border-radius:8px;font-size:0.82rem;"><strong>Fun fact:</strong> ${rock.funFact}</div>
    `;
    panel.style.animation = 'none';
    void panel.offsetWidth;
    panel.style.animation = 'slideUp 0.3s ease';
}

function showProcessInfo(key) {
    const proc = PROCESSES[key];
    const panel = document.getElementById('infoPanel');
    panel.innerHTML = `
        <div class="info-header">
            <span class="info-icon">\u2699\uFE0F</span>
            <span class="info-title">${proc.name}</span>
            <span class="info-type" style="background:var(--process);">Process</span>
        </div>
        <div class="info-desc">${proc.desc}</div>
        <div style="font-size:0.82rem;"><strong>From:</strong> ${proc.from} \u2192 <strong>To:</strong> ${proc.to}</div>
    `;
    panel.style.animation = 'none';
    void panel.offsetWidth;
    panel.style.animation = 'slideUp 0.3s ease';
}

// Quiz
function loadQuiz() {
    const q = QUIZ[currentQuiz];
    document.getElementById('quizQ').textContent = q.q;
    const opts = document.getElementById('quizOptions');
    opts.innerHTML = '';
    document.getElementById('quizFeedback').className = 'quiz-feedback';

    q.opts.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'quiz-opt';
        btn.textContent = opt;
        btn.addEventListener('click', () => checkAnswer(i, q.answer, btn));
        opts.appendChild(btn);
    });
}

function checkAnswer(picked, correct, btn) {
    const fb = document.getElementById('quizFeedback');
    document.querySelectorAll('.quiz-opt').forEach(o => o.style.pointerEvents = 'none');

    if (picked === correct) {
        btn.classList.add('correct');
        fb.className = 'quiz-feedback show right';
        fb.textContent = '\u2705 Correct! Well done!';
    } else {
        btn.classList.add('wrong');
        document.querySelectorAll('.quiz-opt')[correct].classList.add('correct');
        fb.className = 'quiz-feedback show wrong-fb';
        fb.textContent = '\u274C Not quite. The answer is highlighted in green.';
    }

    setTimeout(() => {
        currentQuiz = (currentQuiz + 1) % QUIZ.length;
        loadQuiz();
    }, 2000);
}

loadQuiz();
</script>
</body>
</html>
