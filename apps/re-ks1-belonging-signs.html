<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signs of Belonging</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#fce7f3;--card:#fff;--text:#831843;--text2:#be185d;--accent:#be185d;--accent-bg:#fdf2f8;--border:#fbcfe8;--shadow:0 4px 16px rgba(131,24,67,.1);--radius:18px;--success:#22c55e}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh;user-select:none;-webkit-user-select:none}
.header{background:linear-gradient(135deg,#be185d,#ec4899);color:#fff;padding:16px 20px;text-align:center}
.header h1{font-size:1.5rem;font-weight:900;text-shadow:2px 2px 0 rgba(0,0,0,.1)}
.header p{font-size:.82rem;opacity:.9;font-weight:600;margin-top:2px}
.main{max-width:560px;margin:0 auto;padding:16px}

.score-bar{display:flex;justify-content:space-between;padding:8px 14px;background:var(--card);border-radius:10px;box-shadow:var(--shadow);margin-bottom:14px;font-size:.82rem;font-weight:700}
.instruction{text-align:center;font-size:.95rem;font-weight:700;padding:10px;background:var(--accent-bg);border-radius:14px;margin-bottom:14px;border:2px solid var(--border)}

.item-display{text-align:center;padding:20px;background:var(--card);border-radius:var(--radius);box-shadow:0 8px 32px rgba(131,24,67,.12);margin-bottom:14px}
.item-icon{font-size:4rem;display:block;margin-bottom:6px}
.item-name{font-size:1.2rem;font-weight:800}
.item-desc{font-size:.82rem;color:var(--text2);margin-top:4px}

.religion-options{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
.rel-btn{display:flex;align-items:center;gap:8px;padding:12px;border:3px solid var(--border);border-radius:14px;background:var(--card);font-family:'Inter',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;transition:all .25s;touch-action:manipulation;text-align:left;box-shadow:var(--shadow)}
.rel-btn:hover{transform:scale(1.03);border-color:var(--accent)}
.rel-btn .r-icon{font-size:1.4rem;flex-shrink:0}
.rel-btn.correct{border-color:var(--success);background:#dcfce7;color:#166534}
.rel-btn.wrong{border-color:#ef4444;background:#fef2f2;animation:wobble .4s}

.feedback{text-align:center;font-size:.95rem;font-weight:800;padding:12px;border-radius:var(--radius);display:none;animation:popIn .3s ease;margin-bottom:12px}
.feedback.show{display:block}
.feedback.win{background:#dcfce7;color:#166534;border:2px solid var(--success)}
.feedback.try{background:#fef2f2;color:#991b1b;border:2px solid #fca5a5}

.complete-msg{text-align:center;padding:16px;background:#dcfce7;border:3px solid var(--success);border-radius:var(--radius);font-size:1.1rem;font-weight:900;color:#166534;display:none;animation:popIn .4s ease}

@keyframes popIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
@keyframes wobble{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.celebration{position:fixed;inset:0;pointer-events:none;z-index:1000}
.confetti{position:absolute;border-radius:2px;animation:confettiFall linear forwards}
@keyframes confettiFall{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(100vh) rotate(720deg) scale(.3)}}
</style>
</head>
<body>
<div class="header"><h1>Signs of Belonging</h1><p>Match symbols to their religion!</p></div>
<div class="main">
<div class="score-bar"><span id="scoreLabel" style="color:var(--success)">Score: 0</span><span id="roundLabel" style="color:var(--text2)">Round 1/10</span></div>
<div class="instruction">Which religion does this symbol belong to?</div>
<div class="item-display" id="itemDisplay"><span class="item-icon" id="itemIcon"></span><div class="item-name" id="itemName"></div><div class="item-desc" id="itemDesc"></div></div>
<div class="religion-options" id="relOptions"></div>
<div class="feedback" id="feedback"></div>
<div class="complete-msg" id="completeMsg"></div>
</div>
<div class="celebration" id="celebration"></div>
<script>
const ITEMS=[
{icon:'&#x271D;&#xFE0F;',name:'Cross',religion:'Christianity',desc:'The most important symbol of Christianity'},
{icon:'&#x1F319;',name:'Crescent Moon and Star',religion:'Islam',desc:'A symbol found on many mosques and flags'},
{icon:'&#x2721;&#xFE0F;',name:'Star of David',religion:'Judaism',desc:'A six-pointed star, symbol of the Jewish people'},
{icon:'&#x1F549;&#xFE0F;',name:'Om Symbol',religion:'Hinduism',desc:'A sacred sound and symbol in Hindu prayer'},
{icon:'&#x2638;&#xFE0F;',name:'Dharma Wheel',religion:'Buddhism',desc:'Represents the teachings of the Buddha'},
{icon:'&#x1F54C;',name:'Mosque',religion:'Islam',desc:'The place where Muslims go to pray'},
{icon:'&#x26EA;',name:'Church',religion:'Christianity',desc:'The place where Christians worship'},
{icon:'&#x1F54D;',name:'Synagogue',religion:'Judaism',desc:'The place where Jewish people worship and study'},
{icon:'&#x1F4DC;',name:'Torah Scroll',religion:'Judaism',desc:'The most holy book in Judaism'},
{icon:'&#x1F4D6;',name:'Bible',religion:'Christianity',desc:'The holy book of Christianity'}
];

const RELIGIONS=['Christianity','Islam','Judaism','Hinduism','Buddhism'];

let shuffled=[],round=0,score=0;
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function start(){shuffled=shuffle(ITEMS);round=0;score=0;document.getElementById('completeMsg').style.display='none';loadRound();}

function loadRound(){
if(round>=shuffled.length){endGame();return;}
const item=shuffled[round];
document.getElementById('itemIcon').innerHTML=item.icon;
document.getElementById('itemName').textContent=item.name;
document.getElementById('itemDesc').textContent=item.desc;
document.getElementById('roundLabel').textContent=`Round ${round+1}/${shuffled.length}`;
document.getElementById('scoreLabel').textContent=`Score: ${score}`;
document.getElementById('feedback').className='feedback';

const opts=document.getElementById('relOptions');opts.innerHTML='';
const correct=item.religion;
const wrong=RELIGIONS.filter(r=>r!==correct);
const options=shuffle([correct,...shuffle(wrong).slice(0,3)]);

options.forEach(r=>{
const btn=document.createElement('button');btn.className='rel-btn';
const icons={Christianity:'&#x271D;&#xFE0F;',Islam:'&#x1F319;',Judaism:'&#x2721;&#xFE0F;',Hinduism:'&#x1F549;&#xFE0F;',Buddhism:'&#x2638;&#xFE0F;'};
btn.innerHTML=`<span class="r-icon">${icons[r]||''}</span>${r}`;
btn.addEventListener('click',()=>{
opts.querySelectorAll('.rel-btn').forEach(b=>b.style.pointerEvents='none');
const fb=document.getElementById('feedback');
if(r===correct){btn.classList.add('correct');fb.className='feedback show win';fb.textContent='\u2705 Correct! The '+item.name+' belongs to '+correct+'.';score++;spawnMini();}
else{btn.classList.add('wrong');opts.querySelectorAll('.rel-btn').forEach(b=>{if(b.textContent.includes(correct))b.classList.add('correct');});fb.className='feedback show try';fb.textContent='\u274C It belongs to '+correct+'.';}
document.getElementById('scoreLabel').textContent=`Score: ${score}`;
setTimeout(()=>{round++;loadRound();},1500);
});
opts.appendChild(btn);
});
}

function endGame(){
document.getElementById('itemDisplay').style.display='none';
document.getElementById('relOptions').innerHTML='';
document.getElementById('feedback').style.display='none';
const msg=document.getElementById('completeMsg');msg.style.display='block';
msg.innerHTML=`&#x1F389; You scored ${score}/${shuffled.length}! Great knowledge of religious symbols!`;
celebrate();
}

function spawnMini(){const c=document.getElementById('celebration');const cols=['#be185d','#ec4899','#22c55e','#f59e0b','#3b82f6'];for(let i=0;i<8;i++){const e=document.createElement('div');e.className='confetti';e.style.cssText=`left:${Math.random()*100}vw;top:-10px;background:${cols[Math.floor(Math.random()*cols.length)]};width:${5+Math.random()*6}px;height:${5+Math.random()*6}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1+Math.random()*1.5}s;animation-delay:${Math.random()*.3}s;`;c.appendChild(e);setTimeout(()=>e.remove(),3000);}}
function celebrate(){const c=document.getElementById('celebration');const cols=['#be185d','#ec4899','#22c55e','#f59e0b','#3b82f6','#a855f7'];for(let i=0;i<35;i++){const e=document.createElement('div');e.className='confetti';e.style.cssText=`left:${Math.random()*100}vw;top:-12px;background:${cols[Math.floor(Math.random()*cols.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*.5}s;`;c.appendChild(e);setTimeout(()=>e.remove(),4500);}}

start();
</script>
</body>
</html>
