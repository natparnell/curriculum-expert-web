<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Celebrations Around the World</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#fdf2f8;--card:#fff;--text:#831843;--text2:#be185d;--accent:#ec4899;--accent-bg:#fce7f3;--border:#fbcfe8;--shadow:0 4px 16px rgba(131,24,67,.1);--shadow-lg:0 8px 32px rgba(131,24,67,.16);--radius:20px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh;user-select:none;-webkit-user-select:none}
.header{background:linear-gradient(135deg,#ec4899,#f472b6,#f9a8d4);color:#fff;padding:16px 20px;text-align:center;box-shadow:var(--shadow)}
.header h1{font-size:1.5rem;font-weight:900;text-shadow:2px 2px 0 rgba(0,0,0,.1)}
.header p{font-size:.82rem;opacity:.9;font-weight:600;margin-top:2px}
.main{max-width:560px;margin:0 auto;padding:16px}

.celebrations-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
.celeb-card{display:flex;flex-direction:column;align-items:center;gap:4px;padding:14px 8px;border:3px solid var(--border);border-radius:var(--radius);background:var(--card);box-shadow:var(--shadow);cursor:pointer;transition:all .25s;touch-action:manipulation}
.celeb-card:hover{transform:scale(1.04)}
.celeb-card.active{border-color:var(--accent);background:var(--accent-bg);transform:scale(1.04);box-shadow:var(--shadow-lg)}
.celeb-card .c-icon{font-size:2.4rem}
.celeb-card .c-name{font-size:.82rem;font-weight:800;text-align:center}
.celeb-card .c-religion{font-size:.62rem;font-weight:600;color:var(--text2)}

.detail-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow-lg);overflow:hidden;margin-bottom:14px;display:none;animation:popIn .3s ease}
.detail-card.show{display:block}
.detail-banner{padding:16px;text-align:center;color:#fff}
.detail-banner .d-icon{font-size:3rem}
.detail-banner h2{font-size:1.1rem;font-weight:900;margin-top:4px}
.detail-banner .d-religion{font-size:.78rem;opacity:.85}
.detail-body{padding:16px}
.detail-body .d-desc{font-size:.88rem;color:var(--text);line-height:1.6;margin-bottom:10px}
.detail-body .d-activities{list-style:none;margin-bottom:10px}
.detail-body .d-activities li{padding:6px 0;border-bottom:1px solid var(--border);font-size:.82rem;display:flex;align-items:flex-start;gap:8px}
.detail-body .d-activities li .a-icon{font-size:1.1rem;flex-shrink:0}
.detail-body .fun-fact{padding:10px;background:#fef3c7;border-radius:10px;font-size:.82rem;border-left:4px solid #f59e0b}
.detail-body .fun-fact strong{color:#92400e}

.explored-bar{display:flex;justify-content:center;gap:6px;margin-bottom:14px}
.explored-dot{width:14px;height:14px;border-radius:50%;background:#fce7f3;transition:all .3s}
.explored-dot.done{background:var(--accent)}

.complete-msg{text-align:center;padding:16px;background:#dcfce7;border:3px solid #22c55e;border-radius:var(--radius);font-size:1.1rem;font-weight:900;color:#166534;display:none;animation:popIn .4s ease}

@keyframes popIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
.celebration{position:fixed;inset:0;pointer-events:none;z-index:1000}
.confetti{position:absolute;border-radius:2px;animation:confettiFall linear forwards}
@keyframes confettiFall{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(100vh) rotate(720deg) scale(.3)}}
</style>
</head>
<body>
<div class="header"><h1>Celebrations Around the World</h1><p>Explore how families celebrate special days!</p></div>
<div class="main">
<div class="explored-bar" id="exploredBar"></div>
<div class="celebrations-grid" id="celebGrid"></div>
<div class="detail-card" id="detailCard"></div>
<div class="complete-msg" id="completeMsg"></div>
</div>
<div class="celebration" id="celebrationEl"></div>
<script>
const CELEBRATIONS=[
{name:'Christmas',icon:'&#x1F384;',religion:'Christianity',colour:'#dc2626',
desc:'Christians celebrate the birth of Jesus Christ on 25th December. Families decorate trees, exchange gifts and share a special meal together.',
activities:[{icon:'&#x1F384;',text:'Decorate a Christmas tree with lights and tinsel'},{icon:'&#x1F381;',text:'Give and receive presents'},{icon:'&#x1F37D;&#xFE0F;',text:'Share a special Christmas dinner with family'},{icon:'&#x1F3B5;',text:'Sing carols and go to church'}],
fact:'In the UK, people pull Christmas crackers at dinner and wear paper crowns!'},
{name:'Eid al-Fitr',icon:'&#x1F319;',religion:'Islam',colour:'#059669',
desc:'Muslims celebrate Eid al-Fitr at the end of Ramadan (a month of fasting). It is a joyful time of prayer, food, gifts and spending time with family.',
activities:[{icon:'&#x1F64F;',text:'Special prayers at the mosque in the morning'},{icon:'&#x1F37D;&#xFE0F;',text:'Share delicious food with family and neighbours'},{icon:'&#x1F381;',text:'Children receive gifts and new clothes'},{icon:'&#x1F91D;',text:'Visit friends and family to celebrate together'}],
fact:'The greeting for Eid is "Eid Mubarak" which means "Blessed Eid"!'},
{name:'Diwali',icon:'&#x1FA94;',religion:'Hinduism',colour:'#f59e0b',
desc:'Hindus celebrate Diwali, the Festival of Lights. Families light lamps called diyas, share sweets, and watch fireworks to celebrate the victory of light over darkness.',
activities:[{icon:'&#x1FA94;',text:'Light clay lamps (diyas) and candles'},{icon:'&#x1F386;',text:'Watch beautiful firework displays'},{icon:'&#x1F36C;',text:'Share special sweets and treats'},{icon:'&#x1F3E0;',text:'Clean and decorate the house with rangoli patterns'}],
fact:'Diwali celebrations can last for five days! It is sometimes called the "Festival of Lights".'},
{name:'Hanukkah',icon:'&#x1F54E;',religion:'Judaism',colour:'#2563eb',
desc:'Jewish families celebrate Hanukkah for eight nights. They light candles on a special menorah (candle holder), eat fried foods and play dreidel games.',
activities:[{icon:'&#x1F56F;&#xFE0F;',text:'Light one candle on the menorah each night for eight nights'},{icon:'&#x1F95E;',text:'Eat special fried foods like latkes (potato pancakes)'},{icon:'&#x1FA80;',text:'Play the dreidel spinning top game'},{icon:'&#x1F381;',text:'Exchange small gifts each night'}],
fact:'Hanukkah means "dedication" and remembers when a tiny amount of oil lasted eight whole days in the temple!'},
{name:'Chinese New Year',icon:'&#x1F9E7;',religion:'Chinese culture',colour:'#ef4444',
desc:'Families celebrate Chinese New Year with dragon dances, fireworks, red decorations and special meals. It marks the start of the lunar new year.',
activities:[{icon:'&#x1F409;',text:'Watch exciting dragon and lion dances'},{icon:'&#x1F9E7;',text:'Give red envelopes with money for good luck'},{icon:'&#x1F386;',text:'Set off firecrackers and fireworks'},{icon:'&#x1F37D;&#xFE0F;',text:'Eat special foods like dumplings and noodles'}],
fact:'Each Chinese New Year has a different animal from the zodiac. There are 12 animals in total!'},
{name:'Easter',icon:'&#x1F423;',religion:'Christianity',colour:'#a855f7',
desc:'Christians celebrate Easter to remember when Jesus rose from the dead. Children enjoy Easter egg hunts and families share a special meal.',
activities:[{icon:'&#x26EA;',text:'Go to church for a special Easter service'},{icon:'&#x1F95A;',text:'Enjoy Easter egg hunts in the garden'},{icon:'&#x1F36B;',text:'Give and eat chocolate Easter eggs'},{icon:'&#x1F33B;',text:'Decorate with spring flowers'}],
fact:'In some countries, people roll decorated eggs down hills at Easter! This is called an "egg roll".'}
];

let explored=new Set();
const exploredBar=document.getElementById('exploredBar');
const celebGrid=document.getElementById('celebGrid');
const detailCard=document.getElementById('detailCard');

CELEBRATIONS.forEach(()=>{const d=document.createElement('div');d.className='explored-dot';exploredBar.appendChild(d);});

CELEBRATIONS.forEach((c,i)=>{
const card=document.createElement('div');
card.className='celeb-card';
card.innerHTML=`<span class="c-icon">${c.icon}</span><span class="c-name">${c.name}</span><span class="c-religion">${c.religion}</span>`;
card.addEventListener('click',()=>showCeleb(i));
celebGrid.appendChild(card);
});

function showCeleb(idx){
explored.add(idx);
exploredBar.querySelectorAll('.explored-dot').forEach((d,i)=>d.classList.toggle('done',explored.has(i)));
celebGrid.querySelectorAll('.celeb-card').forEach((c,i)=>c.classList.toggle('active',i===idx));

const c=CELEBRATIONS[idx];
detailCard.classList.remove('show');
void detailCard.offsetWidth;
detailCard.classList.add('show');
detailCard.innerHTML=`
<div class="detail-banner" style="background:linear-gradient(135deg,${c.colour},${c.colour}cc)">
<div class="d-icon">${c.icon}</div><h2>${c.name}</h2><div class="d-religion">${c.religion}</div>
</div>
<div class="detail-body">
<div class="d-desc">${c.desc}</div>
<ul class="d-activities">${c.activities.map(a=>`<li><span class="a-icon">${a.icon}</span>${a.text}</li>`).join('')}</ul>
<div class="fun-fact"><strong>Fun fact:</strong> ${c.fact}</div>
</div>`;

spawnMini();
if(explored.size===CELEBRATIONS.length){
document.getElementById('completeMsg').style.display='block';
document.getElementById('completeMsg').innerHTML='&#x1F389; You explored all the celebrations! People celebrate in wonderful ways around the world!';
celebrate();
}
}

function spawnMini(){const c=document.getElementById('celebrationEl');const cols=['#ec4899','#f472b6','#22c55e','#f59e0b','#3b82f6'];for(let i=0;i<8;i++){const e=document.createElement('div');e.className='confetti';e.style.cssText=`left:${Math.random()*100}vw;top:-10px;background:${cols[Math.floor(Math.random()*cols.length)]};width:${5+Math.random()*6}px;height:${5+Math.random()*6}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1+Math.random()*1.5}s;animation-delay:${Math.random()*.3}s;`;c.appendChild(e);setTimeout(()=>e.remove(),3000);}}
function celebrate(){const c=document.getElementById('celebrationEl');const cols=['#ec4899','#22c55e','#f59e0b','#3b82f6','#a855f7','#ef4444'];for(let i=0;i<35;i++){const e=document.createElement('div');e.className='confetti';e.style.cssText=`left:${Math.random()*100}vw;top:-12px;background:${cols[Math.floor(Math.random()*cols.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*.5}s;`;c.appendChild(e);setTimeout(()=>e.remove(),4500);}}
</script>
</body>
</html>
