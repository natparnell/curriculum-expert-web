<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Materials Sorter</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #f0fdf4;
    --card-bg: #ffffff;
    --text: #14532d;
    --text-light: #4d7c5e;
    --accent: #059669;
    --accent-light: #d1fae5;
    --hard: #3b82f6;
    --hard-bg: #dbeafe;
    --soft: #ec4899;
    --soft-bg: #fce7f3;
    --stretchy: #f59e0b;
    --stretchy-bg: #fef3c7;
    --waterproof: #06b6d4;
    --waterproof-bg: #cffafe;
    --rough: #92400e;
    --rough-bg: #fef3c7;
    --smooth: #8b5cf6;
    --smooth-bg: #f3e8ff;
    --border: #bbf7d0;
    --shadow: 0 4px 16px rgba(20,80,40,0.10);
    --shadow-lg: 0 8px 32px rgba(20,80,40,0.16);
    --radius: 18px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
    overflow-x: hidden;
    user-select: none;
    -webkit-user-select: none;
}

.header {
    background: linear-gradient(135deg, #059669, #34d399, #6ee7b7);
    color: white;
    padding: 16px 20px;
    text-align: center;
    box-shadow: var(--shadow);
}
.header h1 { font-size: 1.5rem; font-weight: 900; text-shadow: 2px 2px 0 rgba(0,0,0,0.1); }
.header p { font-size: 0.82rem; opacity: 0.9; font-weight: 600; margin-top: 2px; }

.main { max-width: 600px; margin: 0 auto; padding: 16px; }

.info-bar {
    display: flex;
    justify-content: space-between;
    padding: 10px 14px;
    background: var(--card-bg);
    border-radius: 12px;
    box-shadow: var(--shadow);
    margin-bottom: 14px;
    font-size: 0.85rem;
    font-weight: 700;
}

.property-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 16px;
}
.prop-btn {
    padding: 8px 16px;
    border: 3px solid var(--border);
    border-radius: 50px;
    background: var(--card-bg);
    font-family: 'Inter', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.25s;
    touch-action: manipulation;
    display: flex;
    align-items: center;
    gap: 6px;
}
.prop-btn:hover { transform: scale(1.06); }
.prop-btn.active { transform: scale(1.08); box-shadow: var(--shadow-lg); }
.prop-btn[data-prop="hard"].active { border-color: var(--hard); background: var(--hard-bg); color: var(--hard); }
.prop-btn[data-prop="soft"].active { border-color: var(--soft); background: var(--soft-bg); color: var(--soft); }
.prop-btn[data-prop="stretchy"].active { border-color: var(--stretchy); background: var(--stretchy-bg); color: var(--stretchy); }
.prop-btn[data-prop="waterproof"].active { border-color: var(--waterproof); background: var(--waterproof-bg); color: var(--waterproof); }
.prop-btn[data-prop="rough"].active { border-color: var(--rough); background: var(--rough-bg); color: var(--rough); }
.prop-btn[data-prop="smooth"].active { border-color: var(--smooth); background: var(--smooth-bg); color: var(--smooth); }

.instruction {
    text-align: center;
    font-size: 1rem;
    font-weight: 700;
    padding: 12px;
    background: var(--accent-light);
    border-radius: 14px;
    margin-bottom: 14px;
    border: 2px solid var(--border);
}

.objects-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 16px;
}

.obj-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 14px 8px;
    background: var(--card-bg);
    border: 3px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: all 0.25s;
    touch-action: manipulation;
    min-height: 100px;
    justify-content: center;
}
.obj-card:hover { transform: scale(1.06); }
.obj-card:active { transform: scale(0.97); }
.obj-card .obj-icon { font-size: 2.4rem; transition: transform 0.3s; }
.obj-card .obj-name { font-size: 0.75rem; font-weight: 700; text-align: center; }
.obj-card.correct { border-color: #22c55e; background: #dcfce7; }
.obj-card.correct .obj-icon { animation: bounce 0.4s ease; }
.obj-card.wrong { animation: wobble 0.4s ease; border-color: #ef4444; }

@keyframes bounce { 0%,100% { transform: scale(1); } 50% { transform: scale(1.2); } }
@keyframes wobble { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }

.result-panel {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow-lg);
    padding: 16px;
    margin-bottom: 14px;
    display: none;
    animation: popIn 0.3s ease;
}
.result-panel.show { display: block; }
.result-panel .result-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
}
.result-panel .result-header .r-icon { font-size: 2rem; }
.result-panel .result-header .r-name { font-size: 1.1rem; font-weight: 800; }
.result-panel .material-label { font-size: 0.82rem; font-weight: 600; color: var(--text-light); margin-bottom: 8px; }
.result-panel .props-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
}
.result-panel .prop-badge {
    padding: 4px 12px;
    border-radius: 50px;
    font-size: 0.72rem;
    font-weight: 700;
    color: white;
}
.result-panel .desc { font-size: 0.85rem; margin-top: 10px; color: var(--text-light); line-height: 1.5; }

.score-section {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 16px;
    text-align: center;
}
.score-section .sorted-count { font-size: 2rem; font-weight: 900; color: var(--accent); }
.score-section .sorted-label { font-size: 0.82rem; color: var(--text-light); font-weight: 600; }

@keyframes popIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

.celebration { position: fixed; inset: 0; pointer-events: none; z-index: 1000; }
.confetti { position: absolute; border-radius: 2px; animation: confettiFall linear forwards; }
@keyframes confettiFall { 0% { opacity:1; transform: translateY(0) rotate(0); } 100% { opacity:0; transform: translateY(100vh) rotate(720deg) scale(0.3); } }

@media (max-width: 420px) {
    .objects-grid { grid-template-columns: repeat(2, 1fr); }
    .obj-card .obj-icon { font-size: 2rem; }
    .property-bar { gap: 6px; }
    .prop-btn { padding: 6px 12px; font-size: 0.72rem; }
}
</style>
</head>
<body>

<div class="header">
    <h1>Materials Sorter</h1>
    <p>Sort objects by what they are made of!</p>
</div>

<div class="main">
    <div class="info-bar">
        <span id="modeLabel" style="color:var(--accent);">Explore Mode</span>
        <span id="scoreLabel" style="color:var(--text-light);">Tap any object!</span>
    </div>

    <div class="property-bar" id="propertyBar">
        <button class="prop-btn" data-prop="hard">Hard</button>
        <button class="prop-btn" data-prop="soft">Soft</button>
        <button class="prop-btn" data-prop="stretchy">Stretchy</button>
        <button class="prop-btn" data-prop="waterproof">Waterproof</button>
        <button class="prop-btn" data-prop="rough">Rough</button>
        <button class="prop-btn" data-prop="smooth">Smooth</button>
    </div>

    <div class="instruction" id="instruction">Tap an object to see what it is made of!</div>

    <div class="objects-grid" id="objectsGrid"></div>

    <div class="result-panel" id="resultPanel"></div>

    <div class="score-section">
        <div class="sorted-count" id="sortedCount">0</div>
        <div class="sorted-label">Objects explored</div>
    </div>
</div>

<div class="celebration" id="celebration"></div>

<script>
const PROPS = {
    hard: { label: 'Hard', colour: '#3b82f6' },
    soft: { label: 'Soft', colour: '#ec4899' },
    stretchy: { label: 'Stretchy', colour: '#f59e0b' },
    waterproof: { label: 'Waterproof', colour: '#06b6d4' },
    rough: { label: 'Rough', colour: '#92400e' },
    smooth: { label: 'Smooth', colour: '#8b5cf6' }
};

const OBJECTS = [
    { icon: '\u{1FA99}', name: 'Rock', material: 'Stone', props: ['hard', 'rough'], desc: 'Rocks are very hard and feel rough and bumpy. You cannot bend or squash them!' },
    { icon: '\u{1F9F8}', name: 'Teddy Bear', material: 'Fabric & stuffing', props: ['soft'], desc: 'Teddy bears are made of soft fabric and filled with fluffy stuffing inside.' },
    { icon: '\u{1F388}', name: 'Balloon', material: 'Rubber', props: ['stretchy', 'smooth', 'waterproof'], desc: 'Balloons are made of rubber. They stretch really big and water slides right off!' },
    { icon: '\u{1F944}', name: 'Spoon', material: 'Metal', props: ['hard', 'smooth', 'waterproof'], desc: 'Metal spoons are hard and shiny smooth. Water just runs off them!' },
    { icon: '\u{1F9F1}', name: 'Brick', material: 'Clay', props: ['hard', 'rough'], desc: 'Bricks are made from clay that has been baked. They are hard and rough to touch.' },
    { icon: '\u{1F9E3}', name: 'Woolly Scarf', material: 'Wool', props: ['soft', 'stretchy'], desc: 'Wool is soft and cosy. It can stretch a little bit when you pull it!' },
    { icon: '\u{1F6A3}', name: 'Rubber Duck', material: 'Rubber', props: ['soft', 'smooth', 'waterproof'], desc: 'Rubber ducks are smooth and a bit squishy. They float because rubber is waterproof!' },
    { icon: '\u{1F4D5}', name: 'Book', material: 'Paper & card', props: ['smooth', 'soft'], desc: 'Paper feels smooth and is quite soft. It tears easily and soaks up water!' },
    { icon: '\u{1FAA3}', name: 'Bucket', material: 'Plastic', props: ['hard', 'smooth', 'waterproof'], desc: 'Plastic buckets are hard, smooth, and great for carrying water because they are waterproof!' },
    { icon: '\u{1F333}', name: 'Tree Bark', material: 'Wood', props: ['hard', 'rough'], desc: 'Tree bark is the hard outside of a tree. It feels rough and bumpy to touch.' },
    { icon: '\u{1F97C}', name: 'Elastic Band', material: 'Rubber', props: ['stretchy', 'smooth'], desc: 'Elastic bands are very stretchy! They are made from rubber and feel smooth.' },
    { icon: '\u{1F9CA}', name: 'Glass Jar', material: 'Glass', props: ['hard', 'smooth', 'waterproof'], desc: 'Glass is very hard and super smooth. It is also waterproof, which is why we keep water in it!' }
];

let activeProp = null;
let explored = new Set();

const objectsGrid = document.getElementById('objectsGrid');
const resultPanel = document.getElementById('resultPanel');

// Build property filter buttons
document.querySelectorAll('.prop-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        const prop = btn.dataset.prop;
        if (activeProp === prop) {
            activeProp = null;
            btn.classList.remove('active');
            document.getElementById('instruction').textContent = 'Tap an object to see what it is made of!';
        } else {
            activeProp = prop;
            document.querySelectorAll('.prop-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('instruction').textContent = `Which objects are ${PROPS[prop].label.toLowerCase()}?`;
        }
        renderObjects();
    });
});

function renderObjects() {
    objectsGrid.innerHTML = '';
    OBJECTS.forEach((obj, i) => {
        const card = document.createElement('div');
        card.className = 'obj-card';

        if (activeProp) {
            const matches = obj.props.includes(activeProp);
            if (!matches) card.style.opacity = '0.25';
            else {
                card.style.borderColor = PROPS[activeProp].colour;
                card.style.background = PROPS[activeProp].colour + '15';
            }
        }

        if (explored.has(i)) {
            card.style.borderColor = '#22c55e';
        }

        card.innerHTML = `<span class="obj-icon">${obj.icon}</span><span class="obj-name">${obj.name}</span>`;
        card.addEventListener('click', () => showObject(i));
        objectsGrid.appendChild(card);
    });
}

function showObject(idx) {
    const obj = OBJECTS[idx];
    explored.add(idx);
    document.getElementById('sortedCount').textContent = explored.size;

    resultPanel.classList.remove('show');
    void resultPanel.offsetWidth;
    resultPanel.classList.add('show');

    let propsHtml = '';
    obj.props.forEach(p => {
        propsHtml += `<span class="prop-badge" style="background:${PROPS[p].colour};">${PROPS[p].label}</span>`;
    });

    resultPanel.innerHTML = `
        <div class="result-header">
            <span class="r-icon">${obj.icon}</span>
            <span class="r-name">${obj.name}</span>
        </div>
        <div class="material-label">Made from: ${obj.material}</div>
        <div class="props-row">${propsHtml}</div>
        <div class="desc">${obj.desc}</div>
    `;

    renderObjects();
    spawnMini();

    if (explored.size === OBJECTS.length) {
        setTimeout(() => {
            document.getElementById('instruction').textContent = '\u{1F389} You explored every material! Amazing scientist!';
            celebrate();
        }, 500);
    }
}

function spawnMini() {
    const container = document.getElementById('celebration');
    const colours = ['#059669','#34d399','#3b82f6','#ec4899','#f59e0b','#06b6d4'];
    for (let i = 0; i < 8; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.style.cssText = `left:${Math.random()*100}vw;top:-10px;background:${colours[Math.floor(Math.random()*colours.length)]};width:${5+Math.random()*6}px;height:${5+Math.random()*6}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${1+Math.random()*1.5}s;animation-delay:${Math.random()*0.3}s;`;
        container.appendChild(el);
        setTimeout(() => el.remove(), 3000);
    }
}

function celebrate() {
    const container = document.getElementById('celebration');
    const colours = ['#059669','#34d399','#6ee7b7','#3b82f6','#ec4899','#f59e0b'];
    for (let i = 0; i < 30; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.style.cssText = `left:${Math.random()*100}vw;top:-12px;background:${colours[Math.floor(Math.random()*colours.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*0.5}s;`;
        container.appendChild(el);
        setTimeout(() => el.remove(), 4000);
    }
}

renderObjects();
</script>
</body>
</html>
