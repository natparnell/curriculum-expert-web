<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Timeline</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #fef7ed;
    --card-bg: #ffffff;
    --text: #451a03;
    --text-light: #92400e;
    --accent: #d97706;
    --accent-light: #fef3c7;
    --border: #fed7aa;
    --shadow: 0 4px 16px rgba(120,60,10,0.10);
    --shadow-lg: 0 8px 32px rgba(120,60,10,0.16);
    --radius: 20px;
    --success: #22c55e;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
    user-select: none;
    -webkit-user-select: none;
}

.header {
    background: linear-gradient(135deg, #b45309, #d97706, #f59e0b);
    color: white;
    padding: 16px 20px;
    text-align: center;
    box-shadow: var(--shadow);
}
.header h1 { font-size: 1.6rem; font-weight: 900; text-shadow: 2px 2px 0 rgba(0,0,0,0.1); }
.header p { font-size: 0.85rem; opacity: 0.9; font-weight: 600; margin-top: 2px; }

.main { max-width: 600px; margin: 0 auto; padding: 16px; }

.instruction {
    text-align: center;
    font-size: 1rem;
    font-weight: 700;
    padding: 10px;
    background: var(--accent-light);
    border-radius: 14px;
    margin-bottom: 14px;
    border: 2px solid var(--border);
}

/* Timeline */
.timeline {
    position: relative;
    padding: 10px 0 10px 50px;
    margin-bottom: 16px;
}
.timeline::before {
    content: '';
    position: absolute;
    left: 24px;
    top: 0;
    bottom: 0;
    width: 4px;
    background: var(--border);
    border-radius: 2px;
}

.timeline-slot {
    position: relative;
    margin-bottom: 14px;
    min-height: 70px;
    padding: 12px 14px;
    background: var(--card-bg);
    border: 3px dashed var(--border);
    border-radius: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: all 0.2s;
    cursor: pointer;
}
.timeline-slot::before {
    content: '';
    position: absolute;
    left: -32px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--border);
    border: 3px solid var(--bg);
    z-index: 2;
}
.timeline-slot.filled {
    border-style: solid;
    border-color: var(--accent);
    background: var(--accent-light);
}
.timeline-slot.filled::before { background: var(--accent); }
.timeline-slot.correct {
    border-color: var(--success);
    background: #dcfce7;
}
.timeline-slot.correct::before { background: var(--success); }

.slot-age {
    font-size: 0.68rem;
    font-weight: 800;
    color: var(--text-light);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    min-width: 60px;
}
.slot-icon { font-size: 2rem; }
.slot-name { font-size: 0.88rem; font-weight: 700; flex: 1; }
.slot-placeholder { font-size: 0.82rem; color: #ccc; font-weight: 600; font-style: italic; }

/* Event bank */
.event-bank {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 14px;
    margin-bottom: 14px;
}
.event-bank h3 {
    font-size: 0.78rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-light);
    margin-bottom: 8px;
}
.events-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
}
.event-card {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px;
    background: var(--accent-light);
    border: 3px solid var(--border);
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.25s;
    touch-action: manipulation;
}
.event-card:hover { transform: scale(1.04); border-color: var(--accent); }
.event-card.selected { border-color: var(--accent); background: white; box-shadow: var(--shadow); transform: scale(1.04); }
.event-card.used { opacity: 0.3; pointer-events: none; }
.event-card .e-icon { font-size: 1.6rem; flex-shrink: 0; }
.event-card .e-name { font-size: 0.78rem; font-weight: 700; }

.btn-row { display: flex; gap: 10px; margin-bottom: 14px; }
.action-btn {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 50px;
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: var(--shadow);
}
.action-btn:hover { transform: scale(1.03); }
.action-btn.check { background: linear-gradient(135deg, var(--accent), #f59e0b); color: white; }
.action-btn.clear { background: var(--card-bg); color: var(--text-light); border: 2px solid var(--border); }

.feedback {
    text-align: center;
    font-size: 1rem;
    font-weight: 800;
    padding: 12px;
    border-radius: var(--radius);
    display: none;
    animation: popIn 0.3s ease;
    margin-bottom: 12px;
}
.feedback.show { display: block; }
.feedback.win { background: #dcfce7; color: #166534; border: 2px solid var(--success); }
.feedback.try { background: #fef2f2; color: #991b1b; border: 2px solid #fca5a5; }

@keyframes popIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }

.celebration { position: fixed; inset: 0; pointer-events: none; z-index: 1000; }
.confetti { position: absolute; border-radius: 2px; animation: confettiFall linear forwards; }
@keyframes confettiFall { 0% { opacity:1; transform: translateY(0) rotate(0); } 100% { opacity:0; transform: translateY(100vh) rotate(720deg) scale(0.3); } }

@media (max-width: 420px) {
    .events-grid { grid-template-columns: 1fr; }
    .event-card .e-icon { font-size: 1.3rem; }
}
</style>
</head>
<body>

<div class="header">
    <h1>Family Timeline</h1>
    <p>Put life events in the right order!</p>
</div>

<div class="main">
    <div class="instruction" id="instruction">Tap an event, then tap a slot on the timeline to place it!</div>

    <div class="timeline" id="timeline"></div>

    <div class="event-bank">
        <h3>Life Events (tap to select)</h3>
        <div class="events-grid" id="eventsGrid"></div>
    </div>

    <div class="btn-row">
        <button class="action-btn clear" id="clearBtn">Clear</button>
        <button class="action-btn check" id="checkBtn">Check Order!</button>
    </div>

    <div class="feedback" id="feedback"></div>
</div>

<div class="celebration" id="celebration"></div>

<script>
const EVENTS = [
    { id: 'born', icon: '&#x1F476;', name: 'Baby is born', order: 0, age: 'Birth' },
    { id: 'walk', icon: '&#x1F6B6;', name: 'Learn to walk', order: 1, age: 'Age 1' },
    { id: 'nursery', icon: '&#x1F3E0;', name: 'Start nursery', order: 2, age: 'Age 3' },
    { id: 'school', icon: '&#x1F3EB;', name: 'Start school', order: 3, age: 'Age 4-5' },
    { id: 'bike', icon: '&#x1F6B2;', name: 'Learn to ride a bike', order: 4, age: 'Age 5-6' },
    { id: 'read', icon: '&#x1F4DA;', name: 'Read a book by yourself', order: 5, age: 'Age 6-7' }
];

let selectedEvent = null;
let slotContents = {};
let usedEvents = new Set();

const timeline = document.getElementById('timeline');
const eventsGrid = document.getElementById('eventsGrid');
const feedback = document.getElementById('feedback');

function renderTimeline() {
    timeline.innerHTML = '';
    EVENTS.forEach((_, i) => {
        const slot = document.createElement('div');
        slot.className = 'timeline-slot' + (slotContents[i] ? ' filled' : '');
        slot.dataset.idx = i;

        if (slotContents[i]) {
            const evt = EVENTS.find(e => e.id === slotContents[i]);
            slot.innerHTML = `<span class="slot-age">${EVENTS[i].age}</span><span class="slot-icon">${evt.icon}</span><span class="slot-name">${evt.name}</span>`;
        } else {
            slot.innerHTML = `<span class="slot-age">${EVENTS[i].age}</span><span class="slot-placeholder">Tap an event then tap here</span>`;
        }

        slot.addEventListener('click', () => placeEvent(i));
        timeline.appendChild(slot);
    });
}

function renderEvents() {
    eventsGrid.innerHTML = '';
    const shuffled = [...EVENTS].sort(() => Math.random() - 0.5);
    shuffled.forEach(evt => {
        const card = document.createElement('div');
        card.className = 'event-card';
        if (usedEvents.has(evt.id)) card.classList.add('used');
        if (selectedEvent === evt.id) card.classList.add('selected');
        card.innerHTML = `<span class="e-icon">${evt.icon}</span><span class="e-name">${evt.name}</span>`;
        card.addEventListener('click', () => {
            if (usedEvents.has(evt.id)) return;
            selectedEvent = evt.id;
            renderEvents();
        });
        eventsGrid.appendChild(card);
    });
}

function placeEvent(slotIdx) {
    if (!selectedEvent) return;

    // Remove event from previous slot if any
    Object.keys(slotContents).forEach(k => {
        if (slotContents[k] === selectedEvent) {
            delete slotContents[k];
        }
    });

    // Remove previous event from this slot
    if (slotContents[slotIdx]) {
        usedEvents.delete(slotContents[slotIdx]);
    }

    slotContents[slotIdx] = selectedEvent;
    usedEvents.add(selectedEvent);
    selectedEvent = null;
    feedback.className = 'feedback';

    renderTimeline();
    renderEvents();
}

document.getElementById('clearBtn').addEventListener('click', () => {
    slotContents = {};
    usedEvents = new Set();
    selectedEvent = null;
    feedback.className = 'feedback';
    renderTimeline();
    renderEvents();
});

document.getElementById('checkBtn').addEventListener('click', () => {
    if (Object.keys(slotContents).length < EVENTS.length) {
        feedback.className = 'feedback show try';
        feedback.textContent = 'Place all the events on the timeline first!';
        return;
    }

    let allCorrect = true;
    EVENTS.forEach((evt, i) => {
        const slot = timeline.children[i];
        if (slotContents[i] === evt.id) {
            slot.classList.add('correct');
        } else {
            allCorrect = false;
        }
    });

    if (allCorrect) {
        feedback.className = 'feedback show win';
        feedback.textContent = '&#x2B50; Perfect! You put all the events in the right order! &#x2B50;';
        celebrate();
    } else {
        feedback.className = 'feedback show try';
        feedback.textContent = '&#x1F914; Not quite right. Green ones are correct. Try swapping the others!';
    }
});

function celebrate() {
    const container = document.getElementById('celebration');
    const colours = ['#b45309','#d97706','#f59e0b','#22c55e','#ec4899','#3b82f6'];
    for (let i = 0; i < 30; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.style.cssText = `left:${Math.random()*100}vw;top:-12px;background:${colours[Math.floor(Math.random()*colours.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*0.5}s;`;
        container.appendChild(el);
        setTimeout(() => el.remove(), 4000);
    }
}

renderTimeline();
renderEvents();
</script>
</body>
</html>
