<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rites of Passage</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#faf5ff;--card:#fff;--text:#3b0764;--text2:#7c3aed;--accent:#7c3aed;--accent-bg:#f5f3ff;--border:#ddd6fe;--shadow:0 4px 16px rgba(60,7,100,.08);--radius:14px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
.header{background:linear-gradient(135deg,#7c3aed,#a78bfa);color:#fff;padding:16px 20px;text-align:center}
.header h1{font-size:1.4rem;font-weight:900}
.header p{font-size:.8rem;opacity:.9;font-weight:600;margin-top:2px}
.main{max-width:800px;margin:0 auto;padding:16px}

.rite-tabs{display:flex;gap:0;margin-bottom:14px;border-radius:10px;overflow:hidden;border:2px solid var(--border)}
.rite-tab{flex:1;padding:10px 6px;border:none;background:var(--card);font-family:'Inter',sans-serif;font-size:.7rem;font-weight:700;cursor:pointer;color:var(--text2);transition:all .2s;text-align:center}
.rite-tab.active{background:var(--accent);color:#fff}

.religion-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.rel-tab{padding:6px 14px;border:1.5px solid var(--border);border-radius:6px;background:var(--card);font-family:'Inter',sans-serif;font-size:.72rem;font-weight:600;cursor:pointer;color:var(--text2);transition:all .2s}
.rel-tab:hover{border-color:var(--accent)}
.rel-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}

.rite-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:14px;box-shadow:var(--shadow);animation:fadeIn .3s ease}
.rite-banner{padding:14px 16px;color:#fff;display:flex;align-items:center;gap:10px}
.rite-banner .r-icon{font-size:1.8rem}
.rite-banner h2{font-size:1rem;font-weight:800}
.rite-banner .r-rite{font-size:.72rem;opacity:.85}
.rite-body{padding:16px}
.rite-body p{font-size:.85rem;color:var(--text2);line-height:1.6;margin-bottom:10px}
.rite-body .feature-list{list-style:none;margin-bottom:10px}
.rite-body .feature-list li{padding:6px 0;border-bottom:1px solid #f1f5f9;font-size:.82rem;display:flex;gap:8px;align-items:flex-start}
.rite-body .feature-list li .f-icon{font-size:1rem;flex-shrink:0}
.compare-note{padding:10px;background:var(--accent-bg);border-radius:10px;font-size:.82rem;border-left:3px solid var(--accent)}
.compare-note strong{color:var(--accent)}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:500px){.rite-tabs{flex-wrap:wrap}.rite-tab{flex:none;width:calc(50% - 1px)}}
</style>
</head>
<body>
<div class="header"><h1>Rites of Passage</h1><p>Compare ceremonies across world religions!</p></div>
<div class="main">
<div class="rite-tabs" id="riteTabs">
<button class="rite-tab active" data-rite="birth">&#x1F476; Birth</button>
<button class="rite-tab" data-rite="coming">&#x1F31F; Coming of Age</button>
<button class="rite-tab" data-rite="marriage">&#x1F48D; Marriage</button>
<button class="rite-tab" data-rite="death">&#x1F56F;&#xFE0F; Death</button>
</div>
<div class="religion-tabs" id="relTabs"></div>
<div id="display"></div>
</div>
<script>
const DATA={
birth:{
Christianity:{icon:'&#x271D;&#xFE0F;',colour:'#7c3aed',name:'Baptism / Christening',
desc:'A baby is welcomed into the Christian community through baptism. Water is poured on the baby\'s head by a priest or minister as a sign of being cleansed and beginning a new life with God.',
features:[{icon:'&#x1F4A7;',text:'Water is poured or sprinkled on the baby\'s head'},{icon:'&#x271D;&#xFE0F;',text:'The sign of the cross is made on the baby\'s forehead'},{icon:'&#x1F56F;&#xFE0F;',text:'A candle is lit to represent the light of Christ'},{icon:'&#x1F46A;',text:'Godparents make promises to help raise the child in faith'}],
compare:'In some Christian traditions (like Baptists), baptism happens when a person is old enough to choose for themselves, by being fully immersed in water.'},
Islam:{icon:'&#x1F319;',colour:'#059669',name:'Aqiqah',
desc:'When a Muslim baby is born, the father whispers the Adhan (call to prayer) in the baby\'s ear. On the seventh day, an Aqiqah ceremony is held.',
features:[{icon:'&#x1F442;',text:'The Adhan is whispered in the baby\'s right ear at birth'},{icon:'&#x2702;&#xFE0F;',text:'The baby\'s head is shaved and the weight of hair is given to charity in silver'},{icon:'&#x1F356;',text:'An animal is sacrificed and the meat is shared with family, friends and the poor'},{icon:'&#x1F4DB;',text:'The baby is given a meaningful name, often from the Quran'}],
compare:'The Aqiqah celebrates God\'s gift of new life. Sharing meat with the poor reflects the Islamic value of caring for those in need.'},
Judaism:{icon:'&#x2721;&#xFE0F;',colour:'#2563eb',name:'Brit Milah / Baby Naming',
desc:'Jewish boys are circumcised on the eighth day after birth in a ceremony called Brit Milah. Baby girls have a naming ceremony at the synagogue.',
features:[{icon:'&#x1F4C5;',text:'Brit Milah takes place on the eighth day after birth'},{icon:'&#x1F4DB;',text:'The baby is given their Hebrew name'},{icon:'&#x1F64F;',text:'Prayers and blessings are said by the rabbi'},{icon:'&#x1F37D;&#xFE0F;',text:'A celebratory meal follows the ceremony'}],
compare:'The ceremony marks the baby\'s entry into the covenant (agreement) between God and the Jewish people, which began with Abraham.'},
Hinduism:{icon:'&#x1F549;&#xFE0F;',colour:'#f59e0b',name:'Jatakarma / Namakarana',
desc:'Hindu babies go through several ceremonies called Samskaras. The Jatakarma happens at birth and the Namakarana (naming ceremony) happens on the twelfth day.',
features:[{icon:'&#x1F36F;',text:'Honey and ghee may be placed on the baby\'s tongue at Jatakarma'},{icon:'&#x1F4DB;',text:'The baby is given a name based on their horoscope at Namakarana'},{icon:'&#x1F64F;',text:'Prayers are offered to God for the baby\'s health and happiness'},{icon:'&#x1FA94;',text:'A lamp is lit during the ceremony'}],
compare:'Hindu ceremonies mark different stages of life (samskaras). There are 16 traditional samskaras from before birth to after death.'}
},
coming:{
Christianity:{icon:'&#x271D;&#xFE0F;',colour:'#7c3aed',name:'Confirmation',
desc:'Confirmation is when a young person confirms the promises made at their baptism and becomes a full member of the Church. A bishop lays hands on them.',
features:[{icon:'&#x270B;',text:'The bishop lays hands on the young person\'s head'},{icon:'&#x1F54A;&#xFE0F;',text:'The Holy Spirit is believed to strengthen them'},{icon:'&#x1F4AC;',text:'The young person publicly confirms their faith'},{icon:'&#x1F37D;&#xFE0F;',text:'They can now take Holy Communion'}],
compare:'Confirmation usually happens between ages 11 and 16. It is a personal commitment to follow Christianity.'},
Judaism:{icon:'&#x2721;&#xFE0F;',colour:'#2563eb',name:'Bar/Bat Mitzvah',
desc:'At age 13 (boys) or 12 (girls), Jewish young people become Bar or Bat Mitzvah, meaning "son/daughter of the commandments." They are now responsible for following Jewish law.',
features:[{icon:'&#x1F4DC;',text:'The young person reads from the Torah in Hebrew for the first time'},{icon:'&#x1F54D;',text:'The ceremony takes place in the synagogue on Shabbat'},{icon:'&#x1F389;',text:'A big celebration party follows with family and friends'},{icon:'&#x1F381;',text:'Gifts are given to mark this important milestone'}],
compare:'Bar/Bat Mitzvah is one of the most important events in a Jewish person\'s life. After this, they can be counted in a minyan (group of 10 for prayer).'}
},
marriage:{
Christianity:{icon:'&#x271D;&#xFE0F;',colour:'#7c3aed',name:'Christian Wedding',
desc:'A Christian wedding takes place in a church. The couple make vows (promises) to love and care for each other. Rings are exchanged as a sign of their commitment.',
features:[{icon:'&#x1F48D;',text:'Rings are exchanged as a sign of eternal love'},{icon:'&#x1F4AC;',text:'Vows are made: "to have and to hold, in sickness and in health"'},{icon:'&#x1F4D6;',text:'Readings from the Bible about love'},{icon:'&#x1F64F;',text:'Prayers asking God to bless the marriage'}],
compare:'The ring is a circle with no end, symbolising love that lasts forever.'},
Islam:{icon:'&#x1F319;',colour:'#059669',name:'Nikah',
desc:'A Muslim wedding ceremony is called a Nikah. It is a contract between the couple, often held at a mosque. The bride receives a gift called Mahr from the groom.',
features:[{icon:'&#x1F4DC;',text:'A marriage contract is signed by both parties'},{icon:'&#x1F4B0;',text:'The groom gives the bride a gift (Mahr)'},{icon:'&#x1F64F;',text:'Prayers and readings from the Quran'},{icon:'&#x1F37D;&#xFE0F;',text:'A Walima (wedding feast) celebrates the marriage'}],
compare:'In Islam, marriage is both a spiritual bond and a legal contract. The Mahr is a gift that belongs to the bride alone.'}
},
death:{
Christianity:{icon:'&#x271D;&#xFE0F;',colour:'#7c3aed',name:'Christian Funeral',
desc:'Christians believe in life after death. At a funeral, prayers are said for the person who has died, and mourners remember their life with love.',
features:[{icon:'&#x1F4D6;',text:'Bible readings about eternal life and heaven'},{icon:'&#x1F3B5;',text:'Hymns are sung to give comfort'},{icon:'&#x1F64F;',text:'Prayers asking God to receive the person\'s soul'},{icon:'&#x1F33A;',text:'Flowers are placed on the coffin'}],
compare:'Christians believe that death is not the end. The funeral celebrates the person\'s life and their journey to be with God.'},
Hinduism:{icon:'&#x1F549;&#xFE0F;',colour:'#f59e0b',name:'Hindu Cremation',
desc:'Hindus believe in reincarnation (being reborn). The body is cremated (burned) to release the soul so it can be reborn into a new life.',
features:[{icon:'&#x1F525;',text:'The body is cremated, usually by the eldest son lighting the funeral pyre'},{icon:'&#x1F4A7;',text:'Ashes are scattered in a holy river like the Ganges'},{icon:'&#x1F64F;',text:'Prayers and mantras from holy texts are chanted'},{icon:'&#x1F56F;&#xFE0F;',text:'A period of mourning lasts for 13 days'}],
compare:'Hindus believe the soul (atman) is eternal and moves through many lives. How you live affects your next life (karma).'}
}
};

let currentRite='birth',currentRel=null;

document.querySelectorAll('.rite-tab').forEach(t=>t.addEventListener('click',()=>{
currentRite=t.dataset.rite;document.querySelectorAll('.rite-tab').forEach(b=>b.classList.remove('active'));t.classList.add('active');
currentRel=null;render();
}));

function render(){
const rites=DATA[currentRite];
const rels=Object.keys(rites);
const relTabs=document.getElementById('relTabs');
relTabs.innerHTML='';
rels.forEach(r=>{
const btn=document.createElement('button');btn.className='rel-tab'+(r===currentRel?' active':'');btn.textContent=r;
btn.addEventListener('click',()=>{currentRel=r;render();});
relTabs.appendChild(btn);
});
if(!currentRel)currentRel=rels[0];

const d=rites[currentRel];
if(!d){document.getElementById('display').innerHTML='<p style="text-align:center;color:var(--text2);padding:20px;">Select a religion above.</p>';return;}

document.getElementById('display').innerHTML=`
<div class="rite-card">
<div class="rite-banner" style="background:linear-gradient(135deg,${d.colour},${d.colour}cc)">
<span class="r-icon">${d.icon}</span><div><h2>${d.name}</h2><div class="r-rite">${currentRel}</div></div>
</div>
<div class="rite-body">
<p>${d.desc}</p>
<ul class="feature-list">${d.features.map(f=>`<li><span class="f-icon">${f.icon}</span>${f.text}</li>`).join('')}</ul>
<div class="compare-note"><strong>Key point:</strong> ${d.compare}</div>
</div>
</div>`;

// Re-highlight active rel tab
relTabs.querySelectorAll('.rel-tab').forEach(t=>t.classList.toggle('active',t.textContent===currentRel));
}

render();
</script>
</body>
</html>
