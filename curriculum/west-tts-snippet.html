<!-- WEST-TTS v1 : shared voice selection. Prefers Google UK English (female) / matching
     Google voice per language (free network neural), falls back to best local voice offline. -->
<script>
window.westTTS = (function () {
  var synth = window.speechSynthesis, voices = [];
  function load() { if (synth) voices = synth.getVoices() || []; }
  if (synth) { load(); try { synth.addEventListener('voiceschanged', load); } catch (e) {} }
  function score(v, lang) {
    var base = lang.slice(0, 2).toLowerCase(), s = 0, n = (v.name || '').toLowerCase();
    if ((v.lang || '').toLowerCase() === lang.toLowerCase()) s += 25;
    else if ((v.lang || '').toLowerCase().slice(0, 2) === base) s += 12;
    if (n.indexOf('google') >= 0) s += 40;           // chosen preference: Google neural
    if (v.localService === false) s += 18;           // network neural quality
    if (base === 'en' && n.indexOf('uk english female') >= 0) s += 30;
    if (base === 'en' && (v.lang || '').toLowerCase() === 'en-gb') s += 8;
    if (/natural|neural|enhanced|premium|siri/.test(n)) s += 8;
    return s;
  }
  function pick(lang) {
    lang = lang || 'en-GB';
    var base = lang.slice(0, 2).toLowerCase();
    var pool = voices.filter(function (v) { return (v.lang || '').toLowerCase().slice(0, 2) === base; });
    if (!pool.length) pool = voices.slice();
    pool.sort(function (a, b) { return score(b, lang) - score(a, lang); });
    return pool[0] || null;
  }
  function speak(text, opts) {
    if (!synth || !text) return null;
    opts = opts || {};
    synth.cancel();
    var u = new SpeechSynthesisUtterance(text);
    u.lang = opts.lang || 'en-GB';
    var v = pick(u.lang); if (v) u.voice = v;
    u.rate = opts.rate != null ? opts.rate : 0.9;
    u.pitch = opts.pitch != null ? opts.pitch : 1.1;
    synth.speak(u);
    return u;
  }
  return { speak: speak, pick: pick, cancel: function () { if (synth) synth.cancel(); }, ready: function () { return !!synth; } };
})();
</script>
